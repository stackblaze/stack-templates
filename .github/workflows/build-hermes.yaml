name: Build Hermes image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/hermes/Dockerfile'
      - 'services/hermes/docker-entrypoint.sh'
      - '.github/workflows/build-hermes.yaml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/hermes
          file: services/hermes/Dockerfile
          push: true
          tags: |
            ghcr.io/stackblaze/stack-templates/hermes:v0.5.0
            ghcr.io/stackblaze/stack-templates/hermes:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

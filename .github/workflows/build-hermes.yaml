name: Build Hermes image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/hermes/**'
      - '.github/workflows/build-hermes.yaml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Hermes from upstream
        env:
          HERMES_REF: main
          SKIP_YARN_COREPACK_CHECK: true
          YARN_IGNORE_NODE: 1
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${HERMES_REF}" https://github.com/hashicorp-forge/hermes.git /tmp/hermes
          cd /tmp/hermes
          make web/set-yarn-version
          # main embeds hermes-plugin/dist; build/linux runs web + plugin builds first.
          make build/linux
          mkdir -p "${GITHUB_WORKSPACE}/services/hermes/_image"
          cp hermes "${GITHUB_WORKSPACE}/services/hermes/_image/hermes"
          cp -r configs "${GITHUB_WORKSPACE}/services/hermes/_image/configs"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: services/hermes
          file: services/hermes/Dockerfile.runtime
          push: true
          tags: |
            ghcr.io/stackblaze/stack-templates/hermes:main
            ghcr.io/stackblaze/stack-templates/hermes:latest

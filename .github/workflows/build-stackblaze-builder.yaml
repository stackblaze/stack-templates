name: Build Stackblaze Builder image

on:
  workflow_dispatch:
  push:
    branches: [main, ci/build-stackblaze-builder]
    paths:
      - 'services/stackblaze-builder/**'
      - '.github/workflows/build-stackblaze-builder.yaml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, kubero]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push workspace image
        uses: docker/build-push-action@v6
        with:
          context: services/stackblaze-builder
          file: services/stackblaze-builder/Dockerfile
          push: true
          tags: |
            ghcr.io/stackblaze/stackblaze-builder:latest
            ghcr.io/stackblaze/stackblaze-builder:${{ github.sha }}

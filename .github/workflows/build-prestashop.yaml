name: Build PrestaShop Kubero image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/prestashop/**'
      - '.github/workflows/build-prestashop.yaml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/prestashop
          push: true
          tags: ghcr.io/stackblaze/stack-templates/prestashop:8-apache

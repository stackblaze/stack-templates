name: Mirror upstream dependencies to ghcr.io/stackblaze

# Mirrors small upstream images that templates / tenant bootstrap
# need into ghcr.io under this repo. Because this repo is public,
# packages created here can be flipped to public visibility with a
# single click on the package's settings page — anonymous pulls
# then work everywhere kubero-managed clusters need them.
#
# Uses `docker buildx imagetools create` so the mirror is a no-pull
# manifest copy — fast, multi-arch, and faithful to the upstream
# digest the tag points at.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the actual push (verifies the source manifest only)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each entry mirrors `source` to
        # `ghcr.io/stackblaze/stack-templates/<dest_name>:<dest_tag>`.
        # The dest_tag MUST match upstream so a registry-only swap
        # in vendored manifests works 1:1 without renaming tags.
        include:
          # busybox — used as the local-path-provisioner helper-pod
          # image on every tenant. Tiny, runs `mkdir` once per PVC
          # create, terminates. The previous mirror at
          # ghcr.io/stackblaze/busybox was private (anonymous pulls
          # 403'd), which left every PVC stuck in Pending. Hosting
          # under this public repo's package namespace makes the
          # visibility flip trivial.
          - source: docker.io/library/busybox:1.36
            dest_tag: '1.36'
            dest_name: busybox
          # odoo — official Docker Hub image hits anonymous pull rate
          # limits during parallel QA batches; mirror keeps template smoke
          # tests reliable (same pattern as neko-rooms GHCR swap).
          - source: docker.io/library/odoo:18.0
            dest_tag: '18.0'
            dest_name: odoo

          # nopCommerce — official image is Docker Hub only; parallel QA
          # batches hit the anonymous pull rate limit (429). Mirror here
          # so templates can swap registry without changing tags.
          - source: docker.io/nopcommerceteam/nopcommerce:4.90.4
            dest_tag: '4.90.4'
            dest_name: nopcommerce

          # OpnForm API — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/jhumanj/opnform-api:1.13.2
            dest_tag: '1.13.2'
            dest_name: opnform-api

          # ownCloud — official Docker Hub image hits anonymous pull rate
          # limits during parallel QA batches.
          - source: docker.io/owncloud/server:10.16.3
            dest_tag: '10.16.3'
            dest_name: owncloud-server

          # Passit — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/passit/passit:stable
            dest_tag: 'stable'
            dest_name: passit

          # Papermerge — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/papermerge/papermerge:3.5.3
            dest_tag: '3.5.3'
            dest_name: papermerge

          # PeerTube — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/chocobozzz/peertube:production-bullseye
            dest_tag: 'production-bullseye'
            dest_name: peertube

          # Photon — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/rtuszik/photon-docker:latest
            dest_tag: 'latest'
            dest_name: photon-docker

          # Penpot frontend — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/penpotapp/frontend:2.16
            dest_tag: '2.16'
            dest_name: penpot-frontend

          # PicoShare — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/mtlynch/picoshare:latest
            dest_tag: 'latest'
            dest_name: picoshare

          # phpBB — Bitnami image removed; makunz/phpbb on Docker Hub hits 429 in QA.
          - source: docker.io/makunz/phpbb:3.3.15
            dest_tag: '3.3.15'
            dest_name: phpbb

          # Pydio Cells — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/pydio/cells:latest
            dest_tag: 'latest'
            dest_name: pydio

          # SeaweedFS — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/chrislusf/seaweedfs:latest
            dest_tag: 'latest'
            dest_name: seaweedfs

          # Snipe-IT — official Docker Hub image hits 429 rate limit in QA.
          - source: docker.io/snipe/snipe-it:v8.6.2
            dest_tag: 'v8.6.2'
            dest_name: snipe-it

          # SuiteCRM — Bitnami legacy image hits 429 rate limit in QA.
          - source: docker.io/bitnamilegacy/suitecrm:8
            dest_tag: '8'
            dest_name: suitecrm

          # Taiga backend — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/taigaio/taiga-back:latest
            dest_tag: 'latest'
            dest_name: taiga-back

          # Tracardi API — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/tracardi/tracardi-api:1.1.6
            dest_tag: '1.1.6'
            dest_name: tracardi-api

          # Total.js Flow — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/totalplatform/flow:latest
            dest_tag: 'latest'
            dest_name: totaljs-flow

          # UniBee API — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/unibee/api:v1.9.0
            dest_tag: 'v1.9.0'
            dest_name: unibee-api

          # Temporal auto-setup — Docker Hub hits 429 rate limit in parallel QA.
          - source: docker.io/temporalio/auto-setup:1.29
            dest_tag: '1.29'
            dest_name: temporal-auto-setup

          # Saltcorn — Docker Hub only; parallel QA hits 429 rate limit.
          - source: docker.io/saltcorn/saltcorn:latest
            dest_tag: 'latest'
            dest_name: saltcorn

          # ClickHouse server — Docker Hub only; posthog/dittofeed addons hit 429 in QA.
          - source: docker.io/clickhouse/clickhouse-server:24.8.7.41
            dest_tag: '24.8.7.41'
            dest_name: clickhouse-server

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror ${{ matrix.source }}
        env:
          SRC: ${{ matrix.source }}
          DEST: ghcr.io/stackblaze/stack-templates/${{ matrix.dest_name }}:${{ matrix.dest_tag }}
          DRY: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          echo "::group::source manifest"
          docker buildx imagetools inspect "$SRC"
          echo "::endgroup::"
          if [[ "$DRY" == "true" ]]; then
            echo "::notice::dry_run=true, skipping push to $DEST"
            exit 0
          fi
          docker buildx imagetools create -t "$DEST" "$SRC"
          echo "::notice::mirrored $SRC -> $DEST"
          docker buildx imagetools inspect "$DEST"

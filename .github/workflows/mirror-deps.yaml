name: Mirror upstream dependencies to ghcr.io/stackblaze

# Mirrors small upstream images that templates / tenant bootstrap
# need into ghcr.io under this repo. Because this repo is public,
# packages created here can be flipped to public visibility with a
# single click on the package's settings page — anonymous pulls
# then work everywhere kubero-managed clusters need them.
#
# Uses `docker buildx imagetools create` so the mirror is a no-pull
# manifest copy — fast, multi-arch, and faithful to the upstream
# digest the tag points at.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the actual push (verifies the source manifest only)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each entry mirrors `source` to
        # `ghcr.io/stackblaze/stack-templates/<dest_name>:<dest_tag>`.
        # The dest_tag MUST match upstream so a registry-only swap
        # in vendored manifests works 1:1 without renaming tags.
        include:
          # busybox — used as the local-path-provisioner helper-pod
          # image on every tenant. Tiny, runs `mkdir` once per PVC
          # create, terminates. The previous mirror at
          # ghcr.io/stackblaze/busybox was private (anonymous pulls
          # 403'd), which left every PVC stuck in Pending. Hosting
          # under this public repo's package namespace makes the
          # visibility flip trivial.
          - source: docker.io/library/busybox:1.36
            dest_tag: '1.36'
            dest_name: busybox

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror ${{ matrix.source }}
        env:
          SRC: ${{ matrix.source }}
          DEST: ghcr.io/stackblaze/stack-templates/${{ matrix.dest_name }}:${{ matrix.dest_tag }}
          DRY: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          echo "::group::source manifest"
          docker buildx imagetools inspect "$SRC"
          echo "::endgroup::"
          if [[ "$DRY" == "true" ]]; then
            echo "::notice::dry_run=true, skipping push to $DEST"
            exit 0
          fi
          docker buildx imagetools create -t "$DEST" "$SRC"
          echo "::notice::mirrored $SRC -> $DEST"
          docker buildx imagetools inspect "$DEST"

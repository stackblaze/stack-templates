apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Gotify is a simple server for sending and receiving
      messages (in real time per WebSocket)
    kubero.dev/template.icon: https://raw.githubusercontent.com/gotify/logo/master/gotify-logo.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://github.com/gotify/server/raw/master/ui.png"]'
    kubero.dev/template.source: https://github.com/gotify/server
    kubero.dev/template.categories: '["communication", "accessories"]'
    kubero.dev/template.title: Gotify
    kubero.dev/template.website: https://gotify-net
  name: gotify
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: gotify-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: gotify
              owner: gotify
              secret:
                name: gotify-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO gotify
              - GRANT CREATE ON SCHEMA public TO gotify
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO gotify
          enableSuperuserAccess: true
          superuserSecret:
            name: gotify-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: gotify-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: gotify
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: gotify-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: gotify
          password: gotify
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: GOTIFY_DEFAULTUSER_NAME
    value: admin
  - name: GOTIFY_DEFAULTUSER_PASS
    value: admin
  - name: GOTIFY_SERVER_PORT
    value: '8080'
  - name: GOTIFY_REGISTRATION
    value: 'false'
  - name: GOTIFY_DATABASE_DIALECT
    value: postgres
  - name: GOTIFY_DATABASE_HOST
    value: gotify-postgresql-rw
  - name: GOTIFY_DATABASE_PORT
    value: '5432'
  - name: GOTIFY_DATABASE_USER
    value: gotify
  - name: GOTIFY_DATABASE_PASSWORD
    value: gotify
  - name: GOTIFY_DATABASE_NAME
    value: gotify
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /app/data
    name: gotify-volume
    size: 1Gi
    storageClass: shared
  image:
    containerPort: '8080'
    repository: gotify/server
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: gotify
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Ecommerce platform with essential commerce features
      Built with React, modular and fully customizable
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/83757778?s=200&v=4
    kubero.dev/template.installation: Set ADMIN_PASSWORD before first boot. Demo catalog
      is seeded automatically on first start.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/evershopcommerce/evershop/dev/.github/images/banner.png"]'
    kubero.dev/template.source: https://github.com/evershopcommerce/evershop
    kubero.dev/template.categories: '["e-commerce"]'
    kubero.dev/template.title: Evershop
    kubero.dev/template.website: https://evershop.io/
  labels:
    manager: kubero
  name: evershop
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-db'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: evershop
              owner: evershop
              secret:
                name: '{{KUBERO_APP_NAME}}-db-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO evershop
              - GRANT CREATE ON SCHEMA public TO evershop
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO evershop
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-db-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: postgres
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: evershop
          password: postgres
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-db-rw'
  - name: DB_PORT
    value: '5432'
  - name: DB_NAME
    value: evershop
  - name: DB_USER
    value: evershop
  - name: DB_PASSWORD
    value: postgres
  - name: DB_SSLMODE
    value: disable
  - name: ADMIN_EMAIL
    value: admin@evershop.local
  - name: ADMIN_PASSWORD
    value: Evershop1!
  - name: ADMIN_NAME
    value: Admin
  - name: SUPPRESS_NO_CONFIG_WARNING
    value: 'true'
  - name: NODE_CONFIG
    value: '{"shop":{"homeUrl":"https://{{KUBERO_APP_HOST}}"}}'
  extraVolumes: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /api/graphql
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/evershop/evershop
    tag: latest
    command:
    - sh
    - -c
    - "for i in $(seq 1 60); do\n  node -e \"const {Pool}=require('pg'); const p=new\
      \ Pool({host:process.env.DB_HOST,port:process.env.DB_PORT,user:process.env.DB_USER,password:process.env.DB_PASSWORD,database:process.env.DB_NAME});\
      \ p.query('SELECT 1').then(()=>process.exit(0)).catch(()=>process.exit(1))\"\
      \ && break\n  sleep 5\ndone\nnpm run start &\nfor i in $(seq 1 120); do\n  wget\
      \ -q -O /dev/null http://127.0.0.1:3000/api/graphql && break\n  sleep 5\ndone\n\
      npm run user:create -- --email \"$ADMIN_EMAIL\" --password \"$ADMIN_PASSWORD\"\
      \ --name \"$ADMIN_NAME\" || true\nnpm run seed -- --all || true\nwait\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: evershop

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Ecommerce platform with essential commerce features
      Built with React, modular and fully customizable
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/83757778?s=200&v=4
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/evershopcommerce/evershop/dev/.github/images/banner.png"]'
    kubero.dev/template.source: https://github.com/evershopcommerce/evershop
    kubero.dev/template.categories: '["e-commerce"]'
    kubero.dev/template.title: Evershop
    kubero.dev/template.website: https://evershop.io/
  labels:
    manager: kubero
  name: evershop
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: evershop-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgresql
              owner: evershop
              secret:
                name: evershop-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: evershop-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: evershop-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: postgres
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: evershop-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: evershop
          password: postgres
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DB_HOST
    value: evershop-postgresql-rw
  - name: DB_PORT
    value: '5432'
  - name: DB_NAME
    value: postgresql
  - name: DB_USER
    value: evershop
  - name: DB_PASSWORD
    value: postgres
  extraVolumes: []
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: evershop/evershop
    tag: latest
  name: evershop
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

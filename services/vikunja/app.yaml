apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: vikunja
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: "The open-source to-do app \u2014 organize tasks,\
      \ projects, and teams on all platforms."
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/vikunja/icon.png
    kubero.dev/template.installation: Set VIKUNJA_SERVICE_PUBLICURL and rotate VIKUNJA_SERVICE_JWTSECRET
      before production use.
    kubero.dev/template.links: '["https://vikunja.io/docs/"]'
    kubero.dev/template.screenshots: '["https://vikunja.io/images/screenshot.png"]'
    kubero.dev/template.source: https://github.com/go-vikunja/vikunja
    kubero.dev/template.categories: '["productivity", "work", "utilities"]'
    kubero.dev/template.title: Vikunja
    kubero.dev/template.website: https://vikunja.io/
  labels:
    manager: kubero
spec:
  name: vikunja
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: vikunja
              owner: vikunja
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: vikunja
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: vikunja
          password: vikunja
  envVars:
  - name: VIKUNJA_SERVICE_PUBLICURL
    value: '{{KUBERO_APP_URL}}'
  - name: VIKUNJA_SERVICE_JWTSECRET
    value: replace-with-openssl-rand-hex-32
  - name: VIKUNJA_SERVICE_ENABLEREGISTRATION
    value: 'true'
  - name: VIKUNJA_DATABASE_TYPE
    value: postgres
  - name: VIKUNJA_DATABASE_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: VIKUNJA_DATABASE_USER
    value: vikunja
  - name: VIKUNJA_DATABASE_PASSWORD
    value: vikunja
  - name: VIKUNJA_DATABASE_DATABASE
    value: vikunja
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /app/vikunja/files
    name: '{{KUBERO_APP_NAME}}-files'
    size: 2Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '3456'
    pullPolicy: Always
    repository: vikunja/vikunja
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

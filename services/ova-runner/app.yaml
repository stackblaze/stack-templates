apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: ova-runner
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: OVA-Runner is a self-hosted CI/CD job runner that executes workloads inside isolated
      OVA/VM environments.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/1120322?s=200&v=4
    kubero.dev/template.installation: Configure RUNNER_TOKEN and COORDINATOR_URL before deploying. Ensure the pod has access
      to the Docker socket or a remote Docker daemon for job execution.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/nicholasgasior/ova-runner
    kubero.dev/template.categories: '["development", "utilities", "automation"]'
    kubero.dev/template.title: OVA-Runner
    kubero.dev/template.website: https://github.com/nicholasgasior/ova-runner
  labels:
    manager: kubero
spec:
  name: ova-runner
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: RUNNER_TOKEN
    value: replace-with-runner-token
  - name: COORDINATOR_URL
    value: '{{KUBERO_APP_URL}}'
  - name: RUNNER_NAME
    value: ova-runner-01
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: ova-runner-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: nicholasgasior/ova-runner
    tag: latest

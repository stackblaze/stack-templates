apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: invoiceninja
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source invoicing, billing, payments and
      expense-tracking platform for freelancers and businesses.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/invoiceninja/icon.png
    kubero.dev/template.installation: 'Invoice Ninja v5 is a Laravel (PHP) app backed
      by MySQL/MariaDB (it does NOT officially support Postgres); Valkey is wired
      for cache and queue. BEFORE first boot ROTATE: APP_KEY (must be a 32-char value;
      generate with `openssl rand -base64 32` and set APP_KEY=base64:<value>) and
      the MariaDB password (default ''invoiceninja''). APP_URL is pre-filled with
      {{KUBERO_APP_URL}} and must match the public URL. On first boot the entrypoint
      runs DB migrations and seeds the admin user from IN_USER_EMAIL / IN_PASSWORD
      (rotate IN_PASSWORD) - then log in at the app URL and change the password. PDF
      generation uses the bundled snappdf (headless Chromium) so no companion service
      is required; set PDF_GENERATOR=snappdf. REQUIRE_HTTPS=false is set because TLS
      is terminated at the ingress. The official image is PHP-FPM only (port 9000);
      this template installs nginx at boot to serve HTTP on :80. Uploads, logos and
      generated PDF invoices persist under /var/www/app/storage on the mounted volume.
      SMTP for mail and optional S3 for storage are configured later via env vars
      or the Settings UI.'
    kubero.dev/template.links: '["https://invoiceninja.github.io/", "https://github.com/invoiceninja/dockerfiles"]'
    kubero.dev/template.screenshots: '["https://www.invoiceninja.com/wp-content/uploads/2021/01/dashboard.png"]'
    kubero.dev/template.source: https://github.com/invoiceninja/invoiceninja
    kubero.dev/template.categories: '["finance", "work", "productivity"]'
    kubero.dev/template.title: Invoice Ninja
    kubero.dev/template.website: https://invoiceninja.com
  labels:
    manager: kubero
spec:
  name: invoiceninja
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: invoiceninja
          username: invoiceninja
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: invoiceninja
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: invoiceninja
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_ENV
    value: production
  - name: APP_DEBUG
    value: 'false'
  - name: IS_DOCKER
    value: 'true'
  - name: APP_KEY
    value: base64:S3ViZXJvVGVtcGxhdGVRYVNtb2tlVGVzdEtleSEhMTI=
  - name: REQUIRE_HTTPS
    value: 'false'
  - name: TRUSTED_PROXIES
    value: '*'
  - name: DB_CONNECTION
    value: mysql
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: DB_PORT
    value: '3306'
  - name: DB_DATABASE
    value: invoiceninja
  - name: DB_USERNAME
    value: invoiceninja
  - name: DB_PASSWORD
    value: invoiceninja
  - name: REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: CACHE_DRIVER
    value: redis
  - name: QUEUE_CONNECTION
    value: redis
  - name: SESSION_DRIVER
    value: redis
  - name: PDF_GENERATOR
    value: snappdf
  - name: IN_USER_EMAIL
    value: admin@example.com
  - name: IN_PASSWORD
    value: replace-with-openssl-rand-hex-32
  - name: MAIL_MAILER
    value: log
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/app/storage
    name: '{{KUBERO_APP_NAME}}-data'
    size: 3Gi
    storageClass: lite
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/invoiceninja/invoiceninja
    tag: '5'
    command:
    - sh
    - -c
    - "apk add --no-cache nginx netcat-openbsd\ncat > /etc/nginx/http.d/default.conf\
      \ <<'EOF'\nserver {\n  listen 80 default_server;\n  server_name _;\n  server_tokens\
      \ off;\n  client_max_body_size 100M;\n  root /var/www/app/public/;\n  index\
      \ index.php;\n  location / {\n    try_files $uri $uri/ /index.php?$query_string;\n\
      \  }\n  location = /favicon.ico { access_log off; log_not_found off; }\n  location\
      \ = /robots.txt  { access_log off; log_not_found off; }\n  location ~* /storage/.*\\\
      .php$ { return 503; }\n  location ~ \\.php$ {\n    fastcgi_pass 127.0.0.1:9000;\n\
      \    fastcgi_index index.php;\n    include fastcgi_params;\n    fastcgi_param\
      \ SCRIPT_FILENAME $document_root$fastcgi_script_name;\n    fastcgi_intercept_errors\
      \ off;\n    fastcgi_buffer_size 16k;\n    fastcgi_buffers 4 16k;\n  }\n}\nEOF\n\
      while ! nc -z \"${DB_HOST}\" 3306 2>/dev/null; do sleep 2; done\nwhile ! nc\
      \ -z \"${REDIS_HOST}\" 6379 2>/dev/null; do sleep 2; done\n/usr/local/bin/docker-entrypoint\
      \ supervisord &\nwhile ! nc -z 127.0.0.1 9000 2>/dev/null; do sleep 2; done\n\
      nginx\nwait\n"
    run:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: lemmy
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Self-hosted, federated (ActivityPub) link aggregator
      and discussion forum - a Reddit-style alternative for the Fediverse.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/lemmy/icon.png
    kubero.dev/template.installation: 'This template runs the PRIMARY Lemmy backend/API
      server ONLY (dessalines/lemmy, a Rust actix-web service listening on HTTP port
      8536). Lemmy is a MULTI-CONTAINER stack and is NOT usable with this pod alone.
      CONFIG: Lemmy normally reads /config/config.hjson, but this template configures
      it purely via the LEMMY_* env vars - the critical ones are LEMMY_DATABASE_URL
      (points at the Postgres add-on) and LEMMY_HOSTNAME (your real public host, baked
      into ActivityPub actor URLs - set it BEFORE federating, it cannot be changed
      cleanly after going live). REQUIRED BEFORE FIRST BOOT: 1) Rotate the Postgres
      password. 2) The first user account you register through the UI becomes the
      instance admin - register it immediately after deploy. MANDATORY COMPANION SERVICES
      to deploy as SEPARATE Kubero apps: (A) FRONTEND - lemmy-ui, image dessalines/lemmy-ui:0.19.19,
      HTTP port 1234; set its env LEMMY_UI_LEMMY_INTERNAL_HOST to this backend''s
      in-cluster service on :8536 and LEMMY_UI_LEMMY_EXTERNAL_HOST to your public
      host; PUBLIC INGRESS should be routed to lemmy-ui (port 1234), which proxies
      /api and /pictrs to the backend - the backend itself is an internal API. (B)
      IMAGE HOST - pict-rs, image asonix/pictrs:0.5, HTTP port 8080, with its own
      ~5Gi RWX volume at /mnt; point the backend at it via LEMMY_PICTRS__URL (e.g.
      http://lemmy-pictrs:8080/). (C) EMAIL (optional) - an SMTP relay such as mwader/postfix-relay
      for signup confirmation/notification mail; wire it via LEMMY_EMAIL__* or the
      smtp_server config. NOTE on datastores: Lemmy 0.19 needs ONLY PostgreSQL (>=15);
      it does NOT use Redis/Valkey. Federation, scheduled cleanup, and the outgoing
      activity queue all run inside this backend process - no separate worker/scheduler
      container is required.'
    kubero.dev/template.links: '["https://join-lemmy.org/docs/administration/install_docker.html",
      "https://join-lemmy.org/docs/administration/configuration.html"]'
    kubero.dev/template.screenshots: '["https://join-lemmy.org/assets/images/main-screenshot.webp"]'
    kubero.dev/template.source: https://github.com/LemmyNet/lemmy
    kubero.dev/template.categories: '["social", "communication", "collaboration"]'
    kubero.dev/template.title: Lemmy
    kubero.dev/template.website: https://join-lemmy.org
  labels:
    manager: kubero
spec:
  name: lemmy
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: lemmy
              owner: lemmy
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO lemmy
              - GRANT CREATE ON SCHEMA public TO lemmy
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO lemmy
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: lemmy
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: lemmy
          password: lemmy
  envVars:
  - name: RUST_LOG
    value: info
  - name: LEMMY_INITIALIZE_WITH_DEFAULT_SETTINGS
    value: 'true'
  - name: LEMMY_TLS__ENABLED
    value: 'false'
  - name: LEMMY_HOSTNAME
    value: '{{KUBERO_APP_HOST}}'
  - name: LEMMY_DATABASE_URL
    value: postgresql://lemmy:lemmy@{{KUBERO_APP_NAME}}-postgresql-rw:5432/lemmy
  - name: LEMMY_PICTRS__URL
    value: http://lemmy-pictrs:8080/
  - name: LEMMY_PICTRS__API_KEY
    value: replace-with-openssl-rand-hex-32
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 1Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8536'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/dessalines/lemmy
    tag: 0.19.19
    run:
      securityContext:
        readOnlyRootFilesystem: false

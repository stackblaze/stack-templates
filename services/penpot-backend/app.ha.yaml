apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
    name: penpot-backend
    annotations:
        kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
        kubero.dev/template.description: "Penpot is a open-source design tool for design and code collaboration."
        kubero.dev/template.icon: "https://avatars.githubusercontent.com/u/30179644"
        kubero.dev/template.installation: "Make sure you have all three services running: penpot-backend, penpot-exporter, penpot-frontend"
        kubero.dev/template.links: '["https://community.penpot.app/"]'
        kubero.dev/template.screenshots: '["https://penpot.app/blog/content/images/size/w2000/2024/02/PenpotUI-flexlayout.png", "https://penpot.app/blog/content/images/size/w1000/2024/02/Penpot_workspace.png"]'
        kubero.dev/template.source: "https://github.com/penpot/penpot"
        kubero.dev/template.categories: '["work","collaboration"]'
        kubero.dev/template.title: "Penpot (Backend)"
        kubero.dev/template.website: "https://penpot.app/"
    labels:
        manager: kubero
spec:
    name: penpot-backend
    deploymentstrategy: docker
    envVars:
        - name: PENPOT_SECRET_KEY
          value: super-secret-devenv-key
        - name: PENPOT_SMTP_ENABLED
          value: "false"
        - name: PENPOT_DATABASE_URI
          value: postgresql://penpot-backend-postgresql-rw/penpot
        - name: PENPOT_REDIS_URI
          value: redis://rfr-penpot-backend-valkey-readwrite:6379/0?verifyPeer=NONE
        - name: PENPOT_TELEMETRY_ENABLED
          value: "true"
        - name: PENPOT_HTTP_SERVER_PORT
          value: "6060"
        - name: PENPOT_STORAGE_ASSETS_FS_DIRECTORY
          value: /opt/data/assets
        - name: PENPOT_ASSETS_STORAGE_BACKEND
          value: assets-fs
        - name: PENPOT_DATABASE_USERNAME
          value: penpot
        - name: PENPOT_DATABASE_PASSWORD
          value: penpot
        - name: PENPOT_EXPORTER_URI
          value: http://penpot-exporter-kuberoapp
        - name: PENPOT_BACKEND_URI
          value: http://penpot-backend-kuberoapp
        - name: PENPOT_PUBLIC_URI
          value: https://penpot-frontend.localhost/
    extraVolumes:
        - accessMode: ReadWriteOnce
          accessModes:
              - ReadWriteOnce
          emptyDir: false
          mountPath: /opt/data/assets
          name: penpot-volume
          size: 1Gi
    cronjobs: []
    addons:
        - displayName: PostgreSQL (CloudNativePG)
          env: []
          icon: /img/addons/pgsql.svg
          id: kubero-operator
          kind: Cluster
          resourceDefinitions:
              Cluster:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata:
                      name: penpot-backend-postgresql
                  spec:
                      instances: 3
                      imageName: ghcr.io/cloudnative-pg/postgresql:16
                      primaryUpdateStrategy: unsupervised
                      storage:
                          storageClass: fast
                          size: 5Gi
                      resources:
                          requests:
                              cpu: 100m
                              memory: 256Mi
                          limits:
                              cpu: "1"
                              memory: 1Gi
                      bootstrap:
                          initdb:
                              database: penpot
                              owner: penpot
                              secret:
                                  name: penpot-backend-postgresql-app
                      enableSuperuserAccess: true
                      superuserSecret:
                          name: penpot-backend-postgresql-superuser
              superuserSecret:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                      name: penpot-backend-postgresql-superuser
                  type: kubernetes.io/basic-auth
                  stringData:
                      username: postgres
                      password: penpot
              appUserSecret:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                      name: penpot-backend-postgresql-app
                  type: kubernetes.io/basic-auth
                  stringData:
                      username: penpot
                      password: penpot
        - displayName: Valkey
          env: []
          icon: /img/addons/redis.svg
          id: kubero-operator
          kind: Valkey
          resourceDefinitions:
              Valkey:
                  apiVersion: rds.valkey.buf.red/v1alpha1
                  kind: Valkey
                  metadata:
                      name: penpot-backend-valkey
                  spec:
                      version: "8.0"
                      arch: failover
                      replicas:
                          shards: 1
                          replicasOfShard: 2
                      sentinel:
                          replicas: 3
                          quorum: 2
                      access:
                          serviceType: ClusterIP
                      storage:
                          capacity: 1Gi
                          storageClassName: fast
                      resources:
                          requests:
                              cpu: 50m
                              memory: 256Mi
                          limits:
                              cpu: 500m
                              memory: 256Mi
    web:
        replicaCount: 0
    worker:
        replicaCount: 1
    image:
        containerPort: 8080
        pullPolicy: Always
        repository: penpotapp/backend
        tag: latest

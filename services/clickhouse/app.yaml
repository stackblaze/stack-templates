apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: clickhouse
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: "Column-oriented OLAP database for real-time\
      \ analytics \u2014 processes billions of rows per second with sub-second query\
      \ latency."
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/clickhouse/icon.png
    kubero.dev/template.installation: "Change CLICKHOUSE_PASSWORD. Access the HTTP\
      \ interface at port 8123 and the Play UI at /play. Connect with any ClickHouse\
      \ client using host={{KUBERO_APP_HOST}}, port=443, user=admin, password=<your-password>.\
      \ The native TCP port 9000 is not exposed externally \u2014 use the HTTP interface\
      \ or the JDBC/ODBC drivers via HTTP. Note: ClickHouse is also available as an\
      \ operator-managed add-on for higher availability."
    kubero.dev/template.links: '["https://clickhouse.com/docs/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/ClickHouse/ClickHouse
    kubero.dev/template.categories: '["database", "analytics", "data"]'
    kubero.dev/template.title: ClickHouse
    kubero.dev/template.website: https://clickhouse.com
  labels:
    manager: kubero
spec:
  name: clickhouse
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: CLICKHOUSE_DB
    value: default
  - name: CLICKHOUSE_USER
    value: admin
  - name: CLICKHOUSE_PASSWORD
    value: change-me
  - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
    value: 1
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/lib/clickhouse
    name: '{{KUBERO_APP_NAME}}-data'
    size: 20Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '4'
      memory: 8Gi
  healthcheck:
    enabled: true
    path: /ping
    startupSeconds: 120
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8123'
    pullPolicy: Always
    repository: clickhouse/clickhouse-server
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: indico
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source web platform from CERN for conference and event management, room booking,
      and collaboration.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/indico/icon.png
    kubero.dev/template.installation: 'Indico is a multi-container stack; this template runs the primary web/WSGI server (getindico/indico)
      only. You MUST deploy these companion services from the SAME getindico/indico image, sharing this app''s env and the
      postgres+valkey add-ons: (1) a Celery worker (command: indico celery worker), and (2) a Celery beat scheduler (command:
      indico celery beat). The upstream production setup also fronts the web container with an nginx reverse proxy (getindico/indico-nginx)
      that proxies to port 9090 and serves static assets; Kubero''s ingress already terminates HTTP, but you may add it if
      you need Indico''s static/asset routing. Rotate SECRET_KEY (openssl rand -hex 32) and the postgres password before going
      to production. On first boot, exec into the web pod and run ''indico db prepare'' to initialize the schema, then ''indico
      setup wizard'' (or ''indico user grant_admin <email>'') to create the initial admin. Indico sends email; configure SMTP
      via the admin UI. Uploads and the indico.conf live on the mounted /opt/indico/data volume.'
    kubero.dev/template.links: '["https://docs.getindico.io/en/stable/", "https://github.com/indico/indico-containers"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/indico/indico
    kubero.dev/template.categories: '["productivity", "collaboration", "work"]'
    kubero.dev/template.title: Indico
    kubero.dev/template.website: https://getindico.io
  labels:
    manager: kubero
spec:
  name: indico
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: indico-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: indico
              owner: indico
              secret:
                name: indico-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: indico-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: indico-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: indico
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: indico-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: indico
          password: indico
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: indico-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: PGHOST
    value: indico-postgresql-rw
  - name: PGPORT
    value: '5432'
  - name: PGUSER
    value: indico
  - name: PGPASSWORD
    value: indico
  - name: PGDATABASE
    value: indico
  - name: INDICO_DB_URI
    value: postgresql://indico:indico@indico-postgresql-rw:5432/indico
  - name: REDIS_CACHE_URL
    value: redis://rfr-indico-valkey-readwrite:6379/0
  - name: CELERY_BROKER
    value: redis://rfr-indico-valkey-readwrite:6379/1
  - name: INDICO_URL
    value: '{{KUBERO_APP_URL}}'
  - name: VIRTUAL_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/indico/data
    name: indico-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '9090'
    pullPolicy: Always
    repository: getindico/indico
    tag: latest

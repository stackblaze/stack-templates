apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: netbox
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: NetBox is the leading open-source DCIM and IP address management platform for network
      infrastructure.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/44905828?s=200&v=4
    kubero.dev/template.installation: Rotate SECRET_KEY and DB passwords before production. Deploy a netbox-worker using the
      same image with `rqworker` for background jobs.
    kubero.dev/template.links: '["https://docs.netbox.dev/"]'
    kubero.dev/template.screenshots: '["https://netbox.dev/static/netbox_logo.svg"]'
    kubero.dev/template.source: https://github.com/netbox-community/netbox
    kubero.dev/template.categories: '["utilities", "work", "development"]'
    kubero.dev/template.title: NetBox
    kubero.dev/template.website: https://netbox.dev/
  labels:
    manager: kubero
spec:
  name: netbox
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: netbox-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: netbox
              owner: netbox
              secret:
                name: netbox-postgresql-app
              postInitApplicationSQL:
                - GRANT ALL ON SCHEMA public TO netbox
                - GRANT CREATE ON SCHEMA public TO netbox
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO netbox
          enableSuperuserAccess: true
          superuserSecret:
            name: netbox-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: netbox-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: netbox
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: netbox-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: netbox
          password: netbox
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: netbox-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: DB_HOST
    value: netbox-postgresql-rw
  - name: DB_NAME
    value: netbox
  - name: DB_USER
    value: netbox
  - name: DB_PASSWORD
    value: netbox
  - name: REDIS_HOST
    value: rfr-netbox-valkey-readwrite
  - name: REDIS_PASSWORD
    value: ''
  - name: REDIS_DATABASE
    value: '0'
  - name: REDIS_CACHE_HOST
    value: rfr-netbox-valkey-readwrite
  - name: REDIS_CACHE_PASSWORD
    value: ''
  - name: REDIS_CACHE_DATABASE
    value: '1'
  - name: SECRET_KEY
    value: '{{KUBERO_GEN_ALNUM:50}}'
  - name: ALLOWED_HOSTS
    value: '{{KUBERO_APP_HOST}}'
  - name: CSRF_TRUSTED_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: SKIP_SUPERUSER
    value: 'false'
  - name: SUPERUSER_NAME
    value: admin
  - name: SUPERUSER_EMAIL
    value: admin@example.com
  - name: SUPERUSER_PASSWORD
    value: change-me
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/netbox/netbox/media
    name: netbox-media
    size: 2Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /login/
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: netboxcommunity/netbox
    tag: latest

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: snipe-it
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free, open-source IT asset and license management system for tracking hardware, software
      licenses, accessories, and consumables.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/4555401?s=200&v=4
    kubero.dev/template.installation: 'Snipe-IT is a Laravel app backed by MariaDB/MySQL (it does NOT support Postgres). It
      requires a 32-char APP_KEY: rotate APP_KEY to a value generated with ''php artisan key:generate --show'' (or ''openssl
      rand -base64 32'' formatted as base64:...) before going live, and rotate the MariaDB password. Valkey is wired for cache/session/queue
      drivers. On first run the app auto-runs migrations; then open the URL and complete the web-based pre-flight setup wizard
      to create the admin user. Mail (MAIL_*) is optional but needed for notifications.'
    kubero.dev/template.links: '["https://snipe-it.readme.io/docs", "https://snipe-it.readme.io/docs/docker"]'
    kubero.dev/template.screenshots: '["https://snipeitapp.com/img/screenshots/dashboard.png"]'
    kubero.dev/template.source: https://github.com/snipe/snipe-it
    kubero.dev/template.categories: '["work", "utilities", "productivity"]'
    kubero.dev/template.title: Snipe-IT
    kubero.dev/template.website: https://snipeitapp.com
  labels:
    manager: kubero
spec:
  name: snipe-it
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: snipe-it-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: snipe-it-mysql-root
            key: password
          database: snipe-it
          username: snipe-it
          passwordSecretKeyRef:
            name: snipe-it-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: snipe-it-mysql-root
        type: Opaque
        stringData:
          password: snipe-it
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: snipe-it-mysql-app
        type: Opaque
        stringData:
          password: snipe-it
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: snipe-it-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: APP_KEY
    value: base64:replace-with-openssl-rand-base64-32
  - name: APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_ENV
    value: production
  - name: APP_DEBUG
    value: 'false'
  - name: APP_TRUSTED_PROXIES
    value: '*'
  - name: DB_CONNECTION
    value: mysql
  - name: DB_HOST
    value: snipe-it-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_DATABASE
    value: snipe-it
  - name: DB_USERNAME
    value: snipe-it
  - name: DB_PASSWORD
    value: snipe-it
  - name: REDIS_HOST
    value: rfr-snipe-it-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: REDIS_PASSWORD
    value: 'null'
  - name: CACHE_DRIVER
    value: redis
  - name: SESSION_DRIVER
    value: redis
  - name: QUEUE_DRIVER
    value: redis
  - name: MAIL_DRIVER
    value: log
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/lib/snipeit
    name: snipe-it-data
    size: 2Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: snipe/snipe-it
    tag: v8.6.2

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: dolibarr
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Dolibarr ERP CRM — contacts, invoices, orders, stocks, agenda, and accounting for businesses and freelancers.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/877491?v=4
    kubero.dev/template.installation: Auto-installs on first boot when DOLI_DB_* and DOLI_URL_ROOT are set. Default login admin/admin — change immediately. First boot may take several minutes while MariaDB initializes.
    kubero.dev/template.links: '["https://wiki.dolibarr.org/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/Dolibarr/dolibarr
    kubero.dev/template.categories: '["work", "productivity", "utilities"]'
    kubero.dev/template.title: Dolibarr
    kubero.dev/template.website: https://www.dolibarr.org/
  labels:
    manager: kubero
spec:
  name: dolibarr
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: "{{KUBERO_APP_NAME}}-dolibarr-mysql"
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: "{{KUBERO_APP_NAME}}-dolibarr-mysql-root"
            key: password
          database: dolidb
          username: dolidbuser
          passwordSecretKeyRef:
            name: "{{KUBERO_APP_NAME}}-dolibarr-mysql-app"
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: "{{KUBERO_APP_NAME}}-dolibarr-mysql-root"
        type: Opaque
        stringData:
          password: dolidbpass
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: "{{KUBERO_APP_NAME}}-dolibarr-mysql-app"
        type: Opaque
        stringData:
          password: dolidbpass
  envVars:
  - name: DOLI_DB_HOST
    value: "{{KUBERO_APP_NAME}}-dolibarr-mysql"
  - name: DOLI_DB_NAME
    value: dolidb
  - name: DOLI_DB_USER
    value: dolidbuser
  - name: DOLI_DB_PASSWORD
    value: dolidbpass
  - name: DOLI_URL_ROOT
    value: "{{KUBERO_APP_URL}}"
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/documents
    name: dolibarr-documents
    size: 2Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: dolibarr/dolibarr
    tag: latest

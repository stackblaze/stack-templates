apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: tolgee
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Developer & translator friendly web-based localization
      platform
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/tolgee/icon.png
    kubero.dev/template.installation: Make sure you have enough RAM and CPU resources
      available.The JWT secret is a long string of random characters. Please generate
      a new one for your installation.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://framerusercontent.com/assets/od4noC0fhYjE0sFtp3pHTfh6A2U.png"]'
    kubero.dev/template.source: https://github.com/tolgee/tolgee-platform
    kubero.dev/template.categories: '["work","development","collaboration"]'
    kubero.dev/template.title: Tolgee
    kubero.dev/template.website: https://tolgee.io/
  labels:
    manager: kubero
spec:
  name: tolgee
  deploymentstrategy: docker
  envVars:
  - name: TOLGEE_AUTHENTICATION_ENABLED
    value: 'true'
  - name: TOLGEE_AUTHENTICATION_INITIAL_PASSWORD
    value: random24
  - name: TOLGEE_AUTHENTICATION_INITIAL_USERNAME
    value: admin
  - name: TOLGEE_AUTHENTICATION_JWT_SECRET
    value: 
  - name: TOLGEE_POSTGRES_AUTOSTART_ENABLED
    value: 'false'
  - name: SPRING_DATASOURCE_URL
    value: jdbc:postgresql://{{KUBERO_APP_NAME}}-postgresql-rw:5432/tolgee
  - name: SPRING_DATASOURCE_USERNAME
    value: tolgee
  - name: SPRING_DATASOURCE_PASSWORD
    value: tolgee
  - name: TOLGEE_FRONTEND_URL
    value: '{{KUBERO_APP_URL}}'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: tolgee-volume
    size: 1Gi
    storageClass: slow
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: tolgee
              owner: tolgee
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO tolgee
              - GRANT CREATE ON SCHEMA public TO tolgee
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO tolgee
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: tolgee
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: tolgee
          password: tolgee
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  image:
    containerPort: 8080
    pullPolicy: Always
    repository: tolgee/tolgee
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true
  healthcheck:
    enabled: true
    path: /actuator/health
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Umami is a simple, fast, privacy-focused alternative
      to Google Analytics.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/105618662?s=200&v=4
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://umami.is/images/languages.png"]'
    kubero.dev/template.source: https://github.com/umami-software/umami
    kubero.dev/template.categories: '["data", "utilities"]'
    kubero.dev/template.title: umami
    kubero.dev/template.website: https://umami.is/
  name: umami
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: umami-umami
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          bootstrap:
            initdb:
              database: umami
              owner: umami
              secret:
                name: umami-umami-app
          enableSuperuserAccess: true
          superuserSecret:
            name: umami-umami-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: umami-umami-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: umami
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: umami-umami-app
        type: kubernetes.io/basic-auth
        stringData:
          username: umami
          password: umami
  cronjobs: []
  deploymentstrategy: umami
  envVars:
  - name: DATABASE_URL
    value: postgresql://umami:umami@umami-umami-rw:5432/umami
  - name: DATABASE_TYPE
    value: postgresql
  - name: HASH_SALT
    value: replace-me-with-a-random-string
  extraVolumes: []
  image:
    containerPort: '3000'
    repository: ghcr.io/umami-software/umami
    tag: postgresql-latest
  name: umami
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

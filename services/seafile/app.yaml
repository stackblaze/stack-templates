apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: seafile
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: High-performance self-hosted file sync and share
      — encrypted libraries, version history, team collaboration, and Office online
      editing.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/seafile/icon.png
    kubero.dev/template.installation: 'Change SEAFILE_ADMIN_EMAIL and SEAFILE_ADMIN_PASSWORD.
      SEAFILE_SERVER_HOSTNAME must be just the hostname (no https://, e.g. seafile.example.com).
      DB_ROOT_PASSWD must match the MariaDB root password from the add-on (default:
      seafile). On first start, Seafile auto-creates its databases (seafile, seahub,
      ccnet). The seafile-data volume holds all uploaded files. SEAFILE_SERVER_LETSENCRYPT=false
      because TLS is handled by the kubero ingress.'
    kubero.dev/template.links: '["https://manual.seafile.com/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/haiwen/seafile
    kubero.dev/template.categories: '["storage", "productivity", "work"]'
    kubero.dev/template.title: Seafile
    kubero.dev/template.website: https://www.seafile.com
  labels:
    manager: kubero
spec:
  name: seafile
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: seafile-db
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: seafile-db-root
            key: password
          database: seafile
          username: seafile
          passwordSecretKeyRef:
            name: seafile-db-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: seafile-db-root
        type: Opaque
        stringData:
          password: seafile
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: seafile-db-app
        type: Opaque
        stringData:
          password: seafile
  envVars:
  - name: DB_HOST
    value: seafile-db
  - name: DB_ROOT_PASSWD
    value: seafile
  - name: TIME_ZONE
    value: Etc/UTC
  - name: SEAFILE_ADMIN_EMAIL
    value: admin@example.com
  - name: SEAFILE_ADMIN_PASSWORD
    value: change-me
  - name: SEAFILE_SERVER_HOSTNAME
    value: '{{KUBERO_APP_HOST}}'
  - name: SEAFILE_SERVER_LETSENCRYPT
    value: false
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /shared
    name: seafile-data
    size: 50Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /api2/ping/
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: seafileltd/seafile-mc
    tag: latest

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: outline
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64", "linux/arm/v7"]'
    kubero.dev/template.description: The fastest knowledge base for growing teams.
      Beautiful, realtime collaborative, feature packed, and markdown compatible.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/outline/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://user-images.githubusercontent.com/380914/110356468-26374600-7fef-11eb-9f6a-f2cc2c8c6590.png"]'
    kubero.dev/template.source: https://github.com/outline/outline
    kubero.dev/template.categories: '["work", "utility"]'
    kubero.dev/template.title: Outline
    kubero.dev/template.website: https://www.getoutline.com/
  labels:
    manager: kubero
spec:
  name: outline
  deploymentstrategy: docker
  envVars:
  - name: NODE_ENV
    value: production
  - name: SECRET_KEY
    value: 4b8767e288424f2f47630e005e1109ddfec63ee561fa86657f1ab41c401465ce
  - name: DATABASE_URL
    value: postgres://outline:outline@outline-postgresql-rw:5432/outline
  - name: PGSSLMODE
    value: disable
  - name: REDIS_URL
    value: redis://rfr-outline-valkey-readwrite:6379
  - name: FILE_STORAGE
    value: local
  - name: FILE_STORAGE_LOCAL_ROOT_DIR
    value: /var/lib/outline/data
  - name: FILE_STORAGE_UPLOAD_MAX_SIZE
    value: '262144000'
  - name: LOG_LEVEL
    value: info
  - name: DEFAULT_LANGUAGE
    value: en_US
  - name: UTILS_SECRET
    value: 74e934cd60281e460db22128382511ffe49031363db1a7e85d4812772e5207e9
  - name: URL
    value: https://outline.localhost
  - name: CDN_URL
    value: https://outline.localhost
  - name: FORCE_HTTPS
    value: 'false'
  - name: SLACK_CLIENT_ID
    value: ''
  - name: SLACK_CLIENT_SECRET
    value: ''
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/lib/outline/data
    name: outline-volume
    size: 1Gi
    storageClass: slow
  cronjobs: []
  addons:
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: outline-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          sentinel:
            replicas: 3
            quorum: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: outline-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: outline
              owner: outline
              secret:
                name: outline-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: outline-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: outline-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: outline
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: outline-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: outline
          password: outline
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: docker.getoutline.com/outlinewiki/outline
    tag: latest

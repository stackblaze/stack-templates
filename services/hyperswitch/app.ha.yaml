apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: hyperswitch
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source, Rust-based payment switch and orchestration platform for routing, retrying
      and reconciling payments across 100+ processors.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/hyperswitch/icon.png
    kubero.dev/template.installation: 'Hyperswitch is a multi-container stack. This template deploys the PRIMARY API server,
      the `hyperswitch-router` (the `standalone` image is the all-in-one self-host variant that bundles config + migrations).
      It listens on HTTP 8080 (health check: GET /health). Add-ons: a Postgres add-on (the system of record) and a Valkey/Redis
      add-on (used for caching, locking and as the scheduler/queue backend) are provisioned. CONFIG: Hyperswitch is normally
      driven by a TOML file, but every value can be overridden with `ROUTER__<SECTION>__<KEY>` env vars (double underscores)
      - that is what this template uses to wire the add-ons. The router reads both a MASTER and a REPLICA database config;
      both are pointed at the same Postgres add-on here. COMPANION SERVICES to deploy as their own Kubero apps, each with
      the SAME database + redis env as this router: (1) SCHEDULER PRODUCER -> image `juspaydotin/hyperswitch-producer:standalone`
      (enqueues scheduled tasks like retries/webhooks); (2) SCHEDULER CONSUMER -> image `juspaydotin/hyperswitch-consumer:standalone`
      (executes those tasks); both are required for retries, payment-method-tokenization expiry and outgoing webhooks to work.
      (3) CONTROL CENTER (admin dashboard) -> image `juspaydotin/hyperswitch-control-center:latest` (HTTP 9000); set its api_url
      to this router''s {{KUBERO_APP_URL}}. (4) CHECKOUT/SDK WEB -> image `juspaydotin/hyperswitch-web:latest` (the unified
      client-side payment SDK, served on 9050/9060). FIRST RUN: the standalone router auto-applies DB migrations on boot;
      create your first merchant/admin-api-key via the /user/signup or admin APIs. SECRETS to ROTATE before going live: replace
      the Postgres password and set strong values for `ROUTER__SECRETS__ADMIN_API_KEY`, `ROUTER__SECRETS__MASTER_ENC_KEY`
      (a 32-byte hex key, `openssl rand -hex 32`) and `ROUTER__SECRETS__JWT_SECRET`. KMS/managed-encryption and an external
      message queue are optional and NOT provisioned here.'
    kubero.dev/template.links: '["https://docs.hyperswitch.io/hyperswitch-open-source/overview", "https://docs.hyperswitch.io/hyperswitch-open-source/account-setup"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/juspay/hyperswitch
    kubero.dev/template.categories: '["finance", "e-commerce", "development"]'
    kubero.dev/template.title: Hyperswitch
    kubero.dev/template.website: https://hyperswitch.io
  labels:
    manager: kubero
spec:
  name: hyperswitch
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: hyperswitch-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: hyperswitch
              owner: hyperswitch
              secret:
                name: hyperswitch-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO hyperswitch
              - GRANT CREATE ON SCHEMA public TO hyperswitch
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO hyperswitch
          enableSuperuserAccess: true
          superuserSecret:
            name: hyperswitch-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: hyperswitch-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: hyperswitch
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: hyperswitch-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: hyperswitch
          password: hyperswitch
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: hyperswitch-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: ROUTER__SERVER__HOST
    value: 0.0.0.0
  - name: ROUTER__SERVER__PORT
    value: '8080'
  - name: ROUTER__SERVER__BASE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: ROUTER__MASTER_DATABASE__HOST
    value: hyperswitch-postgresql-rw
  - name: ROUTER__MASTER_DATABASE__PORT
    value: '5432'
  - name: ROUTER__MASTER_DATABASE__USERNAME
    value: hyperswitch
  - name: ROUTER__MASTER_DATABASE__PASSWORD
    value: hyperswitch
  - name: ROUTER__MASTER_DATABASE__DBNAME
    value: hyperswitch
  - name: ROUTER__REPLICA_DATABASE__HOST
    value: hyperswitch-postgresql-rw
  - name: ROUTER__REPLICA_DATABASE__PORT
    value: '5432'
  - name: ROUTER__REPLICA_DATABASE__USERNAME
    value: hyperswitch
  - name: ROUTER__REPLICA_DATABASE__PASSWORD
    value: hyperswitch
  - name: ROUTER__REPLICA_DATABASE__DBNAME
    value: hyperswitch
  - name: ROUTER__REDIS__HOST
    value: rfr-hyperswitch-valkey-readwrite
  - name: ROUTER__REDIS__PORT
    value: '6379'
  - name: ROUTER__REDIS__CLUSTER_ENABLED
    value: 'false'
  - name: ROUTER__SERVER__WORKERS
    value: '8'
  - name: ROUTER__SECRETS__ADMIN_API_KEY
    value: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  - name: ROUTER__SECRETS__MASTER_ENC_KEY
    value: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  - name: ROUTER__SECRETS__JWT_SECRET
    value: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  - name: ROUTER__LOG__CONSOLE__ENABLED
    value: 'true'
  - name: ROUTER__LOG__CONSOLE__LEVEL
    value: INFO
  - name: RUN_ENV
    value: sandbox
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: juspaydotin/hyperswitch-router
    tag: 2026.06.11.0-standalone
    command:
    - sh
    - -c
    - curl -fsSL -o /tmp/docker_compose.toml https://raw.githubusercontent.com/juspay/hyperswitch/2026.06.11.0/config/docker_compose.toml
      && mkdir -p /tmp/config
      && curl -fsSL -o /tmp/config/superposition_seed.toml https://raw.githubusercontent.com/juspay/hyperswitch/2026.06.11.0/config/superposition_seed.toml
      && cd /tmp && exec /local/bin/router -f /tmp/docker_compose.toml

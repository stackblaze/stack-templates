apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: erpnext
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source ERP suite (accounting, inventory, HR, CRM, manufacturing, projects) built
      on the Frappe framework.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/erpnext/icon.png
    kubero.dev/template.installation: 'ERPNext is a MULTI-CONTAINER Frappe stack. This template deploys the PRIMARY backend
      (gunicorn) image frappe/erpnext, which serves the Frappe HTTP API/app on port 8000. To run a complete, production-ready
      install you MUST deploy these companion services from the SAME frappe/erpnext image (only the command differs) plus
      the nginx frontend, and run one-time site creation: (1) frontend - image frappe/erpnext, command ''nginx-entrypoint.sh'',
      env BACKEND=<this-app>:8000, SOCKETIO=<websocket>:9000, FRAPPE_SITE_NAME_HEADER, UPSTREAM_REAL_IP_ADDRESS - this is
      the public web server (port 8080). (2) websocket - image frappe/erpnext, command ''node /home/frappe/frappe-bench/apps/frappe/socketio.js''
      (port 9000, real-time). (3) queue-short - command ''bench worker --queue short,default''. (4) queue-long - command ''bench
      worker --queue long,default,short''. (5) scheduler - command ''bench schedule''. (6) configurator (run-once init) -
      command writes common_site_config.json from DB_HOST/DB_PORT/REDIS_CACHE/REDIS_QUEUE/SOCKETIO_PORT then exits. (7) create-site
      (run-once Job) - ''bench new-site'' with --db-type mariadb, --mariadb-root-password, --admin-password, then ''bench
      --site <site> install-app erpnext'' and ''bench use <site>''. All services share the /home/frappe/frappe-bench/sites
      volume (the extraVolume below). FIRST RUN: rotate the MariaDB password (default ''erpnext''), set a strong Administrator
      password during create-site, then log in at the app URL as user ''Administrator''. SEARCH (optional): full-text search
      uses the built-in DB by default; ERPNext can optionally integrate an external search backend - omitted here. Frappe
      officially supports MariaDB (first-class) and PostgreSQL; this template uses the MariaDB add-on as the canonical/recommended
      database.'
    kubero.dev/template.links: '["https://docs.frappe.io/erpnext", "https://github.com/frappe/frappe_docker"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/frappe/erpnext
    kubero.dev/template.categories: '["erp", "finance", "crm"]'
    kubero.dev/template.title: ERPNext
    kubero.dev/template.website: https://erpnext.com
  labels:
    manager: kubero
spec:
  name: erpnext
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: erpnext-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: erpnext-mysql-root
            key: password
          database: erpnext
          username: erpnext
          passwordSecretKeyRef:
            name: erpnext-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: erpnext-mysql-root
        type: Opaque
        stringData:
          password: erpnext
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: erpnext-mysql-app
        type: Opaque
        stringData:
          password: erpnext
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: erpnext-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: DB_HOST
    value: erpnext-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_NAME
    value: erpnext
  - name: DB_PASSWORD
    value: erpnext
  - name: MARIADB_ROOT_PASSWORD
    value: erpnext
  - name: REDIS_CACHE
    value: redis://rfr-erpnext-valkey-readwrite:6379
  - name: REDIS_QUEUE
    value: redis://rfr-erpnext-valkey-readwrite:6379
  - name: REDIS_SOCKETIO
    value: redis://rfr-erpnext-valkey-readwrite:6379
  - name: SOCKETIO_PORT
    value: '9000'
  - name: GUNICORN_WORKERS
    value: '2'
  - name: GUNICORN_THREADS
    value: '4'
  - name: GUNICORN_TIMEOUT
    value: '120'
  - name: FRAPPE_SITE_NAME_HEADER
    value: '{{KUBERO_APP_HOST}}'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /home/frappe/frappe-bench/sites
    name: erpnext-sites
    size: 5Gi
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 10
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: frappe/erpnext
    tag: version-15
    command:
    - bash
    - -c
    - |
      set -e
      cd /home/frappe/frappe-bench
      ASSETS_PATH="/home/frappe/frappe-bench/sites/assets"
      BAKED_PATH="/home/frappe/frappe-bench/assets"
      echo "Linking fresh assets to volume..."
      rm -rf "$ASSETS_PATH"
      mkdir -p "$(dirname "$ASSETS_PATH")"
      ln -s "$BAKED_PATH" "$ASSETS_PATH"
      ls -1 apps > sites/apps.txt
      [ -f sites/common_site_config.json ] || echo '{}' > sites/common_site_config.json
      bench set-config -g db_host "$DB_HOST"
      bench set-config -gp db_port "$DB_PORT"
      bench set-config -g redis_cache "$REDIS_CACHE"
      bench set-config -g redis_queue "$REDIS_QUEUE"
      bench set-config -g redis_socketio "$REDIS_SOCKETIO"
      bench set-config -gp socketio_port "$SOCKETIO_PORT"
      SITE="${FRAPPE_SITE_NAME_HEADER:-frontend}"
      if [ ! -d "sites/$SITE" ]; then
        wait-for-it -t 120 "$DB_HOST:$DB_PORT"
        REDIS_HOST="${REDIS_CACHE#redis://}"
        REDIS_HOST="${REDIS_HOST%%/*}"
        wait-for-it -t 120 "$REDIS_HOST"
        bench new-site "$SITE" \
          --mariadb-user-host-login-scope=% \
          --db-root-password="$MARIADB_ROOT_PASSWORD" \
          --admin-password=admin \
          --install-app erpnext \
          --set-default
      fi
      export BACKEND=127.0.0.1:8000
      export SOCKETIO=127.0.0.1:9000
      export UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      export UPSTREAM_REAL_IP_HEADER=X-Forwarded-For
      export UPSTREAM_REAL_IP_RECURSIVE=off
      export FRAPPE_SITE_NAME_HEADER="$SITE"
      GUNICORN_THREADS=${GUNICORN_THREADS:-4}
      GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      echo "Booting Gunicorn with $GUNICORN_WORKERS workers and $GUNICORN_THREADS threads..."
      /home/frappe/frappe-bench/env/bin/gunicorn \
        --chdir=/home/frappe/frappe-bench/sites \
        --bind=127.0.0.1:8000 \
        --threads="$GUNICORN_THREADS" \
        --workers="$GUNICORN_WORKERS" \
        --worker-class=gthread \
        --worker-tmp-dir=/dev/shm \
        --timeout="$GUNICORN_TIMEOUT" \
        --preload \
        frappe.app:application &
      node /home/frappe/frappe-bench/apps/frappe/socketio.js &
      wait-for-it -t 120 127.0.0.1:8000
      exec /usr/local/bin/nginx-entrypoint.sh

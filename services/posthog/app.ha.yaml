apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: posthog
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source product analytics, session replay, feature flags, A/B testing and surveys
      platform built on PostgreSQL, ClickHouse and Kafka.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/posthog/icon.png
    kubero.dev/template.installation: "PostHog is a LARGE multi-service stack; this template runs the PRIMARY all-in-one image\
      \ posthog/posthog (the `web` role: Django backend + frontend) on HTTP port 8000. It is NOT fully functional alone -\
      \ PostHog needs several companion services and TWO datastores that are NOT in the allowed add-on set (Kafka and S3-compatible\
      \ object storage), so plan to deploy those alongside it.\n\nADD-ONS provisioned here: postgres (relational app DB),\
      \ clickhouse (the OLAP event store - the heart of PostHog analytics, reached at clickhouse-posthog-clickhouse:8123 over\
      \ plain HTTP, so CLICKHOUSE_SECURE=false and CLICKHOUSE_VERIFY=false), and valkey (Redis-compatible cache/broker at\
      \ rfr-posthog-valkey-readwrite:6379, no password).\n\nNOT provisionable as add-ons - deploy these as separate Kubero\
      \ apps and update the *_HOSTS/endpoint env vars to point at them:\n  - KAFKA / event bus: PostHog requires Kafka. Use\
      \ Redpanda (image `redpandadata/redpanda:latest`, Kafka API on 9092) or `bitnami/kafka`. Set KAFKA_HOSTS on EVERY PostHog\
      \ container to host:9092.\n  - OBJECT STORAGE (session recordings, exports, uploads): PostHog requires S3-compatible\
      \ storage. Deploy the platform's RustFS/S3 add-on or `minio/minio`, then set OBJECT_STORAGE_ENABLED=true, OBJECT_STORAGE_ENDPOINT,\
      \ OBJECT_STORAGE_ACCESS_KEY_ID, OBJECT_STORAGE_SECRET_ACCESS_KEY, OBJECT_STORAGE_BUCKET.\n  - TEMPORAL (batch exports\
      \ / scheduled jobs): image `temporalio/auto-setup` on gRPC 7233; only needed if you use batch exports.\n\nCOMPANION\
      \ POSTHOG CONTAINERS (same posthog/posthog image, different command - deploy each as its own Kubero app sharing the\
      \ SAME env vars / DATABASE_URL / CLICKHOUSE / KAFKA / REDIS):\n  - WORKER (Celery): command `./bin/docker-worker-celery\
      \ --with-scheduler` - runs async tasks AND the scheduler; REQUIRED for the app to work.\n  - PLUGIN-SERVER / ingestion:\
      \ command `./bin/plugin-server` - consumes Kafka events into ClickHouse; REQUIRED for any analytics data to appear.\n\
      \  - MIGRATE (one-shot, run FIRST): command `python manage.py migrate && python manage.py migrate_clickhouse` to create\
      \ Postgres + ClickHouse schemas before the web/worker start. The migrate-clickhouse step needs Kafka reachable.\n  -\
      \ (Optional high-scale, separate Rust images) CAPTURE -> `ghcr.io/posthog/posthog/capture:latest` (event intake on Kafka),\
      \ FEATURE-FLAGS -> `ghcr.io/posthog/posthog/feature-flags:latest`.\n\nROTATE before production: SECRET_KEY and ENCRYPTION_SALT_KEYS\
      \ (both set here to placeholder `replace-with-openssl-rand-hex-32` values - generate real ones with `openssl rand -hex\
      \ 32`; ENCRYPTION_SALT_KEYS must be a 32-byte base64/urlsafe key and CANNOT change after first boot or stored secrets\
      \ break), plus the postgres and clickhouse add-on passwords (default `posthog`).\n\nFIRST-RUN: run the MIGRATE job,\
      \ then start web + worker + plugin-server; open {{KUBERO_APP_URL}} and complete the on-screen setup wizard to create\
      \ the first organization and admin user. SITE_URL is preset to your public URL and IS_BEHIND_PROXY=true / DISABLE_SECURE_SSL_REDIRECT=true\
      \ are set because TLS is terminated at the Kubero ingress. NOTE: PostHog deprecated its official Helm chart - self-hosting\
      \ is officially Docker-Compose-based and unsupported for high scale; PostHog Cloud is the recommended path for large\
      \ workloads."
    kubero.dev/template.links: '["https://posthog.com/docs/self-host", "https://posthog.com/docs/self-host/configure/environment-variables"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/PostHog/posthog
    kubero.dev/template.categories: '["data", "monitoring", "productivity"]'
    kubero.dev/template.title: PostHog
    kubero.dev/template.website: https://posthog.com
  labels:
    manager: kubero
spec:
  name: posthog
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: posthog-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: posthog
              owner: posthog
              secret:
                name: posthog-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO posthog
              - GRANT CREATE ON SCHEMA public TO posthog
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO posthog
          enableSuperuserAccess: true
          superuserSecret:
            name: posthog-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: posthog-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: posthog
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: posthog-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: posthog
          password: posthog
  - displayName: ClickHouse
    env: []
    icon: /img/addons/clickhouse.svg
    id: clickhouse-operator
    kind: ClickHouseInstallation
    resourceDefinitions:
      ClickHouseInstallation:
        apiVersion: clickhouse.altinity.com/v1
        kind: ClickHouseInstallation
        metadata:
          name: posthog-clickhouse
        spec:
          configuration:
            zookeeper:
              nodes:
              - host: 127.0.0.1
                port: 2181
              session_timeout_ms: 30000
              operation_timeout_ms: 10000
            files:
              config.d/posthog-remote-servers.xml: |
                <clickhouse>
                  <remote_servers>
                    <posthog>
                      <shard>
                        <replica>
                          <host>localhost</host>
                          <port>9000</port>
                        </replica>
                      </shard>
                    </posthog>
                    <posthog_migrations>
                      <shard>
                        <replica>
                          <host>localhost</host>
                          <port>9000</port>
                        </replica>
                      </shard>
                    </posthog_migrations>
                    <posthog_single_shard>
                      <shard>
                        <replica>
                          <host>localhost</host>
                          <port>9000</port>
                        </replica>
                      </shard>
                    </posthog_single_shard>
                    <posthog_writable>
                      <shard>
                        <replica>
                          <host>localhost</host>
                          <port>9000</port>
                        </replica>
                      </shard>
                    </posthog_writable>
                    <posthog_primary_replica>
                      <shard>
                        <replica>
                          <host>localhost</host>
                          <port>9000</port>
                        </replica>
                      </shard>
                    </posthog_primary_replica>
                  </remote_servers>
                </clickhouse>
            users:
              admin/password: posthog
              admin/networks/ip:
              - 0.0.0.0/0
            clusters:
            - name: analytics
              layout:
                shardsCount: 1
                replicasCount: 2
              templates:
                podTemplate: clickhouse-pod-template
          defaults:
            templates:
              dataVolumeClaimTemplate: data-volume-template
              logVolumeClaimTemplate: log-volume-template
              podTemplate: clickhouse-pod-template
          templates:
            podTemplates:
            - name: clickhouse-pod-template
              spec:
                containers:
                - name: clickhouse
                  image: ghcr.io/stackblaze/stack-templates/clickhouse-server:24.8.7.41
                  resources:
                    requests:
                      cpu: 100m
                      memory: 512Mi
                    limits:
                      cpu: '1'
                      memory: 2Gi
                - name: zookeeper
                  image: zookeeper:3.7.0
                  env:
                  - name: ZOO_AUTOPURGE_PURGEINTERVAL
                    value: '1'
                  - name: ZOO_AUTOPURGE_SNAPRETAINCOUNT
                    value: '3'
                  resources:
                    requests:
                      cpu: 50m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
            volumeClaimTemplates:
            - name: data-volume-template
              spec:
                accessModes:
                - ReadWriteOnce
                storageClassName: fast
                resources:
                  requests:
                    storage: 5Gi
            - name: log-volume-template
              spec:
                accessModes:
                - ReadWriteOnce
                storageClassName: fast
                resources:
                  requests:
                    storage: 1Gi
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: posthog-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: DATABASE_URL
    value: postgresql://posthog:posthog@posthog-postgresql-rw:5432/posthog
  - name: POSTHOG_DB_NAME
    value: posthog
  - name: POSTHOG_DB_USER
    value: posthog
  - name: POSTHOG_DB_PASSWORD
    value: posthog
  - name: POSTHOG_POSTGRES_HOST
    value: posthog-postgresql-rw
  - name: POSTHOG_POSTGRES_PORT
    value: '5432'
  - name: CLICKHOUSE_HOST
    value: clickhouse-posthog-clickhouse
  - name: CLICKHOUSE_DATABASE
    value: posthog
  - name: CLICKHOUSE_USER
    value: admin
  - name: CLICKHOUSE_PASSWORD
    value: posthog
  - name: CLICKHOUSE_SECURE
    value: 'false'
  - name: CLICKHOUSE_VERIFY
    value: 'false'
  - name: REDIS_URL
    value: redis://rfr-posthog-valkey-readwrite:6379
  - name: KAFKA_HOSTS
    value: posthog-kafka:9092
  - name: KAFKA_URL
    value: kafka://posthog-kafka:9092
  - name: SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  - name: ENCRYPTION_SALT_KEYS
    value: replace-with-openssl-rand-hex-32
  - name: DISABLE_SECURE_SSL_REDIRECT
    value: 'true'
  - name: IS_BEHIND_PROXY
    value: 'true'
  - name: TRUST_ALL_PROXIES
    value: 'true'
  - name: DEPLOYMENT
    value: hobby
  - name: OBJECT_STORAGE_ENABLED
    value: 'false'
  extraVolumes: []
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '2'
      memory: 4Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 1800
    timeoutSeconds: 10
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/posthog/posthog
    tag: latest

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: jellyfin
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free software media system that puts you in control
      of managing and streaming your movies, TV, and music.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/jellyfin/icon.png
    kubero.dev/template.installation: Mount media under /media or add libraries pointing
      to your storage after first login.
    kubero.dev/template.links: '["https://jellyfin.org/docs/"]'
    kubero.dev/template.screenshots: '["https://jellyfin.org/images/screenshots/home.png"]'
    kubero.dev/template.source: https://github.com/jellyfin/jellyfin
    kubero.dev/template.categories: '["media", "utilities"]'
    kubero.dev/template.title: Jellyfin
    kubero.dev/template.website: https://jellyfin.org/
  labels:
    manager: kubero
spec:
  name: jellyfin
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: DOTNET_USE_POLLING_FILE_WATCHER
    value: '1'
  - name: JELLYFIN_PublishedServerUrl
    value: '{{KUBERO_APP_URL}}'
  - name: TZ
    value: Etc/UTC
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /config
    name: '{{KUBERO_APP_NAME}}-data'
    size: 4Gi
    storageClass: lite
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /media
    name: '{{KUBERO_APP_NAME}}-media'
    size: 10Gi
    storageClass: lite
  cronjobs: []
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8096'
    pullPolicy: Always
    repository: jellyfin/jellyfin
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

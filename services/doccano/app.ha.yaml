apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: doccano
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Open source annotation tool for machine learning
      practitioners.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/58067660
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/doccano/doccano/master/docs/images/demo/demo.gif"]'
    kubero.dev/template.source: https://github.com/doccano/doccano
    kubero.dev/template.categories: '["ai"]'
    kubero.dev/template.title: Doccano
    kubero.dev/template.website: https://doccano.github.io/doccano/
  labels:
    manager: kubero
spec:
  name: doccano
  deploymentstrategy: docker
  envVars:
  - name: ADMIN_USERNAME
    value: admin
  - name: ADMIN_EMAIL
    value: admin@example.com
  - name: ADMIN_PASSWORD
    value: random16
  - name: SECRET_KEY
    value: 7b3f9c2e1a8d4f60b5e2c9a17d4e8f3c6b0a9d2e5f81c47a3b6d9e0f2a5c8b1d4
  - name: DEBUG
    value: 'False'
  - name: DATABASE_URL
    value: postgresql://doccano:doccano@{{KUBERO_APP_NAME}}-postgresql-rw:5432/doccano
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data-volume'
    size: 1Gi
    storageClass: shared
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: doccano
              owner: doccano
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO doccano
              - GRANT CREATE ON SCHEMA public TO doccano
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO doccano
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: doccano
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: doccano
          password: doccano
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/doccano/doccano
    run:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        readOnlyRootFilesystem: false
    tag: latest
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: claper
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Claper turns your presentations into an interactive,
      engaging and exciting experience.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/109804388?s=48&v=4
    kubero.dev/template.installation: 'Some more ENV vars : https://github.com/ClaperCo/Claper/blob/main/.env.sample'
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://github.com/ClaperCo/Claper/raw/main/priv/static/images/preview.png"]'
    kubero.dev/template.source: https://github.com/ClaperCo/Claper
    kubero.dev/template.categories: '["communication", "work"]'
    kubero.dev/template.title: Claper
    kubero.dev/template.website: https://claper.co/
  labels:
    manager: kubero
spec:
  name: claper
  deploymentstrategy: docker
  envVars:
  - name: DATABASE_URL
    value: postgres://claper:claper@claper-postgresql-rw:5432/postgresql
  - name: SECRET_KEY_BASE
    value: 0LZiQBLw4WvqPlz4cz8RsHJlxNiSqM9B48y4ChyJ5v1oA0L/TPIqRjQNdPZN3iEG
  - name: PRESENTATION_STORAGE
    value: local
  - name: PRESENTATION_STORAGE_DIR
    value: /app/uploads
  - name: MAIL_TRANSPORT
    value: local
  - name: MAIL_FROM
    value: noreply@claper.co
  - name: MAIL_FROM_NAME
    value: Claper
  - name: MAX_FILE_SIZE_MB
    value: '15'
  - name: ENABLE_ACCOUNT_CREATION
    value: 'true'
  - name: ALLOW_UNLINK_EXTERNAL_PROVIDER
    value: 'false'
  - name: GS_JPG_RESOLUTION
    value: 300x300
  - name: LOGOUT_REDIRECT_URL
    value: https://google.com
  - name: BASE_URL
    value: http://claper.localhost
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /app/uploads
    name: claper-volume
    size: 1Gi
    storageClass: shared
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: claper-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgresql
              owner: claper
              secret:
                name: claper-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: claper-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: claper-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: claper
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: claper-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: claper
          password: claper
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '4000'
    pullPolicy: Always
    repository: ghcr.io/claperco/claper
    tag: latest

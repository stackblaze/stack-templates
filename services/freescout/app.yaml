apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: freescout
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free self-hosted help desk and shared inbox,
      a privacy-friendly open-source alternative to Zendesk and Help Scout.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/freescout/icon.png
    kubero.dev/template.installation: 'Image: nfrastack/freescout (community-maintained,
      formerly tiredofit). Rotate APP_KEY (base64 of 32 random bytes: `base64:$(openssl
      rand -base64 32)`), the Postgres password (default ''freescout''), and ADMIN_PASS
      before exposing publicly. First run auto-installs and seeds the admin user from
      ADMIN_EMAIL / ADMIN_PASS; change the admin password after first login. DB_TYPE=pgsql
      points FreeScout at the bundled postgres add-on (host freescout-postgresql-rw).
      For inbound/outbound email, configure SMTP/IMAP in the FreeScout settings UI
      (or via mail env vars) after install. Persistent /data volume holds uploads,
      installed modules, cache and config.'
    kubero.dev/template.links: '["https://github.com/freescout-help-desk/freescout/wiki/Installation-Guide",
      "https://github.com/nfrastack/docker-freescout"]'
    kubero.dev/template.screenshots: '["https://freescout.net/wp-content/uploads/2018/12/screenshot-conversation.png"]'
    kubero.dev/template.source: https://github.com/freescout-help-desk/freescout
    kubero.dev/template.categories: '["helpdesk", "communication", "collaboration"]'
    kubero.dev/template.title: FreeScout
    kubero.dev/template.website: https://freescout.net
  labels:
    manager: kubero
spec:
  name: freescout
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: freescout-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: freescout
              owner: freescout
              secret:
                name: freescout-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO freescout
              - GRANT CREATE ON SCHEMA public TO freescout
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO freescout
          enableSuperuserAccess: true
          superuserSecret:
            name: freescout-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: freescout-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: freescout
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: freescout-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: freescout
          password: freescout
  envVars:
  - name: APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_KEY
    value: base64:S3ViZXJvVGVtcGxhdGVRYVNtb2tlVGVzdEtleSEhMTI=
  - name: SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: DB_TYPE
    value: pgsql
  - name: DB_CONNECTION
    value: pgsql
  - name: DB_HOST
    value: freescout-postgresql-rw
  - name: DB_PORT
    value: '5432'
  - name: DB_NAME
    value: freescout
  - name: DB_DATABASE
    value: freescout
  - name: DB_USER
    value: freescout
  - name: DB_USERNAME
    value: freescout
  - name: DB_PASS
    value: freescout
  - name: DB_PASSWORD
    value: freescout
  - name: ADMIN_EMAIL
    value: admin@example.com
  - name: ADMIN_PASS
    value: KuberoQaAdminPass123
  - name: TZ
    value: Etc/UTC
  - name: NGINX_ENABLE_EXPLOIT_PROTECTION
    value: 'FALSE'
  - name: NGINX_SERVER_NAME
    value: _
  - name: NGINX_ENABLE_DENY_HIDDEN_FILES
    value: 'FALSE'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: freescout-data
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: nfrastack/freescout
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true

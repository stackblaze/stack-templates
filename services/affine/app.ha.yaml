apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: AFFiNE is a next-gen knowledge base that brings
      planning, sorting and creating all together
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/affine/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '["https://docs.affine.pro/docs/hello-bonjour-aloha-%E4%BD%A0%E5%A5%BD"]'
    kubero.dev/template.screenshots: 'null'
    kubero.dev/template.source: https://github.com/toeverything/AFFiNE
    kubero.dev/template.categories: '["utilities", "work"]'
    kubero.dev/template.title: AFFiNE
    kubero.dev/template.website: https://affine.pro/
  labels:
    manager: kubero
  name: affine
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: affine-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgresql
              owner: affine
              secret:
                name: affine-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: affine-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: affine-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: afffine
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: affine-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: affine
          password: afffine
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: affine-valkey
        spec:
          version: "8.0"
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          sentinel:
            replicas: 3
            quorum: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: NODE_OPTIONS
    value: --import=./scripts/register.js
  - name: REDIS_SERVER_HOST
    value: rfr-affine-valkey-readwrite
  - name: DATABASE_URL
    value: postgres://affine:afffine@affine-postgresql-rw:5432/postgresql
  - name: NODE_ENV
    value: production
  - name: AFFINE_ADMIN_EMAIL
    value: admin@admin.com
  - name: AFFINE_ADMIN_PASSWORD
    value: admin
  - name: TELEMETRY_ENABLE
    value: 'false'
  - name: REDIS_SERVER_PASSWORD
    value: ""
  extraVolumes:
  - accessMode: ReadWriteOnce
    accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /root/.affine
    name: affine-volume
    size: 1Gi
  image:
    containerPort: '3010'
    pullPolicy: Always
    repository: ghcr.io/toeverything/affine-graphql
    tag: stable
  name: affine
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

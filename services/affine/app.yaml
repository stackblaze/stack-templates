apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: AFFiNE is a next-gen knowledge base that brings
      planning, sorting and creating all together
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/affine/icon.png
    kubero.dev/template.installation: First boot runs database migrations via self-host-predeploy.js;
      startup can take several minutes.
    kubero.dev/template.links: '["https://docs.affine.pro/docs/hello-bonjour-aloha-%E4%BD%A0%E5%A5%BD"]'
    kubero.dev/template.screenshots: '["https://affine.pro/og.jpeg"]'
    kubero.dev/template.source: https://github.com/toeverything/AFFiNE
    kubero.dev/template.categories: '["utilities", "work"]'
    kubero.dev/template.title: AFFiNE
    kubero.dev/template.website: https://affine.pro/
  labels:
    manager: kubero
  name: affine
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: affine
              owner: affine
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO affine
              - GRANT CREATE ON SCHEMA public TO affine
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO affine
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: afffine
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: affine
          password: afffine
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: REDIS_SERVER_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: DATABASE_URL
    value: postgresql://affine:afffine@{{KUBERO_APP_NAME}}-postgresql-rw:5432/affine
  - name: AFFINE_INDEXER_ENABLED
    value: 'false'
  - name: NODE_ENV
    value: production
  - name: AFFINE_ADMIN_EMAIL
    value: admin@admin.com
  - name: AFFINE_ADMIN_PASSWORD
    value: admin
  - name: TELEMETRY_ENABLE
    value: 'false'
  - name: REDIS_SERVER_PASSWORD
    value: ''
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /root/.affine
    name: affine-volume
    size: 1Gi
    storageClass: lite
  image:
    containerPort: '3010'
    pullPolicy: Always
    repository: ghcr.io/toeverything/affine
    tag: stable
    command:
    - sh
    - -c
    - node ./scripts/self-host-predeploy.js && node ./dist/main.js
    run:
      securityContext:
        readOnlyRootFilesystem: false
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  name: affine
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

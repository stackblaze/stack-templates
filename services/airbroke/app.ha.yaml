apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
    name: airbroke
    annotations:
        kubero.dev/template.architecture: "[]"
        kubero.dev/template.description: "A lightweight, Airbrake-compatible, PostgreSQL-based Open Source Error Catcher"
        kubero.dev/template.icon: "https://raw.githubusercontent.com/icoretech/airbroke/refs/heads/main/public/logo.svg"
        kubero.dev/template.installation: "After installation you need to login into the pod and run the following command: `npx prisma migrate deploy`"
        kubero.dev/template.links: "[]"
        kubero.dev/template.screenshots: '["https://github.com/icoretech/airbroke/raw/main/public/aidemo.gif"]'
        kubero.dev/template.source: "https://github.com/icoretech/airbroke"
        kubero.dev/template.categories: '["development", "monitoring", "ai"]'
        kubero.dev/template.title: "Airbroke"
        kubero.dev/template.website: "https://airbroke.icorete.ch/"
    labels:
        manager: kubero
spec:
    name: airbroke
    deploymentstrategy: docker
    envVars:
        - name: DATABASE_URL
          value: postgresql://airbroke:airbroke@airbroke-postgresql-rw:5432/airbroke?schema=public
        - name: DIRECT_URL
          value: postgresql://airbroke:airbroke@airbroke-postgresql-rw:5432/airbroke?schema=public
        - name: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
          value: random64
        - name: AUTH_SECRET
          value: random64
        - name: AIRBROKE_GITHUB_ID
          value: createAGithubApp
        - name: AIRBROKE_GITHUB_SECRET
          value: createAGithubApp
        - name: AUTH_DEBUG
          value: "false"
        - name: AUTH_URL
          value: https://airbroke.localhost/
        - name: AIRBROKE_CORS_ORIGINS
          value: https://airbroke.localhost/
    extraVolumes: []
    cronjobs: []
    addons:
        - displayName: PostgreSQL (CloudNativePG)
          env: []
          icon: /img/addons/pgsql.svg
          id: kubero-operator
          kind: Cluster
          resourceDefinitions:
              Cluster:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata:
                      name: airbroke-postgresql
                  spec:
                      instances: 3
                      imageName: ghcr.io/cloudnative-pg/postgresql:16
                      primaryUpdateStrategy: unsupervised
                      storage:
                          storageClass: fast
                          size: 5Gi
                      resources:
                          requests:
                              cpu: 100m
                              memory: 256Mi
                          limits:
                              cpu: "1"
                              memory: 1Gi
                      bootstrap:
                          initdb:
                              database: airbroke
                              owner: airbroke
                              secret:
                                  name: airbroke-postgresql-app
                      enableSuperuserAccess: true
                      superuserSecret:
                          name: airbroke-postgresql-superuser
              superuserSecret:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                      name: airbroke-postgresql-superuser
                  type: kubernetes.io/basic-auth
                  stringData:
                      username: postgres
                      password: airbroke
              appUserSecret:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                      name: airbroke-postgresql-app
                  type: kubernetes.io/basic-auth
                  stringData:
                      username: airbroke
                      password: airbroke
    web:
        replicaCount: 1
    worker:
        replicaCount: 0
    image:
        containerPort: "3000"
        pullPolicy: Always
        repository: ghcr.io/icoretech/airbroke
        tag: latest

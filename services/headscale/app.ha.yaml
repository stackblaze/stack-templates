apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: headscale
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: "Self-hosted Tailscale control server \u2014\
      \ manage your own WireGuard mesh VPN with the full Tailscale client ecosystem\
      \ but zero vendor lock-in."
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/headscale/icon.png
    kubero.dev/template.installation: 'PostgreSQL is provisioned via the bundled add-on.
      HEADSCALE_SERVER_URL must be the public HTTPS URL of this app. After deploy,
      create a user with headscale users create <name> (exec into the container or
      use the gRPC API). Generate a pre-auth key with headscale preauthkeys create
      --user <name> --reusable, then use it with the Tailscale client: tailscale up
      --login-server={{KUBERO_APP_URL}}.'
    kubero.dev/template.links: '["https://headscale.net/running-headscale-container/"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/juanfont/headscale/main/docs/assets/logo/headscale3_header_stacked_left.png"]'
    kubero.dev/template.source: https://github.com/juanfont/headscale
    kubero.dev/template.categories: '["networking", "security", "utilities"]'
    kubero.dev/template.title: Headscale
    kubero.dev/template.website: https://headscale.net
  labels:
    manager: kubero
spec:
  name: headscale
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: headscale
              owner: headscale
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO headscale
              - GRANT CREATE ON SCHEMA public TO headscale
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO headscale
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: headscale
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: headscale
          password: headscale
  envVars:
  - name: HEADSCALE_LISTEN_ADDR
    value: 0.0.0.0:8080
  - name: HEADSCALE_SERVER_URL
    value: '{{KUBERO_APP_URL}}'
  - name: HEADSCALE_PRIVATE_KEY_PATH
    value: /var/lib/headscale/private.key
  - name: HEADSCALE_NOISE_PRIVATE_KEY_PATH
    value: /var/lib/headscale/noise_private.key
  - name: HEADSCALE_PREFIXES_V4
    value: 100.64.0.0/10
  - name: HEADSCALE_PREFIXES_V6
    value: fd7a:115c:a1e0::/48
  - name: HEADSCALE_DNS_OVERRIDE_LOCAL_DNS
    value: 'false'
  - name: HEADSCALE_DNS_MAGIC_DNS
    value: 'false'
  - name: HEADSCALE_DERP_URLS
    value: https://controlplane.tailscale.com/derpmap/default
  - name: HEADSCALE_DATABASE_TYPE
    value: postgres
  - name: HEADSCALE_DATABASE_POSTGRES_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: HEADSCALE_DATABASE_POSTGRES_PORT
    value: '5432'
  - name: HEADSCALE_DATABASE_POSTGRES_NAME
    value: headscale
  - name: HEADSCALE_DATABASE_POSTGRES_USER
    value: headscale
  - name: HEADSCALE_DATABASE_POSTGRES_PASS
    value: headscale
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/lib/headscale
    name: '{{KUBERO_APP_NAME}}-data'
    size: 1Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: '1'
      memory: 512Mi
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 60
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: ghcr.io/juanfont/headscale
    tag: 0.28.0-debug
    command:
    - sh
    - -c
    - "mkdir -p /var/lib/headscale\nif [ ! -f /var/lib/headscale/config.yaml ]; then\n\
      \  printf '%s\\n' \\\n    'server_url: http://127.0.0.1:8080' \\\n    'noise:'\
      \ \\\n    '  private_key_path: /var/lib/headscale/noise_private.key' \\\n  \
      \  'dns:' \\\n    '  override_local_dns: false' \\\n    '  magic_dns: false'\
      \ \\\n    'derp:' \\\n    '  urls:' \\\n    '    - https://controlplane.tailscale.com/derpmap/default'\
      \ \\\n    > /var/lib/headscale/config.yaml\nfi\nif ! grep -q '^derp:' /var/lib/headscale/config.yaml;\
      \ then\n  printf '%s\\n' 'derp:' '  urls:' '    - https://controlplane.tailscale.com/derpmap/default'\
      \ >> /var/lib/headscale/config.yaml\nfi\nexec /ko-app/headscale -c /var/lib/headscale/config.yaml\
      \ serve\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

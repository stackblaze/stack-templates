apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: headscale
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Self-hosted Tailscale control server — manage your own WireGuard mesh VPN with the full Tailscale client ecosystem but zero vendor lock-in.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/headscale/icon.png
    kubero.dev/template.installation: 'Headscale uses SQLite by default — no database add-on required. HEADSCALE_SERVER_URL must be the public HTTPS URL of this app. After deploy, create a user with headscale users create <name> (exec into the container or use the gRPC API). Generate a pre-auth key with headscale preauthkeys create --user <name> --reusable, then use it with the Tailscale client: tailscale up --login-server={{KUBERO_APP_URL}}.'
    kubero.dev/template.links: '["https://headscale.net/running-headscale-container/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/juanfont/headscale
    kubero.dev/template.categories: '["networking", "security", "utilities"]'
    kubero.dev/template.title: Headscale
    kubero.dev/template.website: https://headscale.net
  labels:
    manager: kubero
spec:
  name: headscale
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: HEADSCALE_LISTEN_ADDR
    value: '0.0.0.0:8080'
  - name: HEADSCALE_SERVER_URL
    value: '{{KUBERO_APP_URL}}'
  - name: HEADSCALE_DATABASE_TYPE
    value: sqlite
  - name: HEADSCALE_DATABASE_SQLITE_PATH
    value: /var/lib/headscale/db.sqlite
  - name: HEADSCALE_PRIVATE_KEY_PATH
    value: /var/lib/headscale/private.key
  - name: HEADSCALE_NOISE_PRIVATE_KEY_PATH
    value: /var/lib/headscale/noise_private.key
  - name: HEADSCALE_PREFIXES_V4
    value: 100.64.0.0/10
  - name: HEADSCALE_PREFIXES_V6
    value: fd7a:115c:a1e0::/48
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/lib/headscale
    name: headscale-data
    size: 1Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: '1'
      memory: 512Mi
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 60
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: ghcr.io/juanfont/headscale
    tag: '0.28.0-debug'
    command:
    - sh
    - -c
    - |
      mkdir -p /var/lib/headscale
      if [ ! -f /var/lib/headscale/config.yaml ]; then
        printf '%s\n' 'server_url: http://127.0.0.1:8080' 'noise:' '  private_key_path: /var/lib/headscale/noise_private.key' > /var/lib/headscale/config.yaml
      fi
      exec /ko-app/headscale -c /var/lib/headscale/config.yaml serve

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: directus
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The flexible backend for all your projects. Turn
      your DB into a headless CMS, admin panels, or apps with a custom UI, instant
      APIs, auth & more.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/15967950
    kubero.dev/template.installation: Set ADMIN_EMAIL and ADMIN_PASSWORD before first
      login. Rotate SECRET to a random value for production. Valkey is used for API
      caching (and multi-instance sync in HA). Connects at rfr-<app>-valkey-readwrite:6379.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://framerusercontent.com/images/wDMzR3oV9R51pVCPoOz6PGTRs54.png"]'
    kubero.dev/template.source: https://github.com/directus/directus
    kubero.dev/template.categories: '["database", "cms", "api"]'
    kubero.dev/template.title: Directus
    kubero.dev/template.website: https://directus.io/
  labels:
    manager: kubero
spec:
  name: directus
  deploymentstrategy: docker
  envVars:
  - name: ADMIN_EMAIL
    value: admin@example.com
  - name: ADMIN_PASSWORD
    value: example
  - name: WEBSOCKETS_ENABLED
    value: 'true'
  - name: DB_CLIENT
    value: pg
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: DB_PORT
    value: '5432'
  - name: DB_DATABASE
    value: directus
  - name: DB_USER
    value: directus
  - name: DB_PASSWORD
    value: directus
  - name: CACHE_ENABLED
    value: 'true'
  - name: CACHE_AUTO_PURGE
    value: 'true'
  - name: CACHE_STORE
    value: redis
  - name: REDIS
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /directus/uploads
    name: '{{KUBERO_APP_NAME}}-uploads-volume'
    size: 1Gi
    storageClass: lite
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /directus/extensions
    name: directus-extensions-volume
    size: 1Gi
    storageClass: lite
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /directus/templates
    name: directus-templates-volume
    size: 1Gi
    storageClass: lite
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: directus
              owner: directus
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO directus
              - GRANT CREATE ON SCHEMA public TO directus
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO directus
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: directus
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: directus
          password: directus
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /admin
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8055'
    pullPolicy: Always
    repository: directus/directus
    tag: '11'
    run:
      securityContext:
        readOnlyRootFilesystem: false

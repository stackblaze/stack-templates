apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: directus
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The flexible backend for all your projects. Turn
      your DB into a headless CMS, admin panels, or apps with a custom UI, instant
      APIs, auth & more.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/15967950
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/directus/directus
    kubero.dev/template.categories: '["database", "cms", "api"]'
    kubero.dev/template.title: Directus
    kubero.dev/template.website: https://directus.io/
  labels:
    manager: kubero
spec:
  name: directus
  deploymentstrategy: docker
  envVars:
  - name: ADMIN_EMAIL
    value: admin@example.com
  - name: ADMIN_PASSWORD
    value: example
  - name: WEBSOCKETS_ENABLED
    value: 'true'
  - name: DB_CLIENT
    value: pg
  - name: DB_HOST
    value: directus-postgresql-rw
  - name: DB_PORT
    value: '5432'
  - name: DB_DATABASE
    value: directus
  - name: DB_USER
    value: directus
  - name: DB_PASSWORD
    value: directus
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /directus/uploads
    name: directus-uploads-volume
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /directus/extensions
    name: directus-extensions-volume
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /directus/templates
    name: directus-templates-volume
    size: 1Gi
    storageClass: shared
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: directus-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: directus
              owner: directus
              secret:
                name: directus-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO directus
              - GRANT CREATE ON SCHEMA public TO directus
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO directus
          enableSuperuserAccess: true
          superuserSecret:
            name: directus-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: directus-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: directus
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: directus-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: directus
          password: directus
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8055'
    pullPolicy: Always
    repository: directus/directus
    tag: '11'
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: logto
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: 'Logto is an open-source Identity and Access
      Management (IAM) platform designed to streamline Customer Identity and Access
      Management (CIAM) and Workforce Identity Management. '
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/logto/icon.png
    kubero.dev/template.installation: 'run kubectl `apply -f https://raw.githubusercontent.com/kubero-dev/kubero/main/services/logto/logto-admin-ingress.yaml`
      to enable the admin interface. A list of all available environment variables
      can be found here : https://docs.logto.io/docs/references/core/configuration/'
    kubero.dev/template.links: '["https://docs.logto.io/"]'
    kubero.dev/template.screenshots: '["https://logto.io/assets/social-CH_XwNBP.jpg"]'
    kubero.dev/template.source: https://github.com/logto-io/logto
    kubero.dev/template.categories: '["identity", "access", "management"]'
    kubero.dev/template.title: logto
    kubero.dev/template.website: https://logto.io/
  labels:
    manager: kubero
spec:
  name: logto
  deploymentstrategy: docker
  envVars:
  - name: DB_URL
    value: postgresql://postgres:logto@{{KUBERO_APP_NAME}}-db-rw:5432/logto
  - name: TRUST_PROXY_HEADER
    value: '1'
  - name: ENDPOINT
    value: '{{KUBERO_APP_URL}}'
  - name: ADMIN_ENDPOINT
    value: '{{KUBERO_APP_URL}}'
  extraVolumes: []
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-db'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: logto
              owner: postgres
              secret:
                name: '{{KUBERO_APP_NAME}}-db-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO postgres
              - GRANT CREATE ON SCHEMA public TO postgres
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO postgres
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-db-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: logto
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: logto
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /api/status
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '3001'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/svhd/logto
    tag: latest
    command:
    - sh
    - -c
    - "for i in $(seq 1 60); do\n  node -e \"const {Client}=require('pg'); const c=new\
      \ Client(process.env.DB_URL); c.connect().then(()=>{c.end();process.exit(0)}).catch(()=>process.exit(1))\"\
      \ && break\n  sleep 5\ndone\nnpm run cli db seed -- --swe && npm start\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

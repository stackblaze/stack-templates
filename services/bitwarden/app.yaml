apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open source password management solutions for
      individuals, teams, and business organizations.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/15990069?s=200&v=4
    kubero.dev/template.installation: 'Register at https://bitwarden.com/host/ and set BW_INSTALLATION_ID
      and BW_INSTALLATION_KEY before first use. BW_DOMAIN is set from {{KUBERO_APP_HOST}}
      when the platform assigns a public URL. Rotate the default postgres password
      (bitwarden) before production.'
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/bitwarden/brand/main/screenshots/apps-combo-logo.png"]'
    kubero.dev/template.source: https://github.com/bitwarden/server
    kubero.dev/template.categories: '["security", "utilities"]'
    kubero.dev/template.title: Bitwarden
    kubero.dev/template.website: https://bitwarden.com/
  labels:
    manager: kubero
  name: bitwarden
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: bitwarden
              owner: bitwarden
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: bitwarden
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: bitwarden
          password: bitwarden
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: BW_DB_PROVIDER
    value: postgresql
  - name: BW_DB_SERVER
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: BW_DB_DATABASE
    value: bitwarden
  - name: BW_DB_USERNAME
    value: bitwarden
  - name: BW_DB_PASSWORD
    value: bitwarden
  - name: BW_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: BW_INSTALLATION_ID
    value: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
  - name: BW_INSTALLATION_KEY
    value: XXXXXXXXXXXXXXXXXXXX
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /etc/bitwarden
    name: bitwarden
    size: 1Gi
    storageClass: slow
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  ingress:
    enabled: true
    hosts:
    - host: ''
      paths:
      - path: /
        pathType: Prefix
  image:
    containerPort: 8080
    pullPolicy: Always
    repository: ghcr.io/bitwarden/lite
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: bitwarden
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Painless self-hosted all-in-one software development
      service, includes Git hosting, code review, team collaboration, package registry
      and CI/CD
    kubero.dev/template.icon: https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@e1e91781144b4f96bf330019f945a0db1b06534a/services/gitea/icon.png
    kubero.dev/template.installation: 'Install lock is set via env — open the app and register the first account (it becomes admin).'
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@e1e91781144b4f96bf330019f945a0db1b06534a/services/gitea/demo.mp4", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@e1e91781144b4f96bf330019f945a0db1b06534a/services/gitea/dashboard.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@e1e91781144b4f96bf330019f945a0db1b06534a/services/gitea/screenshot-repo.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@e1e91781144b4f96bf330019f945a0db1b06534a/services/gitea/screenshot-explore.png"]'
    kubero.dev/template.source: https://github.com/go-gitea/gitea
    kubero.dev/template.categories: '["work","development","collaboration"]'
    kubero.dev/template.title: gitea
    kubero.dev/template.website: https://gitea.io/
    # Git SSH needs a raw-TCP LoadBalancer port (see spec.additionalPorts),
    # which the shared-tier ResourceQuota blocks (services.loadbalancers: 0).
    # Restrict this template to dedicated clusters where that port is available.
    kubero.dev/template.requiresDedicated: 'true'
  name: gitea
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: gitea
              owner: gitea
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO gitea
              - GRANT CREATE ON SCHEMA public TO gitea
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO gitea
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: gitea
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: gitea
          password: gitea
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: GITEA__database__DB_TYPE
    value: postgres
  - name: GITEA__database__HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: GITEA__database__PORT
    value: '5432'
  - name: GITEA__database__NAME
    value: gitea
  - name: GITEA__database__USER
    value: gitea
  - name: GITEA__database__PASSWD
    value: gitea
  # Skip the browser install wizard — DB/server settings come from env above.
  # First registered user becomes the site admin.
  - name: GITEA__security__INSTALL_LOCK
    value: 'true'
  - name: GITEA__server__DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  # Public HTTPS base URL — used for clone URLs, webhooks and OAuth redirects.
  - name: GITEA__server__ROOT_URL
    value: '{{KUBERO_APP_URL}}'
  # Built-in SSH server (in-process, runs as the gitea user — no root sshd).
  # Host keys live under the shared RWX /data, so all web replicas present the
  # same key. SSH_PORT/SSH_DOMAIN are advertised in the ssh:// clone URL.
  - name: GITEA__server__START_SSH_SERVER
    value: 'true'
  - name: GITEA__server__SSH_LISTEN_PORT
    value: '2222'
  - name: GITEA__server__SSH_PORT
    value: '2222'
  - name: GITEA__server__SSH_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  # Git SSH endpoint. Ingress is HTTP-only, so SSH needs its own L4 port: this
  # adds a containerPort + ClusterIP port and (expose) an external Service on
  # 2222. NOTE: externalPort 2222 is bound cluster-wide — only one app per
  # cluster can use it until kubero-server allocates a unique port per app.
  additionalPorts:
  - name: ssh
    port: 2222
    expose: true
    externalPort: 2222
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 10Gi
    storageClass: shared
  image:
    containerPort: '3000'
    repository: registry.stackblaze.cloud/gitea/gitea
    run:
      securityContext:
        readOnlyRootFilesystem: false
    tag: latest
  name: gitea
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Painless self-hosted all-in-one software development
      service, includes Git hosting, code review, team collaboration, package registry
      and CI/CD
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/12724356?s=200&v=4
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://camo.githubusercontent.com/134f49a62801ab393c211125515d108439c67b59befb2ec3e42e7235af4f5d6c/68747470733a2f2f646c2e67697465612e696f2f73637265656e73686f74732f686f6d655f74696d656c696e652e706e67","https://camo.githubusercontent.com/186c2a4c286dcb5e6c419ae11c062721ba73eafcc40e518f237adcc9985385db/68747470733a2f2f646c2e67697465612e696f2f73637265656e73686f74732f757365725f70726f66696c652e706e67"]'
    kubero.dev/template.source: https://github.com/go-gitea/gitea
    kubero.dev/template.categories: '["work","development","collaboration"]'
    kubero.dev/template.title: gitea
    kubero.dev/template.website: https://gitea.io/
    # Git SSH needs a raw-TCP LoadBalancer port (see spec.additionalPorts),
    # which the shared-tier ResourceQuota blocks (services.loadbalancers: 0).
    # Restrict this template to dedicated clusters where that port is available.
    kubero.dev/template.requiresDedicated: 'true'
  name: gitea
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: gitea
              owner: gitea
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO gitea
              - GRANT CREATE ON SCHEMA public TO gitea
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO gitea
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: gitea
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: gitea
          password: gitea
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: GITEA__database__DB_TYPE
    value: postgres
  - name: GITEA__database__HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: GITEA__database__PORT
    value: '5432'
  - name: GITEA__database__NAME
    value: gitea
  - name: GITEA__database__USER
    value: gitea
  - name: GITEA__database__PASSWD
    value: gitea
  # Public HTTPS base URL — used for clone URLs, webhooks and OAuth redirects.
  - name: GITEA__server__ROOT_URL
    value: '{{KUBERO_APP_URL}}'
  # Built-in SSH server (in-process, runs as the gitea user — no root sshd).
  # Listens on SSH_LISTEN_PORT inside the pod; SSH_PORT/SSH_DOMAIN are what
  # Gitea advertises in the ssh:// clone URL. Reached off-cluster through the
  # additionalPorts external Service below.
  - name: GITEA__server__START_SSH_SERVER
    value: 'true'
  - name: GITEA__server__SSH_LISTEN_PORT
    value: '2222'
  - name: GITEA__server__SSH_PORT
    value: '2222'
  - name: GITEA__server__SSH_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  # Git SSH endpoint. Ingress is HTTP-only, so SSH needs its own L4 port: this
  # adds a containerPort + ClusterIP port and (expose) an external Service on
  # 2222. NOTE: externalPort 2222 is bound cluster-wide — only one app per
  # cluster can use it until kubero-server allocates a unique port per app.
  additionalPorts:
  - name: ssh
    port: 2222
    expose: true
    externalPort: 2222
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 10Gi
    storageClass: slow
  image:
    containerPort: '3000'
    repository: gitea/gitea
    run:
      securityContext:
        readOnlyRootFilesystem: false
    tag: latest
  name: gitea
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open source, self-hosted alternative to Trello,
      Notion, and Asana.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/focalboard/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '["https://www.focalboard.com/"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/mattermost/focalboard/main/website/site/static/img/hero.jpg"]'
    kubero.dev/template.source: https://github.com/mattermost/focalboard
    kubero.dev/template.categories: '["productivity", "work"]'
    kubero.dev/template.title: Focalboard
    kubero.dev/template.website: https://www.focalboard.com/
  labels:
    manager: kubero
  name: focalboard
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: focalboard
              owner: focalboard
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO focalboard
              - GRANT CREATE ON SCHEMA public TO focalboard
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO focalboard
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: focalboard
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: focalboard
          password: focalboard
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: FOCALBOARD_SERVER_ROOT
    value: '{{KUBERO_APP_URL}}'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /opt/focalboard/data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 1Gi
    storageClass: shared
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/mattermost/focalboard
    tag: latest
    command:
    - sh
    - -c
    - mkdir -p /opt/focalboard/data/files && printf '%s\n' "{\"serverRoot\":\"${FOCALBOARD_SERVER_ROOT}\",\"port\":8000,\"dbtype\":\"postgres\",\"dbconfig\":\"host=focalboard-postgresql-rw
      port=5432 user=focalboard password=focalboard dbname=focalboard sslmode=disable\",\"postgres_dbconfig\":\"dbname=focalboard
      sslmode=disable\",\"useSSL\":false,\"webpath\":\"./pack\",\"filespath\":\"./data/files\",\"telemetry\":false,\"session_expire_time\":2592000,\"session_refresh_time\":18000,\"localOnly\":false,\"enableLocalMode\":true,\"localModeSocketLocation\":\"/var/tmp/focalboard_local.socket\",\"enablePublicSharedBoards\":false}"
      > /opt/focalboard/config.json && exec /opt/focalboard/bin/focalboard-server
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: focalboard
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

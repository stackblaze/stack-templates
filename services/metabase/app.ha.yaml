apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: metabase
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Metabase is the easy, open-source way for everyone
      in your company to ask questions and learn from data.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/metabase/icon.png
    kubero.dev/template.installation: First boot can take several minutes while Metabase
      initializes its application database.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/metabase/screenshot-dashboard-ecommerce-insights.png", "https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/metabase/screenshot-question-product-category.png", "https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/metabase/screenshot-metric-revenue-by-state.png", "https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/metabase/screenshot-getting-started.png"]'
    kubero.dev/template.source: https://github.com/metabase/metabase
    kubero.dev/template.categories: '[ "data", "work" ]'
    kubero.dev/template.title: Metabase
    kubero.dev/template.website: https://www.metabase.com/
  labels:
    manager: kubero
spec:
  name: metabase
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: metabase-postgres
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: metabase
              owner: metabase
              secret:
                name: metabase-postgres-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO metabase
              - GRANT CREATE ON SCHEMA public TO metabase
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO metabase
          enableSuperuserAccess: true
          superuserSecret:
            name: metabase-postgres-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: metabase-postgres-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: metabase
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: metabase-postgres-app
        type: kubernetes.io/basic-auth
        stringData:
          username: metabase
          password: metabase
  envVars:
  - name: MB_DB_TYPE
    value: postgres
  - name: MB_DB_DBNAME
    value: metabase
  - name: MB_DB_PORT
    value: '5432'
  - name: MB_DB_USER
    value: metabase
  - name: MB_DB_PASS
    value: metabase
  - name: MB_DB_HOST
    value: metabase-postgres-rw
  - name: JAVA_OPTS
    value: -Xmx1536m
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: metabase/metabase
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10

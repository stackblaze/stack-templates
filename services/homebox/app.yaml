apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Homebox is the inventory and organization system
      built for the Home User
    kubero.dev/template.icon: https://homebox.software/lilbox.svg
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: 'null'
    kubero.dev/template.source: https://github.com/sysadminsmedia/homebox
    kubero.dev/template.categories: '["documentation", "work"]'
    kubero.dev/template.title: Homebox
    kubero.dev/template.website: https://homebox.software
  name: homebox
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: homebox
              owner: homebox
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO homebox
              - GRANT CREATE ON SCHEMA public TO homebox
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO homebox
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: homebox
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: homebox
          password: homebox
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: HBOX_DATABASE_DRIVER
    value: postgres
  - name: HBOX_DATABASE_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: HBOX_DATABASE_PORT
    value: '5432'
  - name: HBOX_DATABASE_USERNAME
    value: homebox
  - name: HBOX_DATABASE_PASSWORD
    value: homebox
  - name: HBOX_DATABASE_DATABASE
    value: homebox
  - name: HBOX_DATABASE_SSL_MODE
    value: disable
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 1Gi
    storageClass: slow
  image:
    containerPort: '7745'
    repository: ghcr.io/hay-kot/homebox
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true
  name: homebox
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

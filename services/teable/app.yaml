apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: teable
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source Airtable alternative built on native Postgres — spreadsheet UI over real SQL tables with automations, views, and API.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/teable/icon.png
    kubero.dev/template.installation: Change SECRET_KEY to a random string. PUBLIC_ORIGIN must match the app URL exactly (used for OAuth callbacks and magic links). Teable stores data directly in Postgres — each table becomes a real SQL table you can query. The storage volume holds file attachments. Register on first visit to create the admin workspace.
    kubero.dev/template.links: '["https://help.teable.io/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/teableio/teable
    kubero.dev/template.categories: '["data", "productivity", "work"]'
    kubero.dev/template.title: Teable
    kubero.dev/template.website: https://teable.io
  labels:
    manager: kubero
spec:
  name: teable
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: teable-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: teable
              owner: teable
              secret:
                name: teable-postgresql-app
              postInitApplicationSQL:
                - GRANT ALL ON SCHEMA public TO teable
                - GRANT CREATE ON SCHEMA public TO teable
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO teable
          enableSuperuserAccess: true
          superuserSecret:
            name: teable-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: teable-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: teable
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: teable-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: teable
          password: teable
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: teable-cache
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: PRISMA_DATABASE_URL
    value: 'postgresql://teable:teable@teable-postgresql-rw:5432/teable'
  - name: BACKEND_CACHE_REDIS_URI
    value: 'redis://rfr-teable-cache-readwrite:6379/0'
  - name: SECRET_KEY
    value: change-me-to-random-string
  - name: PUBLIC_ORIGIN
    value: '{{KUBERO_APP_URL}}'
  - name: BACKEND_STORAGE_TYPE
    value: local
  - name: BACKEND_LOCAL_STORAGE_PATH
    value: /app/.teable
  - name: BACKEND_UPLOAD_FILE_SIZE_LIMIT
    value: 209715200
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /app/.teable
    name: teable-storage
    size: 10Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: ghcr.io/teableio/teable
    tag: latest

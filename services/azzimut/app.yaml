apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: azzimut
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Azimutt is a full-stack database exploration
      tool. It allows you to explore your database, run queries, and visualize the
      results.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/89384563
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://azimutt.app/images/og/azimutt-2a331c4663dc7c6a94d0c47af0fbf7fe.jpg?vsn=d"]'
    kubero.dev/template.source: https://github.com/azimuttapp/azimutt
    kubero.dev/template.categories: '["data", "debug", "development"]'
    kubero.dev/template.title: Azimutt
    kubero.dev/template.website: https://azimutt.app/
  labels:
    manager: kubero
spec:
  name: azzimut
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-db'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: azimutt
              owner: azimutt
              secret:
                name: '{{KUBERO_APP_NAME}}-db-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO azimutt
              - GRANT CREATE ON SCHEMA public TO azimutt
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO azimutt
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-db-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: azimutt
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: azimutt
          password: azimutt
  envVars:
  - name: PHX_SERVER
    value: 'true'
  - name: PHX_PROTOCOL
    value: ipv4
  - name: PHX_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: PORT
    value: '4000'
  - name: SECRET_KEY_BASE
    value: '{{KUBERO_GEN_ALNUM:64}}'
  - name: DATABASE_URL
    value: postgresql://azimutt:azimutt@{{KUBERO_APP_NAME}}-db-rw:5432/azimutt
  - name: FILE_STORAGE_ADAPTER
    value: local
  - name: AUTH_PASSWORD
    value: 'true'
  - name: SKIP_EMAIL_CONFIRMATION
    value: 'true'
  - name: SKIP_ONBOARDING_FUNNEL
    value: 'true'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /app/bin/uploads
    name: '{{KUBERO_APP_NAME}}-uploads'
    size: 1Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '4000'
    pullPolicy: Always
    repository: ghcr.io/azimuttapp/azimutt
    tag: main
    command:
    - sh
    - -c
    - "for i in $(seq 1 90); do\n  if /app/bin/migrate; then break; fi\n  sleep 5\n\
      done\nexec /app/bin/server\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: dotcms-ha
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: "Hybrid headless CMS — high-availability deployment: 3-node CloudNativePG Postgres with automatic failover and 2 clustered dotCMS replicas on shared RWX storage."
    kubero.dev/template.icon: "https://avatars.githubusercontent.com/u/1005263?s=200&v=4"
    kubero.dev/template.installation: |
      Default admin login is `admin@dotcms.com` / `admin`. Change `DOT_INITIAL_ADMIN_PASSWORD` before exposing the instance.

      **High-availability tier.** Provisions:
      - **PostgreSQL 16 — 3 instances** via the **CloudNativePG** operator (`dotcms-db`): one primary + two streaming replicas with automatic failover. dotCMS connects to the `dotcms-db-rw` service, which always tracks the current primary. Requires the CloudNativePG operator on the cluster.
      - **2 dotCMS web replicas** clustered via `DOT_DOTCMS_CLUSTER_ID`, sharing the assets directory on a `ReadWriteMany` volume so both nodes serve the same content and survive a node failure / rolling deploys.
      - **OpenSearch 1.3.x** (`dotcms-opensearch`) — dotCMS does *not* support OpenSearch 2.x/3.x. Note: this runs as a **single** OpenSearch node (the addon chart pins single-node discovery). The search index is rebuildable, so the data tier (Postgres) and app tier (dotCMS) are HA while search is not yet — reindex from the dotCMS admin if the OpenSearch pod is rescheduled.

      First boot takes 2–5 minutes while dotCMS initializes the schema and indices. Wait for the Postgres cluster and OpenSearch to become Ready before the dotCMS pods pass their startup checks.
    kubero.dev/template.links: '["https://dev.dotcms.com/docs/", "https://github.com/dotCMS/core"]'
    kubero.dev/template.screenshots: '["https://www.dotcms.com/dA/cd72e798-1e69/1000w/dotcms-edit-mode.png"]'
    kubero.dev/template.source: "https://github.com/dotCMS/core"
    kubero.dev/template.categories: '["cms", "work", "productivity"]'
    kubero.dev/template.title: "dotCMS (HA)"
    kubero.dev/template.website: "https://www.dotcms.com/"
  labels:
    manager: kubero
spec:
  name: dotcms-ha
  deploymentstrategy: docker
  envVars:
    # NOTE: the dotCMS image already selects a GC — don't add -XX:+UseG1GC here
    # ("Multiple garbage collectors selected" -> JVM won't start). Heap only.
    - name: CMS_JAVA_OPTS
      value: "-Xmx1g -XX:MaxMetaspaceSize=512m"
    - name: LANG
      value: C.UTF-8
    - name: TZ
      value: UTC
    # CloudNativePG publishes the current primary on the `<cluster>-rw`
    # service and reattaches it across failover, so all dotCMS replicas
    # always write to the leader. Credentials come from the dotcms-db-app secret.
    - name: DB_BASE_URL
      value: "jdbc:postgresql://dotcms-db-rw:5432/dotcms"
    - name: DB_USERNAME
      value: dotcmsdbuser
    - name: DB_PASSWORD
      value: password
    # The KuberoOpenSearch addon (opensearch-project chart) runs plain HTTP
    # with no security plugin and exposes the service as 'opensearch'.
    - name: DOT_ES_ENDPOINTS
      value: "http://opensearch:9200"
    - name: DOT_ES_AUTH_TYPE
      value: "NONE"
    - name: DOT_INITIAL_ADMIN_PASSWORD
      value: admin
    # Shared cluster id ties the two dotCMS pods into one logical cluster so
    # they coordinate cache invalidation and serve identical content.
    - name: DOT_DOTCMS_CLUSTER_ID
      value: dotcms-ha
  extraVolumes:
    # Shared assets dir on RWX so BOTH dotCMS replicas mount the same content
    # — required for clustering/HA, not just persistence.
    - accessModes:
        - ReadWriteMany
      storageClass: shared
      emptyDir: false
      mountPath: /data/shared
      name: dotcms-shared
      size: 10Gi
  cronjobs: []
  addons:
    # PostgreSQL via the CloudNativePG operator (Bitnami's postgresql chart
    # was moved behind Broadcom's paid catalog in 2025 and no longer gets
    # free image updates). CNPG is CNCF, Apache-2 and actively maintained.
    # `kind` + the resourceDefinitions key are both `Cluster` so the addon's
    # status resolves. The operator applies every resourceDefinitions value as
    # a manifest, so the Cluster CR and its two secrets all get created.
    - displayName: PostgreSQL (CloudNativePG)
      env: []
      icon: /img/addons/pgsql.svg
      id: kubero-operator
      kind: Cluster
      resourceDefinitions:
        Cluster:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: dotcms-db
          spec:
            # HA: 1 primary + 2 hot standbys with automatic failover.
            instances: 3
            # dotCMS supports PostgreSQL 13–16; pin 16 (CNPG defaults to 17).
            imageName: ghcr.io/cloudnative-pg/postgresql:16
            primaryUpdateStrategy: unsupervised
            storage:
              storageClass: fast
              size: 5Gi
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 1Gi
            bootstrap:
              initdb:
                database: dotcms
                owner: dotcmsdbuser
                secret:
                  name: dotcms-db-app
            enableSuperuserAccess: true
            superuserSecret:
              name: dotcms-db-superuser
        # CNPG reads username/password from kubernetes.io/basic-auth secrets.
        superuserSecret:
          apiVersion: v1
          kind: Secret
          metadata:
            name: dotcms-db-superuser
          type: kubernetes.io/basic-auth
          stringData:
            username: postgres
            password: password
        appUserSecret:
          apiVersion: v1
          kind: Secret
          metadata:
            name: dotcms-db-app
          type: kubernetes.io/basic-auth
          stringData:
            username: dotcmsdbuser
            password: password
    - displayName: OpenSearch
      env: []
      icon: /img/addons/opensearch.svg
      id: kubero-operator
      kind: KuberoOpenSearch
      resourceDefinitions:
        KuberoOpenSearch:
          apiVersion: application.kubero.dev/v1alpha1
          kind: KuberoOpenSearch
          metadata:
            name: dotcms-opensearch
          spec:
            opensearch:
              image:
                tag: "1.3.20"
              # opensearch-project chart uses a top-level persistence block
              # (it ignores the bitnami-style master/data persistence keys).
              persistence:
                enabled: true
                storageClass: fast
                size: 10Gi
              security:
                enabled: true
                adminPassword: admin
                tls:
                  verificationMode: none
                  autoGenerated: true
              master:
                masterOnly: false
                replicaCount: 1
                persistence:
                  size: 8Gi
              data:
                replicaCount: 0
                persistence:
                  size: 8Gi
              ingest:
                enabled: false
                replicaCount: 0
              coordinating:
                replicaCount: 0
              dashboards:
                enabled: false
  # Per-pod sizing (2Gi-per-container tenant tier): memory reserved at 2Gi
  # (requests==limits; dotCMS warns against memory oversubscription) with
  # -Xmx1g + 512m metaspace leaving headroom. With 2 replicas the app tier
  # reserves 2×2Gi; bump both to 4Gi/-Xmx2g on a higher-memory tier.
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 2Gi
  # dotCMS first boot takes 2-5 min — longer than the chart's fixed ~90s startup
  # probe — so disable the probes here, otherwise it gets killed mid-init.
  healthcheck:
    enabled: false
  web:
    # Two clustered replicas for app-tier HA + zero-downtime rolling deploys.
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: "8082"
    pullPolicy: Always
    repository: dotcms/dotcms
    tag: latest

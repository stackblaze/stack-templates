apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: mediacms
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Modern, fully featured open-source video and
      media content management system for building self-hosted media portals and streaming
      sites.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mediacms/icon.png
    kubero.dev/template.installation: 'This template runs the PRIMARY MediaCMS application
      container ONLY (mediacms/mediacms). MediaCMS is a Django + Celery MULTI-CONTAINER
      stack and is NOT complete with this pod alone. By default this pod is configured
      as the WEB front end (ENABLE_UWSGI=yes, ENABLE_NGINX=yes serving HTTP on port
      80), with migrations and Celery DISABLED so they can run as dedicated apps.
      REQUIRED before/at first boot: 1) Run database migrations ONCE - deploy a one-shot
      companion app from the SAME image mediacms/mediacms with env ENABLE_UWSGI=no,
      ENABLE_NGINX=no, ENABLE_CELERY_BEAT=no, ENABLE_CELERY_SHORT=no, ENABLE_CELERY_LONG=no,
      ENABLE_MIGRATIONS=yes, ADMIN_USER=admin, ADMIN_EMAIL=admin@localhost and ADMIN_PASSWORD
      set to a strong value (this also creates the first superuser). Alternatively
      set ENABLE_MIGRATIONS=yes on THIS web pod for the very first deploy, then set
      it back to no. 2) Rotate the Postgres password (template default is the slug
      ''mediacms'') and set a real ADMIN_PASSWORD. Valkey/Redis is password-less in-cluster.
      MANDATORY COMPANION SERVICES to deploy as SEPARATE apps from the SAME image
      mediacms/mediacms, sharing the SAME Postgres + Valkey + the /home/mediacms/mediacms/media_files
      volume (use RWX storage so uploads/transcodes are visible to all): (a) Celery
      WORKER for short tasks - env ENABLE_UWSGI=no, ENABLE_NGINX=no, ENABLE_CELERY_SHORT=yes,
      ENABLE_CELERY_LONG=yes, ENABLE_CELERY_BEAT=no, ENABLE_MIGRATIONS=no (handles
      thumbnailing, encoding/transcoding and notifications - REQUIRED or uploaded
      videos never finish processing); (b) Celery BEAT scheduler - env ENABLE_CELERY_BEAT=yes
      with all other ENABLE_* = no (periodic cleanup/maintenance jobs). All companion
      pods need the identical POSTGRES_* and REDIS_LOCATION env vars as this web pod.
      Route public ingress to THIS web pod (it runs the bundled nginx). Set FRONTEND_HOST
      to your public https URL so absolute media/asset links resolve correctly. Heavy
      video transcoding is CPU/RAM intensive - size the worker pod accordingly. For
      production at scale media_files can be offloaded to S3 (e.g. the RustFS add-on)
      via Django storages, but the default uses the local volume.'
    kubero.dev/template.links: '["https://github.com/mediacms-io/mediacms/blob/main/docs/admins_docs.md",
      "https://github.com/mediacms-io/mediacms/blob/main/docs/Installation.md"]'
    kubero.dev/template.screenshots: '["https://mediacms.io/static/images/mediacms.png"]'
    kubero.dev/template.source: https://github.com/mediacms-io/mediacms
    kubero.dev/template.categories: '["media", "cms", "social"]'
    kubero.dev/template.title: MediaCMS
    kubero.dev/template.website: https://mediacms.io
  labels:
    manager: kubero
spec:
  name: mediacms
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: mediacms-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: mediacms
              owner: mediacms
              secret:
                name: mediacms-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: mediacms-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: mediacms-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: mediacms
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: mediacms-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: mediacms
          password: mediacms
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: mediacms-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: ENABLE_UWSGI
    value: 'yes'
  - name: ENABLE_NGINX
    value: 'yes'
  - name: ENABLE_MIGRATIONS
    value: 'no'
  - name: ENABLE_CELERY_BEAT
    value: 'no'
  - name: ENABLE_CELERY_SHORT
    value: 'no'
  - name: ENABLE_CELERY_LONG
    value: 'no'
  - name: FRONTEND_HOST
    value: '{{KUBERO_APP_URL}}'
  - name: POSTGRES_HOST
    value: mediacms-postgresql-rw
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_DB
    value: mediacms
  - name: POSTGRES_USER
    value: mediacms
  - name: POSTGRES_PASSWORD
    value: mediacms
  - name: REDIS_LOCATION
    value: redis://rfr-mediacms-valkey-readwrite:6379/1
  - name: ADMIN_USER
    value: admin
  - name: ADMIN_EMAIL
    value: admin@localhost
  - name: ADMIN_PASSWORD
    value: replace-with-openssl-rand-hex-16
  - name: TZ
    value: UTC
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /home/mediacms/mediacms/media_files
    name: mediacms-media
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: mediacms/mediacms
    tag: latest

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: ojs
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source journal management and scholarly publishing platform from the Public Knowledge
      Project, handling submission, peer review, and publication.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/ojs/icon.png
    kubero.dev/template.installation: Uses the official pkpofficial/ojs image (MariaDB backend). Set PKP_CLI_INSTALL=1 to
      auto-run the CLI installer on first boot using the DB_* env vars; otherwise complete the web-based installer at the
      app URL. ROTATE the mariadb add-on password and the DB_PASSWORD env to match before going to production. The /var/www/html
      volume persists OJS config (config.inc.php), uploaded submission files, and public files across restarts. SERVERNAME
      is set from the app host so generated config/URLs are correct.
    kubero.dev/template.links: '["https://docs.pkp.sfu.ca/", "https://github.com/pkp/docker-ojs"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/pkp/ojs
    kubero.dev/template.categories: '["cms", "documentation", "collaboration"]'
    kubero.dev/template.title: Open Journal Systems
    kubero.dev/template.website: https://pkp.sfu.ca/software/ojs/
  labels:
    manager: kubero
spec:
  name: ojs
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: ojs-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: ojs-mysql-root
            key: password
          database: ojs
          username: ojs
          passwordSecretKeyRef:
            name: ojs-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ojs-mysql-root
        type: Opaque
        stringData:
          password: ojs
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ojs-mysql-app
        type: Opaque
        stringData:
          password: ojs
  envVars:
  - name: SERVERNAME
    value: '{{KUBERO_APP_HOST}}'
  - name: HTTP_PORT
    value: '8080'
  - name: DB_HOST
    value: ojs-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_NAME
    value: ojs
  - name: DB_USER
    value: ojs
  - name: DB_PASSWORD
    value: ojs
  - name: PKP_CLI_INSTALL
    value: '1'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html
    name: ojs-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: pkpofficial/ojs
    tag: stable-3_5_0

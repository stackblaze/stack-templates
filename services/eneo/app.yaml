apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: eneo
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: 'Open-source, multi-tenant AI platform for the
      public sector: build chat assistants, RAG knowledge bases and AI workflows on
      your own models.'
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/eneo/icon.png
    kubero.dev/template.installation: "PRIMARY container = the FastAPI backend (ghcr.io/eneo-ai/eneo-backend,\
      \ listens on :8000, served behind a reverse proxy). This template deploys ONLY\
      \ the backend API. To run the full stack you must also deploy these companion\
      \ services as separate apps, all sharing this app's env (especially the POSTGRES_*,\
      \ REDIS_*, JWT_SECRET, URL_SIGNING_KEY, ENCRYPTION_KEY values):\n  - Frontend\
      \ (SvelteKit UI, the user-facing site on :3000): image ghcr.io/eneo-ai/eneo-frontend:latest.\
      \ Point its API base at this backend.\n  - Worker (ARQ background tasks: web\
      \ crawls, uploads, integrations): SAME image ghcr.io/eneo-ai/eneo-backend:latest\
      \ with env RUN_AS_WORKER=true.\n  - DB init (one-shot migrations + default tenant/user;\
      \ run ONCE then it exits): SAME backend image with command [\"python\",\"init_db.py\"\
      ]. Run this before the backend/worker the first time, or run `python init_db.py`\
      \ in the backend container.\nDATASTORES: Postgres MUST have the pgvector extension\
      \ (the upstream compose uses pgvector/pgvector:pg16) \u2014 Eneo stores embeddings\
      \ in pgvector; confirm the operator-provisioned Postgres has the `vector` extension\
      \ available/enabled. Redis is provided here by the Valkey add-on (used by ARQ\
      \ for the job queue).\nSECRETS TO ROTATE before production: JWT_SECRET, URL_SIGNING_KEY,\
      \ ENCRYPTION_KEY (generate each with `openssl rand -hex 32`), and the Postgres\
      \ password. Also set PUBLIC_ORIGIN to your real https URL (pre-filled with this\
      \ app's URL token).\nLLM PROVIDERS: Eneo brings its own models \u2014 set at\
      \ least one of OPENAI_API_KEY / ANTHROPIC_API_KEY / GEMINI_API_KEY / AZURE_*\
      \ / MISTRAL_API_KEY, or point VLLM_MODEL_URL at a self-hosted model. Optional:\
      \ INFINITY_URL for embeddings, TAVILY_API_KEY for web search.\nFIRST RUN: after\
      \ db-init, log in with the default admin user created by init_db.py and immediately\
      \ change its password."
    kubero.dev/template.links: '["https://github.com/eneo-ai/eneo/blob/main/docs/INSTALLATION.md",
      "https://github.com/eneo-ai/eneo/blob/main/docs/DEPLOYMENT.md"]'
    kubero.dev/template.screenshots: '["https://eneo.ai/public/og-image.png"]'
    kubero.dev/template.source: https://github.com/eneo-ai/eneo
    kubero.dev/template.categories: '["ai", "productivity", "collaboration"]'
    kubero.dev/template.title: Eneo
    kubero.dev/template.website: https://eneo.ai
  labels:
    manager: kubero
spec:
  name: eneo
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: eneo
              owner: eneo
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - CREATE EXTENSION IF NOT EXISTS vector;
              - GRANT ALL ON SCHEMA public TO eneo
              - GRANT CREATE ON SCHEMA public TO eneo
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO eneo
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: eneo
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: eneo
          password: eneo
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: POSTGRES_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_DB
    value: eneo
  - name: POSTGRES_USER
    value: eneo
  - name: POSTGRES_PASSWORD
    value: eneo
  - name: REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: PUBLIC_ORIGIN
    value: '{{KUBERO_APP_URL}}'
  - name: API_PREFIX
    value: /api/v1
  - name: JWT_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: JWT_AUDIENCE
    value: '*'
  - name: JWT_ISSUER
    value: ENEO
  - name: JWT_EXPIRY_TIME
    value: '86400'
  - name: JWT_ALGORITHM
    value: HS256
  - name: JWT_TOKEN_PREFIX
    value: Bearer
  - name: URL_SIGNING_KEY
    value: replace-with-openssl-rand-hex-32
  - name: ENCRYPTION_KEY
    value: replace-with-openssl-rand-hex-32
  - name: USING_ACCESS_MANAGEMENT
    value: 'true'
  - name: USING_CRAWL
    value: 'true'
  - name: UPLOAD_FILE_TO_SESSION_MAX_SIZE
    value: '10485760'
  - name: UPLOAD_IMAGE_TO_SESSION_MAX_SIZE
    value: '10485760'
  - name: UPLOAD_MAX_FILE_SIZE
    value: '10485760'
  - name: TRANSCRIPTION_MAX_FILE_SIZE
    value: '10485760'
  - name: API_KEY_LENGTH
    value: '64'
  - name: API_KEY_HEADER_NAME
    value: X-API-Key
  - name: NUM_WORKERS
    value: '1'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /app/data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 2Gi
    storageClass: lite
  cronjobs: []
  healthcheck:
    enabled: true
    path: /docs
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '2'
      memory: 1536Mi
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/eneo-ai/eneo-backend
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: picoshare
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Minimalist self-hosted file-sharing service for
      generating shareable download links to files of any size.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/picoshare/icon.png
    kubero.dev/template.installation: 'PicoShare stores everything in a single SQLite
      database under /data (no external datastore add-on needed). REQUIRED: set PS_SHARED_SECRET
      to a strong random value before exposing publicly (it is the admin/upload passphrase)
      and rotate the default. Optional: enable Litestream streaming backups by setting
      LITESTREAM_BUCKET / LITESTREAM_ENDPOINT / LITESTREAM_ACCESS_KEY_ID / LITESTREAM_SECRET_ACCESS_KEY
      (requires an external S3-compatible bucket; omitted from addons since Kubero
      add-ons do not cover S3). The persistent volume at /data must be retained across
      upgrades or all uploads and links are lost.'
    kubero.dev/template.links: '["https://github.com/mtlynch/picoshare/blob/master/README.md"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/mtlynch/picoshare/master/docs/demo.gif"]'
    kubero.dev/template.source: https://github.com/mtlynch/picoshare
    kubero.dev/template.categories: '["storage", "utilities", "productivity"]'
    kubero.dev/template.title: PicoShare
    kubero.dev/template.website: https://pico.rocks
  labels:
    manager: kubero
spec:
  name: picoshare
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: PORT
    value: '3001'
  - name: PS_SHARED_SECRET
    value: replace-with-openssl-rand-hex-32
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: picoshare-data
    size: 2Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '3001'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/picoshare
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true

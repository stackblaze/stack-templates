apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: redash
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source data visualization and dashboarding tool to query, explore, and share insights
      from 30+ SQL/NoSQL/API data sources.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/redash/icon.png
    kubero.dev/template.installation: 'Redash is a multi-process stack: every service runs the SAME redash/redash image with
      a different command. This template runs the primary web server (command `server`, port 5000). You MUST ALSO deploy these
      companion deployments from the identical redash/redash:10.1.0.b50633 image, same env vars, to make it functional: a Celery
      WORKER (`celery worker --app=redash.worker --queue=queries,celery`) for running queries, a SCHEDULER (`celery worker
      --app=redash.worker --beat --queue=periodic,emails,schemas`) for refreshes and alerts, and a one-time INIT/migration
      job (`create_db`) that must run ONCE before first boot to create the schema. Bundled add-ons Postgres and Redis (provided
      by the Valkey add-on) are provisioned here. ROTATE before exposing: REDASH_COOKIE_SECRET and REDASH_SECRET_KEY (each
      `openssl rand -hex 32`; SECRET_KEY must be 32+ chars and must NOT change after data exists or saved credentials become
      undecryptable), plus the Postgres add-on password. Set REDASH_HOST to your public URL. After the create_db job completes
      and the server is up, open the app and the first registration becomes the admin. Optional: outbound email needs REDASH_MAIL_*
      SMTP env vars (not provisioned).'
    kubero.dev/template.links: '["https://redash.io/help/open-source/setup", "https://github.com/getredash/setup"]'
    kubero.dev/template.screenshots: '["https://redash.io/assets/images/elements/redash-mobile.png"]'
    kubero.dev/template.source: https://github.com/getredash/redash
    kubero.dev/template.categories: '["data", "monitoring", "development"]'
    kubero.dev/template.title: Redash
    kubero.dev/template.website: https://redash.io
  labels:
    manager: kubero
spec:
  name: redash
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: redash-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: redash
              owner: redash
              secret:
                name: redash-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO redash
              - GRANT CREATE ON SCHEMA public TO redash
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO redash
          enableSuperuserAccess: true
          superuserSecret:
            name: redash-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: redash-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: redash
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: redash-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: redash
          password: redash
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: redash-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: PYTHONUNBUFFERED
    value: '0'
  - name: REDASH_LOG_LEVEL
    value: INFO
  - name: REDASH_DATABASE_URL
    value: postgresql://redash:redash@redash-postgresql-rw:5432/redash
  - name: REDASH_REDIS_URL
    value: redis://rfr-redash-valkey-readwrite:6379/0
  - name: REDASH_COOKIE_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: REDASH_SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  - name: REDASH_HOST
    value: '{{KUBERO_APP_URL}}'
  - name: REDASH_WEB_WORKERS
    value: '1'
  - name: REDASH_ENFORCE_HTTPS
    value: 'false'
  extraVolumes: []
  cronjobs: []
  healthcheck:
    enabled: true
    path: /ping
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '5000'
    pullPolicy: Always
    repository: redash/redash
    tag: 10.1.0.b50633
    command:
    - /bin/sh
    - -c
    - /app/bin/docker-entrypoint create_db && exec /app/bin/docker-entrypoint server

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: onlyoffice
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: OnlyOffice document collaboration on Nextcloud —
      self-hosted file sync & sharing with users and an admin portal, plus real-time
      editing of documents, spreadsheets and presentations via a pre-wired OnlyOffice
      Docs connector.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/onlyoffice/icon.png
    kubero.dev/template.installation: 'Deploys the stackblaze/nextcloud-onlyoffice image
      (Nextcloud with the ONLYOFFICE connector baked in + a self-configuring startup
      hook) on internal port 80, with the bundled PostgreSQL (CloudNativePG) and Valkey
      (Redis) add-ons. On first boot the hook auto-installs and configures the connector
      from DOCUMENT_SERVER_URL + ONLYOFFICE_JWT_SECRET — no manual setup. IMPORTANT:
      this app needs a running OnlyOffice Document Server to edit documents. Point
      DOCUMENT_SERVER_URL at one (the default is the shared platform Docs) and set
      ONLYOFFICE_JWT_SECRET to that Docs'' JWT_SECRET (they must match; rotate both
      from the placeholder with `openssl rand -hex 32`). The admin account is
      NEXTCLOUD_ADMIN_USER / NEXTCLOUD_ADMIN_PASSWORD (change the password). Nextcloud
      data, config and state live under /var/www/html.'
    kubero.dev/template.links: '["https://docs.nextcloud.com/", "https://api.onlyoffice.com/docs/docs-api/get-started/"]'
    kubero.dev/template.screenshots: '["https://download.onlyoffice.com/assets/fb/fb_icon_325x325.jpg"]'
    kubero.dev/template.source: https://github.com/stackblaze/nextcloud-onlyoffice
    kubero.dev/template.categories: '["productivity", "collaboration", "documentation"]'
    kubero.dev/template.title: OnlyOffice
    kubero.dev/template.website: https://www.onlyoffice.com/
  labels:
    manager: kubero
spec:
  name: onlyoffice
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: nextcloud
              owner: nextcloud
              secret:
                name: 'postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: 'postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: 'postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: nextcloud
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: 'postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: nextcloud
          password: nextcloud
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  # --- Database (CloudNativePG) ---
  - name: POSTGRES_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_DB
    value: nextcloud
  - name: POSTGRES_USER
    value: nextcloud
  - name: POSTGRES_PASSWORD
    value: nextcloud
  # --- Cache (Valkey/Redis) ---
  - name: REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  # --- Nextcloud admin + access ---
  - name: NEXTCLOUD_ADMIN_USER
    value: admin
  - name: NEXTCLOUD_ADMIN_PASSWORD
    value: changeme-admin
  - name: NEXTCLOUD_TRUSTED_DOMAINS
    value: '{{KUBERO_APP_HOST}}'
  - name: NEXTCLOUD_PUBLIC_URL
    value: 'https://{{KUBERO_APP_HOST}}'
  - name: OVERWRITEPROTOCOL
    value: https
  # --- OnlyOffice connector (auto-configured by the image's startup hook) ---
  # DOCUMENT_SERVER_URL must point at a running OnlyOffice Document Server and
  # ONLYOFFICE_JWT_SECRET must equal that Docs server's JWT_SECRET.
  - name: DOCUMENT_SERVER_URL
    value: 'https://onlyoffice-d290.stackblaze.app/'
  - name: ONLYOFFICE_JWT_SECRET
    value: replace-with-openssl-rand-hex-32
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html
    name: data
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi
  healthcheck:
    enabled: true
    path: /status.php
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/nextcloud-onlyoffice
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

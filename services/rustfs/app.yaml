apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: rustfs
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: High-performance, S3-compatible distributed object
      storage written in Rust, with a built-in web console; a drop-in MinIO/Ceph alternative.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/rustfs/icon.png
    kubero.dev/template.installation: 'RustFS is itself the datastore: it persists
      all objects and metadata on disk under /data using erasure coding, so no database
      add-on is required. The S3-compatible API and web console are both served on
      container port 9000 (console reachable at /rustfs/console). Set RUSTFS_VOLUMES
      to the data path. IMPORTANT: rotate RUSTFS_ACCESS_KEY and RUSTFS_SECRET_KEY
      before exposing the endpoint - the template defaults (rustfsadmin / replace-with-openssl-rand-hex-32)
      are root credentials. After first boot, log in to the console with those credentials,
      then create scoped access keys and buckets for your apps. For multi-node erasure-set
      durability, run several replicas and point RUSTFS_VOLUMES at multiple mounts;
      this single-node template gives one volume suitable for dev/small workloads.
      No external S3, search engine, or SMTP service is needed.'
    kubero.dev/template.links: '["https://docs.rustfs.com", "https://github.com/rustfs/rustfs#readme"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/rustfs/rustfs
    kubero.dev/template.categories: '["storage", "data", "development"]'
    kubero.dev/template.title: RustFS
    kubero.dev/template.website: https://rustfs.com
  labels:
    manager: kubero
spec:
  name: rustfs
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: RUSTFS_ADDRESS
    value: 0.0.0.0:9000
  - name: RUSTFS_VOLUMES
    value: /data
  - name: RUSTFS_ACCESS_KEY
    value: rustfsadmin
  - name: RUSTFS_SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  - name: RUSTFS_CONSOLE_ENABLE
    value: 'true'
  - name: RUSTFS_SERVER_DOMAINS
    value: '{{KUBERO_APP_HOST}}'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: lite
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 120
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '9000'
    pullPolicy: Always
    repository: rustfs/rustfs
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: mantisbt
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: MantisBT is an open source web-based bug and
      issue tracker that balances simplicity with powerful project and workflow management.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mantisbt/icon.png
    kubero.dev/template.installation: 'Database is configured through the first-run
      web installer at /admin/install.php, NOT via env vars. To reach it, this template
      sets MANTIS_ENABLE_ADMIN=1 so the /admin directory is accessible; SET IT BACK
      TO 0 after setup for security. At install.php choose database type ''MySQL Improved
      (mysqli)'' and enter: Hostname=mantisbt-mysql, Username=mantisbt, Password=mantisbt,
      Database name=mantisbt (these are template defaults from the mariadb add-on;
      rotate them). The default app admin login is administrator / root: change the
      password immediately after install. Persisted volumes hold config (/var/www/html/config)
      and custom files/uploads (/var/www/html/custom).'
    kubero.dev/template.links: '["https://www.mantisbt.org/documentation.php", "https://github.com/mantisbt/mantisbt/blob/master/docbook/Admin_Guide/en-US/Installation.xml"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/mantisbt/mantisbt/master/doc/modern_view_issues.png"]'
    kubero.dev/template.source: https://github.com/mantisbt/mantisbt
    kubero.dev/template.categories: '["development", "productivity", "helpdesk"]'
    kubero.dev/template.title: MantisBT
    kubero.dev/template.website: https://www.mantisbt.org/
  labels:
    manager: kubero
spec:
  name: mantisbt
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: mantisbt
          username: mantisbt
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: mantisbt
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: mantisbt
  envVars:
  - name: MANTIS_ENABLE_ADMIN
    value: '1'
  - name: MANTIS_TIMEZONE
    value: UTC
  - name: PHP_MAX_UPLOAD_SIZE
    value: 32M
  - name: MANTIS_DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: MANTIS_DB_NAME
    value: mantisbt
  - name: MANTIS_DB_USER
    value: mantisbt
  - name: MANTIS_DB_PASS
    value: mantisbt
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/www/html/config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/www/html/custom
    name: mantisbt-custom
    size: 3Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: xlrl/mantisbt
    tag: 2.28.3
    run:
      securityContext:
        readOnlyRootFilesystem: false

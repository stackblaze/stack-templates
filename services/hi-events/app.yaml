apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: hi-events
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source event management and ticket-selling
      platform (Laravel + React) for creating events, selling tickets, and managing
      attendees.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/hi-events/icon.png
    kubero.dev/template.installation: 'Hi.Events is a Laravel API + React frontend
      stack. This template deploys the ALL-IN-ONE image (daveearley/hi.events-all-in-one,
      container port 80) which bundles the API, the built frontend, nginx, and the
      queue worker + scheduler in one container, so for a basic deployment NO companion
      services are required. It is wired to the Postgres and Valkey (Redis) add-ons
      provisioned here. For a horizontally-scaled production setup you can instead
      split into separate images, all sharing the SAME DATABASE_URL, Redis and APP_KEY/JWT_SECRET:
      (1) Backend API - image daveearley/hi.events-backend on port 8000; (2) a queue/scheduler
      worker from the same backend image with command ''php artisan queue:work'' plus
      a scheduler (''php artisan schedule:work''); (3) Frontend - image daveearley/hi.events-frontend
      on port 3000, set its VITE_API_URL_CLIENT/VITE_API_URL_SERVER to the backend
      URL. ROTATE before exposing publicly: APP_KEY (a 32-char value prefixed with
      ''base64:'', e.g. `echo "base64:$(openssl rand -base64 32)"`), JWT_SECRET (`openssl
      rand -hex 32`), and the Postgres add-on password. SMTP is required to deliver
      tickets and confirmation emails: set MAIL_HOST/MAIL_PORT/MAIL_USERNAME/MAIL_PASSWORD
      to a real relay. Payments use Stripe: set STRIPE_SECRET_KEY / STRIPE_PUBLIC_KEY
      / STRIPE_WEBHOOK_SECRET and VITE_STRIPE_PUBLISHABLE_KEY. The public URLs (APP_FRONTEND_URL
      / VITE_FRONTEND_URL / APP_URL) are wired to this app''s public URL. First run:
      the container runs migrations on boot; then browse to the site and register
      the first organiser account (set APP_DISABLE_REGISTRATION=true afterwards to
      close signups). Ticket images/logos and other uploads are persisted on the mounted
      volume.'
    kubero.dev/template.links: '["https://hi.events/docs/getting-started/deploying",
      "https://hi.events/docs/configuration/environment-variables"]'
    kubero.dev/template.screenshots: '["https://hi.events/open-graph-cover.jpg"]'
    kubero.dev/template.source: https://github.com/HiEventsDev/hi.events
    kubero.dev/template.categories: '["e-commerce", "productivity", "work"]'
    kubero.dev/template.title: Hi.Events
    kubero.dev/template.website: https://hi.events/
  labels:
    manager: kubero
spec:
  name: hi-events
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: hi-events
              owner: hi-events
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: hi-events
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: hi-events
          password: hi-events
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: APP_ENV
    value: production
  - name: APP_DEBUG
    value: 'false'
  - name: APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_FRONTEND_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_KEY
    value: base64:replace-with-openssl-rand-base64-32
  - name: JWT_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: APP_DISABLE_REGISTRATION
    value: 'false'
  - name: APP_SAAS_MODE_ENABLED
    value: 'false'
  - name: VITE_FRONTEND_URL
    value: '{{KUBERO_APP_URL}}'
  - name: VITE_API_URL_CLIENT
    value: '{{KUBERO_APP_URL}}/api'
  - name: VITE_API_URL_SERVER
    value: '{{KUBERO_APP_URL}}/api'
  - name: DATABASE_URL
    value: postgresql://hi-events:hi-events@{{KUBERO_APP_NAME}}-postgresql-rw:5432/hi-events
  - name: DB_CONNECTION
    value: pgsql
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: DB_PORT
    value: '5432'
  - name: DB_DATABASE
    value: hi-events
  - name: DB_USERNAME
    value: hi-events
  - name: DB_PASSWORD
    value: hi-events
  - name: REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: REDIS_PASSWORD
    value: 'null'
  - name: QUEUE_CONNECTION
    value: redis
  - name: CACHE_DRIVER
    value: redis
  - name: SESSION_DRIVER
    value: redis
  - name: FILESYSTEM_PUBLIC_DISK
    value: local
  - name: FILESYSTEM_PRIVATE_DISK
    value: local
  - name: MAIL_MAILER
    value: smtp
  - name: MAIL_HOST
    value: smtp.example.com
  - name: MAIL_PORT
    value: '587'
  - name: MAIL_USERNAME
    value: replace-with-smtp-username
  - name: MAIL_PASSWORD
    value: replace-with-smtp-password
  - name: MAIL_ENCRYPTION
    value: tls
  - name: MAIL_FROM_ADDRESS
    value: tickets@example.com
  - name: MAIL_FROM_NAME
    value: Hi.Events
  - name: STRIPE_PUBLIC_KEY
    value: replace-with-stripe-public-key
  - name: STRIPE_SECRET_KEY
    value: replace-with-stripe-secret-key
  - name: STRIPE_WEBHOOK_SECRET
    value: replace-with-stripe-webhook-secret
  - name: VITE_STRIPE_PUBLISHABLE_KEY
    value: replace-with-stripe-publishable-key
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /app/backend/storage/app
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: lite
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/daveearley/hi.events-all-in-one
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: penpot
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source design and prototyping platform for product teams; the design tool for design
      and code collaboration.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/penpot/icon.png
    kubero.dev/template.installation: 'Penpot is a MULTI-CONTAINER stack. This template deploys the PRIMARY web entrypoint,
      the nginx FRONTEND image `penpotapp/frontend` (HTTP 8080), which serves the SPA and reverse-proxies API/asset traffic
      to the backend and exporter. By itself the frontend will not function until you also deploy these COMPANION services
      as their own Kubero apps (all pinned to the SAME version tag 2.16): (1) BACKEND -> image `penpotapp/backend` (listens
      on HTTP 6060); give it the database/redis/secret env shown below: PENPOT_DATABASE_URI=postgresql://penpot-postgresql-rw:5432/penpot,
      PENPOT_DATABASE_USERNAME=penpot, PENPOT_DATABASE_PASSWORD=penpot, PENPOT_REDIS_URI=redis://rfr-penpot-valkey-readwrite:6379/0,
      PENPOT_SECRET_KEY=(rotate, `openssl rand -hex 32`), PENPOT_PUBLIC_URI={{KUBERO_APP_URL}}, PENPOT_FLAGS, and the assets-fs
      storage env; it must MOUNT THE SAME shared assets volume at /opt/data/assets as the frontend. (2) EXPORTER -> image
      `penpotapp/exporter` (HTTP 6061), set PENPOT_PUBLIC_URI=http://penpot-frontend:8080 and PENPOT_REDIS_URI to the same
      Valkey URI; it renders thumbnails/exports via a headless browser. The frontend reaches the backend/exporter by the env
      PENPOT_BACKEND_URI / PENPOT_EXPORTER_URI (or PENPOT_INTERNAL_RESOLVER) -> point these at the backend (`http://penpot-backend:6060`)
      and exporter (`http://penpot-exporter:6061`) service names once those apps are up. ADD-ONS provisioned: a Postgres add-on
      (Penpot requires PostgreSQL) and a Valkey/Redis add-on. ROTATE the default Postgres password and set a strong PENPOT_SECRET_KEY
      (the same value MUST be shared by frontend, backend and exporter). FIRST RUN: by default registration is open; after
      creating the first owner account add `disable-registration` to PENPOT_FLAGS. SMTP is optional via PENPOT_SMTP_* env
      (with the `enable-smtp` flag); without it user emails print to the backend log. User-uploaded assets live on the shared
      local volume at /opt/data/assets (for multi-replica or large deployments use an S3-compatible backend instead, set via
      PENPOT_ASSETS_STORAGE_BACKEND=assets-s3, which is NOT provisioned here).'
    kubero.dev/template.links: '["https://help.penpot.app/technical-guide/getting-started/", "https://help.penpot.app/technical-guide/configuration/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/penpot/penpot
    kubero.dev/template.categories: '["development", "collaboration", "productivity"]'
    kubero.dev/template.title: Penpot
    kubero.dev/template.website: https://penpot.app
  labels:
    manager: kubero
spec:
  name: penpot
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: penpot-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: penpot
              owner: penpot
              secret:
                name: penpot-postgresql-app
              postInitApplicationSQL:
                - GRANT ALL ON SCHEMA public TO penpot
                - GRANT CREATE ON SCHEMA public TO penpot
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO penpot
          enableSuperuserAccess: true
          superuserSecret:
            name: penpot-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: penpot-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: penpot
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: penpot-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: penpot
          password: penpot
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: penpot-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: PENPOT_PUBLIC_URI
    value: '{{KUBERO_APP_URL}}'
  - name: PENPOT_BACKEND_URI
    value: http://penpot-backend:6060
  - name: PENPOT_EXPORTER_URI
    value: http://penpot-exporter:6061
  - name: PENPOT_FLAGS
    value: enable-registration enable-login-with-password disable-email-verification disable-secure-session-cookies
  - name: PENPOT_DATABASE_URI
    value: postgresql://penpot-postgresql-rw:5432/penpot
  - name: PENPOT_DATABASE_USERNAME
    value: penpot
  - name: PENPOT_DATABASE_PASSWORD
    value: penpot
  - name: PENPOT_REDIS_URI
    value: redis://rfr-penpot-valkey-readwrite:6379/0
  - name: PENPOT_SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  - name: PENPOT_ASSETS_STORAGE_BACKEND
    value: assets-fs
  - name: PENPOT_STORAGE_ASSETS_FS_DIRECTORY
    value: /opt/data/assets
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/data/assets
    name: penpot-assets
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/penpot-frontend
    tag: '2.16'

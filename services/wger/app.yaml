apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: wger
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Self-hosted FLOSS fitness and workout manager
      that lets you track workouts, nutrition, body weight, and exercises.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/wger/icon.png
    kubero.dev/template.installation: 'Single-container Django app served via gunicorn
      on port 8000. Rotate SECRET_KEY and SIGNING_KEY (each a unique 50-char random
      string; they MUST differ) and the postgres password before going to production.
      Companion services deployed as add-ons: PostgreSQL (primary DB) and a Valkey
      (Redis-protocol) instance used for both the Django cache and the Celery broker/backend.
      Migrations run automatically on boot (DJANGO_PERFORM_MIGRATIONS=True). On first
      run an admin user ''admin'' (password ''adminadmin'') is created via DJANGO_DB_BOOTSTRAP_USER
      defaults; change it immediately. Set CSRF_TRUSTED_ORIGINS / SITE_URL to your
      real https URL (templated below). Uploaded media and static files persist on
      the mounted volume. Note: the periodic exercise/ingredient sync tasks run via
      Celery against the Valkey add-on; no separate worker pod is templated, so heavy
      background sync may be limited.'
    kubero.dev/template.links: '["https://wger.readthedocs.io/en/latest/production/docker.html"]'
    kubero.dev/template.screenshots: '["https://hosted.weblate.org/widgets/wger/-/multi-blue.svg"]'
    kubero.dev/template.source: https://github.com/wger-project/wger
    kubero.dev/template.categories: '["productivity", "utilities", "data"]'
    kubero.dev/template.title: Wger
    kubero.dev/template.website: https://wger.de
  labels:
    manager: kubero
spec:
  name: wger
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: wger
              owner: wger
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO wger
              - GRANT CREATE ON SCHEMA public TO wger
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO wger
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: wger
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: wger
          password: wger
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: SECRET_KEY
    value: replace-with-openssl-rand-hex-32-50chars
  - name: SIGNING_KEY
    value: replace-with-different-openssl-rand-hex-32
  - name: DJANGO_DEBUG
    value: 'False'
  - name: DJANGO_DB_ENGINE
    value: django.db.backends.postgresql
  - name: DJANGO_DB_DATABASE
    value: wger
  - name: DJANGO_DB_USER
    value: wger
  - name: DJANGO_DB_PASSWORD
    value: wger
  - name: DJANGO_DB_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: DJANGO_DB_PORT
    value: '5432'
  - name: DJANGO_PERFORM_MIGRATIONS
    value: 'True'
  - name: DJANGO_CACHE_BACKEND
    value: django_redis.cache.RedisCache
  - name: DJANGO_CACHE_LOCATION
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/1
  - name: DJANGO_CACHE_CLIENT_CLASS
    value: django_redis.client.DefaultClient
  - name: DJANGO_CACHE_TIMEOUT
    value: '1296000'
  - name: USE_CELERY
    value: 'False'
  - name: CELERY_BROKER
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/2
  - name: CELERY_BACKEND
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/2
  - name: SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: CSRF_TRUSTED_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: ALLOWED_HOSTS
    value: '*'
  - name: X_FORWARDED_PROTO_HEADER_SET
    value: 'True'
  - name: MEDIA_ROOT
    value: /home/wger/media
  - name: STATIC_ROOT
    value: /home/wger/static
  - name: WGER_USE_GUNICORN
    value: 'True'
  - name: DJANGO_COLLECTSTATIC_ON_STARTUP
    value: 'True'
  - name: SYNC_EXERCISES_ON_STARTUP
    value: 'False'
  - name: SYNC_EXERCISES_CELERY
    value: 'False'
  - name: SYNC_EXERCISE_IMAGES_CELERY
    value: 'False'
  - name: SYNC_INGREDIENTS_CELERY
    value: 'False'
  - name: CACHE_API_EXERCISES_CELERY
    value: 'False'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /home/wger/media
    name: '{{KUBERO_APP_NAME}}-media'
    size: 5Gi
    storageClass: slow
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /home/wger/static
    name: '{{KUBERO_APP_NAME}}-static'
    size: 2Gi
    storageClass: slow
  cronjobs: []
  healthcheck:
    enabled: true
    path: /robots.txt
    startupSeconds: 1800
    timeoutSeconds: 10
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/wger-server
    tag: latest
    command:
    - /bin/bash
    - -ec
    - "until python3 -c \"import psycopg; psycopg.connect(host='${DJANGO_DB_HOST}',\
      \ port=int('${DJANGO_DB_PORT}'), user='${DJANGO_DB_USER}', password='${DJANGO_DB_PASSWORD}',\
      \ dbname='${DJANGO_DB_DATABASE}')\"; do\n  echo 'Waiting for PostgreSQL...'\n\
      \  sleep 3\ndone\nREDIS_HOST=\"${DJANGO_CACHE_LOCATION#redis://}\"\nREDIS_HOST=\"\
      ${REDIS_HOST%%/*}\"\nREDIS_HOST=\"${REDIS_HOST%%:*}\"\nREDIS_PORT=\"${DJANGO_CACHE_LOCATION##*:}\"\
      \nREDIS_PORT=\"${REDIS_PORT%%/*}\"\nuntil (echo >/dev/tcp/\"${REDIS_HOST}\"\
      /\"${REDIS_PORT}\") 2>/dev/null; do\n  echo 'Waiting for Valkey...'\n  sleep\
      \ 2\ndone\nexec /home/wger/entrypoint.sh\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

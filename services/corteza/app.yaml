apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: corteza
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The Corteza low-code platform lets you build
      and iterate CRM, business process and other structured data apps fast, create
      intelligent business process workflows and connect with almost any data source.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/corteza/icon.png
    kubero.dev/template.installation: Make sure to activate CORS headers
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/cortezaproject/corteza/2024.9.x/.github/assets/hero-animation.webp"]'
    kubero.dev/template.source: https://github.com/cortezaproject/corteza
    kubero.dev/template.categories: '["crm", "erp" ]'
    kubero.dev/template.title: Corteza
    kubero.dev/template.website: https://cortezaproject.org/
  labels:
    manager: kubero
spec:
  name: corteza
  deploymentstrategy: docker
  envVars:
  - name: VIRTUAL_HOST
    value: corteza.localhost
  - name: DB_DSN
    value: postgres://corteza:corteza@{{KUBERO_APP_NAME}}-postgresql-rw:5432/corteza?sslmode=disable
  - name: HTTP_WEBAPP_ENABLED
    value: 'true'
  - name: ACTIONLOG_ENABLED
    value: 'false'
  extraVolumes: []
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: corteza
              owner: corteza
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: corteza
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: corteza
          password: corteza
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: cortezaproject/corteza
    tag: '2023.3'
    run:
      securityContext:
        readOnlyRootFilesystem: true
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/cors-allow-headers: '*'
      nginx.ingress.kubernetes.io/cors-allow-origin: '*'
      nginx.ingress.kubernetes.io/cors-expose-headers: '*'
      nginx.ingress.kubernetes.io/enable-cors: 'true'

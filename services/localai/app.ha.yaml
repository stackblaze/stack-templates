apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: localai
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Self-hosted, OpenAI-compatible REST API for running
      LLMs, image generation, audio transcription, and embeddings locally — no GPU
      required.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/localai/icon.png
    kubero.dev/template.installation: 'LocalAI provides an OpenAI-compatible API for
      local models. Use the latest-cpu tag (no GPU). Download a model by placing a
      GGUF file in the /models volume, or use the gallery API to install models: POST
      /models/apply with {"id":"gpt4all-j"}. Set THREADS to the number of CPU cores
      available. Use the /v1 endpoints with any OpenAI client library — just point
      the base URL at {{KUBERO_APP_URL}}/v1.'
    kubero.dev/template.links: '["https://localai.io/basics/getting_started/"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/mudler/LocalAI/master/docs/static/images/diagrams/composable-core.png"]'
    kubero.dev/template.source: https://github.com/mudler/LocalAI
    kubero.dev/template.categories: '["ai", "utilities"]'
    kubero.dev/template.title: LocalAI
    kubero.dev/template.website: https://localai.io
  labels:
    manager: kubero
spec:
  name: localai
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: MODELS_PATH
    value: /models
  - name: CONTEXT_SIZE
    value: 512
  - name: THREADS
    value: 4
  - name: DEBUG
    value: false
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /models
    name: localai-models
    size: 2Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '4'
      memory: 8Gi
  healthcheck:
    enabled: true
    path: /readyz
    startupSeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/localai/localai
    tag: latest-cpu
    run:
      securityContext:
        readOnlyRootFilesystem: false

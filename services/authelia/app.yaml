apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: authelia
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source authentication and authorization
      server providing SSO and multi-factor auth as a companion to reverse proxies
      via a login portal.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/authelia/icon.png
    kubero.dev/template.installation: Authelia is an SSO / 2FA portal that protects
      other apps via your reverse proxy (forward-auth / OpenID Connect); it is not
      a destination app on its own. It needs a YAML config file that environment variables
      cannot fully replace - access control rules, the authentication backend (file
      or LDAP), the session cookie domain, and the SMTP/notifier must be defined in
      /config/configuration.yml. A persistent volume is mounted at /config to hold
      that file plus the bundled file-based users database (users_database.yml); seed
      both on first boot (exec into the pod or pre-populate the volume) or Authelia
      will exit at startup. Production state is stored in the postgres add-on (set
      AUTHELIA_STORAGE_POSTGRES_* - rotate the password) and session data in the valkey
      add-on (Redis-compatible, no password). ROTATE the three secret env values (AUTHELIA_SESSION_SECRET,
      AUTHELIA_STORAGE_ENCRYPTION_KEY, AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET)
      with 'openssl rand -hex 32' before going live. Email-based flows (password reset,
      second-factor registration) require an SMTP server configured under notifier
      in the config file. Authelia listens on HTTP port 9091; TLS is terminated at
      the Kubero ingress.
    kubero.dev/template.links: '["https://www.authelia.com/configuration/prologue/introduction/",
      "https://www.authelia.com/integration/prologue/get-started/"]'
    kubero.dev/template.screenshots: '["https://www.authelia.com/images/1FA.png"]'
    kubero.dev/template.source: https://github.com/authelia/authelia
    kubero.dev/template.categories: '["security", "identity", "utilities"]'
    kubero.dev/template.title: Authelia
    kubero.dev/template.website: https://www.authelia.com
  labels:
    manager: kubero
spec:
  name: authelia
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: authelia
              owner: authelia
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO authelia
              - GRANT CREATE ON SCHEMA public TO authelia
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO authelia
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: authelia
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: authelia
          password: authelia
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: AUTHELIA_STORAGE_POSTGRES_ADDRESS
    value: tcp://{{KUBERO_APP_NAME}}-postgresql-rw:5432
  - name: AUTHELIA_STORAGE_POSTGRES_DATABASE
    value: authelia
  - name: AUTHELIA_STORAGE_POSTGRES_USERNAME
    value: authelia
  - name: AUTHELIA_STORAGE_POSTGRES_PASSWORD
    value: authelia
  - name: AUTHELIA_SESSION_REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: AUTHELIA_SESSION_REDIS_PORT
    value: '6379'
  - name: AUTHELIA_STORAGE_ENCRYPTION_KEY
    value: replace-with-openssl-rand-hex-32
  - name: AUTHELIA_SESSION_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: AUTHELIA_PUBLIC_URL
    value: '{{KUBERO_APP_URL}}'
  - name: AUTHELIA_COOKIE_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 1Gi
    storageClass: slow
  cronjobs: []
  healthcheck:
    enabled: true
    path: /api/health
    startupSeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '9091'
    pullPolicy: Always
    repository: authelia/authelia
    tag: '4.39'
    command:
    - sh
    - -c
    - "grep -q 'kubero-seed' /config/configuration.yml 2>/dev/null || { cat > /config/configuration.yml\
      \ <<EOF\n# kubero-seed\nauthentication_backend:\n  file:\n    path: /config/users_database.yml\n\
      access_control:\n  default_policy: one_factor\nsession:\n  cookies:\n    - domain:\
      \ '${AUTHELIA_COOKIE_DOMAIN}'\n      authelia_url: '${AUTHELIA_PUBLIC_URL}'\n\
      notifier:\n  filesystem:\n    filename: /config/notifications.txt\nEOF\ncat\
      \ > /config/users_database.yml <<'EOF'\n# kubero-seed\nusers:\n  authelia:\n\
      \    disabled: false\n    displayname: Authelia User\n    password: \"$argon2id$v=19$m=65536,t=3,p=4$BpLnfgDsc2WD8F2q$o/v/I2Yc7fKqK3P9H2Kj9m1A4fG4K8K2\"\
      \n    email: authelia@example.com\n    groups: []\nEOF\n}\ngrep -q 'authelia:'\
      \ /config/users_database.yml 2>/dev/null || cat > /config/users_database.yml\
      \ <<'EOF'\n# kubero-seed\nusers:\n  authelia:\n    disabled: false\n    displayname:\
      \ Authelia User\n    password: \"$argon2id$v=19$m=65536,t=3,p=4$BpLnfgDsc2WD8F2q$o/v/I2Yc7fKqK3P9H2Kj9m1A4fG4K8K2\"\
      \n    email: authelia@example.com\n    groups: []\nEOF\nexec authelia\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

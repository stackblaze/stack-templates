apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Homarr is a simple and lightweight homepage for
      your server, that helps you easily access all of your services in one place.
    kubero.dev/template.icon: https://github.com/ajnart/homarr/raw/dev/public/imgs/logo/logo-color.svg
    kubero.dev/template.installation: Uses Homarr v1 (homarr-labs) with the bundled
      PostgreSQL add-on. Set AUTH_SECRET and SECRET_ENCRYPTION_KEY to random values
      before production use.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://user-images.githubusercontent.com/71191962/169860380-856634fb-4f41-47cb-ba54-6a9e7b3b9c81.gif"]'
    kubero.dev/template.source: https://github.com/homarr-labs/homarr
    kubero.dev/template.categories: '["homepage"]'
    kubero.dev/template.title: Homarr
    kubero.dev/template.website: https://homarr.dev
  name: homarr
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: homarr
              owner: homarr
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO homarr
              - GRANT CREATE ON SCHEMA public TO homarr
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO homarr
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: homarr
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: homarr
          password: homarr
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DB_DRIVER
    value: node-postgres
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: DB_PORT
    value: '5432'
  - name: DB_NAME
    value: homarr
  - name: DB_USER
    value: homarr
  - name: DB_PASSWORD
    value: homarr
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /appdata
    name: homarr-appdata
    size: 1Gi
    storageClass: shared
  image:
    containerPort: '7575'
    repository: ghcr.io/homarr-labs/homarr
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: homarr
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

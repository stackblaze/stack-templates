apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: tandoor
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Self-hosted Django recipe manager for organizing
      recipes, meal plans, and shopping lists.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/67073608?s=200&v=4
    kubero.dev/template.installation: Set SECRET_KEY to a random 50+ character string.
      Tandoor 2 bundles nginx on port 80; first boot runs migrations and collectstatic
      (a few minutes). Complete setup at /setup/ on first visit.
    kubero.dev/template.links: '["https://docs.tandoor.dev/"]'
    kubero.dev/template.screenshots: '["https://docs.tandoor.dev/assets/img/logo.png"]'
    kubero.dev/template.source: https://github.com/TandoorRecipes/recipes
    kubero.dev/template.categories: '["utilities", "productivity"]'
    kubero.dev/template.title: Tandoor Recipes
    kubero.dev/template.website: https://tandoor.dev/
  labels:
    manager: kubero
spec:
  name: tandoor
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: tandoor
              owner: tandoor
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO tandoor
              - GRANT CREATE ON SCHEMA public TO tandoor
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO tandoor
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: tandoor
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: tandoor
          password: tandoor
  envVars:
  - name: SECRET_KEY
    value: tandoor-qa-secret-key-change-me-before-production-use-50chars
  - name: DB_ENGINE
    value: django.db.backends.postgresql
  - name: POSTGRES_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_USER
    value: tandoor
  - name: POSTGRES_PASSWORD
    value: tandoor
  - name: POSTGRES_DB
    value: tandoor
  - name: ALLOWED_HOSTS
    value: '*'
  - name: TZ
    value: Etc/UTC
  - name: TANDOOR_PORT
    value: '80'
  - name: GUNICORN_WORKERS
    value: '1'
  - name: GUNICORN_THREADS
    value: '2'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /opt/recipes/staticfiles
    name: '{{KUBERO_APP_NAME}}-static'
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /opt/recipes/mediafiles
    name: '{{KUBERO_APP_NAME}}-media'
    size: 2Gi
    storageClass: shared
  cronjobs: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: vabene1111/recipes
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

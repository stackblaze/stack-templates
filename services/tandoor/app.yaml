apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: tandoor
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Self-hosted Django recipe manager for organizing
      recipes, meal plans, and shopping lists.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/67073608?s=200&v=4
    kubero.dev/template.installation: Set SECRET_KEY to a random 50+ character string.
      First boot runs migrations and collectstatic (may take several minutes). Gunicorn
      serves HTTP on port 8080 with whitenoise for static files.
    kubero.dev/template.links: '["https://docs.tandoor.dev/"]'
    kubero.dev/template.screenshots: '["https://docs.tandoor.dev/assets/img/logo.png"]'
    kubero.dev/template.source: https://github.com/TandoorRecipes/recipes
    kubero.dev/template.categories: '["utilities", "productivity"]'
    kubero.dev/template.title: Tandoor Recipes
    kubero.dev/template.website: https://tandoor.dev/
  labels:
    manager: kubero
spec:
  name: tandoor
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: tandoor-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: tandoor
              owner: tandoor
              secret:
                name: tandoor-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO tandoor
              - GRANT CREATE ON SCHEMA public TO tandoor
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO tandoor
          enableSuperuserAccess: true
          superuserSecret:
            name: tandoor-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: tandoor-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: tandoor
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: tandoor-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: tandoor
          password: tandoor
  envVars:
  - name: SECRET_KEY
    value: tandoor-qa-secret-key-change-me-before-production-use-50chars
  - name: DB_ENGINE
    value: django.db.backends.postgresql
  - name: POSTGRES_HOST
    value: tandoor-postgresql-rw
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_USER
    value: tandoor
  - name: POSTGRES_PASSWORD
    value: tandoor
  - name: POSTGRES_DB
    value: tandoor
  - name: ALLOWED_HOSTS
    value: '*'
  - name: TZ
    value: Etc/UTC
  - name: GUNICORN_MEDIA
    value: '1'
  - name: GUNICORN_WORKERS
    value: '1'
  - name: GUNICORN_THREADS
    value: '2'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/recipes/staticfiles
    name: tandoor-static
    size: 1Gi
    storageClass: slow
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/recipes/mediafiles
    name: tandoor-media
    size: 2Gi
    storageClass: slow
  cronjobs: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: vabene1111/recipes
    tag: latest
    command:
    - sh
    - -c
    - cd /opt/recipes && . venv/bin/activate && until pg_isready --host="$POSTGRES_HOST"
      --port="$POSTGRES_PORT" --user="$POSTGRES_USER" -q; do sleep 5; done && python
      manage.py migrate --noinput && (test -f /opt/recipes/staticfiles/.collectstatic_done
      || (python manage.py collectstatic --noinput && touch /opt/recipes/staticfiles/.collectstatic_done))
      && chmod -R 755 /opt/recipes/mediafiles && exec gunicorn --bind 0.0.0.0:8080
      --workers ${GUNICORN_WORKERS:-1} --threads ${GUNICORN_THREADS:-2} --timeout
      ${GUNICORN_TIMEOUT:-30} --access-logfile - --error-logfile - --log-level ${GUNICORN_LOG_LEVEL:-info}
      recipes.wsgi

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: formbricks
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source Qualtrics alternative for in-product micro-surveys and experience management.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/formbricks/icon.png
    kubero.dev/template.installation: Pinned to v4.8.6 for Kubero single-app deploy (v5 requires Hub and Cube).
      Replace NEXTAUTH_SECRET, ENCRYPTION_KEY, and CRON_SECRET with openssl rand -hex 32 before production.
      For Formbricks v5 with Hub, use the official Helm chart instead.
    kubero.dev/template.links: '["https://formbricks.com/docs/self-hosting/setup/docker"]'
    kubero.dev/template.screenshots: '["https://formbricks.com/images/og-image.png"]'
    kubero.dev/template.source: https://github.com/formbricks/formbricks
    kubero.dev/template.categories: '["automation", "utilities", "work"]'
    kubero.dev/template.title: Formbricks
    kubero.dev/template.website: https://formbricks.com/
  labels:
    manager: kubero
spec:
  name: formbricks
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: formbricks-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: formbricks
              owner: formbricks
              secret:
                name: formbricks-postgresql-app
              postInitApplicationSQL:
                - CREATE EXTENSION IF NOT EXISTS vector;
                - GRANT ALL ON SCHEMA public TO formbricks
                - GRANT CREATE ON SCHEMA public TO formbricks
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO formbricks
          enableSuperuserAccess: true
          superuserSecret:
            name: formbricks-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: formbricks-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: formbricks
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: formbricks-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: formbricks
          password: formbricks
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: formbricks-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: WEBAPP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: NEXTAUTH_URL
    value: '{{KUBERO_APP_URL}}'
  - name: DATABASE_URL
    value: postgresql://formbricks:formbricks@formbricks-postgresql-rw:5432/formbricks?schema=public
  - name: REDIS_URL
    value: redis://rfr-formbricks-valkey-readwrite:6379
  - name: NEXTAUTH_SECRET
    value: random64
  - name: ENCRYPTION_KEY
    value: random64
  - name: CRON_SECRET
    value: random64
  - name: EMAIL_VERIFICATION_DISABLED
    value: '1'
  - name: PASSWORD_RESET_DISABLED
    value: '1'
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: ghcr.io/formbricks/formbricks
    tag: "4.8.6"

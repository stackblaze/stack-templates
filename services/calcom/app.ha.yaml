apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The open source Calendly alternative. You are
      in charge of your own data, workflow and appearance
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/calcom/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://user-images.githubusercontent.com/8019099/176390354-f1bc7069-0341-437a-9bb8-eb41092b4016.gif"]'
    kubero.dev/template.source: https://github.com/calcom/cal.com
    kubero.dev/template.categories: '["work", "utilities"]'
    kubero.dev/template.title: cal.com
    kubero.dev/template.website: https://cal.com/
  name: calcom
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-db'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: calcom
              owner: calcom
              secret:
                name: '{{KUBERO_APP_NAME}}-db-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO calcom
              - GRANT CREATE ON SCHEMA public TO calcom
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO calcom
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-db-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: calcom
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: calcom
          password: calcom
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DATABASE_URL
    value: postgresql://calcom:calcom@{{KUBERO_APP_NAME}}-db-rw:5432/calcom
  - name: DATABASE_DIRECT_URL
    value: postgresql://calcom:calcom@{{KUBERO_APP_NAME}}-db-rw:5432/calcom
  - name: DATABASE_HOST
    value: '{{KUBERO_APP_NAME}}-db-rw:5432'
  - name: NODE_ENV
    value: production
  - name: NEXT_PUBLIC_LICENSE_CONSENT
    value: agree
  - name: NEXT_PUBLIC_WEBAPP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: NEXTAUTH_URL
    value: '{{KUBERO_APP_URL}}'
  - name: NEXTAUTH_SECRET
    value: '00000000000000000000000000000000'
  - name: CALENDSO_ENCRYPTION_KEY
    value: '11111111111111111111111111111111'
  extraVolumes: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /auth/login
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: calcom.docker.scarf.sh/calcom/cal.com
    run:
      securityContext:
        readOnlyRootFilesystem: false
    tag: latest
  name: calcom

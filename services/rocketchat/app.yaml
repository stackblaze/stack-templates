apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Rocket.Chat is an open-source fully customizable
      communications platform developed in JavaScript for organizations with high
      standards of data protection.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/12508788?s=200&v=4
    kubero.dev/template.installation: First boot can take several minutes while Rocket.Chat
      runs MongoDB migrations. Requires at least 2Gi memory. Pin to 6.13.1 because
      DocumentDB does not support MongoDB collation indexes required by Rocket.Chat 7+.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://global-uploads.webflow.com/611a19b9853b7414a0f6b3f6/6464d93d33af48db33864025_Team%20Collab.webp","https://global-uploads.webflow.com/611a19b9853b7414a0f6b3f6/615d85d3d3ae5682e8571dfb_Group%203924%20(1).png"]'
    kubero.dev/template.source: https://github.com/RocketChat/Rocket.Chat
    kubero.dev/template.categories: '["communication", "collaboration", "work", "utilities"]'
    kubero.dev/template.title: Rocket.Chat
    kubero.dev/template.website: https://rocket.chat/
  name: rocketchat
spec:
  addons:
  - displayName: Document DB
    env: []
    icon: /img/addons/mongo.svg
    id: kubero-operator
    kind: DocumentDB
    resourceDefinitions:
      DocumentDB:
        apiVersion: documentdb.io/preview
        kind: DocumentDB
        metadata:
          name: rocketchat-documentdb
        spec:
          nodeCount: 1
          instancesPerNode: 1
          documentDbCredentialSecret: documentdb-credentials
          resource:
            storage:
              pvcSize: 1Gi
              storageClass: default
          exposeViaService:
            serviceType: ClusterIP
      credentialSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: documentdb-credentials
        type: Opaque
        stringData:
          username: mongoadmin
          password: changeme
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: MONGO_URL
    value: mongodb://mongoadmin:changeme@documentdb-service-rocketchat-documentdb:10260/rocketchat?directConnection=true&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidCertificates=true&replicaSet=rs0&serverSelectionTimeoutMS=60000
  - name: ROOT_URL
    value: '{{KUBERO_APP_URL}}'
  - name: DEPLOY_METHOD
    value: docker
  - name: NODE_OPTIONS
    value: --max-old-space-size=1536
  extraVolumes: []
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: registry.rocket.chat/rocketchat/rocket.chat
    tag: '6.13.1'
  # Default QA LimitRange caps web pods at 512Mi; Rocket.Chat OOMs during boot.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  # First boot + migrations can exceed the chart's fixed ~90s startup probe once
  # DocumentDB is up; keep probes enabled so QA waits for HTTP, not a Running pod.
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  name: rocketchat
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

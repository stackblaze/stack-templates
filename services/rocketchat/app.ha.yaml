apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Rocket.Chat is an open-source fully customizable
      communications platform developed in JavaScript for organizations with high
      standards of data protection.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/rocketchat/icon.png
    kubero.dev/template.installation: "First boot can take several minutes while Rocket.Chat\
      \ runs MongoDB migrations. Requires at least 2Gi memory. Pin to 5.4.10 \u2014\
      \ Microsoft DocumentDB lacks MongoDB collation indexes (breaks 6.x) and full\
      \ oplog support."
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://global-uploads.webflow.com/611a19b9853b7414a0f6b3f6/6464d93d33af48db33864025_Team%20Collab.webp","https://global-uploads.webflow.com/611a19b9853b7414a0f6b3f6/615d85d3d3ae5682e8571dfb_Group%203924%20(1).png"]'
    kubero.dev/template.source: https://github.com/RocketChat/Rocket.Chat
    kubero.dev/template.categories: '["communication", "collaboration", "work", "utilities"]'
    kubero.dev/template.title: Rocket.Chat
    kubero.dev/template.website: https://rocket.chat/
  name: rocketchat
spec:
  addons:
  - displayName: Document DB
    env: []
    icon: /img/addons/mongo.svg
    id: kubero-operator
    kind: DocumentDB
    resourceDefinitions:
      DocumentDB:
        apiVersion: documentdb.io/preview
        kind: DocumentDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-documentdb'
        spec:
          nodeCount: 1
          instancesPerNode: 1
          documentDbCredentialSecret: documentdb-credentials
          resource:
            storage:
              pvcSize: 1Gi
              storageClass: default
          exposeViaService:
            serviceType: ClusterIP
      credentialSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: documentdb-credentials
        type: Opaque
        stringData:
          username: mongoadmin
          password: changeme
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: MONGO_URL
    value: mongodb://mongoadmin:changeme@documentdb-service-{{KUBERO_APP_NAME}}-documentdb:10260/rocketchat?directConnection=true&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidCertificates=true&replicaSet=rs0&retryWrites=false&serverSelectionTimeoutMS=60000
  - name: MONGO_OPLOG_URL
    value: mongodb://mongoadmin:changeme@documentdb-service-{{KUBERO_APP_NAME}}-documentdb:10260/local?authSource=admin&directConnection=true&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidCertificates=true&replicaSet=rs0&retryWrites=false
  - name: ROOT_URL
    value: '{{KUBERO_APP_URL}}'
  - name: HTTP_FORWARDED_COUNT
    value: '1'
  - name: IGNORE_CHANGE_STREAM
    value: 'true'
  - name: DEPLOY_METHOD
    value: docker
  - name: NODE_OPTIONS
    value: --max-old-space-size=1536
  extraVolumes: []
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/rocketchat/rocket.chat
    tag: 5.4.10
    run:
      securityContext:
        readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /api/info
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  name: rocketchat
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: iris
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source collaborative incident response platform for DFIR analysts to share investigation
      evidence, tasks, and timelines.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/iris/icon.png
    kubero.dev/template.installation: 'DFIR-IRIS is a multi-container stack; this template runs the primary web/app server
      (ghcr.io/dfir-iris/iriswebapp_app) only. You MUST deploy these companion services to make it functional: (1) a worker
      from the SAME ghcr.io/dfir-iris/iriswebapp_app image with env IRIS_WORKER=1 (it runs the Celery jobs handler and shares
      this app''s env, the postgres add-on, and the rabbitmq add-on broker). Upstream also ships (2) ghcr.io/dfir-iris/iriswebapp_db
      (a pre-tuned Postgres image) and (3) ghcr.io/dfir-iris/iriswebapp_nginx (a reverse proxy that terminates TLS on 443
      and proxies to the app on 8000). Here the Kubero ingress terminates HTTP and the postgres add-on replaces the db image,
      so neither companion image is required; deploy iriswebapp_nginx only if you need its static-asset routing. Pin all companion
      images to the SAME tag as this app (v2.4.20). IMPORTANT: rotate IRIS_SECRET_KEY and IRIS_SECURITY_PASSWORD_SALT (each
      ''openssl rand -hex 32'') and the postgres/rabbitmq passwords before production. The app auto-creates the schema and
      an initial ''administrator'' user on first boot; the generated admin password is printed in the app pod logs (grep for
      ''WARNING :: post_init :: create_safe_admin''). User-uploaded case evidence is stored in the database, but server-side
      datastore files live on the mounted /home/iris/downloads volume.'
    kubero.dev/template.links: '["https://docs.dfir-iris.org", "https://github.com/dfir-iris/iris-web/wiki"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/dfir-iris/iris-web
    kubero.dev/template.categories: '["security", "collaboration", "productivity"]'
    kubero.dev/template.title: DFIR-IRIS
    kubero.dev/template.website: https://dfir-iris.org
  labels:
    manager: kubero
spec:
  name: iris
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: iris-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: iris
              owner: iris
              secret:
                name: iris-postgresql-app
              postInitApplicationSQL:
                - GRANT ALL ON SCHEMA public TO iris
                - GRANT CREATE ON SCHEMA public TO iris
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO iris
          enableSuperuserAccess: true
          superuserSecret:
            name: iris-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: iris-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: iris
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: iris-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: iris
          password: iris
  - displayName: RabbitMQ
    env: []
    icon: /img/addons/rabbitmq.svg
    id: kubero-operator
    kind: RabbitmqCluster
    resourceDefinitions:
      RabbitmqCluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: iris-rabbitmq
        spec:
          replicas: 3
          persistence:
            storageClassName: fast
            storage: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
  envVars:
  - name: POSTGRES_SERVER
    value: iris-postgresql-rw
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_USER
    value: iris
  - name: POSTGRES_PASSWORD
    value: iris
  - name: POSTGRES_ADMIN_USER
    value: iris
  - name: POSTGRES_ADMIN_PASSWORD
    value: iris
  - name: POSTGRES_DB
    value: iris
  - name: DB_HOST
    value: iris-postgresql-rw
  - name: CELERY_HOST
    value: iris-rabbitmq
  - name: IRIS_WORKER
    value: '0'
  - name: IRIS_SECRET_KEY
    value: 8f3c2a1b9e7d6c5b4a39281706f5e4d3c2b1a0987654321fedcba0987654321
  - name: IRIS_SECURITY_PASSWORD_SALT
    value: 1a2b3c4d5e6f708192a3b4c5d6e7f8091a2b3c4d5e6f708192a3b4c5d6e7f80
  - name: IRIS_URL
    value: '{{KUBERO_APP_URL}}'
  - name: LOG_LEVEL
    value: INFO
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /home/iris/downloads
    name: iris-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 180
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/dfir-iris/iriswebapp_app
    tag: v2.4.20
    command:
    - ./iris-entrypoint.sh
    - app

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The definitive self-hosted URL shortener with
      REST API and visit tracking.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/shlink/icon.png
    kubero.dev/template.installation: Uses the MariaDB add-on. Set DEFAULT_DOMAIN
      to your short domain.
    kubero.dev/template.links: '["https://shlink.io/documentation/"]'
    kubero.dev/template.screenshots: '["https://shlink.io/images/shlink-dashboard.png"]'
    kubero.dev/template.source: https://github.com/shlinkio/shlink
    kubero.dev/template.categories: '["utilities", "development"]'
    kubero.dev/template.title: Shlink
    kubero.dev/template.website: https://shlink.io/
  labels:
    manager: kubero
  name: shlink
spec:
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: shlink-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: shlink-mysql-root
            key: password
          database: shlink
          username: shlink
          passwordSecretKeyRef:
            name: shlink-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: shlink-mysql-root
        type: Opaque
        stringData:
          password: shlink
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: shlink-mysql-app
        type: Opaque
        stringData:
          password: shlink
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DEFAULT_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: IS_HTTPS_ENABLED
    value: 'true'
  - name: TRUSTED_PROXIES
    value: 10.0.0.0/8,REMOTE_ADDR
  - name: INITIAL_API_KEY
    value: shlink-qa-api-key
  - name: DB_DRIVER
    value: mysql
  - name: DB_NAME
    value: shlink
  - name: DB_USER
    value: shlink
  - name: DB_PASSWORD
    value: shlink
  - name: DB_HOST
    value: shlink-mysql
  - name: DB_PORT
    value: '3306'
  healthcheck:
    enabled: true
    path: /rest/health
    startupSeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: shlinkio/shlink
    tag: stable
  name: shlink
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

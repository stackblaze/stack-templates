apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The definitive self-hosted URL shortener with REST API and visit tracking.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/shlink/icon.png
    kubero.dev/template.installation: Uses built-in SQLite for quick setup. Set DEFAULT_DOMAIN to your short domain. Root path returns 404 by design — use /rest/health for health checks.
    kubero.dev/template.links: '["https://shlink.io/documentation/"]'
    kubero.dev/template.screenshots: '["https://shlink.io/images/shlink-dashboard.png"]'
    kubero.dev/template.source: https://github.com/shlinkio/shlink
    kubero.dev/template.categories: '["utilities", "development"]'
    kubero.dev/template.title: Shlink
    kubero.dev/template.website: https://shlink.io/
  labels:
    manager: kubero
  name: shlink
spec:
  addons: []
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DEFAULT_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: IS_HTTPS_ENABLED
    value: 'true'
  - name: TRUSTED_PROXIES
    value: 10.0.0.0/8,REMOTE_ADDR
  - name: INITIAL_API_KEY
    value: shlink-qa-api-key
  healthcheck:
    enabled: true
    path: /rest/health
    startupSeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: shlinkio/shlink
    tag: stable
  name: shlink
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: unomi
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source Java/OSGi Customer Data Platform that manages profiles, segments and events
      with a privacy-first context server and standards-based API.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/unomi/icon.png
    kubero.dev/template.installation: Apache Unomi 3.x requires Elasticsearch 9.x for all profile/event/segment storage. This template
      provisions a single-node Elasticsearch 9.1.3 companion (`elasticsearch` Service on :9200) automatically; for production
      HA you may point UNOMI_ELASTICSEARCH_ADDRESSES at an external cluster instead. Unomi's Karaf runtime state lives on the
      persistent volume at /opt/apache-unomi/data. The HTTP context-server and REST API listen on 8181 (TLS :9443 and Karaf SSH
      :8102 are also exposed but need separate routing). Rotate UNOMI_THIRDPARTY_PROVIDER1_KEY and UNOMI_ROOT_PASSWORD from
      the placeholders before production; tighten UNOMI_THIRDPARTY_PROVIDER1_IPADDRESSES from 0.0.0.0/0. Manage profiles and
      rules via the REST API / Karaf console — there is no bundled web admin UI.
    kubero.dev/template.links: '["https://unomi.apache.org/manual/latest/index.html", "https://github.com/apache/unomi/tree/master/docker"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/apache/unomi
    kubero.dev/template.categories: '["data", "crm", "automation"]'
    kubero.dev/template.title: Apache Unomi
    kubero.dev/template.website: https://unomi.apache.org
  labels:
    manager: kubero
spec:
  name: unomi
  deploymentstrategy: docker
  addons:
  - displayName: Elasticsearch
    env: []
    icon: /img/addons/opensearch.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: unomi-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      unomiEsDeployment:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: unomi-es
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: unomi-es
          template:
            metadata:
              labels:
                app: unomi-es
            spec:
              securityContext:
                fsGroup: 1000
                fsGroupChangePolicy: OnRootMismatch
              initContainers:
              - name: sysctl
                image: busybox:1.36
                command:
                - sh
                - -c
                - sysctl -w vm.max_map_count=262144 || true
                securityContext:
                  privileged: true
              - name: data-perms
                image: busybox:1.36
                command:
                - sh
                - -c
                - chown -R 1000:1000 /usr/share/elasticsearch/data
                volumeMounts:
                - name: data
                  mountPath: /usr/share/elasticsearch/data
              containers:
              - name: unomi-es
                image: docker.elastic.co/elasticsearch/elasticsearch:9.1.3
                imagePullPolicy: Always
                ports:
                - name: http
                  containerPort: 9200
                env:
                - name: discovery.type
                  value: single-node
                - name: xpack.security.enabled
                  value: 'false'
                - name: cluster.name
                  value: contextElasticSearch
                - name: ES_JAVA_OPTS
                  value: -Xms512m -Xmx512m
                - name: bootstrap.memory_lock
                  value: 'false'
                volumeMounts:
                - name: data
                  mountPath: /usr/share/elasticsearch/data
                readinessProbe:
                  httpGet:
                    path: /_cluster/health
                    port: 9200
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 12
                resources:
                  requests:
                    cpu: 250m
                    memory: 1Gi
                  limits:
                    cpu: '1'
                    memory: 1536Mi
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: unomi-es-data
      unomiEsData:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: unomi-es-data
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
          storageClassName: fast
      unomiEsService:
        apiVersion: v1
        kind: Service
        metadata:
          name: unomi-es
        spec:
          type: ClusterIP
          selector:
            app: unomi-es
          ports:
          - name: http
            port: 9200
            targetPort: 9200
  envVars:
  - name: UNOMI_ELASTICSEARCH_ADDRESSES
    value: unomi-es:9200
  - name: UNOMI_ELASTICSEARCH_CLUSTERNAME
    value: contextElasticSearch
  - name: UNOMI_CLUSTER_PUBLIC_ADDRESS
    value: '{{KUBERO_APP_URL}}'
  - name: UNOMI_CLUSTER_INTERNAL_ADDRESS
    value: http://localhost:8181
  - name: UNOMI_THIRDPARTY_PROVIDER1_KEY
    value: replace-with-openssl-rand-hex-32
  - name: UNOMI_THIRDPARTY_PROVIDER1_IPADDRESSES
    value: 0.0.0.0/0,::1,127.0.0.1
  - name: UNOMI_ROOT_PASSWORD
    value: replace-with-openssl-rand-hex-16
  - name: KARAF_OPTS
    value: -Dunomi.autoStart=true
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/apache-unomi/data
    name: unomi-data
    size: 2Gi
  cronjobs: []
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8181'
    pullPolicy: Always
    repository: apache/unomi
    tag: 3.0.0
    command:
    - bash
    - -c
    - sed -i '/org.ops4j.pax.web.config.file/d' /opt/apache-unomi/etc/org.ops4j.pax.web.cfg && exec ./entrypoint.sh

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: lago
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source metering and usage-based billing
      platform for invoicing, subscriptions, and pay-as-you-go pricing.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/lago/icon.png
    kubero.dev/template.installation: 'Lago is a multi-service Rails stack. This template
      runs the PRIMARY API server (getlago/api) on port 3000, wired to the Postgres
      and Valkey (Redis) add-ons provisioned here. You MUST deploy the companion services
      separately, all sharing the SAME database, Redis, and the env keys below: (1)
      Worker - image getlago/api with command ''./scripts/start.worker.sh'' (Sidekiq
      background jobs, required for billing/invoicing to function); (2) Clock - image
      getlago/api with command ''./scripts/start.clock.sh'' (recurring/scheduled jobs);
      (3) Frontend - image getlago/front on port 80, set its API_URL to this app''s
      public URL and APP_ENV=production; (4) PDF generator - image getlago/lago-gotenberg:7.8.2
      on port 3000, point LAGO_PDF_URL at it (default http://lago-pdf:3000). Lago''s
      Postgres needs the partman + uuid-ossp extensions; if the provisioned Postgres
      lacks them, swap in getlago/postgres-partman:15-alpine. ROTATE before exposing:
      SECRET_KEY_BASE, LAGO_ENCRYPTION_PRIMARY_KEY, LAGO_ENCRYPTION_DETERMINISTIC_KEY,
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT (each via ''openssl rand -hex 32''), LAGO_RSA_PRIVATE_KEY
      (a real PEM via ''openssl genrsa 2048 | base64''), and the Postgres add-on password.
      First run: the API container runs DB migrations on boot via LAGO_CREATE_ORG;
      create your first organization/user through the frontend signup. Object storage
      (S3) for invoice PDFs is optional and not provisioned - configure LAGO_USE_AWS_S3
      + bucket env vars if needed.'
    kubero.dev/template.links: '["https://getlago.com/docs/guide/lago-self-hosted/docker",
      "https://getlago.com/docs/api-reference/intro"]'
    kubero.dev/template.screenshots: '["https://getlago.com/og/og-home.png"]'
    kubero.dev/template.source: https://github.com/getlago/lago
    kubero.dev/template.categories: '["finance", "e-commerce", "development"]'
    kubero.dev/template.title: Lago
    kubero.dev/template.website: https://www.getlago.com/
  labels:
    manager: kubero
spec:
  name: lago
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: lago
              owner: lago
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
              - GRANT ALL ON SCHEMA public TO lago
              - GRANT CREATE ON SCHEMA public TO lago
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO lago
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: lago
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: lago
          password: lago
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: RAILS_ENV
    value: production
  - name: RAILS_LOG_TO_STDOUT
    value: 'true'
  - name: LAGO_CREATE_ORG
    value: 'true'
  - name: LAGO_ORG_USER_EMAIL
    value: admin@example.com
  - name: LAGO_ORG_USER_PASSWORD
    value: lago-qa-password
  - name: LAGO_ORG_NAME
    value: Lago QA
  - name: DATABASE_URL
    value: postgresql://lago:lago@{{KUBERO_APP_NAME}}-postgresql-rw:5432/lago
  - name: POSTGRES_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_DB
    value: lago
  - name: POSTGRES_USER
    value: lago
  - name: POSTGRES_PASSWORD
    value: lago
  - name: REDIS_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379
  - name: REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: SECRET_KEY_BASE
    value: c3ca1454fe7a7fb2caf01788087960abbd8b0fd95437048038568ce7c50d66dffdfe9060d38ad2004eeda3b4d855f8b68f03fd05a89683058a0b18f0f42789df
  - name: LAGO_ENCRYPTION_PRIMARY_KEY
    value: 87c07b4a3378aac7fd056be7d4abb1df91f6db93c05f99ca38f3130ef6c633c
  - name: LAGO_ENCRYPTION_DETERMINISTIC_KEY
    value: 3369141cf3c73c435d6645b9ae1241cba7327e43c53bd9bb9b77d10d9176f524
  - name: LAGO_ENCRYPTION_KEY_DERIVATION_SALT
    value: 350a8a39581e80223b84ae70304ddfeda9259ffdc1ae3ef1f7d5add7268aaf62
  - name: LAGO_RSA_PRIVATE_KEY
    value: 
  - name: LAGO_API_URL
    value: '{{KUBERO_APP_URL}}'
  - name: LAGO_FRONT_URL
    value: '{{KUBERO_APP_URL}}'
  - name: LAGO_PDF_URL
    value: http://lago-pdf:3000
  - name: LAGO_REDIS_CACHE_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379
  - name: LAGO_SIDEKIQ_WEB
    value: 'false'
  - name: LAGO_DISABLE_SEGMENT
    value: 'true'
  extraVolumes: []
  cronjobs: []
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: getlago/api
    tag: v1.48.1
    run:
      securityContext:
        readOnlyRootFilesystem: false

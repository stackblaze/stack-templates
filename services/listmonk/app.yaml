apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: listmonk
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Self-hosted high-performance newsletter and mailing
      list manager with analytics, templating, and multi-list support. Mailchimp alternative.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/listmonk/icon.png
    kubero.dev/template.installation: "Change LISTMONK_app__admin_password. On first\
      \ boot, listmonk runs database migrations automatically. Log in at /admin with\
      \ admin/<password>. Configure an SMTP server in Settings > SMTP to send campaigns.\
      \ Import subscribers via CSV or the API. Listmonk is extremely efficient \u2014\
      \ a single instance can send millions of emails per hour with a good SMTP provider."
    kubero.dev/template.links: '["https://listmonk.app/docs/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/knadh/listmonk
    kubero.dev/template.categories: '["email", "marketing", "communication"]'
    kubero.dev/template.title: Listmonk
    kubero.dev/template.website: https://listmonk.app
  labels:
    manager: kubero
spec:
  name: listmonk
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: listmonk
              owner: listmonk
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO listmonk
              - GRANT CREATE ON SCHEMA public TO listmonk
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO listmonk
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: listmonk
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: listmonk
          password: listmonk
  envVars:
  - name: LISTMONK_db__host
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: LISTMONK_db__port
    value: 5432
  - name: LISTMONK_db__user
    value: listmonk
  - name: LISTMONK_db__password
    value: listmonk
  - name: LISTMONK_db__database
    value: listmonk
  - name: LISTMONK_db__ssl_mode
    value: disable
  - name: LISTMONK_app__admin_username
    value: admin
  - name: LISTMONK_app__admin_password
    value: change-me
  - name: LISTMONK_app__address
    value: 0.0.0.0:9000
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /listmonk/uploads
    name: '{{KUBERO_APP_NAME}}-uploads'
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: '1'
      memory: 512Mi
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '9000'
    pullPolicy: Always
    repository: ghcr.io/knadh/listmonk
    tag: v6.1.0
    command:
    - sh
    - -c
    - ./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade
      --yes --config '' && exec ./listmonk --config ''
    run:
      securityContext:
        readOnlyRootFilesystem: true

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: postiz
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Schedule social media posts, measure them, exchange
      with other members and get a lot of help from AI
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/postiz/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://private-user-images.githubusercontent.com/100117126/363204406-a27ee220-beb7-4c7e-8c1b-2c44301f82ef.gif?jwt=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmF3LmdpdGh1YnVzZXJjb250ZW50LmNvbSIsImtleSI6ImtleTUiLCJleHAiOjE3MzIxMDU4NDEsIm5iZiI6MTczMjEwNTU0MSwicGF0aCI6Ii8xMDAxMTcxMjYvMzYzMjA0NDA2LWEyN2VlMjIwLWJlYjctNGM3ZS04YzFiLTJjNDQzMDFmODJlZi5naWY_.uqwvPkAVLFnwySvFdZp8IbQNGkLiM_w2_X3bB9ufz7E"]'
    kubero.dev/template.source: https://github.com/gitroomhq/postiz-app
    kubero.dev/template.categories: '["social", "utilities"]'
    kubero.dev/template.title: Postiz
    kubero.dev/template.website: https://postiz.com/
  labels:
    manager: kubero
spec:
  name: postiz
  deploymentstrategy: docker
  envVars:
  - name: MAIN_URL
    value: '{{KUBERO_APP_URL}}'
  - name: FRONTEND_URL
    value: '{{KUBERO_APP_URL}}'
  - name: JWT_SECRET
    value: random string that is unique to every install - just type random characters
      here!
  - name: DATABASE_URL
    value: postgresql://postiz:postiz@postiz-postgresql-rw:5432/postiz
  - name: REDIS_URL
    value: redis://rfr-postiz-valkey-readwrite:6379
  - name: IS_GENERAL
    value: 'true'
  - name: STORAGE_PROVIDER
    value: local
  - name: UPLOAD_DIRECTORY
    value: /upload
  - name: NEXT_PUBLIC_UPLOAD_DIRECTORY
    value: /upload
  - name: NEXT_PUBLIC_BACKEND_URL
    value: '{{KUBERO_APP_URL}}/api'
  - name: BACKEND_INTERNAL_URL
    value: http://localhost:3000
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /upload
    name: postiz-upload-volume
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /config
    name: postiz-config-volume
    size: 1Gi
    storageClass: slow
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: postiz-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: postiz
              owner: postiz
              secret:
                name: postiz-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO postiz
              - GRANT CREATE ON SCHEMA public TO postiz
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO postiz
          enableSuperuserAccess: true
          superuserSecret:
            name: postiz-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: postiz-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: postiz
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: postiz-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: postiz
          password: postiz
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: postiz-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          sentinel:
            replicas: 3
            quorum: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '5000'
    pullPolicy: Always
    repository: ghcr.io/gitroomhq/postiz-app
    tag: latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: cryptgeon
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Secure, open-source service for sharing self-destructing,
      end-to-end-encrypted notes and files, inspired by PrivNote.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/cryptgeon/icon.png
    kubero.dev/template.installation: Deploy with the bundled Valkey (Redis-compatible)
      add-on, which is where all encrypted notes/files are stored temporarily until
      they expire or are viewed; nothing is persisted on disk, so no volume is required.
      The app connects to Valkey via the REDIS env var (passwordless in-cluster).
      Encryption happens client-side in the browser using AES-GCM, so the server never
      sees plaintext or keys and there is no admin login or user database to seed.
      Tune SIZE_LIMIT (max payload, e.g. 4 MiB), MAX_VIEWS and MAX_EXPIRATION (minutes)
      to taste. Because data lives only in Valkey memory, restarting/redeploying Valkey
      clears all outstanding notes. No SMTP, S3 or external search engine is needed.
    kubero.dev/template.links: '["https://github.com/cupcakearmy/cryptgeon#readme",
      "https://cryptgeon.org"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/cupcakearmy/cryptgeon/main/design/Screens.png"]'
    kubero.dev/template.source: https://github.com/cupcakearmy/cryptgeon
    kubero.dev/template.categories: '["security", "utilities", "productivity"]'
    kubero.dev/template.title: Cryptgeon
    kubero.dev/template.website: https://cryptgeon.org
  labels:
    manager: kubero
spec:
  name: cryptgeon
  deploymentstrategy: docker
  addons:
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: REDIS
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379
  - name: SIZE_LIMIT
    value: 4 MiB
  - name: MAX_VIEWS
    value: '100'
  - name: MAX_EXPIRATION
    value: '360'
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/cupcakearmy/cryptgeon
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

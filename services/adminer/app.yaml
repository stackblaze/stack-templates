apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: adminer
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Lightweight single-file database manager for
      MySQL, PostgreSQL, SQLite, MongoDB, and more — simpler alternative to phpMyAdmin.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/adminer/icon.png
    kubero.dev/template.installation: Adminer has no credentials of its own — it proxies
      your database credentials. Enter the hostname, username, and password of any
      database server accessible from within the cluster (e.g. a CNPG Postgres at
      myapp-postgresql-rw, port 5432). Supports PostgreSQL, MySQL/MariaDB, SQLite,
      and more. For security, restrict ingress access to internal users only.
    kubero.dev/template.links: '["https://www.adminer.org/"]'
    kubero.dev/template.screenshots: '["https://www.adminer.org/static/screenshots/table.png"]'
    kubero.dev/template.source: https://github.com/vrana/adminer
    kubero.dev/template.categories: '["database", "development", "utilities"]'
    kubero.dev/template.title: Adminer
    kubero.dev/template.website: https://www.adminer.org
  labels:
    manager: kubero
spec:
  name: adminer
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: ADMINER_DEFAULT_SERVER
    value: null
  - name: ADMINER_DESIGN
    value: pepa-linha
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: adminer
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

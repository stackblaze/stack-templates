apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: humhub
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Flexible open-source social network kit for private
      communities and team collaboration.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/humhub/icon.png
    kubero.dev/template.installation: Set HUMHUB_HOST to your public hostname. Set
      HUMHUB_ADMIN_PASSWORD before first boot for auto-install.
    kubero.dev/template.links: '["https://docs.humhub.org/"]'
    kubero.dev/template.screenshots: '["https://www.humhub.com/static/img/humhub-logo.png"]'
    kubero.dev/template.source: https://github.com/humhub/humhub
    kubero.dev/template.categories: '["communication", "social", "work"]'
    kubero.dev/template.title: HumHub
    kubero.dev/template.website: https://www.humhub.com/
  labels:
    manager: kubero
spec:
  name: humhub
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: humhub
          username: humhub
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: humhub
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: humhub
  envVars:
  - name: HUMHUB_DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: HUMHUB_DB_NAME
    value: humhub
  - name: HUMHUB_DB_USER
    value: humhub
  - name: HUMHUB_DB_PASSWORD
    value: humhub
  - name: HUMHUB_PROTO
    value: https
  - name: HUMHUB_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: HUMHUB_ADMIN_LOGIN
    value: admin
  - name: HUMHUB_ADMIN_EMAIL
    value: admin@example.com
  - name: HUMHUB_ADMIN_PASSWORD
    value: change-me
  - name: HUMHUB_AUTO_INSTALL
    value: 'true'
  - name: HUMHUB_TRUSTED_HOSTS
    value: 10.0.0.0/8
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/localhost/htdocs/protected/config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 1Gi
    storageClass: slow
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/localhost/htdocs/uploads
    name: '{{KUBERO_APP_NAME}}-uploads'
    size: 2Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: mriedmann/humhub
    tag: stable
    run:
      securityContext:
        readOnlyRootFilesystem: false

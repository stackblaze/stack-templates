apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: stackblaze-builder
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Stackblaze Builder workspace — browser VS Code (code-server) on a persistent project volume. A clean dev environment; add a database, auth and APIs anytime by attaching the Supabase add-on. Use with the Stackblaze Builder agent or edit manually, then ship via GitHub PR and deploy.
    kubero.dev/template.icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/vscode.png
    kubero.dev/template.installation: 'Browser VS Code (code-server) on a persistent PVC at /home/coder/project — open the app URL for the IDE. This is a clean workspace with no database. Need Postgres + Auth + APIs? Attach the Supabase add-on (it provisions a CloudNativePG database too) and the connection env is injected for you.'
    kubero.dev/template.links: '["https://github.com/stackblaze/stack-templates/tree/main/services/stackblaze-builder"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/stackblaze/stack-templates
    kubero.dev/template.categories: '["development", "ai", "work"]'
    kubero.dev/template.title: Stackblaze Builder
    kubero.dev/template.website: https://stackblaze.cloud
    stackblaze.dev/template.builder: 'true'
  labels:
    manager: kubero
spec:
  name: stackblaze-builder
  deploymentstrategy: docker
  addons: []
  cronjobs: []
  envVars:
  - name: DEFAULT_WORKSPACE
    value: /home/coder/project
  - name: STACKBLAZE_BUILDER
    value: '1'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /home/coder/project
    name: '{{KUBERO_APP_NAME}}-workspace'
    size: 10Gi
  healthcheck:
    enabled: true
    path: /
    periodSeconds: 15
    startupSeconds: 180
    timeoutSeconds: 5
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stackblaze-builder
    tag: latest
  resources:
    limits:
      cpu: '2'
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Your friendliest open source all-in-one automation
      tool ✨ Workflow automation tool 100+ integration / Enterprise automation tool
      / Zapier Alternative
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/activepieces/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://github.com/activepieces/activepieces/assets/1812998/e75616ce-7801-45b7-b3fa-eba778bebde3"]'
    kubero.dev/template.source: https://github.com/activepieces/activepieces
    kubero.dev/template.categories: '["productivity", "development", "work"]'
    kubero.dev/template.title: Activepieces
    kubero.dev/template.website: https://www.activepieces.com/
  labels:
    manager: kubero
  name: activepieces
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: activepieces-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgresql
              owner: activepieces
              secret:
                name: activepieces-postgresql-app
              postInitApplicationSQL:
              - CREATE EXTENSION IF NOT EXISTS vector;
          enableSuperuserAccess: true
          superuserSecret:
            name: activepieces-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: activepieces-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: activepieces
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: activepieces-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: activepieces
          password: activepieces
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: activepieces-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          sentinel:
            replicas: 3
            quorum: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: AP_POSTGRES_DATABASE
    value: postgresql
  - name: AP_POSTGRES_PASSWORD
    value: activepieces
  - name: AP_POSTGRES_USERNAME
    value: activepieces
  - name: AP_ENGINE_EXECUTABLE_PATH
    value: dist/packages/engine/main.js
  - name: AP_JWT_SECRET
    value: secret
  - name: AP_ENVIRONMENT
    value: prod
  - name: AP_FRONTEND_URL
    value: http://activepieces.lacolhost.com
  - name: AP_WEBHOOK_TIMEOUT_SECONDS
    value: '30'
  - name: AP_TRIGGER_DEFAULT_POLL_INTERVAL
    value: '5'
  - name: AP_REDIS_HOST
    value: rfr-activepieces-valkey-readwrite
  - name: AP_REDIS_PORT
    value: '6379'
  - name: AP_SANDBOX_RUN_TIME_SECONDS
    value: '600'
  - name: AP_TELEMETRY_ENABLED
    value: 'true'
  - name: AP_TEMPLATES_SOURCE_URL
    value: https://cloud.activepieces.com/api/v1/flow-templates
  - name: AP_POSTGRES_HOST
    value: activepieces-postgresql-rw
  - name: AP_POSTGRES_PORT
    value: '5432'
  - name: AP_REDIS_PASSWORD
    value: activepieces
  - name: AP_ENCRYPTION_KEY
    value: 0123456789abcdef0123456789abcdef
  extraVolumes: []
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: ghcr.io/activepieces/activepieces
    run:
      command: node index.js
      readOnlyAppStorage: true
      repository: node
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add: []
          drop: []
        readOnlyRootFilesystem: false
        runAsGroup: 0
        runAsNonRoot: false
        runAsUser: 0
      tag: latest
    tag: latest
  name: activepieces
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

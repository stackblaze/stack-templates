apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: bigcapital
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source double-entry accounting and financial
      reporting platform, a self-hosted alternative to QuickBooks, Xero and Wave.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/bigcapital/icon.png
    kubero.dev/template.installation: 'Multi-container stack. This template runs the
      PRIMARY backend API only: bigcapitalhq/server (listens on :3000). It is NOT
      usable on its own — you MUST also deploy these companion services and route
      them behind a reverse proxy (Envoy/Nginx): (1) FRONTEND/webapp: bigcapitalhq/webapp:latest
      (the SPA UI); (2) GATEWAY/proxy: envoyproxy/envoy:v1.30-latest fronting / ->
      webapp and /api -> server, terminating TLS on 80/443; (3) PDF rendering: gotenberg/gotenberg:7
      (point GOTENBERG_URL at it, e.g. http://gotenberg:9000); (4) DB MIGRATION: a
      one-shot run of the same bigcapitalhq/server image with the migration command
      to provision the system + tenant schemas before first boot. The server multi-tenants:
      SYSTEM_DB_NAME is the control DB and each org gets its own DB prefixed by TENANT_DB_NAME_PERFIX.
      Add-ons wired: MariaDB (bigcapital-mysql:3306, app uses MySQL—not Postgres)
      and Valkey/Redis (rfr-bigcapital-valkey-readwrite:6379, no password) used for
      both cache and the BullMQ job queue. BEFORE exposing publicly ROTATE: JWT_SECRET
      (openssl rand -hex 32) and the MariaDB password (default ''bigcapital''). Set
      BASE_URL to your public URL (pre-filled with {{KUBERO_APP_URL}}). After the
      stack is up, browse to the gateway URL and create the first account (no default
      account exists); set SIGNUP_DISABLED=true afterward to lock down registration.
      Optional integrations (Plaid bank sync, Stripe/Lemon Squeezy billing, S3 attachments,
      SMTP mail) are configured via additional env vars.'
    kubero.dev/template.links: '["https://docs.bigcapital.app/deployment/docker",
      "https://github.com/bigcapitalhq/bigcapital/blob/develop/docker-compose.prod.yml"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/bigcapitalhq/bigcapital/develop/static/bigcapital-screenshot.png"]'
    kubero.dev/template.source: https://github.com/bigcapitalhq/bigcapital
    kubero.dev/template.categories: '["finance", "erp", "work"]'
    kubero.dev/template.title: Bigcapital
    kubero.dev/template.website: https://bigcapital.app
  labels:
    manager: kubero
spec:
  name: bigcapital
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: bigcapital-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: bigcapital-mysql-root
            key: password
          database: bigcapital
          username: bigcapital
          passwordSecretKeyRef:
            name: bigcapital-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: bigcapital-mysql-root
        type: Opaque
        stringData:
          password: bigcapital
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: bigcapital-mysql-app
        type: Opaque
        stringData:
          password: bigcapital
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: bigcapital-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: BASE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: PORT
    value: '3000'
  - name: NODE_ENV
    value: production
  - name: JWT_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: DB_HOST
    value: bigcapital-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_USER
    value: bigcapital
  - name: DB_PASSWORD
    value: bigcapital
  - name: DB_CHARSET
    value: utf8
  - name: SYSTEM_DB_NAME
    value: bigcapital
  - name: TENANT_DB_NAME_PERFIX
    value: bigcapital_tenant_
  - name: REDIS_HOST
    value: rfr-bigcapital-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: QUEUE_HOST
    value: rfr-bigcapital-valkey-readwrite
  - name: QUEUE_PORT
    value: '6379'
  - name: GOTENBERG_URL
    value: http://gotenberg:9000
  - name: S3_REGION
    value: us-east-1
  - name: S3_ACCESS_KEY_ID
    value: bigcapital
  - name: S3_SECRET_ACCESS_KEY
    value: bigcapital
  - name: S3_ENDPOINT
    value: http://127.0.0.1:9000
  - name: S3_BUCKET
    value: bigcapital
  - name: S3_FORCE_PATH_STYLE
    value: 'true'
  - name: SIGNUP_DISABLED
    value: 'false'
  - name: SIGNUP_EMAIL_CONFIRMATION
    value: 'false'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: bigcapital-data
    size: 2Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /api/system_db
    startupSeconds: 600
    timeoutSeconds: 10
    periodSeconds: 15
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: bigcapitalhq/server
    tag: latest
    command:
    - sh
    - -c
    - cd packages/server && node dist/cli.js system:migrate:latest && node dist/cli.js
      tenants:migrate:latest && exec node dist/main.js
    run:
      securityContext:
        readOnlyRootFilesystem: false

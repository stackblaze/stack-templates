apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Atuin replaces your existing shell history with
      a SQLite database, and records additional context for your commands.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/122059230?s=200&v=4
    kubero.dev/template.installation: 'Make sure you have selected the correct storageclass for
      the database. If you are unsure, you can check the available storage classes
      by running the following command: ```bash kubectl get storageclass ``` '
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/atuinsh/atuin/main/demo.gif"]'
    kubero.dev/template.source: https://github.com/atuinsh/atuin
    kubero.dev/template.categories: '["development", "utilities"]'
    kubero.dev/template.title: Atuin
    kubero.dev/template.website: https://atuin.sh/
  labels:
    manager: kubero
  name: atuin
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: atuin-autin-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          bootstrap:
            initdb:
              database: atuin
              owner: atuin
              secret:
                name: atuin-autin-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: atuin-autin-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: atuin-autin-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: atuin
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: atuin-autin-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: atuin
          password: atuin
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: ATUIN_HOST
    value: 0.0.0.0
  - name: ATUIN_OPEN_REGISTRATION
    value: 'true'
  - name: ATUIN_DB_URI
    value: postgres://atuin:atuin@atuin-autin-postgresql-rw/atuin
  - name: RUST_LOG
    value: info,atuin_server=debug
  extraVolumes: []
  image:
    command:
    - atuin
    - server
    - start
    containerPort: '8888'
    pullPolicy: Always
    repository: ghcr.io/atuinsh/atuin
    tag: latest
  name: atuin
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

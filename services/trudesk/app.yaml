apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: trudesk
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source helpdesk and ticketing system with email piping, knowledge base, live notifications,
      and per-team agent workflows.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/15837764?s=200&v=4
    kubero.dev/template.installation: Trudesk is a Node.js helpdesk that stores all data in MongoDB; the documentdb add-on
      below provides the MongoDB-compatible backend. The TD_MONGODB_* vars point at the in-cluster documentdb service (host
      documentdb-service-trudesk-documentdb, port 10260) using SCRAM-SHA-256 over TLS, user 'mongoadmin'. Because the endpoint
      uses a self-signed cert, TD_MONGODB_AUTHENTICATION_DATABASE is set to admin and the connection allows invalid TLS certs.
      Rotate the documentdb password from the default 'trudesk' before exposing publicly. On first load open {{KUBERO_APP_URL}}/install
      to run the web setup wizard, which creates the database schema and your super-admin account. Trudesk runs its own internal
      Redis for caching/sessions inside the container, so no external Redis add-on is needed. Configure inbound (IMAP mailbox)
      and outbound (SMTP) email in the admin panel after install to enable ticket creation from email. Uploads and generated
      assets are persisted on the mounted volume.
    kubero.dev/template.links: '["https://docs.trudesk.io", "https://github.com/polonel/trudesk/blob/master/docker-compose.yml"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/polonel/trudesk
    kubero.dev/template.categories: '["helpdesk", "work", "collaboration"]'
    kubero.dev/template.title: Trudesk
    kubero.dev/template.website: https://trudesk.io
  labels:
    manager: kubero
spec:
  name: trudesk
  deploymentstrategy: docker
  addons:
  - displayName: Document DB
    env: []
    icon: /img/addons/mongo.svg
    id: kubero-operator
    kind: DocumentDB
    resourceDefinitions:
      DocumentDB:
        apiVersion: documentdb.io/preview
        kind: DocumentDB
        metadata:
          name: trudesk-documentdb
        spec:
          nodeCount: 1
          instancesPerNode: 1
          documentDbCredentialSecret: documentdb-credentials
          resource:
            storage:
              pvcSize: 1Gi
              storageClass: default
          exposeViaService:
            serviceType: ClusterIP
      credentialSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: documentdb-credentials
        type: Opaque
        stringData:
          username: mongoadmin
          password: trudesk
  envVars:
  - name: NODE_ENV
    value: production
  - name: TRUDESK_DOCKER
    value: 'true'
  - name: USE_XFORWARDIP
    value: 'true'
  - name: TD_MONGODB_SERVER
    value: documentdb-service-trudesk-documentdb
  - name: TD_MONGODB_PORT
    value: '10260'
  - name: TD_MONGODB_DATABASE
    value: trudesk
  - name: TD_MONGODB_USERNAME
    value: mongoadmin
  - name: TD_MONGODB_PASSWORD
    value: trudesk
  - name: TD_MONGODB_AUTHENTICATION_DATABASE
    value: admin
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /usr/src/trudesk/public/uploads
    name: trudesk-data
    size: 2Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8118'
    pullPolicy: Always
    repository: polonel/trudesk
    tag: '1'

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: lightldap
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Lightweight authentication server providing a
      simplified, opinionated LDAP interface with a clean web UI for user and group
      management.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/lightldap/icon.png
    kubero.dev/template.installation: 'LLDAP exposes its web admin UI on port 17170
      and an LDAP endpoint on port 3890 (LDAP is not HTTP; expose it separately if
      other apps must bind to it). ROTATE these template defaults before production:
      LLDAP_JWT_SECRET and LLDAP_KEY_SEED (generate with `openssl rand -hex 32`),
      and LLDAP_LDAP_USER_PASS (the initial admin password for the bind user ''admin'').
      On first run log in at the app URL with admin / the LLDAP_LDAP_USER_PASS value,
      then create users/groups. This spec uses the bundled Postgres add-on via LLDAP_DATABASE_URL;
      if you prefer the default embedded SQLite store, remove the postgres add-on
      and LLDAP_DATABASE_URL and keep the /data volume. Adjust LLDAP_LDAP_BASE_DN
      to your domain.'
    kubero.dev/template.links: '["https://github.com/lldap/lldap/blob/main/README.md"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/lldap/lldap
    kubero.dev/template.categories: '["identity", "security", "utilities"]'
    kubero.dev/template.title: LLDAP
    kubero.dev/template.website: https://github.com/lldap/lldap
  labels:
    manager: kubero
spec:
  name: lightldap
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: lightldap
              owner: lightldap
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: lightldap
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: lightldap
          password: lightldap
  envVars:
  - name: LLDAP_JWT_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: LLDAP_KEY_SEED
    value: replace-with-openssl-rand-hex-32
  - name: LLDAP_LDAP_USER_PASS
    value: lightldap
  - name: LLDAP_LDAP_BASE_DN
    value: dc=example,dc=com
  - name: LLDAP_DATABASE_URL
    value: postgres://lightldap:lightldap@{{KUBERO_APP_NAME}}-postgresql-rw:5432/lightldap
  - name: LLDAP_HTTP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: TZ
    value: UTC
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 2Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '17170'
    pullPolicy: Always
    repository: lldap/lldap
    tag: stable
    run:
      securityContext:
        readOnlyRootFilesystem: false

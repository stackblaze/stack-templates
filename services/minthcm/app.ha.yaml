apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: minthcm
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source, AI-native Human Capital Management
      (HCM) platform for HR processes, built on the SuiteCRM core with full data ownership.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/minthcm/icon.png
    kubero.dev/template.installation: MintHCM requires a companion Elasticsearch 7.10+
      service for search/indexing (not an operator add-on here) - deploy one and point
      ELASTICSEARCH_HOST/PORT at it, or the app boots but search features stay disabled.
      The bundled MariaDB add-on holds all relational data; rotate the default db
      password (currently the slug 'minthcm') after first deploy. On first run the
      entrypoint installs the schema using MINT_USER/MINT_PASS (admin/minthcm) and
      MINT_URL ({{KUBERO_APP_URL}}) - log in and change the admin password immediately.
      Set INSTALL_DEMO_DATA=yes only for evaluation. First boot clones the app and
      runs MintCLI install (several minutes). Persistent state lives under /var/www/html
      (.initialized marker) and /var/spool/cron/crontabs (scheduled jobs).
    kubero.dev/template.links: '["https://minthcm.org/support/deploy-minthcm-on-docker/",
      "https://github.com/minthcm/minthcm"]'
    kubero.dev/template.screenshots: '["https://minthcm.org/wp-content/uploads/2023/11/5.jpg"]'
    kubero.dev/template.source: https://github.com/minthcm/minthcm
    kubero.dev/template.categories: '["crm", "work", "productivity"]'
    kubero.dev/template.title: MintHCM
    kubero.dev/template.website: https://minthcm.org
  labels:
    manager: kubero
spec:
  name: minthcm
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: minthcm
          username: minthcm
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: minthcm
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: minthcm
  envVars:
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: DB_PORT
    value: '3306'
  - name: DB_NAME
    value: minthcm
  - name: DB_USER
    value: minthcm
  - name: DB_PASS
    value: minthcm
  - name: MYSQL_PASSWORD
    value: minthcm
  - name: MINT_URL
    value: '{{KUBERO_APP_URL}}'
  - name: MINT_USER
    value: admin
  - name: MINT_PASS
    value: minthcm
  - name: ELASTICSEARCH_HOST
    value: '{{KUBERO_APP_NAME}}-elasticsearch'
  - name: ELASTICSEARCH_PORT
    value: '9200'
  - name: ELASTICSEARCH_USERNAME
    value: elastic
  - name: ELASTICSEARCH_PASSWORD
    value: changeme
  - name: INSTALL_DEMO_DATA
    value: 'no'
  - name: SSL
    value: 'no'
  - name: REBUILD_FRONTEND
    value: 'no'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/www/html
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/spool/cron/crontabs
    name: minthcm-cron
    size: 1Gi
    storageClass: shared
  cronjobs: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '1'
      memory: 1Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: minthcm/minthcm
    tag: latest
    command:
    - bash
    - -c
    - /usr/local/bin/start.sh; exec tail -f /dev/null
    run:
      securityContext:
        readOnlyRootFilesystem: false

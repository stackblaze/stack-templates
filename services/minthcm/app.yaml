apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: minthcm
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source, AI-native Human Capital Management (HCM) platform for HR processes, built
      on the SuiteCRM core with full data ownership.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/51930847?s=200&v=4
    kubero.dev/template.installation: MintHCM requires a companion Elasticsearch 7.10+ service for search/indexing (not an
      operator add-on here) - deploy one and point ELASTICSEARCH_HOST/PORT at it, or the app boots but search features stay
      disabled. The bundled MariaDB add-on holds all relational data; rotate the default db password (currently the slug 'minthcm')
      after first deploy. On first run the entrypoint installs the schema using MINT_USER/MINT_PASS (admin/minthcm) and MINT_URL
      ({{KUBERO_APP_URL}}) - log in and change the admin password immediately. Set INSTALL_DEMO_DATA=yes only for evaluation.
      Persistent app code, config and uploads live under /var/www/html.
    kubero.dev/template.links: '["https://minthcm.org/support/deploy-minthcm-on-docker/", "https://github.com/minthcm/minthcm"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/minthcm/minthcm
    kubero.dev/template.categories: '["crm", "work", "productivity"]'
    kubero.dev/template.title: MintHCM
    kubero.dev/template.website: https://minthcm.org
  labels:
    manager: kubero
spec:
  name: minthcm
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: minthcm-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: minthcm-mysql-root
            key: password
          database: minthcm
          username: minthcm
          passwordSecretKeyRef:
            name: minthcm-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: minthcm-mysql-root
        type: Opaque
        stringData:
          password: minthcm
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: minthcm-mysql-app
        type: Opaque
        stringData:
          password: minthcm
  envVars:
  - name: DB_HOST
    value: minthcm-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_NAME
    value: minthcm
  - name: DB_USER
    value: minthcm
  - name: DB_PASS
    value: minthcm
  - name: MYSQL_PASSWORD
    value: minthcm
  - name: MINT_URL
    value: '{{KUBERO_APP_URL}}'
  - name: MINT_USER
    value: admin
  - name: MINT_PASS
    value: minthcm
  - name: ELASTICSEARCH_HOST
    value: minthcm-elasticsearch
  - name: ELASTICSEARCH_PORT
    value: '9200'
  - name: ELASTICSEARCH_USERNAME
    value: elastic
  - name: ELASTICSEARCH_PASSWORD
    value: changeme
  - name: INSTALL_DEMO_DATA
    value: 'no'
  - name: SSL
    value: 'no'
  - name: REBUILD_FRONTEND
    value: 'no'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html
    name: minthcm-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: minthcm/minthcm
    tag: latest

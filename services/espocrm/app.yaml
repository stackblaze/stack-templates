apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: espocrm
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: 'Open-source CRM for sales and customer management:
      contacts, accounts, leads, opportunities, activities, workflows, reporting and
      email.'
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/8108711?s=200&v=4
    kubero.dev/template.installation: Runs the official EspoCRM image (espocrm/espocrm,
      apache variant). EspoCRM only supports MySQL/MariaDB (no PostgreSQL) — this
      template ships the bundled mariadb addon (default db/user/password 'espocrm',
      rotate before production and keep ESPOCRM_DATABASE_PASSWORD in sync). On first
      boot the admin account is provisioned from ESPOCRM_ADMIN_USERNAME / ESPOCRM_ADMIN_PASSWORD
      — rotate ESPOCRM_ADMIN_PASSWORD (placeholder value). ESPOCRM_SITE_URL is wired
      to the app URL token so generated links resolve. The valkey addon is wired as
      an optional Redis cache backend (Valkey is Redis-compatible and password-less
      here) via ESPOCRM_CONFIG_USE_CACHE / the Redis host/port vars; remove it if
      not wanted. Persistent app data (uploads, custom code, config, extensions) lives
      at /var/www/html — back this up. EspoCRM needs a scheduled cron job hitting
      cron.php every ~1 minute; run it via an external CronJob after install. For
      outbound email configure SMTP from the EspoCRM admin UI.
    kubero.dev/template.links: '["https://docs.espocrm.com/administration/docker/installation/",
      "https://hub.docker.com/r/espocrm/espocrm"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/espocrm/espocrm
    kubero.dev/template.categories: '["crm", "work", "productivity"]'
    kubero.dev/template.title: EspoCRM
    kubero.dev/template.website: https://www.espocrm.com
  labels:
    manager: kubero
spec:
  name: espocrm
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: espocrm-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: espocrm-mysql-root
            key: password
          database: espocrm
          username: espocrm
          passwordSecretKeyRef:
            name: espocrm-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: espocrm-mysql-root
        type: Opaque
        stringData:
          password: espocrm
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: espocrm-mysql-app
        type: Opaque
        stringData:
          password: espocrm
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: espocrm-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: ESPOCRM_DATABASE_PLATFORM
    value: Mysql
  - name: ESPOCRM_DATABASE_HOST
    value: espocrm-mysql
  - name: ESPOCRM_DATABASE_PORT
    value: '3306'
  - name: ESPOCRM_DATABASE_NAME
    value: espocrm
  - name: ESPOCRM_DATABASE_USER
    value: espocrm
  - name: ESPOCRM_DATABASE_PASSWORD
    value: espocrm
  - name: ESPOCRM_SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: ESPOCRM_ADMIN_USERNAME
    value: admin
  - name: ESPOCRM_ADMIN_PASSWORD
    value: replace-with-openssl-rand-hex-32
  - name: ESPOCRM_CONFIG_USE_CACHE
    value: 'true'
  - name: ESPOCRM_CONFIG_CACHE_PROVIDER
    value: Redis
  - name: ESPOCRM_CONFIG_REDIS_HOST
    value: rfr-espocrm-valkey-readwrite
  - name: ESPOCRM_CONFIG_REDIS_PORT
    value: '6379'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html
    name: espocrm-data
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: espocrm/espocrm
    tag: apache

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: funkwhale
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free, federated (ActivityPub) music server and sharing platform - a self-hosted alternative
      to streaming services for the Fediverse.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/funkwhale/icon.png
    kubero.dev/template.installation: 'This template runs the PRIMARY Funkwhale API server container ONLY (funkwhale/api -
      a Django/gunicorn app listening on HTTP port 5000 via FUNKWHALE_API_IP/FUNKWHALE_API_PORT). Funkwhale is a MULTI-CONTAINER
      stack and is NOT complete with this pod alone. REQUIRED before first boot: 1) Rotate DJANGO_SECRET_KEY - generate with
      ''openssl rand -base64 45'' (or ''openssl rand -hex 32'') and set it; the placeholder MUST be replaced. 2) After the
      Postgres add-on is up, exec into the api pod and run ''python manage.py migrate'' (then ''python manage.py collectstatic
      --noinput''). 3) Create the first admin with ''python manage.py createsuperuser'' (or ''python manage.py fw users create
      --superuser''). MANDATORY COMPANION SERVICES to deploy as SEPARATE apps (same FUNKWHALE_VERSION, sharing the SAME Postgres
      + Valkey + media volume): (a) funkwhale/api with command [''celery'',''-A'',''funkwhale_api.taskapp'',''worker'',''-l'',''INFO'']
      - the CELERY WORKER that handles federation delivery, audio import/transcoding, and async tasks (MANDATORY); (b) funkwhale/api
      with command [''celery'',''-A'',''funkwhale_api.taskapp'',''beat'',''-l'',''INFO''] - the CELERY BEAT SCHEDULER for
      periodic federation/cleanup jobs; (c) funkwhale/front - the NGINX FRONTEND/REVERSE-PROXY image (port 80) that serves
      the Vue.js SPA, static/media files, and proxies /api to this api pod. Point the funkwhale/front container''s FUNKWHALE_API_HOST/FUNKWHALE_API_PORT
      at this api Service, mount the SAME /srv/funkwhale/data/media (RWX) volume, and route public ingress to funkwhale/front
      (NOT directly to the api pod). The worker/beat/front pods must share this api pod''s media volume - use RWX storage
      so imported/federated audio is reachable by all. OPTIONAL: a Typesense container (image typesense/typesense) enables
      full-text search - set TYPESENSE_API_KEY + TYPESENSE_HOST and run ''python manage.py search build''; omit for a basic
      start. OBJECT STORAGE: for production at scale set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_STORAGE_BUCKET_NAME
      / AWS_S3_ENDPOINT_URL at an external S3 bucket (e.g. the RustFS add-on) instead of the local media volume. Rotate the
      Postgres password; Valkey is password-less in-cluster. FUNKWHALE_HOSTNAME is baked into ActivityPub actor URLs and cannot
      be changed cleanly after federating, so set it to your real host before going live.'
    kubero.dev/template.links: '["https://docs.funkwhale.audio/administrator/installation/docker.html", "https://docs.funkwhale.audio/administrator/configuration/env.html"]'
    kubero.dev/template.screenshots: '["https://funkwhale.audio/img/screenshots/queue.png"]'
    kubero.dev/template.source: https://dev.funkwhale.audio/funkwhale/funkwhale
    kubero.dev/template.categories: '["media", "social", "communication"]'
    kubero.dev/template.title: Funkwhale
    kubero.dev/template.website: https://funkwhale.audio
  labels:
    manager: kubero
spec:
  name: funkwhale
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: funkwhale-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: funkwhale
              owner: funkwhale
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO funkwhale
              - GRANT CREATE ON SCHEMA public TO funkwhale
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO funkwhale
              secret:
                name: funkwhale-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: funkwhale-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: funkwhale-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: funkwhale
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: funkwhale-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: funkwhale
          password: funkwhale
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: funkwhale-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: FUNKWHALE_HOSTNAME
    value: '{{KUBERO_APP_HOST}}'
  - name: FUNKWHALE_PROTOCOL
    value: https
  - name: FUNKWHALE_API_IP
    value: 0.0.0.0
  - name: FUNKWHALE_API_PORT
    value: '5000'
  - name: DJANGO_SETTINGS_MODULE
    value: config.settings.production
  - name: DJANGO_SECRET_KEY
    value: qa-change-me-openssl-rand-base64-45-before-production
  - name: DJANGO_ALLOWED_HOSTS
    value: '{{KUBERO_APP_HOST}}'
  - name: DATABASE_URL
    value: postgresql://funkwhale:funkwhale@funkwhale-postgresql-rw:5432/funkwhale
  - name: DB_HOST
    value: funkwhale-postgresql-rw
  - name: DB_PORT
    value: '5432'
  - name: DB_NAME
    value: funkwhale
  - name: DB_USER
    value: funkwhale
  - name: DB_PASSWORD
    value: funkwhale
  - name: CACHE_URL
    value: redis://rfr-funkwhale-valkey-readwrite:6379/0
  - name: CELERY_BROKER_URL
    value: redis://rfr-funkwhale-valkey-readwrite:6379/0
  - name: MEDIA_ROOT
    value: /srv/funkwhale/data/media
  - name: STATIC_ROOT
    value: /srv/funkwhale/data/static
  - name: MUSIC_DIRECTORY_PATH
    value: /srv/funkwhale/data/music
  - name: MUSIC_DIRECTORY_SERVE_PATH
    value: /srv/funkwhale/data/music
  - name: FUNKWHALE_FRONTEND_PATH
    value: /srv/funkwhale/front/dist
  - name: NESTED_PROXY
    value: '1'
  - name: EMAIL_CONFIG
    value: consolemail://
  - name: DEFAULT_FROM_EMAIL
    value: noreply@example.com
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /srv/funkwhale/data/media
    name: funkwhale-media
    size: 5Gi
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /srv/funkwhale/data/music
    name: funkwhale-music
    size: 5Gi
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /srv/funkwhale/data/static
    name: funkwhale-static
    size: 1Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /api/v1/instance/
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '5000'
    pullPolicy: Always
    repository: funkwhale/api
    tag: '1.4'

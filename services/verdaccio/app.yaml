apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: verdaccio
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Lightweight private npm/yarn/pnpm registry — proxy public packages and publish private ones with simple auth and no external database.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/verdaccio/icon.png
    kubero.dev/template.installation: 'Configure your npm client: npm set registry {{KUBERO_APP_URL}}. Add users with npm adduser --registry {{KUBERO_APP_URL}}. Publish packages with npm publish --registry {{KUBERO_APP_URL}}. By default Verdaccio proxies missing packages from npmjs.org. Configure auth, package access rules, and proxy uplinks by mounting a custom config.yaml to /verdaccio/conf/config.yaml via the conf volume.'
    kubero.dev/template.links: '["https://verdaccio.org/docs/installation/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/verdaccio/verdaccio
    kubero.dev/template.categories: '["development", "utilities", "devops"]'
    kubero.dev/template.title: Verdaccio
    kubero.dev/template.website: https://verdaccio.org
  labels:
    manager: kubero
spec:
  name: verdaccio
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: VERDACCIO_PORT
    value: 4873
  - name: VERDACCIO_PROTOCOL
    value: https
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /verdaccio/storage
    name: verdaccio-storage
    size: 10Gi
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /verdaccio/conf
    name: verdaccio-conf
    size: 1Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: '1'
      memory: 512Mi
  healthcheck:
    enabled: true
    path: /-/ping
    startupSeconds: 60
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '4873'
    pullPolicy: Always
    repository: verdaccio/verdaccio
    tag: latest

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: verdaccio
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: "Lightweight private npm/yarn/pnpm registry \u2014\
      \ proxy public packages and publish private ones with simple auth and no external\
      \ database."
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/verdaccio/icon.png
    kubero.dev/template.installation: 'Configure your npm client: npm set registry
      {{KUBERO_APP_URL}}. Add users with npm adduser --registry {{KUBERO_APP_URL}}.
      Publish packages with npm publish --registry {{KUBERO_APP_URL}}. By default
      Verdaccio proxies missing packages from npmjs.org. To customize auth, package
      access rules, or proxy uplinks, add an extraVolume mounting a populated config.yaml
      at /verdaccio/conf/config.yaml (subPath mount) so the image default config is
      not replaced.'
    kubero.dev/template.links: '["https://verdaccio.org/docs/installation/"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/verdaccio/screenshot.png"]'
    kubero.dev/template.source: https://github.com/verdaccio/verdaccio
    kubero.dev/template.categories: '["development", "utilities", "devops"]'
    kubero.dev/template.title: Verdaccio
    kubero.dev/template.website: https://verdaccio.org
  labels:
    manager: kubero
spec:
  name: verdaccio
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: VERDACCIO_PORT
    value: 4873
  - name: VERDACCIO_PROTOCOL
    value: http
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /verdaccio/storage
    name: '{{KUBERO_APP_NAME}}-storage'
    size: 10Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: '1'
      memory: 512Mi
  healthcheck:
    enabled: true
    path: /-/ping
    startupSeconds: 60
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '4873'
    pullPolicy: Always
    repository: verdaccio/verdaccio
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true

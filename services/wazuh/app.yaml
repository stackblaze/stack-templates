apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: wazuh
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source security platform delivering unified XDR and SIEM protection for endpoints
      and cloud workloads, with a web dashboard for alerts and agents.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/wazuh/icon.png
    kubero.dev/template.installation: 'This template deploys ONLY the Wazuh Dashboard (web UI, wazuh/wazuh-dashboard), which
      listens on port 5601 and is a thin front-end. Wazuh is a multi-container stack and will not function until you also
      deploy its companion services: 1) wazuh/wazuh-indexer:4.12.0 - the OpenSearch-based data store that holds all alerts
      and events (Wazuh''s real datastore; it is NOT one of the supported operator add-ons, so no add-on is provisioned here
      - run it as a separate StatefulSet with its own volume and TLS certs); 2) wazuh/wazuh-manager:4.12.0 - the analysis/server
      engine that ingests agent data (exposes 1514/1515/55000) and provides the API the dashboard queries. The dashboard connects
      to the indexer via OPENSEARCH_HOSTS and to the manager API via WAZUH_API_URL; update those hostnames/ports to match
      the Services you create for the indexer (:9200) and manager (:55000). Generate the indexer/manager TLS certificates
      with the official wazuh-certs-tool before first boot. Rotate every credential in this template (INDEXER_PASSWORD, DASHBOARD_PASSWORD,
      WAZUH_API_PASSWORD and the manager/indexer admin passwords) away from the placeholder values. Log in to the dashboard
      at {{KUBERO_APP_URL}} with DASHBOARD_USERNAME / DASHBOARD_PASSWORD after the indexer and manager are healthy. Wazuh
      agents are installed separately on the endpoints you want to monitor and point at the manager.'
    kubero.dev/template.links: '["https://documentation.wazuh.com/current/deployment-options/docker/wazuh-container.html",
      "https://github.com/wazuh/wazuh-docker"]'
    kubero.dev/template.screenshots: '["https://wazuh.com/uploads/2022/05/Threat-hunting.png"]'
    kubero.dev/template.source: https://github.com/wazuh/wazuh
    kubero.dev/template.categories: '["security", "monitoring", "data"]'
    kubero.dev/template.title: Wazuh
    kubero.dev/template.website: https://wazuh.com
  labels:
    manager: kubero
spec:
  name: wazuh
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: SERVER_HOST
    value: 0.0.0.0
  - name: SERVER_PORT
    value: '5601'
  - name: OPENSEARCH_HOSTS
    value: https://wazuh-indexer:9200
  - name: INDEXER_USERNAME
    value: admin
  - name: INDEXER_PASSWORD
    value: replace-with-openssl-rand-base64-32
  - name: WAZUH_API_URL
    value: https://wazuh-manager
  - name: API_USERNAME
    value: wazuh-wui
  - name: API_PASSWORD
    value: replace-with-openssl-rand-base64-32
  - name: DASHBOARD_USERNAME
    value: kibanaserver
  - name: DASHBOARD_PASSWORD
    value: replace-with-openssl-rand-base64-32
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /usr/share/wazuh-dashboard/data/wazuh/config
    name: wazuh-dashboard-config
    size: 1Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '5601'
    pullPolicy: Always
    repository: wazuh/wazuh-dashboard
    tag: 4.12.0

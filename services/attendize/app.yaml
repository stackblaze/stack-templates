apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: attendize
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source ticket selling and event management
      platform (Laravel) for organizing events and selling tickets online.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/attendize/icon.png
    kubero.dev/template.installation: 'Attendize auto-configures on first boot — no
      /install wizard. Log in at {{KUBERO_APP_URL}}/login with admin@example.com /
      changeme (change immediately). Sample organiser and demo events are pre-loaded.
      A queue worker runs in the background for PDF tickets and email jobs. SMTP is
      still placeholder (smtp.example.com) — set MAIL_HOST/MAIL_PORT/MAIL_USERNAME/MAIL_PASSWORD
      to a real relay for ticket delivery. ROTATE before production: APP_KEY, MariaDB
      db/user/password (defaults attendize/attendize/attendize). Uses MariaDB (MySQL-only,
      not Postgres) and Valkey/Redis for queue + cache.'
    kubero.dev/template.links: '["https://github.com/Attendize/Attendize/blob/master/docker-compose.yml"]'
    kubero.dev/template.screenshots: '["https://www.attendize.com/images/screenshots/screen1.PNG"]'
    kubero.dev/template.source: https://github.com/Attendize/Attendize
    kubero.dev/template.categories: '["e-commerce", "productivity", "work"]'
    kubero.dev/template.title: Attendize
    kubero.dev/template.website: https://www.attendize.com/
  labels:
    manager: kubero
spec:
  name: attendize
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: attendize
          username: attendize
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: attendize
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: attendize
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: APP_ENV
    value: production
  - name: APP_DEBUG
    value: 'false'
  - name: APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_KEY
    value: base64:NOZophDCMGE4GYrdDTo5Zt6yEKW+ymEHy85Wtk/HU58=
  - name: DB_CONNECTION
    value: mysql
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: DB_PORT
    value: '3306'
  - name: DB_DATABASE
    value: attendize
  - name: DB_USERNAME
    value: attendize
  - name: DB_PASSWORD
    value: attendize
  - name: QUEUE_CONNECTION
    value: redis
  - name: CACHE_DRIVER
    value: redis
  - name: SESSION_DRIVER
    value: redis
  - name: REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: REDIS_PASSWORD
    value: 'null'
  - name: MAIL_DRIVER
    value: smtp
  - name: MAIL_HOST
    value: smtp.example.com
  - name: MAIL_PORT
    value: '587'
  - name: MAIL_USERNAME
    value: replace-with-smtp-username
  - name: MAIL_PASSWORD
    value: replace-with-smtp-password
  - name: MAIL_ENCRYPTION
    value: tls
  - name: MAIL_FROM_ADDRESS
    value: tickets@example.com
  - name: MAIL_FROM_NAME
    value: Attendize
  - name: ADMIN_EMAIL
    value: admin@example.com
  - name: ADMIN_PASSWORD
    value: changeme
  - name: ATTENDIZE_AUTO_SETUP
    value: 'true'
  - name: SESSION_SECURE_COOKIE
    value: 'true'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/public/uploads
    name: '{{KUBERO_APP_NAME}}-uploads'
    size: 5Gi
    storageClass: lite
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 1
  healthcheck:
    enabled: true
    # /login is rate-limited (429) and fails probes that hit it every second;
    # / returns 302 once the app is serving and works for startup/readiness.
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: elestio/attendize-web
    tag: latest
    command:
    - /bin/bash
    - -c
    - "wget -q -O /tmp/kubero-entrypoint.sh \"https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/attendize/kubero-entrypoint.sh\"\
      \nchmod +x /tmp/kubero-entrypoint.sh\nexec /tmp/kubero-entrypoint.sh\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

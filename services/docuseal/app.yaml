apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: docuseal
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open source DocuSign alternative. Create, fill,
      and sign digital documents
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/docuseal/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://www.docuseal.com/packs/static/images/resources/quick-start-1-216aeed1da1db5b3e718.jpg"]'
    kubero.dev/template.source: https://github.com/docusealco/docuseal
    kubero.dev/template.categories: '["work", "security"]'
    kubero.dev/template.title: Docuseal
    kubero.dev/template.website: https://www.docuseal.com/
  labels:
    manager: kubero
spec:
  name: docuseal
  deploymentstrategy: docker
  envVars:
  - name: DATABASE_URL
    value: postgresql://docuseal:docuseal@docuseal-postgresql-rw:5432/docuseal
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: docuseal-data
    size: 2Gi
    storageClass: shared
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: docuseal-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: docuseal
              owner: docuseal
              secret:
                name: docuseal-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO docuseal
              - GRANT CREATE ON SCHEMA public TO docuseal
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO docuseal
          enableSuperuserAccess: true
          superuserSecret:
            name: docuseal-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: docuseal-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: docuseal
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: docuseal-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: docuseal
          password: docuseal
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: docuseal/docuseal
    tag: latest

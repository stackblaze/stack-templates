apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: 'A Bitwarden compatible paswordsafe server written
      in Rust. '
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/vaultwarden/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: 'null'
    kubero.dev/template.source: https://github.com/dani-garcia/vaultwarden
    kubero.dev/template.categories: '["security", "utilities"]'
    kubero.dev/template.title: Vaultwarden
    kubero.dev/template.website: https://github.com/dani-garcia/vaultwarden
  name: vaultwarden
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: vaultwarden-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: vaultwarden
              owner: vaultwarden
              secret:
                name: vaultwarden-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO vaultwarden
              - GRANT CREATE ON SCHEMA public TO vaultwarden
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO vaultwarden
          enableSuperuserAccess: true
          superuserSecret:
            name: vaultwarden-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: vaultwarden-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: vaultwarden
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: vaultwarden-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: vaultwarden
          password: vaultwarden
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DATABASE_URL
    value: postgresql://vaultwarden:vaultwarden@vaultwarden-postgresql-rw:5432/vaultwarden
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: vaultwarden-data
    size: 1Gi
    storageClass: shared
  image:
    containerPort: '80'
    repository: vaultwarden/server
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: vaultwarden
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

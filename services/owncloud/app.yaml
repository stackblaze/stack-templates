apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: owncloud
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: ownCloud is a self-hosted file sync and share
      platform for storing, accessing and collaborating on your files across devices.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/owncloud/icon.png
    kubero.dev/template.installation: The official owncloud/server image initializes
      itself on first boot using the OWNCLOUD_ADMIN_* and OWNCLOUD_DB_* environment
      variables, so no manual setup wizard is needed. It is built and tested against
      MariaDB/MySQL plus Redis (provided here by the mariadb and valkey add-ons).
      Rotate the mariadb add-on credentials and the OWNCLOUD_ADMIN_PASSWORD ('owncloud'
      default) after first login. OWNCLOUD_TRUSTED_DOMAINS / OWNCLOUD_DOMAIN are wired
      to the app host so the instance accepts requests at its public URL; add any
      extra domains there. The valkey add-on is password-less, so OWNCLOUD_REDIS_HOST
      points at rfr-owncloud-valkey-readwrite with no password set. User files, config
      and the SQLite-free data dir live under /mnt/data (persisted by the owncloud-data
      volume). For large instances raise the app pod size and PHP memory limit. An
      external object/S3 store is optional and not required for a base install.
    kubero.dev/template.links: '["https://doc.owncloud.com/server/latest/admin_manual/installation/docker/",
      "https://doc.owncloud.com/server/latest/admin_manual/"]'
    kubero.dev/template.screenshots: '["https://owncloud.com/wp-content/uploads/2020/08/ownCloud-Trademark.png"]'
    kubero.dev/template.source: https://github.com/owncloud/core
    kubero.dev/template.categories: '["storage", "productivity", "collaboration"]'
    kubero.dev/template.title: ownCloud
    kubero.dev/template.website: https://owncloud.com/
  labels:
    manager: kubero
spec:
  name: owncloud
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: owncloud
          username: owncloud
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: owncloud
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: owncloud
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: OWNCLOUD_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: OWNCLOUD_TRUSTED_DOMAINS
    value: '{{KUBERO_APP_HOST}}'
  - name: OWNCLOUD_DB_TYPE
    value: mysql
  - name: OWNCLOUD_DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: OWNCLOUD_DB_NAME
    value: owncloud
  - name: OWNCLOUD_DB_USERNAME
    value: owncloud
  - name: OWNCLOUD_DB_PASSWORD
    value: owncloud
  - name: OWNCLOUD_ADMIN_USERNAME
    value: admin
  - name: OWNCLOUD_ADMIN_PASSWORD
    value: owncloud
  - name: OWNCLOUD_MYSQL_UTF8MB4
    value: 'true'
  - name: OWNCLOUD_REDIS_ENABLED
    value: 'true'
  - name: OWNCLOUD_REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: OWNCLOUD_REDIS_PORT
    value: '6379'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /mnt/data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/owncloud-server
    tag: 10.16.3
    run:
      securityContext:
        readOnlyRootFilesystem: true

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The Open Source Airtable Alternative. Turns any
      MySQL, PostgreSQL, SQL Server, SQLite & MariaDB into a smart-spreadsheet.
    kubero.dev/template.icon: https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@c44450bb24e2439a4c573aeaf2ee793575f02054/services/nocodb/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@c44450bb24e2439a4c573aeaf2ee793575f02054/services/nocodb/demo.mp4", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@c44450bb24e2439a4c573aeaf2ee793575f02054/services/nocodb/dashboard.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@c44450bb24e2439a4c573aeaf2ee793575f02054/services/nocodb/screenshot-customers.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@c44450bb24e2439a4c573aeaf2ee793575f02054/services/nocodb/screenshot-pipeline.png"]'
    kubero.dev/template.source: https://github.com/nocodb/nocodb
    kubero.dev/template.categories: '["data", "development", "work"]'
    kubero.dev/template.title: NocoDB
    kubero.dev/template.website: https://www.nocodb.com
  name: nocodb
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: nocodb
              owner: nocodb
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO nocodb
              - GRANT CREATE ON SCHEMA public TO nocodb
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO nocodb
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: nocodb
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: nocodb
          password: nocodb
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: NODE_OPTIONS
    value: --max-old-space-size=1536
  # NocoDB expects a connection URL in NC_DB (not "pg" + split host vars).
  # Format: pg://host:port?u=user&p=password&d=database
  - name: NC_DB
    value: 'pg://{{KUBERO_APP_NAME}}-postgresql-rw:5432?u=nocodb&p=nocodb&d=nocodb'
  - name: PORT
    value: '8080'
  extraVolumes: []
  image:
    containerPort: '8080'
    repository: registry.stackblaze.cloud/nocodb/nocodb
    run:
      securityContext:
        readOnlyRootFilesystem: false
    tag: latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  name: nocodb
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

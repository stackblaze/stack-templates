apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Calibre-Web is a web app for browsing, reading,
      and downloading eBooks using an existing Calibre database.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/18373368?s=200&v=4
    kubero.dev/template.installation: Default login is admin/admin123 — change the
      password after first login. Mount your Calibre library at /books (must contain
      metadata.db).
    kubero.dev/template.links: '["https://github.com/janeczku/calibre-web/wiki"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/janeczku/calibre-web
    kubero.dev/template.categories: '["media", "utilities"]'
    kubero.dev/template.title: Calibre-Web
    kubero.dev/template.website: https://github.com/janeczku/calibre-web
  labels:
    manager: kubero
  name: calibre-web
spec:
  addons: []
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: PUID
    value: '1000'
  - name: PGID
    value: '1000'
  - name: TZ
    value: Etc/UTC
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /config
    name: calibre-web-config
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /books
    name: calibre-web-books
    size: 1Gi
    storageClass: shared
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8083'
    pullPolicy: Always
    repository: lscr.io/linuxserver/calibre-web
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: calibre-web
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: woocommerce
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: The world's most popular open-source e-commerce
      platform, built as a WordPress plugin to turn any WordPress site into a fully
      featured online store.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/woocommerce/icon.png
    kubero.dev/template.installation: 'WooCommerce is a WordPress plugin, so this
      template runs the official wordpress image (PHP/Apache) and you install WooCommerce
      from inside wp-admin. WordPress requires MySQL/MariaDB (it does not support
      PostgreSQL), so the mariadb add-on is shipped. First run: complete the WordPress
      install wizard, then in wp-admin go to Plugins > Add New, search ''WooCommerce'',
      install + activate, and run the WooCommerce setup wizard (store address, currency,
      payment, shipping). Rotate the MariaDB password and all eight WORDPRESS_AUTH_KEY/SALT
      secrets (openssl rand -base64 64) before production. WP_HOME/WP_SITEURL are
      pinned to the app URL so checkout and admin URLs resolve. Persistent data (wp-content:
      plugins incl. WooCommerce, themes, uploads/product images) lives on the mounted
      volume at /var/www/html. For email (order receipts) configure an SMTP plugin;
      for payments add a gateway plugin (Stripe/PayPal).'
    kubero.dev/template.links: '["https://woocommerce.com/documentation/", "https://hub.docker.com/_/wordpress"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/woocommerce/woocommerce
    kubero.dev/template.categories: '["e-commerce", "cms", "work"]'
    kubero.dev/template.title: WooCommerce
    kubero.dev/template.website: https://woocommerce.com/
  labels:
    manager: kubero
spec:
  name: woocommerce
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mariadb'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mariadb-root'
            key: password
          database: woocommerce
          username: woocommerce
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mariadb-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mariadb-root'
        type: Opaque
        stringData:
          password: woocommerce
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mariadb-app'
        type: Opaque
        stringData:
          password: woocommerce
  envVars:
  - name: WORDPRESS_DB_HOST
    value: '{{KUBERO_APP_NAME}}-mariadb'
  - name: WORDPRESS_DB_NAME
    value: woocommerce
  - name: WORDPRESS_DB_USER
    value: woocommerce
  - name: WORDPRESS_DB_PASSWORD
    value: woocommerce
  - name: WORDPRESS_TABLE_PREFIX
    value: wp_
  - name: WORDPRESS_CONFIG_EXTRA
    value: define('WP_HOME', '{{KUBERO_APP_URL}}'); define('WP_SITEURL', '{{KUBERO_APP_URL}}');
  - name: WORDPRESS_AUTH_KEY
    value: replace-with-openssl-rand-base64-64
  - name: WORDPRESS_SECURE_AUTH_KEY
    value: replace-with-openssl-rand-base64-64
  - name: WORDPRESS_LOGGED_IN_KEY
    value: replace-with-openssl-rand-base64-64
  - name: WORDPRESS_NONCE_KEY
    value: replace-with-openssl-rand-base64-64
  - name: WORDPRESS_AUTH_SALT
    value: replace-with-openssl-rand-base64-64
  - name: WORDPRESS_SECURE_AUTH_SALT
    value: replace-with-openssl-rand-base64-64
  - name: WORDPRESS_LOGGED_IN_SALT
    value: replace-with-openssl-rand-base64-64
  - name: WORDPRESS_NONCE_SALT
    value: replace-with-openssl-rand-base64-64
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/wp-content
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    repository: ghcr.io/stackblaze/stack-templates/wordpress
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true

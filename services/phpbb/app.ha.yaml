apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: phpbb
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: phpBB is a free, open-source flat-forum bulletin
      board software for building and running an online community discussion board.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/phpbb/icon.png
    kubero.dev/template.installation: Uses the makunz/phpbb image (community continuation
      of the discontinued Bitnami image), which bundles Apache + PHP and only supports
      MariaDB/MySQL (phpBB does support PostgreSQL upstream, but this image does not),
      so the mariadb add-on is shipped. On first boot the container runs the phpBB
      installer non-interactively against the MariaDB add-on, creating the admin account
      from PHPBB_USERNAME / PHPBB_PASSWORD / PHPBB_EMAIL. ROTATE the admin password
      (PHPBB_PASSWORD, currently a placeholder) and the mariadb add-on credentials
      (db/user/password all default to 'phpbb') before going to production, then log
      in at /adm to harden settings. PHPBB_HOST is wired to the public host via {{KUBERO_APP_HOST}}
      so generated links use the live URL. Persistent data (config, uploads/attachments,
      avatars, cache) lives under /bitnami/phpbb on the mounted volume. Configure
      SMTP via the board's ACP or PHPBB_SMTP_* env vars for outbound email. ALLOW_EMPTY_PASSWORD
      is disabled.
    kubero.dev/template.links: '["https://www.phpbb.com/support/docs/en/3.3/ug/",
      "https://github.com/bitnami/containers/tree/main/bitnami/phpbb"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/phpbb/phpbb
    kubero.dev/template.categories: '["communication", "collaboration", "social"]'
    kubero.dev/template.title: phpBB
    kubero.dev/template.website: https://www.phpbb.com/
  labels:
    manager: kubero
spec:
  name: phpbb
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: phpbb-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: phpbb-mysql-root
            key: password
          database: phpbb
          username: phpbb
          passwordSecretKeyRef:
            name: phpbb-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: phpbb-mysql-root
        type: Opaque
        stringData:
          password: phpbb
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: phpbb-mysql-app
        type: Opaque
        stringData:
          password: phpbb
  envVars:
  - name: PHPBB_DATABASE_HOST
    value: phpbb-mysql
  - name: PHPBB_DATABASE_PORT_NUMBER
    value: '3306'
  - name: PHPBB_DATABASE_NAME
    value: phpbb
  - name: PHPBB_DATABASE_USER
    value: phpbb
  - name: PHPBB_DATABASE_PASSWORD
    value: phpbb
  - name: PHPBB_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: PHPBB_USERNAME
    value: admin
  - name: PHPBB_PASSWORD
    value: replace-with-openssl-rand-hex-32
  - name: PHPBB_EMAIL
    value: admin@example.com
  - name: ALLOW_EMPTY_PASSWORD
    value: 'no'
  - name: BITNAMI_DEBUG
    value: 'false'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /bitnami/phpbb
    name: phpbb-data
    size: 3Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/phpbb
    tag: 3.3.15
    run:
      securityContext:
        readOnlyRootFilesystem: false

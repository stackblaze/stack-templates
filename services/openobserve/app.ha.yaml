apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: openobserve
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Rust-based, petabyte-scale observability platform
      for logs, metrics, traces and real user monitoring; a lightweight Elasticsearch/Datadog
      alternative.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/openobserve/icon.png
    kubero.dev/template.installation: Metadata is stored in the bundled PostgreSQL
      add-on; ingest data persists under /data. Set ZO_ROOT_USER_EMAIL and ZO_ROOT_USER_PASSWORD
      before first login.
    kubero.dev/template.links: '["https://openobserve.ai/docs/quickstart/", "https://openobserve.ai/docs/environment-variables/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/openobserve/openobserve
    kubero.dev/template.categories: '["monitoring", "data", "utilities"]'
    kubero.dev/template.title: OpenObserve
    kubero.dev/template.website: https://openobserve.ai
  labels:
    manager: kubero
spec:
  name: openobserve
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: openobserve-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: openobserve
              owner: openobserve
              secret:
                name: openobserve-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO openobserve
              - GRANT CREATE ON SCHEMA public TO openobserve
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO openobserve
          enableSuperuserAccess: true
          superuserSecret:
            name: openobserve-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: openobserve-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: openobserve
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: openobserve-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: openobserve
          password: openobserve
  envVars:
  - name: ZO_ROOT_USER_EMAIL
    value: admin@example.com
  - name: ZO_ROOT_USER_PASSWORD
    value: ChangeMe#123
  - name: ZO_HTTP_PORT
    value: '5080'
  - name: ZO_LOCAL_MODE
    value: 'true'
  - name: ZO_LOCAL_MODE_STORAGE
    value: disk
  - name: ZO_DATA_DIR
    value: /data
  - name: ZO_TELEMETRY
    value: 'false'
  - name: ZO_WEB_URL
    value: '{{KUBERO_APP_URL}}'
  - name: ZO_META_STORE
    value: postgres
  - name: ZO_META_POSTGRES_DSN
    value: postgresql://openobserve:openobserve@openobserve-postgresql-rw:5432/openobserve
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: openobserve-data
    size: 5Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '5080'
    pullPolicy: Always
    repository: public.ecr.aws/zinclabs/openobserve
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

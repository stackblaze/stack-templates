apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: psono
  annotations:
    kubero.dev/template.architecture: '["amd64"]'
    kubero.dev/template.description: "Psono is an open-source, self-hosted password\
      \ manager for teams \u2014 end-to-end encrypted secret storage with sharing,\
      \ an admin portal and a REST API."
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/29746989?s=200&v=4
    kubero.dev/template.installation: "The six server keys are generated uniquely\
      \ per deploy by kubero and persisted (they never change for the life of the\
      \ instance) \u2014 no manual setup. The web client is served at /, the admin\
      \ portal at /portal and the server API at /server; create the first admin account\
      \ via the registration flow. The optional file-repository (large file storage)\
      \ needs a separate psono-fileserver deployment."
    kubero.dev/template.links: '["https://doc.psono.com/"]'
    kubero.dev/template.screenshots: '["https://psono.com/static/img/section-3.png"]'
    kubero.dev/template.source: https://gitlab.com/psono/psono-combo
    kubero.dev/template.categories: '["security", "work"]'
    kubero.dev/template.title: Psono
    kubero.dev/template.website: https://psono.com/
  labels:
    manager: kubero
spec:
  name: psono
  deploymentstrategy: docker
  envVars:
  - name: PSONO_HOST_URL
    value: '{{KUBERO_APP_URL}}/server'
  - name: PSONO_ALLOWED_HOSTS
    value: '*'
  - name: PSONO_DATABASE_URL
    value: postgres://psono:psono@{{KUBERO_APP_NAME}}-postgresql-rw:5432/psono
  - name: PSONO_SECRET_KEY
    value: '{{KUBERO_GEN_ALNUM:64}}'
  - name: PSONO_ACTIVATION_LINK_SECRET
    value: '{{KUBERO_GEN_ALNUM:64}}'
  - name: PSONO_DB_SECRET
    value: '{{KUBERO_GEN_ALNUM:64}}'
  - name: PSONO_EMAIL_SECRET_SALT
    value: '{{KUBERO_GEN_BCRYPT_SALT}}'
  - name: PSONO_PRIVATE_KEY
    value: '{{KUBERO_GEN_X25519_SK}}'
  - name: PSONO_PUBLIC_KEY
    value: '{{KUBERO_GEN_X25519_PK}}'
  extraVolumes: []
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: psono
              owner: psono
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: psono
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: psono
          password: psono
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    # psono (daphne) serves no route at "/" (404) — the REST API is under
    # /server. /server/info/ is a public, no-auth endpoint that returns 200.
    path: /server/info/
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: 8000
    pullPolicy: Always
    repository: registry.stackblaze.cloud/psono/psono-combo
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

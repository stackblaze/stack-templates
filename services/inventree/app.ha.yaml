apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: inventree
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source inventory management and stock-control
      system for parts, suppliers, builds and orders, with a REST API and barcode
      support.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/inventree/icon.png
    kubero.dev/template.installation: 'InvenTree is a multi-container Django stack.
      This template runs the PRIMARY web/server image ''inventree/inventree:stable''
      (gunicorn on :8000), wired to Postgres and Valkey (Redis cache). You MUST also
      deploy these companion services from the SAME ''inventree/inventree:stable''
      image: (1) WORKER - the django-q background task processor, started with command
      [''invoke'',''worker''] (or the bundled ''worker'' entrypoint); it shares the
      same env vars and data volume. (2) PROXY - a Caddy reverse proxy/static-file
      server (image ''caddy:2-alpine'') that fronts the server and serves /static
      and /media from the shared data volume; in Kubero the ingress already handles
      TLS, so the Caddy proxy is optional if you point ingress at this app directly,
      but static/media files must still be served. The server entrypoint auto-runs
      DB migrations and collectstatic on boot. ROTATE before going live: INVENTREE_SECRET_KEY
      (run ''openssl rand -hex 32'') and the Postgres password. After first boot,
      create the admin/superuser via ''invoke superuser'' in the server pod (or set
      INVENTREE_ADMIN_USER / INVENTREE_ADMIN_PASSWORD / INVENTREE_ADMIN_EMAIL env
      vars for auto-creation), then log in at the URL. INVENTREE_SITE_URL is set to
      the public URL; keep INVENTREE_ALLOWED_HOSTS / INVENTREE_TRUSTED_ORIGINS in
      sync if you change the hostname. Email (INVENTREE_EMAIL_*) is optional but needed
      for notifications and password resets.'
    kubero.dev/template.links: '["https://docs.inventree.org/en/stable/start/docker/",
      "https://docs.inventree.org/en/stable/start/config/"]'
    kubero.dev/template.screenshots: '["https://docs.inventree.org/en/stable/assets/images/index_dashboard.png"]'
    kubero.dev/template.source: https://github.com/inventree/InvenTree
    kubero.dev/template.categories: '["erp", "work", "productivity"]'
    kubero.dev/template.title: InvenTree
    kubero.dev/template.website: https://inventree.org
  labels:
    manager: kubero
spec:
  name: inventree
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: inventree-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: inventree
              owner: inventree
              secret:
                name: inventree-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: inventree-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: inventree-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: inventree
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: inventree-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: inventree
          password: inventree
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: inventree-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: INVENTREE_SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  - name: INVENTREE_SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: INVENTREE_ALLOWED_HOSTS
    value: '*'
  - name: INVENTREE_TRUSTED_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: INVENTREE_USE_X_FORWARDED_HOST
    value: 'True'
  - name: INVENTREE_USE_X_FORWARDED_PORT
    value: 'True'
  - name: INVENTREE_USE_X_FORWARDED_PROTO
    value: 'True'
  - name: INVENTREE_DEBUG
    value: 'False'
  - name: INVENTREE_DB_ENGINE
    value: postgresql
  - name: INVENTREE_DB_NAME
    value: inventree
  - name: INVENTREE_DB_USER
    value: inventree
  - name: INVENTREE_DB_PASSWORD
    value: inventree
  - name: INVENTREE_DB_HOST
    value: inventree-postgresql-rw
  - name: INVENTREE_DB_PORT
    value: '5432'
  - name: INVENTREE_CACHE_ENABLED
    value: 'True'
  - name: INVENTREE_CACHE_HOST
    value: rfr-inventree-valkey-readwrite
  - name: INVENTREE_CACHE_PORT
    value: '6379'
  - name: INVENTREE_EXT_VOLUME
    value: /home/inventree/data
  - name: INVENTREE_AUTO_UPDATE
    value: 'True'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /home/inventree/data
    name: inventree-data
    size: 5Gi
    storageClass: slow
  cronjobs: []
  healthcheck:
    enabled: true
    path: /api/system/health/
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: inventree/inventree
    tag: stable

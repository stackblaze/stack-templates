apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: preview-demo
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: |
      Minimal Node.js git app with PostgreSQL — purpose-built to test Stackblaze preview environments.
      Deploy, enable Preview environments (Auto), open a PR, and verify the app + Postgres addon are cloned per PR with env vars rebound.
    kubero.dev/template.icon: "https://avatars.githubusercontent.com/u/958072?s=200&v=4"
    kubero.dev/template.installation: |
      1. Deploy this template to a pipeline (git repo: `stackblaze-adam/preview-demo` or your fork).
      2. Pipeline **Settings → Preview environments** → **Auto — clone every matching app**.
      3. Optional: set **Seed SQL path** to `.kubero/preview-seed.sql` on the pipeline preview config.
      4. Open a PR on the repo → expect `pr-<n>-preview-demo` and a cloned Postgres (`preview-demo-postgresql-pr-<n>`).
      5. Hit the preview URL `/` and confirm `STACKBLAZE_PREVIEW=true` and `visitCount` in the JSON response.

      First boot waits for the Postgres addon to become Ready (1–3 min). App listens on port **8080**.
    kubero.dev/template.links: '["https://github.com/stackblaze-adam/preview-demo"]'
    kubero.dev/template.screenshots: "[]"
    kubero.dev/template.source: "https://github.com/stackblaze-adam/preview-demo"
    kubero.dev/template.categories: '["development", "testing"]'
    kubero.dev/template.title: "Preview demo (git + Postgres)"
    kubero.dev/template.website: "https://github.com/stackblaze-adam/preview-demo"
  labels:
    manager: kubero
spec:
  name: preview-demo
  deploymentstrategy: git
  buildstrategy: nixpacks
  buildpack: nodejs
  gitrepo:
    ssh_url: git@github.com:stackblaze-adam/preview-demo.git
    clone_url: https://github.com/stackblaze-adam/preview-demo.git
    default_branch: main
    private: false
    admin: false
  envVars:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "8080"
    - name: DATABASE_URL
      value: postgres://preview:preview@{{KUBERO_APP_NAME}}-postgresql:5432/preview
  extraVolumes: []
  cronjobs: []
  addons:
    - displayName: PostgreSQL
      env: []
      icon: /img/addons/pgsql.svg
      id: kubero-operator
      kind: KuberoPostgresql
      resourceDefinitions:
        KuberoPostgresql:
          apiVersion: application.kubero.dev/v1alpha1
          kind: KuberoPostgresql
          metadata:
            name: "{{KUBERO_APP_NAME}}-postgresql"
          spec:
            postgresql:
              global:
                postgresql:
                  auth:
                    database: preview
                    password: preview
                    postgresPassword: preview
                    username: preview
              primary:
                persistence:
                  size: 1Gi
      version:
        latest: 0.1.5
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: "8080"
    pullPolicy: Always
    repository: ghcr.io/kubero-dev/idler
    tag: v1
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 120
    timeoutSeconds: 5
    periodSeconds: 10

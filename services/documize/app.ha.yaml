apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: documize
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source modern document and knowledge management
      platform combining wiki, docs and structured templates for teams.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/documize/icon.png
    kubero.dev/template.installation: 'Documize ships as a single Linux binary (no
      official Docker image). This template uses debian:bookworm-slim and downloads
      the Community+ release from downloads.documize.com on first start (same approach
      as the upstream docker-compose.yaml). Deploy with the bundled PostgreSQL add-on;
      DOCUMIZEDB and DOCUMIZEDBTYPE=postgresql point Documize at the ''documize-postgresql-rw''
      service (rotate the Postgres add-on password and update DOCUMIZEDB after install).
      DOCUMIZELOCATION is set to ''selfhost''. IMPORTANT: replace DOCUMIZESALT with
      a unique random string (e.g. openssl rand -hex 16) before production. All documents
      and uploads live in Postgres, so no app volume is required. On first boot open
      the app URL to run the setup wizard and create the initial admin account.'
    kubero.dev/template.links: '["https://docs.documize.com/", "https://github.com/documize/community/blob/master/docker-compose.yaml"]'
    kubero.dev/template.screenshots: '["https://github.com/documize/community/blob/master/screenshot.png?raw=true"]'
    kubero.dev/template.source: https://github.com/documize/community
    kubero.dev/template.categories: '["documentation", "collaboration", "productivity"]'
    kubero.dev/template.title: Documize
    kubero.dev/template.website: https://www.documize.com/
  labels:
    manager: kubero
spec:
  name: documize
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: documize
              owner: documize
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO documize
              - GRANT CREATE ON SCHEMA public TO documize
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO documize
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: documize
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: documize
          password: documize
  envVars:
  - name: DOCUMIZEPORT
    value: '5001'
  - name: DOCUMIZEDB
    value: host=documize-postgresql-rw port=5432 dbname=documize user=documize password=documize
      sslmode=disable
  - name: DOCUMIZEDBTYPE
    value: postgresql
  - name: DOCUMIZESALT
    value: replace-with-openssl-rand-hex-16
  - name: DOCUMIZELOCATION
    value: selfhost
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '5001'
    pullPolicy: Always
    repository: public.ecr.aws/docker/library/debian
    tag: bookworm-slim
    command:
    - /bin/bash
    - -ec
    - 'apt-get -qq update && apt-get -qq install -y wget ca-certificates

      DB_HOST="${DOCUMIZEDB#*host=}"; DB_HOST="${DB_HOST%% *}"

      until (echo >/dev/tcp/"${DB_HOST}"/5432) 2>/dev/null; do sleep 2; done

      wget -q https://downloads.documize.com/documize-community-plus-linux-amd64 -O
      /tmp/documize

      chmod +x /tmp/documize

      exec /tmp/documize

      '
    run:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        readOnlyRootFilesystem: false

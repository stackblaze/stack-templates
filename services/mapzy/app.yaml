apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: mapzy
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free, simple, open-source and self-hostable store finder / store locator you can embed
      on any website.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/119911711?s=200&v=4
    kubero.dev/template.installation: Rails (Puma) app backed by PostgreSQL only; no Redis required. Rotate SECRET_KEY_BASE
      (generate with `openssl rand -hex 64`, must be a long alphanumeric string) and the postgres credentials before going
      to production. MAPBOX_ACCESS_TOKEN is REQUIRED for map tiles - sign up at mapbox.com and paste your token (Mapbox is
      an external third-party service, not bundled). On first boot set INIT_USER_EMAIL / INIT_USER_PASSWORD to seed an admin
      account, or set ALLOW_REGISTRATION=true to self-register. MISSION_CONTROL_USERNAME / _PASSWORD protect the background-jobs
      dashboard - rotate them. Set RAILS_SERVE_STATIC_FILES=true so assets are served by the container.
    kubero.dev/template.links: '["https://github.com/mapzy/mapzy/blob/main/SELFHOSTING.md"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/mapzy/mapzy
    kubero.dev/template.categories: '["utilities", "productivity", "media"]'
    kubero.dev/template.title: Mapzy
    kubero.dev/template.website: https://mapzy.io
  labels:
    manager: kubero
spec:
  name: mapzy
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: mapzy-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: mapzy
              owner: mapzy
              secret:
                name: mapzy-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: mapzy-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: mapzy-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: mapzy
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: mapzy-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: mapzy
          password: mapzy
  envVars:
  - name: DATABASE_URL
    value: postgresql://mapzy:mapzy@mapzy-postgresql-rw:5432/mapzy
  - name: SECRET_KEY_BASE
    value: replace-with-openssl-rand-hex-64
  - name: RAILS_ENV
    value: production
  - name: RAILS_SERVE_STATIC_FILES
    value: 'true'
  - name: RAILS_LOG_TO_STDOUT
    value: 'true'
  - name: PORT
    value: '3000'
  - name: ALLOW_REGISTRATION
    value: 'false'
  - name: MAPBOX_ACCESS_TOKEN
    value: replace-with-your-mapbox-access-token
  - name: MISSION_CONTROL_USERNAME
    value: mapzy
  - name: MISSION_CONTROL_PASSWORD
    value: replace-with-openssl-rand-hex-32
  - name: INIT_USER_EMAIL
    value: admin@example.com
  - name: INIT_USER_PASSWORD
    value: replace-with-openssl-rand-hex-16
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /rails/storage
    name: mapzy-data
    size: 2Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: mapzy/mapzy
    tag: latest

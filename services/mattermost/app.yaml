apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: mattermost
  annotations:
    kubero.dev/template.architecture: '["arm64", "amd64"]'
    kubero.dev/template.description: "Mattermost is an open-source, self-hosted collaboration\
      \ platform for messaging, file sharing and ChatOps \u2014 an alternative to\
      \ Slack."
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mattermost/icon.png
    kubero.dev/template.installation: Ships the MIT-licensed Team Edition. Set MM_SERVICESETTINGS_SITEURL
      to your public URL before going live, then create the initial admin at
      /signup_user_complete on first visit.
    kubero.dev/template.links: '["https://docs.mattermost.com/"]'
    kubero.dev/template.screenshots: '["https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/mattermost/demo.mp4","https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mattermost/dashboard.png","https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mattermost/screenshot-town-square.png","https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mattermost/screenshot-engineering.png","https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mattermost/screenshot-product-launch.png","https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mattermost/screenshot-releases.png","https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mattermost/screenshot-customer-success.png"]'
    kubero.dev/template.source: https://github.com/mattermost/mattermost
    kubero.dev/template.categories: '["communication", "work"]'
    kubero.dev/template.title: Mattermost
    kubero.dev/template.website: https://mattermost.com/
  labels:
    manager: kubero
spec:
  name: mattermost
  deploymentstrategy: docker
  envVars:
  - name: MM_SERVICESETTINGS_SITEURL
    value: '{{KUBERO_APP_URL}}'
  - name: MM_SQLSETTINGS_DRIVERNAME
    value: postgres
  - name: MM_SQLSETTINGS_DATASOURCE
    value: postgres://mattermost:mattermost@{{KUBERO_APP_NAME}}-postgresql-rw:5432/mattermost?sslmode=disable&connect_timeout=10
  - name: TZ
    value: Etc/UTC
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    storageClass: lite
    emptyDir: false
    mountPath: /mattermost/data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: mattermost
              owner: mattermost
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: mattermost
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: mattermost
          password: mattermost
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8065'
    pullPolicy: IfNotPresent
    repository: mattermost/mattermost-team-edition
    # Pinned, NOT :latest. Modern Mattermost images are shell-less (no /bin/bash,
    # /bin/sh, wget) — a floating :latest pulled fresh on a node/cluster rebuild
    # breaks any command override, and the `sh -c` tmp-perms init too. Use the
    # image's DEFAULT entrypoint (the mattermost binary) + config via MM_* env.
    tag: '10.5'
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: taiga
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source agile project management platform
      with Scrum and Kanban boards, backlogs, sprints, and issue tracking.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/taiga/icon.png
    kubero.dev/template.installation: 'This template deploys taiga-back (the Django
      API server) ONLY. Taiga is a multi-container stack and is NOT functional without
      its companion services, which must be deployed separately as their own apps/sidecars:
      (1) taiga-async = same image taigaio/taiga-back:latest with command celery worker
      (the background task/Celery worker, shares POSTGRES_* + RABBITMQ + TAIGA_SECRET_KEY);
      (2) taiga-front = taigaio/taiga-front:latest (the web UI, served on port 80);
      (3) taiga-events = taigaio/taiga-events:latest (websocket push server, needs
      its own RabbitMQ broker + the same TAIGA_SECRET_KEY); (4) taiga-protected =
      taigaio/taiga-protected:latest (signed-URL attachment proxy, needs TAIGA_SECRET_KEY);
      (5) taiga-gateway = nginx:1.19-alpine routing front/back/events/protected on
      port 9000 (the real public entrypoint). This template provisions the shared
      postgres and rabbitmq add-ons that taiga-back, taiga-async, and taiga-events
      all connect to. ROTATE: TAIGA_SECRET_KEY (set to replace-with-openssl-rand-hex-32
      here; generate with `openssl rand -hex 32` and use the SAME value across back/async/events/protected),
      the postgres password, and the RABBITMQ_PASS. FIRST RUN: exec into taiga-back
      and run `python manage.py migrate` then `python manage.py loaddata initial_project_templates`
      and create a superuser with `python manage.py createsuperuser`. Note EVENTS_PUSH_BACKEND_URL
      and CELERY_BROKER_URL point at the rabbitmq add-on (amqp://taiga:taiga@taiga-rabbitmq:5672).'
    kubero.dev/template.links: '["https://docs.taiga.io/setup-production.html", "https://github.com/taigaio/taiga-docker"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/taigaio/taiga-back
    kubero.dev/template.categories: '["work", "productivity", "collaboration"]'
    kubero.dev/template.title: Taiga
    kubero.dev/template.website: https://www.taiga.io
  labels:
    manager: kubero
spec:
  name: taiga
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: taiga-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: taiga
              owner: taiga
              secret:
                name: taiga-postgresql-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO taiga
              - GRANT CREATE ON SCHEMA public TO taiga
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO taiga
          enableSuperuserAccess: true
          superuserSecret:
            name: taiga-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: taiga-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: taiga
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: taiga-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: taiga
          password: taiga
  - displayName: RabbitMQ
    env: []
    icon: /img/addons/rabbitmq.svg
    id: kubero-operator
    kind: RabbitmqCluster
    resourceDefinitions:
      RabbitmqCluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: taiga-rabbitmq
        spec:
          replicas: 3
          persistence:
            storageClassName: fast
            storage: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          rabbitmq:
            additionalConfig: 'default_user = taiga

              default_pass = taiga

              '
  envVars:
  - name: POSTGRES_HOST
    value: taiga-postgresql-rw
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_DB
    value: taiga
  - name: POSTGRES_USER
    value: taiga
  - name: POSTGRES_PASSWORD
    value: taiga
  - name: TAIGA_SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  - name: TAIGA_SITES_SCHEME
    value: https
  - name: TAIGA_SITES_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: TAIGA_SUBPATH
    value: ''
  - name: RABBITMQ_USER
    value: taiga
  - name: RABBITMQ_PASS
    value: taiga
  - name: CELERY_ENABLED
    value: 'True'
  - name: CELERY_BROKER_URL
    value: amqp://taiga:taiga@taiga-rabbitmq:5672
  - name: EVENTS_PUSH_BACKEND
    value: taiga.events.backends.rabbitmq.EventsPushBackend
  - name: EVENTS_PUSH_BACKEND_URL
    value: amqp://taiga:taiga@taiga-rabbitmq:5672
  - name: ENABLE_TELEMETRY
    value: 'False'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /taiga-back/media
    name: taiga-media
    size: 5Gi
    storageClass: shared
  cronjobs: []
  healthcheck:
    enabled: true
    path: /api/v1/
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/taiga-back
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

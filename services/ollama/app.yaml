apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: ollama
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Run large language models locally — Llama 3,
      Mistral, Gemma, Phi, and 100+ models via a simple OpenAI-compatible REST API.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/ollama/icon.png
    kubero.dev/template.installation: 'Ollama runs a local LLM inference server. After
      deploy, pull a model: POST /api/pull with {"model":"llama3.2"}. Then chat at
      POST /api/chat or use the OpenAI-compatible endpoint at /v1. GPU is unavailable
      on CPU nodes — use quantised models (llama3.2:3b, phi3:mini) for acceptable
      speed. Increase the volume before pulling large models (7B ~4GB, 70B ~40GB).
      Pair with Open WebUI for a browser chat interface.'
    kubero.dev/template.links: '["https://github.com/ollama/ollama", "https://ollama.com/library"]'
    kubero.dev/template.screenshots: '["https://ollama.com/public/og.png"]'
    kubero.dev/template.source: https://github.com/ollama/ollama
    kubero.dev/template.categories: '["ai", "utilities", "development"]'
    kubero.dev/template.title: Ollama
    kubero.dev/template.website: https://ollama.com
  labels:
    manager: kubero
spec:
  name: ollama
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: OLLAMA_HOST
    value: 0.0.0.0
  - name: OLLAMA_ORIGINS
    value: '*'
  - name: OLLAMA_KEEP_ALIVE
    value: 5m
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /root/.ollama
    name: ollama-models
    size: 20Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '4'
      memory: 8Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 60
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '11434'
    pullPolicy: Always
    repository: ollama/ollama
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true

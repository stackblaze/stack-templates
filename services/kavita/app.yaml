apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Kavita is a fast, feature-rich cross-platform reading
      server for manga, comics, and books with OPDS support.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/75163075?s=200&v=4
    kubero.dev/template.installation: Complete the setup wizard on first login to create
      your admin account.
    kubero.dev/template.links: '["https://wiki.kavitareader.com/"]'
    kubero.dev/template.screenshots: '["https://www.kavitareader.com/img/hero.png"]'
    kubero.dev/template.source: https://github.com/Kareadita/Kavita
    kubero.dev/template.categories: '["media", "utilities"]'
    kubero.dev/template.title: Kavita
    kubero.dev/template.website: https://www.kavitareader.com/
  labels:
    manager: kubero
  name: kavita
spec:
  addons: []
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: TZ
    value: Etc/UTC
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /kavita/config
    name: kavita-config
    size: 1Gi
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /data
    name: kavita-library
    size: 1Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '5000'
    pullPolicy: Always
    repository: ghcr.io/kareadita/kavita
    tag: latest
  name: kavita
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

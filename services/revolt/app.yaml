apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: revolt
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: 'Open-source, self-hostable Discord alternative:
      a real-time chat platform with servers, channels, DMs, voice and file sharing
      (now branded Stoat).'
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/revolt/icon.png
    kubero.dev/template.installation: 'PLATFORM NOTE: Revolt requires real MongoDB
      features (capped collections, collation indexes) that Stackblaze DocumentDB
      and FerretDB do not fully provide — this template is marked unsupported until
      native MongoDB is available; API-only deploy may still fail at DB init. This
      template runs ONLY the PRIMARY Revolt
      backend API (the Rust ''delta'' monolith, image ghcr.io/stoatchat/api, HTTP
      port 8000). Revolt (recently rebranded ''Stoat'') is a MULTI-CONTAINER microservice
      stack; the API alone is not a usable deployment - you MUST deploy the companion
      services below pointing at the SAME datastores, and supply a shared Revolt.toml
      config file. CONFIG: Revolt is configured PRIMARILY via a Revolt.toml file bind-mounted
      at /Revolt.toml (mounted here at the persistent /config volume - drop your Revolt.toml
      there or mount it at the root); the env vars below override the database/redis/rabbit
      connection URLs that Revolt.toml otherwise carries. In Revolt.toml set hosts.app
      to your public https URL ({{KUBERO_APP_URL}}), generate the auth/file/voice
      secrets, and configure the S3/MinIO file backend. ROTATE: the FerretDB postgresql.auth
      password, and ALL secrets in Revolt.toml (api keys, auth pepper, file-server
      token, vapid/push keys, livekit keys) - the defaults are placeholders. ADD-ONS
      PROVISIONED HERE: ferretdb (MongoDB-wire-compatible - Revolt''s primary datastore;
      prefer external real MongoDB if available),
      valkey (Redis/KeyDB-compatible cache + pub/sub), and rabbitmq (push-notification
      + cross-service message queue). EXTERNAL SERVICE NOT PROVISIONED: Revolt requires
      an S3-compatible object store for ALL uploaded files/avatars/attachments (upstream
      ships MinIO image minio/minio) - deploy the RustFS/MinIO S3 add-on and point
      autumn at it via Revolt.toml [files] s3 settings; the local /config volume does
      NOT hold attachments. COMPANION SERVICES to deploy (all ghcr.io/stoatchat, pin
      to the same tag e.g. v0.13.6, all share Revolt.toml + the same Mongo/Redis/Rabbit/S3):
      events (websocket gateway, ghcr.io/stoatchat/events), autumn (file server, ghcr.io/stoatchat/file-server),
      january (link/media proxy, ghcr.io/stoatchat/proxy), crond (scheduled tasks,
      ghcr.io/stoatchat/crond), pushd (push-notification worker / rabbit consumer,
      ghcr.io/stoatchat/pushd), web (frontend client, ghcr.io/stoatchat/for-web),
      and a reverse proxy (caddy) to route the public domain to web/api/events/autumn.
      Voice is optional via voice-ingress + livekit (ghcr.io/stoatchat/livekit-server).
      FIRST-RUN: bring up Mongo/Redis/Rabbit and S3, then the api + companion services;
      open the web client, create the first account, and configure the instance.'
    kubero.dev/template.links: '["https://github.com/revoltchat/self-hosted", "https://developers.revolt.chat/"]'
    kubero.dev/template.screenshots: '["https://revolt.chat/static/img/hero.png"]'
    kubero.dev/template.source: https://github.com/revoltchat/self-hosted
    kubero.dev/template.categories: '["communication", "collaboration", "social"]'
    kubero.dev/template.title: Revolt
    kubero.dev/template.website: https://revolt.chat
  labels:
    manager: kubero
spec:
  name: revolt
  deploymentstrategy: docker
  addons:
  - displayName: FerretDB
    env: []
    icon: /img/addons/ferretdb.svg
    id: kubero-operator
    kind: KuberoFerretDB
    resourceDefinitions:
      KuberoFerretDB:
        apiVersion: application.kubero.dev/v1alpha1
        kind: KuberoFerretDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-ferretdb'
        spec:
          ferretdb:
            image:
              tag: '2.7.0'
            replicaCount: 1
          postgresql:
            image:
              tag: '17-0.107.0-ferretdb-2.7.0'
            auth:
              username: ferretdb
              password: changeme
              database: postgres
            persistence:
              enabled: true
              size: 1Gi
              storageClass: smart
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  - displayName: RabbitMQ
    env: []
    icon: /img/addons/rabbitmq.svg
    id: kubero-operator
    kind: RabbitmqCluster
    resourceDefinitions:
      RabbitmqCluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-rabbitmq'
        spec:
          replicas: 1
          persistence:
            storageClassName: fast
            storage: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          rabbitmq:
            additionalConfig: 'default_user = revolt

              default_pass = revolt

              '
  envVars:
  - name: REVOLT__DATABASE__MONGODB
    value: mongodb://ferretdb:changeme@{{KUBERO_APP_NAME}}-ferretdb-kuberoferretdb:27017/revolt
  - name: REVOLT__DATABASE__REDIS
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/
  - name: REVOLT__RABBIT__HOST
    value: '{{KUBERO_APP_NAME}}-rabbitmq'
  - name: REVOLT__RABBIT__PORT
    value: '5672'
  - name: REVOLT__RABBIT__USERNAME
    value: revolt
  - name: REVOLT__RABBIT__PASSWORD
    value: revolt
  - name: REVOLT__HOSTS__APP
    value: '{{KUBERO_APP_URL}}'
  - name: REVOLT__HOSTS__API
    value: '{{KUBERO_APP_URL}}/api'
  - name: REVOLT__HOSTS__EVENTS
    value: '{{KUBERO_APP_URL}}/ws'
  - name: ROCKET_PORT
    value: '8000'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 1Gi
    storageClass: lite
  cronjobs: []
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/stoatchat/api
    tag: v0.13.6
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: revolt
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: 'Open-source, self-hostable Discord alternative: a real-time chat platform with servers,
      channels, DMs, voice and file sharing (now branded Stoat).'
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/revolt/icon.png
    kubero.dev/template.installation: 'This template runs ONLY the PRIMARY Revolt backend API (the Rust ''delta'' monolith,
      image ghcr.io/stoatchat/api, HTTP port 8000). Revolt (recently rebranded ''Stoat'') is a MULTI-CONTAINER microservice
      stack; the API alone is not a usable deployment - you MUST deploy the companion services below pointing at the SAME
      datastores, and supply a shared Revolt.toml config file. CONFIG: Revolt is configured PRIMARILY via a Revolt.toml file
      bind-mounted at /Revolt.toml (mounted here at the persistent /config volume - drop your Revolt.toml there or mount it
      at the root); the env vars below override the database/redis/rabbit connection URLs that Revolt.toml otherwise carries.
      In Revolt.toml set hosts.app to your public https URL ({{KUBERO_APP_URL}}), generate the auth/file/voice secrets, and
      configure the S3/MinIO file backend. ROTATE: the documentdb mongoadmin password, and ALL secrets in Revolt.toml (api
      keys, auth pepper, file-server token, vapid/push keys, livekit keys) - the defaults are placeholders. ADD-ONS PROVISIONED
      HERE: documentdb (MongoDB-compatible - Revolt''s primary datastore), valkey (Redis/KeyDB-compatible cache + pub/sub),
      and rabbitmq (push-notification + cross-service message queue). EXTERNAL SERVICE NOT PROVISIONED: Revolt requires an
      S3-compatible object store for ALL uploaded files/avatars/attachments (upstream ships MinIO image minio/minio) - deploy
      the RustFS/MinIO S3 add-on and point autumn at it via Revolt.toml [files] s3 settings; the local /config volume does
      NOT hold attachments. COMPANION SERVICES to deploy (all ghcr.io/stoatchat, pin to the same tag e.g. v0.13.6, all share
      Revolt.toml + the same Mongo/Redis/Rabbit/S3): events (websocket gateway, ghcr.io/stoatchat/events), autumn (file server,
      ghcr.io/stoatchat/file-server), january (link/media proxy, ghcr.io/stoatchat/proxy), crond (scheduled tasks, ghcr.io/stoatchat/crond),
      pushd (push-notification worker / rabbit consumer, ghcr.io/stoatchat/pushd), web (frontend client, ghcr.io/stoatchat/for-web),
      and a reverse proxy (caddy) to route the public domain to web/api/events/autumn. Voice is optional via voice-ingress
      + livekit (ghcr.io/stoatchat/livekit-server). FIRST-RUN: bring up Mongo/Redis/Rabbit and S3, then the api + companion
      services; open the web client, create the first account, and configure the instance.'
    kubero.dev/template.links: '["https://github.com/revoltchat/self-hosted", "https://developers.revolt.chat/"]'
    kubero.dev/template.screenshots: '["https://revolt.chat/static/img/hero.png"]'
    kubero.dev/template.source: https://github.com/revoltchat/self-hosted
    kubero.dev/template.categories: '["communication", "collaboration", "social"]'
    kubero.dev/template.title: Revolt
    kubero.dev/template.website: https://revolt.chat
  labels:
    manager: kubero
spec:
  name: revolt
  deploymentstrategy: docker
  addons:
  - displayName: Document DB
    env: []
    icon: /img/addons/mongo.svg
    id: kubero-operator
    kind: DocumentDB
    resourceDefinitions:
      DocumentDB:
        apiVersion: documentdb.io/preview
        kind: DocumentDB
        metadata:
          name: revolt-documentdb
        spec:
          nodeCount: 1
          instancesPerNode: 1
          documentDbCredentialSecret: documentdb-credentials
          resource:
            storage:
              pvcSize: 1Gi
              storageClass: default
          exposeViaService:
            serviceType: ClusterIP
      credentialSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: documentdb-credentials
        type: Opaque
        stringData:
          username: mongoadmin
          password: revolt
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: revolt-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  - displayName: RabbitMQ
    env: []
    icon: /img/addons/rabbitmq.svg
    id: kubero-operator
    kind: RabbitmqCluster
    resourceDefinitions:
      RabbitmqCluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: revolt-rabbitmq
        spec:
          replicas: 1
          persistence:
            storageClassName: fast
            storage: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      default-userSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: revolt-rabbitmq-default-user
        type: Opaque
        stringData:
          username: revolt
          password: revolt
          default_user.conf: 'default_user = revolt

            default_pass = revolt'
  envVars:
  - name: REVOLT_DATABASE_URL
    value: mongodb://mongoadmin:revolt@documentdb-service-revolt-documentdb:10260/?directConnection=true&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidCertificates=true&replicaSet=rs0
  - name: MONGODB
    value: mongodb://mongoadmin:revolt@documentdb-service-revolt-documentdb:10260/?directConnection=true&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidCertificates=true&replicaSet=rs0
  - name: REVOLT_REDIS_URI
    value: redis://rfr-revolt-valkey-readwrite:6379
  - name: REDIS_URI
    value: redis://rfr-revolt-valkey-readwrite:6379
  - name: REVOLT_RABBIT_URI
    value: amqp://revolt:revolt@revolt-rabbitmq:5672
  - name: RABBIT_HOST
    value: revolt-rabbitmq
  - name: RABBIT_PORT
    value: '5672'
  - name: RABBIT_USERNAME
    value: revolt
  - name: RABBIT_PASSWORD
    value: revolt
  - name: REVOLT_APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: REVOLT_PUBLIC_URL
    value: '{{KUBERO_APP_URL}}/api'
  - name: REVOLT_EXTERNAL_WS_URL
    value: '{{KUBERO_APP_URL}}/ws'
  - name: HOSTNAME
    value: 0.0.0.0:8000
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /config
    name: revolt-config
    size: 1Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/stoatchat/api
    tag: v0.13.6

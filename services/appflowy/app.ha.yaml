apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: appflowy
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source Notion alternative — self-hosted workspace for notes, docs, and collaboration.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/86002201?s=200&v=4
    kubero.dev/template.installation: Bundles AppFlowy Cloud API with GoTrue auth in one pod. Deploy appflowy-web from the AppFlowy-Cloud
      docker-compose in the same pipeline for the full web UI.
    kubero.dev/template.links: '["https://appflowy-io-appflowy.mintlify.app/self-hosting/installation"]'
    kubero.dev/template.screenshots: '["https://appflowy.io/_next/static/media/appflowy-logo.0a1a0b0b.png"]'
    kubero.dev/template.source: https://github.com/AppFlowy-IO/AppFlowy-Cloud
    kubero.dev/template.categories: '["productivity", "work", "collaboration"]'
    kubero.dev/template.title: AppFlowy
    kubero.dev/template.website: https://appflowy.io/
  labels:
    manager: kubero
spec:
  name: appflowy
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: appflowy-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: appflowy
              owner: appflowy
              secret:
                name: appflowy-postgresql-app
              postInitApplicationSQL:
                - CREATE EXTENSION IF NOT EXISTS vector
                - GRANT ALL ON SCHEMA public TO appflowy
                - GRANT CREATE ON SCHEMA public TO appflowy
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO appflowy
          enableSuperuserAccess: true
          superuserSecret:
            name: appflowy-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: appflowy-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: appflowy
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: appflowy-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: appflowy
          password: appflowy
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: appflowy-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  - displayName: RustFS
    env: []
    icon: /img/addons/rustfs.svg
    id: kubero-operator
    kind: Tenant
    resourceDefinitions:
      Tenant:
        apiVersion: rustfs.com/v1alpha1
        kind: Tenant
        metadata:
          name: appflowy-rustfs
        spec:
          image: rustfs/rustfs:latest
          credsSecret:
            name: rustfs-credentials
          pools:
          - name: pool-0
            servers: 1
            persistence:
              volumesPerServer: 4
              volumeClaimTemplate:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
                storageClassName: slow
      credsSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: rustfs-credentials
        type: Opaque
        stringData:
          accesskey: rustfsadmin
          secretkey: changeme
  envVars:
  - name: APPFLOWY_DATABASE_URL
    value: postgres://appflowy:appflowy@appflowy-postgresql-rw:5432/appflowy
  - name: APPFLOWY_REDIS_URI
    value: redis://rfr-appflowy-valkey-readwrite:6379
  - name: APPFLOWY_CLOUD_BASE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APPFLOWY_WEB_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APPFLOWY_S3_CREATE_BUCKET
    value: 'true'
  - name: APPFLOWY_ENVIRONMENT
    value: production
  - name: APPFLOWY_GOTRUE_JWT_SECRET
    value: '{{KUBERO_GEN_ALNUM:32}}'
  - name: APPFLOWY_GOTRUE_BASE_URL
    value: http://127.0.0.1:9999
  - name: GOTRUE_DATABASE_URL
    value: postgres://appflowy:appflowy@appflowy-postgresql-rw:5432/appflowy?search_path=auth
  - name: GOTRUE_DB_DRIVER
    value: postgres
  - name: GOTRUE_PORT
    value: '9999'
  - name: API_EXTERNAL_URL
    value: '{{KUBERO_APP_URL}}/gotrue'
  - name: GOTRUE_MAILER_AUTOCONFIRM
    value: 'true'
  - name: GOTRUE_SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: GOTRUE_URI_ALLOW_LIST
    value: '**'
  - name: GOTRUE_ADMIN_EMAIL
    value: admin@example.com
  - name: GOTRUE_ADMIN_PASSWORD
    value: appflowy
  - name: APPFLOWY_S3_USE_MINIO
    value: 'true'
  - name: APPFLOWY_S3_MINIO_URL
    value: http://appflowy-rustfs-io:9000
  - name: APPFLOWY_S3_ACCESS_KEY
    value: rustfsadmin
  - name: APPFLOWY_S3_SECRET_KEY
    value: changeme
  - name: APPFLOWY_S3_BUCKET
    value: appflowy
  extraVolumes: []
  cronjobs: []
  resources:
    requests:
      cpu: 200m
      memory: 768Mi
    limits:
      cpu: '1'
      memory: 1536Mi
  healthcheck:
    enabled: true
    path: /api/health
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: appflowyinc/appflowy_cloud
    tag: latest
    command:
    - sh
    - -c
    - |
      set -e
      ARCH=$(uname -m)
      case "$ARCH" in
        x86_64) CRANE_ARCH=x86_64 ;;
        aarch64) CRANE_ARCH=arm64 ;;
        *) echo "unsupported arch: $ARCH"; exit 1 ;;
      esac
      if [ ! -x /tmp/crane ]; then
        curl -fsSL "https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_${CRANE_ARCH}.tar.gz" | tar xz -C /tmp crane
      fi
      mkdir -p /tmp/gotrue-root
      /tmp/crane export appflowyinc/gotrue:latest | tar x -C /tmp/gotrue-root
      GOTRUE_BIN=$(find /tmp/gotrue-root -name auth -type f | head -1)
      if [ -z "$GOTRUE_BIN" ]; then
        echo "failed to locate gotrue auth binary"
        exit 1
      fi
      export PORT="${GOTRUE_PORT:-9999}"
      export DATABASE_URL="$GOTRUE_DATABASE_URL"
      export GOTRUE_JWT_SECRET="$APPFLOWY_GOTRUE_JWT_SECRET"
      "$GOTRUE_BIN" &
      for i in $(seq 1 120); do
        if curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null 2>&1; then
          break
        fi
        sleep 2
      done
      curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null
      exec appflowy_cloud

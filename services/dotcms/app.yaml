apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: dotcms
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: "Hybrid headless content management system for building modern websites, apps and digital experiences with a Java-based, API-first platform."
    kubero.dev/template.icon: "https://avatars.githubusercontent.com/u/1005263?s=200&v=4"
    kubero.dev/template.installation: |
      Default admin login is `admin@dotcms.com` / `admin`. Change `DOT_INITIAL_ADMIN_PASSWORD` before exposing the instance.

      Provisions two addons automatically:
      - **PostgreSQL 16** (`dotcms-postgres`) — dotCMS supports PostgreSQL 13–16.
      - **OpenSearch 1.3.x** (`dotcms-opensearch`) — dotCMS does *not* support OpenSearch 2.x or 3.x. Do not bump the image tag.

      First boot takes 2–5 minutes while dotCMS initializes the schema and indices. Wait for both addons to become Ready before the dotCMS pod will pass its startup checks.
    kubero.dev/template.links: '["https://dev.dotcms.com/docs/", "https://github.com/dotCMS/core"]'
    kubero.dev/template.screenshots: '["https://www.dotcms.com/dA/cd72e798-1e69/1000w/dotcms-edit-mode.png"]'
    kubero.dev/template.source: "https://github.com/dotCMS/core"
    kubero.dev/template.categories: '["cms", "work", "productivity"]'
    kubero.dev/template.title: "dotCMS"
    kubero.dev/template.website: "https://www.dotcms.com/"
  labels:
    manager: kubero
spec:
  name: dotcms
  deploymentstrategy: docker
  envVars:
    - name: CMS_JAVA_OPTS
      value: "-Xmx2g"
    - name: LANG
      value: C.UTF-8
    - name: TZ
      value: UTC
    - name: DB_BASE_URL
      value: "jdbc:postgresql://dotcms-postgres-postgresql/dotcms"
    - name: DB_USERNAME
      value: dotcmsdbuser
    - name: DB_PASSWORD
      value: password
    - name: DOT_ES_ENDPOINTS
      value: "https://dotcms-opensearch-opensearch:9200"
    - name: DOT_ES_AUTH_BASIC_USER
      value: admin
    - name: DOT_ES_AUTH_BASIC_PASSWORD
      value: admin
    - name: DOT_INITIAL_ADMIN_PASSWORD
      value: admin
    - name: DOT_DOTCMS_CLUSTER_ID
      value: dotcms-production
  extraVolumes:
    - accessModes:
        - ReadWriteOnce
      emptyDir: false
      mountPath: /data/shared
      name: dotcms-shared
      size: 10Gi
  cronjobs: []
  addons:
    - displayName: PostgreSQL
      env: []
      icon: /img/addons/pgsql.svg
      id: kubero-operator
      kind: KuberoPostgresql
      resourceDefinitions:
        KuberoPostgresql:
          apiVersion: application.kubero.dev/v1alpha1
          kind: KuberoPostgresql
          metadata:
            name: dotcms-postgres
          spec:
            postgresql:
              image:
                tag: "16"
              global:
                postgresql:
                  auth:
                    database: dotcms
                    password: password
                    postgresPassword: password
                    username: dotcmsdbuser
              primary:
                persistence:
                  size: 5Gi
    - displayName: OpenSearch
      env: []
      icon: /img/addons/opensearch.svg
      id: kubero-operator
      kind: KuberoOpenSearch
      resourceDefinitions:
        KuberoOpenSearch:
          apiVersion: application.kubero.dev/v1alpha1
          kind: KuberoOpenSearch
          metadata:
            name: dotcms-opensearch
          spec:
            opensearch:
              image:
                tag: "1.3.20"
              security:
                enabled: true
                adminPassword: admin
                tls:
                  verificationMode: none
                  autoGenerated: true
              master:
                masterOnly: false
                replicaCount: 1
                persistence:
                  size: 8Gi
              data:
                replicaCount: 0
                persistence:
                  size: 8Gi
              ingest:
                enabled: false
                replicaCount: 0
              coordinating:
                replicaCount: 0
              dashboards:
                enabled: false
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: "8082"
    pullPolicy: Always
    repository: dotcms/dotcms
    tag: latest

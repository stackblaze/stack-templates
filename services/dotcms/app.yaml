apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: dotcms
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Hybrid headless content management system for
      building modern websites, apps and digital experiences with a Java-based, API-first
      platform.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/1005263?s=200&v=4
    kubero.dev/template.installation: "Default admin login is `admin@dotcms.com` /\
      \ `admin`. Change `DOT_INITIAL_ADMIN_PASSWORD` before exposing the instance.\n\
      \nProvisions two addons automatically:\n- **PostgreSQL 16** via the **CloudNativePG**\
      \ operator (`dotcms-db`) \u2014 dotCMS supports PostgreSQL 13\u201316. Requires\
      \ the CloudNativePG operator on the cluster.\n- **OpenSearch 1.3.x** (`dotcms-opensearch`)\
      \ \u2014 dotCMS does *not* support OpenSearch 2.x or 3.x. Do not bump the image\
      \ tag.\n\nThis is the single-instance tier. For a clustered, failover-capable\
      \ deployment (3-node Postgres + 2 dotCMS replicas) pick the **High availability**\
      \ deployment type when installing.\n\nFirst boot takes 2\u20135 minutes while\
      \ dotCMS initializes the schema and indices. Wait for both addons to become\
      \ Ready before the dotCMS pod will pass its startup checks.\n"
    kubero.dev/template.links: '["https://dev.dotcms.com/docs/", "https://github.com/dotCMS/core"]'
    kubero.dev/template.screenshots: '["https://www.dotcms.com/dA/cd72e798-1e69/1000w/dotcms-edit-mode.png"]'
    kubero.dev/template.source: https://github.com/dotCMS/core
    kubero.dev/template.categories: '["cms", "work", "productivity"]'
    kubero.dev/template.title: dotCMS
    kubero.dev/template.website: https://www.dotcms.com/
  labels:
    manager: kubero
spec:
  name: dotcms
  deploymentstrategy: docker
  envVars:
  - name: CMS_JAVA_OPTS
    value: -Xmx1g -XX:MaxMetaspaceSize=512m
  - name: LANG
    value: C.UTF-8
  - name: TZ
    value: UTC
  - name: DB_BASE_URL
    value: jdbc:postgresql://{{KUBERO_APP_NAME}}-db-rw:5432/dotcms
  - name: DB_USERNAME
    value: dotcmsdbuser
  - name: DB_PASSWORD
    value: password
  - name: DOT_ES_ENDPOINTS
    value: http://{{KUBERO_APP_NAME}}-opensearch:9200
  - name: DOT_ES_AUTH_TYPE
    value: NONE
  - name: DOT_INITIAL_ADMIN_PASSWORD
    value: admin
  - name: DOT_DOTCMS_CLUSTER_ID
    value: dotcms-production
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    storageClass: slow
    emptyDir: false
    mountPath: /data/shared
    name: '{{KUBERO_APP_NAME}}-shared'
    size: 10Gi
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-db'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: dotcms
              owner: dotcmsdbuser
              secret:
                name: '{{KUBERO_APP_NAME}}-db-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO dotcmsdbuser
              - GRANT CREATE ON SCHEMA public TO dotcmsdbuser
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO dotcmsdbuser
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-db-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: password
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: dotcmsdbuser
          password: password
  - displayName: OpenSearch
    env: []
    icon: /img/addons/opensearch.svg
    id: kubero-operator
    kind: KuberoOpenSearch
    resourceDefinitions:
      KuberoOpenSearch:
        apiVersion: application.kubero.dev/v1alpha1
        kind: KuberoOpenSearch
        metadata:
          name: '{{KUBERO_APP_NAME}}-opensearch'
        spec:
          opensearch:
            clusterName: '{{KUBERO_APP_NAME}}-opensearch'
            masterService: '{{KUBERO_APP_NAME}}-opensearch'
            image:
              tag: 1.3.20
            singleNode: true
            replicas: 1
            persistence:
              enabled: true
              storageClass: fast
              size: 10Gi
            securityConfig:
              enabled: false
            config:
              opensearch.yml: 'cluster.name: {{KUBERO_APP_NAME}}-opensearch

                network.host: 0.0.0.0

                discovery.type: single-node

                plugins.security.disabled: true

                '
  resources:
    requests:
      cpu: '1'
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /dotAdmin/
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8082'
    pullPolicy: Always
    repository: dotcms/dotcms
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

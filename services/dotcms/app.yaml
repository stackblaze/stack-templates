apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: dotcms
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: "Hybrid headless content management system for building modern websites, apps and digital experiences with a Java-based, API-first platform."
    kubero.dev/template.icon: "https://avatars.githubusercontent.com/u/1005263?s=200&v=4"
    kubero.dev/template.installation: |
      Default admin login is `admin@dotcms.com` / `admin`. Change `DOT_INITIAL_ADMIN_PASSWORD` before exposing the instance.

      Provisions two addons automatically:
      - **PostgreSQL 16** (`dotcms-postgres`) — dotCMS supports PostgreSQL 13–16.
      - **OpenSearch 1.3.x** (`dotcms-opensearch`) — dotCMS does *not* support OpenSearch 2.x or 3.x. Do not bump the image tag.

      First boot takes 2–5 minutes while dotCMS initializes the schema and indices. Wait for both addons to become Ready before the dotCMS pod will pass its startup checks.
    kubero.dev/template.links: '["https://dev.dotcms.com/docs/", "https://github.com/dotCMS/core"]'
    kubero.dev/template.screenshots: '["https://www.dotcms.com/dA/cd72e798-1e69/1000w/dotcms-edit-mode.png"]'
    kubero.dev/template.source: "https://github.com/dotCMS/core"
    kubero.dev/template.categories: '["cms", "work", "productivity"]'
    kubero.dev/template.title: "dotCMS"
    kubero.dev/template.website: "https://www.dotcms.com/"
  labels:
    manager: kubero
spec:
  name: dotcms
  deploymentstrategy: docker
  envVars:
    - name: CMS_JAVA_OPTS
      value: "-Xmx2g"
    - name: LANG
      value: C.UTF-8
    - name: TZ
      value: UTC
    - name: DB_BASE_URL
      value: "jdbc:postgresql://dotcms-postgres-postgresql/dotcms"
    - name: DB_USERNAME
      value: dotcmsdbuser
    - name: DB_PASSWORD
      value: password
    # HTTP (no TLS) + no auth because the OpenSearch addon below ships with
    # the security plugin disabled. Tenant namespaces are NetworkPolicy-
    # isolated, so intra-namespace traffic doesn't need in-flight encryption.
    # If you flip `securityConfig.enabled: true` on the addon, switch this
    # to `https://` and add back DOT_ES_AUTH_BASIC_USER / DOT_ES_AUTH_BASIC_PASSWORD.
    - name: DOT_ES_ENDPOINTS
      value: "http://dotcms-opensearch:9200"
    - name: DOT_INITIAL_ADMIN_PASSWORD
      value: admin
    - name: DOT_DOTCMS_CLUSTER_ID
      value: dotcms-production
  extraVolumes:
    - accessModes:
        - ReadWriteOnce
      emptyDir: false
      mountPath: /data/shared
      name: dotcms-shared
      size: 10Gi
  cronjobs: []
  addons:
    - displayName: PostgreSQL
      env: []
      icon: /img/addons/pgsql.svg
      id: kubero-operator
      kind: KuberoPostgresql
      resourceDefinitions:
        KuberoPostgresql:
          apiVersion: application.kubero.dev/v1alpha1
          kind: KuberoPostgresql
          metadata:
            name: dotcms-postgres
          spec:
            postgresql:
              image:
                tag: "16"
              global:
                postgresql:
                  auth:
                    database: dotcms
                    password: password
                    postgresPassword: password
                    username: dotcmsdbuser
              primary:
                persistence:
                  size: 5Gi
    # The kuberoopensearch chart in stackblaze/kubero-operator wraps the
    # opensearch-project/opensearch chart (chart 1.35.x, app 1.3.20) since
    # 2026-05. dotCMS only supports OpenSearch 1.3.x — do not bump the tag.
    # See that repo's commit history for why we migrated off bitnami.
    - displayName: OpenSearch
      env: []
      icon: /img/addons/opensearch.svg
      id: kubero-operator
      kind: KuberoOpenSearch
      resourceDefinitions:
        KuberoOpenSearch:
          apiVersion: application.kubero.dev/v1alpha1
          kind: KuberoOpenSearch
          metadata:
            name: dotcms-opensearch
          spec:
            opensearch:
              clusterName: dotcms-opensearch
              masterService: dotcms-opensearch
              singleNode: true
              replicas: 1
              roles:
                - master
                - ingest
                - data
              image:
                repository: opensearchproject/opensearch
                tag: "1.3.20"
              persistence:
                enabled: true
                size: 8Gi
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 2Gi
              # Security plugin off → HTTP + no auth, which matches the
              # DOT_ES_ENDPOINTS env above. Turning this on requires also
              # rewriting the opensearch.yml block and the dotcms env vars.
              securityConfig:
                enabled: false
              extraEnvs:
                - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
                  value: ChangeMe-Stackblaze!1
              config:
                opensearch.yml: |
                  cluster.name: dotcms-opensearch
                  network.host: 0.0.0.0
                  discovery.type: single-node
                  plugins.security.disabled: true
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: "8082"
    pullPolicy: Always
    repository: dotcms/dotcms
    tag: latest

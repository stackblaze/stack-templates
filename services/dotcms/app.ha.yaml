apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: dotcms-ha
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: "Hybrid headless CMS \u2014 high-availability\
      \ deployment: 3-node CloudNativePG Postgres with automatic failover and 2 clustered\
      \ dotCMS replicas on shared RWX storage."
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/1005263?s=200&v=4
    kubero.dev/template.installation: "Default admin login is `admin@dotcms.com` /\
      \ `admin`. Change `DOT_INITIAL_ADMIN_PASSWORD` before exposing the instance.\n\
      \n**High-availability tier.** Provisions:\n- **PostgreSQL 16 \u2014 3 instances**\
      \ via the **CloudNativePG** operator (`dotcms-db`): one primary + two streaming\
      \ replicas with automatic failover. dotCMS connects to the `dotcms-db-rw` service,\
      \ which always tracks the current primary. Requires the CloudNativePG operator\
      \ on the cluster.\n- **3 dotCMS web replicas** clustered via `DOT_DOTCMS_CLUSTER_ID`,\
      \ sharing the assets directory on a `ReadWriteMany` volume so every node serves\
      \ the same content and survives node failures / rolling deploys.\n- **OpenSearch\
      \ 1.3.x \u2014 3 nodes** (`dotcms-opensearch`): a real clustered OpenSearch\
      \ (3 master-eligible nodes, quorum-based) on HTTP with the security plugin disabled.\
      \ dotCMS does *not* support OpenSearch 2.x/3.x, so the version is pinned to\
      \ 1.3.20.\n\nFirst boot takes 2\u20135 minutes while dotCMS initializes the\
      \ schema and indices. Wait for the Postgres cluster and OpenSearch to become\
      \ Ready before the dotCMS pods pass their startup checks.\n"
    kubero.dev/template.links: '["https://dev.dotcms.com/docs/", "https://github.com/dotCMS/core"]'
    kubero.dev/template.screenshots: '["https://www.dotcms.com/dA/cd72e798-1e69/1000w/dotcms-edit-mode.png"]'
    kubero.dev/template.source: https://github.com/dotCMS/core
    kubero.dev/template.categories: '["cms", "work", "productivity"]'
    kubero.dev/template.title: dotCMS (HA)
    kubero.dev/template.website: https://www.dotcms.com/
  labels:
    manager: kubero
spec:
  name: dotcms-ha
  deploymentstrategy: docker
  envVars:
  - name: CMS_JAVA_OPTS
    value: -Xmx1g -XX:MaxMetaspaceSize=512m
  - name: LANG
    value: C.UTF-8
  - name: TZ
    value: UTC
  - name: DB_BASE_URL
    value: jdbc:postgresql://{{KUBERO_APP_NAME}}-db-rw:5432/dotcms
  - name: DB_USERNAME
    value: dotcmsdbuser
  - name: DB_PASSWORD
    value: password
  - name: DOT_ES_ENDPOINTS
    value: http://{{KUBERO_APP_NAME}}-opensearch:9200
  - name: DOT_ES_AUTH_TYPE
    value: NONE
  - name: DOT_INITIAL_ADMIN_PASSWORD
    value: admin
  - name: DOT_DOTCMS_CLUSTER_ID
    value: dotcms-ha
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    storageClass: shared
    emptyDir: false
    mountPath: /data/shared
    name: '{{KUBERO_APP_NAME}}-shared'
    size: 10Gi
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-db'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: dotcms
              owner: dotcmsdbuser
              secret:
                name: '{{KUBERO_APP_NAME}}-db-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO dotcmsdbuser
              - GRANT CREATE ON SCHEMA public TO dotcmsdbuser
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO dotcmsdbuser
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-db-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: password
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-db-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: dotcmsdbuser
          password: password
  - displayName: OpenSearch
    env: []
    icon: /img/addons/opensearch.svg
    id: kubero-operator
    kind: KuberoOpenSearch
    resourceDefinitions:
      KuberoOpenSearch:
        apiVersion: application.kubero.dev/v1alpha1
        kind: KuberoOpenSearch
        metadata:
          name: '{{KUBERO_APP_NAME}}-opensearch'
        spec:
          opensearch:
            clusterName: '{{KUBERO_APP_NAME}}-opensearch'
            masterService: '{{KUBERO_APP_NAME}}-opensearch'
            image:
              tag: 1.3.20
            singleNode: false
            replicas: 3
            roles:
            - master
            - ingest
            - data
            persistence:
              enabled: true
              storageClass: smart
              size: 10Gi
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: '1'
                memory: 2Gi
            securityConfig:
              enabled: false
            config:
              opensearch.yml: 'cluster.name: opensearch

                network.host: 0.0.0.0

                plugins.security.disabled: true

                '
  resources:
    requests:
      cpu: '1'
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /dotAdmin/
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 3
  worker:
    replicaCount: 0
  image:
    containerPort: '8082'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/dotcms/dotcms
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

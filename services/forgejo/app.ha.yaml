apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Beyond coding. Forgejo is a self-hosted lightweight
      software forge with Git hosting, code review, team collaboration, package registry
      and CI/CD.
    kubero.dev/template.icon: https://codeberg.org/forgejo/Forgejo/raw/branch/forgejo/public/assets/img/logo.svg
    kubero.dev/template.installation: PostgreSQL is provisioned via the bundled add-on.
      Git data lives under /data. Set FORGEJO__server__ROOT_URL to your public URL
      before first deploy if not using Kubero ingress substitution.
    kubero.dev/template.links: '["https://forgejo.org/"]'
    kubero.dev/template.screenshots: '["https://forgejo.org/_astro/og-preview.Uy75QWb0_6Lpd2.webp"]'
    kubero.dev/template.source: https://codeberg.org/forgejo/Forgejo
    kubero.dev/template.categories: '["work","development","collaboration"]'
    kubero.dev/template.title: Forgejo
    kubero.dev/template.website: https://forgejo.org/
    # Git SSH needs a raw-TCP LoadBalancer port (see spec.additionalPorts),
    # which the shared-tier ResourceQuota blocks (services.loadbalancers: 0).
    # Restrict this template to dedicated clusters where that port is available.
    kubero.dev/template.requiresDedicated: 'true'
  name: forgejo
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: forgejo
              owner: forgejo
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO forgejo
              - GRANT CREATE ON SCHEMA public TO forgejo
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO forgejo
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: forgejo
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: forgejo
          password: forgejo
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: USER_UID
    value: '1000'
  - name: USER_GID
    value: '1000'
  - name: FORGEJO__server__ROOT_URL
    value: '{{KUBERO_APP_URL}}'
  # Skip the browser install wizard — DB/server settings come from env.
  # First registered user becomes the site admin.
  - name: FORGEJO__security__INSTALL_LOCK
    value: 'true'
  - name: FORGEJO__server__DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: FORGEJO__database__DB_TYPE
    value: postgres
  - name: FORGEJO__database__HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: FORGEJO__database__PORT
    value: '5432'
  - name: FORGEJO__database__NAME
    value: forgejo
  - name: FORGEJO__database__USER
    value: forgejo
  - name: FORGEJO__database__PASSWD
    value: forgejo
  # Built-in SSH server (in-process, runs as the git user — no root sshd).
  # Host keys live under the shared RWX /data, so all web replicas present the
  # same key. SSH_PORT/SSH_DOMAIN are advertised in the ssh:// clone URL.
  - name: FORGEJO__server__START_SSH_SERVER
    value: 'true'
  - name: FORGEJO__server__SSH_LISTEN_PORT
    value: '2222'
  - name: FORGEJO__server__SSH_PORT
    value: '2222'
  - name: FORGEJO__server__SSH_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  # Git SSH endpoint. Ingress is HTTP-only, so SSH needs its own L4 port: this
  # adds a containerPort + ClusterIP port and (expose) an external Service on
  # 2222. NOTE: externalPort 2222 is bound cluster-wide — only one app per
  # cluster can use it until kubero-server allocates a unique port per app.
  additionalPorts:
  - name: ssh
    port: 2222
    expose: true
    externalPort: 2222
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 10Gi
    storageClass: shared
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: codeberg.org/forgejo/forgejo
    run:
      securityContext:
        readOnlyRootFilesystem: false
    tag: '11'
  name: forgejo
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

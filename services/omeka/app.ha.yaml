apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: omeka
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source web publishing platform for sharing digital collections and creating media-rich
      exhibits, built for libraries, museums, and archives.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/omeka/icon.png
    kubero.dev/template.installation: There is no official Omeka S image; this uses the actively maintained community image
      giocomai/omeka-s-docker (Omeka S 4.x on PHP/Apache). Omeka S supports MySQL/MariaDB only, so a mariadb add-on is deployed.
      ROTATE the mariadb add-on password and the matching MYSQL_PASSWORD env before production. On first boot, complete the
      web installer at the app URL to create the admin account and the first site. The /var/www/html/volume path persists
      config (database.ini, local.config.php), uploaded files, themes, and modules across restarts.
    kubero.dev/template.links: '["https://omeka.org/s/docs/user-manual/", "https://github.com/giocomai/omeka-s-docker"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/omeka/omeka-s
    kubero.dev/template.categories: '["cms", "media", "documentation"]'
    kubero.dev/template.title: Omeka S
    kubero.dev/template.website: https://omeka.org/s/
  labels:
    manager: kubero
spec:
  name: omeka
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: omeka-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: omeka-mysql-root
            key: password
          database: omeka
          username: omeka
          passwordSecretKeyRef:
            name: omeka-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: omeka-mysql-root
        type: Opaque
        stringData:
          password: omeka
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: omeka-mysql-app
        type: Opaque
        stringData:
          password: omeka
  envVars:
  - name: MYSQL_HOST
    value: omeka-mysql
  - name: MYSQL_PORT
    value: '3306'
  - name: MYSQL_DATABASE
    value: omeka
  - name: MYSQL_USER
    value: omeka
  - name: MYSQL_PASSWORD
    value: omeka
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/volume
    name: omeka-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: giocomai/omeka-s-docker
    tag: v4.1.1

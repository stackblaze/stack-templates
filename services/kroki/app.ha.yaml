apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: kroki
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Creates diagrams from textual descriptions — unified API for PlantUML, Mermaid, Graphviz,
      and more.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/4894788?s=200&v=4
    kubero.dev/template.installation: No database required. Optionally set KROKI_SAFE_MODE=secure for production.
    kubero.dev/template.links: '["https://docs.kroki.io/"]'
    kubero.dev/template.screenshots: '["https://kroki.io/assets/img/kroki-logo.png"]'
    kubero.dev/template.source: https://github.com/yuzutech/kroki
    kubero.dev/template.categories: '["utilities", "development", "documentation"]'
    kubero.dev/template.title: Kroki
    kubero.dev/template.website: https://kroki.io/
  labels:
    manager: kubero
spec:
  name: kroki
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: KROKI_SAFE_MODE
    value: unsafe
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: yuzutech/kroki
    tag: latest

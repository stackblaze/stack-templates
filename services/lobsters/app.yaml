apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: lobsters
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Computing-focused community link aggregator and discussion site built on Ruby on Rails.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/22999921?s=200&v=4
    kubero.dev/template.installation: 'Lobsters has no official container image; this template uses the community-maintained
      utensils/lobsters image, which is stale (last pushed ~5 years ago) and pinned to the legacy MariaDB schema. For a current
      deployment, build from source (https://github.com/lobsters/lobsters; note the project is migrating toward SQLite). Required
      setup: (1) ROTATE SECRET_KEY_BASE and INGRESS_PASSWORD to fresh random values (openssl rand -hex 64 / -hex 32) and rotate
      the MariaDB password from the slug default. (2) The MariaDB add-on is provisioned automatically; on first boot run rails
      db:setup / db:migrate inside the app container to create the schema, then create the first admin via rails console (User.create
      then user.grant_moderatorship / is_admin). (3) DATABASE_URL uses the trilogy/mysql2 adapter against the lobsters-mysql
      service.'
    kubero.dev/template.links: '["https://github.com/lobsters/lobsters/blob/master/README.md"]'
    kubero.dev/template.screenshots: '["https://lobste.rs/s"]'
    kubero.dev/template.source: https://github.com/lobsters/lobsters
    kubero.dev/template.categories: '["social", "collaboration", "communication"]'
    kubero.dev/template.title: Lobsters
    kubero.dev/template.website: https://lobste.rs
  labels:
    manager: kubero
spec:
  name: lobsters
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: lobsters-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: lobsters-mysql-root
            key: password
          database: lobsters
          username: lobsters
          passwordSecretKeyRef:
            name: lobsters-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: lobsters-mysql-root
        type: Opaque
        stringData:
          password: lobsters
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: lobsters-mysql-app
        type: Opaque
        stringData:
          password: lobsters
  envVars:
  - name: RAILS_ENV
    value: production
  - name: RACK_ENV
    value: production
  - name: PORT
    value: '9000'
  - name: DATABASE_URL
    value: mysql2://lobsters:lobsters@lobsters-mysql:3306/lobsters
  - name: SECRET_KEY_BASE
    value: replace-with-openssl-rand-hex-64
  - name: INGRESS_PASSWORD
    value: replace-with-openssl-rand-hex-32
  - name: RAILS_SERVE_STATIC_FILES
    value: 'true'
  - name: RAILS_LOG_TO_STDOUT
    value: 'true'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /app/public/uploads
    name: lobsters-data
    size: 2Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '9000'
    pullPolicy: Always
    repository: utensils/lobsters
    tag: latest

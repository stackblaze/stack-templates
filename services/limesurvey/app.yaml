apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: LimeSurvey is the simple, quick and anonymous
      online survey tool that's bursting with juicy insights.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/limesurvey/icon.png
    kubero.dev/template.installation: Auto-installs on first boot when LIMESURVEY_DB_*
      and admin env vars are set. Default login admin/root — change immediately.
    kubero.dev/template.links: '"https://manual.limesurvey.org/LimeSurvey_Manual"'
    kubero.dev/template.screenshots: '["https://manual.limesurvey.org/images/1/15/Surveys-alternative_button.png","https://manual.limesurvey.org/images/5/50/Newsurveyscreen.png"]'
    kubero.dev/template.source: https://github.com/LimeSurvey/LimeSurvey
    kubero.dev/template.categories: '["communication", "utilities"]'
    kubero.dev/template.title: LimeSurvey
    kubero.dev/template.website: https://www.limesurvey.org
  labels:
    manager: kubero
  name: limesurvey
spec:
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: limesurvey-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: limesurvey-mysql-root
            key: password
          database: limesurvey
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: limesurvey-mysql-root
        type: Opaque
        stringData:
          password: root
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: LIMESURVEY_DB_HOST
    value: limesurvey-mysql
  - name: LIMESURVEY_DB_PASSWORD
    value: root
  - name: LIMESURVEY_ADMIN_USER
    value: admin
  - name: LIMESURVEY_ADMIN_PASSWORD
    value: root
  - name: LIMESURVEY_DB_NAME
    value: limesurvey
  - name: LIMESURVEY_USE_INNODB
    value: '1'
  - name: LIMESURVEY_ADMIN_NAME
    value: Lime Administrator
  - name: LIMESURVEY_ADMIN_EMAIL
    value: lime@lime.me
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/upload
    name: limesurvey-upload
    size: 2Gi
    storageClass: slow
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/plugins
    name: limesurvey-plugins
    size: 1Gi
    storageClass: slow
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/application/config
    name: limesurvey-config
    size: 1Gi
    storageClass: slow
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: adamzammit/limesurvey
    tag: latest
  name: limesurvey
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

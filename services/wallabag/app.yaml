apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
    kubero.dev/template.description: Self-hostable read-it-later app for saving and
      classifying web pages to read later.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/4573139?s=200&v=4
    kubero.dev/template.installation: "Default login is wallabag:wallabag \u2014 change\
      \ the password after first login."
    kubero.dev/template.links: '["https://doc.wallabag.org/"]'
    kubero.dev/template.screenshots: '["https://www.wallabag.org/images/logo-wallabag.svg"]'
    kubero.dev/template.source: https://github.com/wallabag/wallabag
    kubero.dev/template.categories: '["utilities", "productivity"]'
    kubero.dev/template.title: wallabag
    kubero.dev/template.website: https://www.wallabag.org/
  labels:
    manager: kubero
  name: wallabag
spec:
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: wallabag
          username: wallabag
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: wallabag
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: wallabag
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: SYMFONY__ENV__DOMAIN_NAME
    value: '{{KUBERO_APP_URL}}'
  - name: TRUSTED_HOSTS
    value: '{{KUBERO_APP_HOST}}|localhost|127.0.0.1|10\\..+'
  - name: TRUSTED_PROXIES
    value: 10.0.0.0/8,REMOTE_ADDR
  - name: SYMFONY__ENV__SECRET
    value: ovmpmAWXRCabNlMgzlzFXDYmCFfzGv
  - name: SYMFONY__ENV__FOSUSER_REGISTRATION
    value: 'false'
  - name: SYMFONY__ENV__DATABASE_DRIVER
    value: pdo_mysql
  - name: SYMFONY__ENV__DATABASE_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: SYMFONY__ENV__DATABASE_PORT
    value: '3306'
  - name: SYMFONY__ENV__DATABASE_NAME
    value: wallabag
  - name: SYMFONY__ENV__DATABASE_USER
    value: wallabag
  - name: SYMFONY__ENV__DATABASE_PASSWORD
    value: wallabag
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/wallabag/web/assets/images
    name: wallabag-images
    size: 1Gi
    storageClass: slow
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: wallabag/wallabag
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true
  name: wallabag
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

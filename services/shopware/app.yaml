apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: shopware
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source headless commerce platform for building
      online stores, marketplaces, and B2B/D2C experiences with Symfony and Vue.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/shopware/icon.png
    kubero.dev/template.installation: 'Image: dockware/play (the de-facto managed
      Shopware 6 Docker image; runs Apache + PHP-FPM on port 80). Shopware REQUIRES
      MySQL 8 / MariaDB 10.11+ (NOT Postgres) - the mariadb add-on is wired in. Valkey
      (Redis-compatible) is wired in for sessions and app cache. First-run: the image
      ships a pre-installed demo shop using its bundled MySQL; for production point
      DATABASE_URL at the external mariadb add-on (set INSTALL=1 / run `bin/console
      system:install` on first boot to migrate the schema onto it), then create an
      admin via `bin/console user:create`. Default admin login of the bundled demo
      is admin / shopware - ROTATE immediately. Rotate APP_SECRET and INSTANCE_ID_HASH
      (placeholders below) with `openssl rand -hex 32` and the mariadb/db passwords.
      COMPANION SERVICES (deploy as separate apps sharing the same DATABASE_URL/Redis):
      a message-consumer worker (`bin/console messenger:consume async,low_priority`,
      same dockware/play image, run as a long-lived command), a scheduled-task worker
      (`bin/console scheduled-task:run`), and a cron/cache-warmer. SEARCH: Shopware
      scales poorly past ~50k products on MySQL search - deploy OpenSearch 2.x separately
      (NOT an available operator add-on; run it standalone) and set OPENSEARCH_URL
      + SHOPWARE_ES_ENABLED=1 + SHOPWARE_ES_INDEXING_ENABLED=1. Optionally front the
      storefront with Varnish/HTTP cache for production.'
    kubero.dev/template.links: '["https://developer.shopware.com/docs/", "https://docs.dockware.io"]'
    kubero.dev/template.screenshots: '["https://images.ctfassets.net/nqzs8zsepqpi/7f1d5mBYgcP8rCOWho4vO6/32f04a0b3bb687d2df562966d5099138/og_image.png"]'
    kubero.dev/template.source: https://github.com/shopware/shopware
    kubero.dev/template.categories: '["e-commerce", "cms", "crm"]'
    kubero.dev/template.title: Shopware
    kubero.dev/template.website: https://www.shopware.com
  labels:
    manager: kubero
spec:
  name: shopware
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: shopware
          username: shopware
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: shopware
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: shopware
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: APP_ENV
    value: prod
  - name: APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: INSTANCE_ID_HASH
    value: replace-with-openssl-rand-hex-32
  - name: DATABASE_URL
    value: mysql://shopware:shopware@{{KUBERO_APP_NAME}}-mysql:3306/shopware
  - name: REDIS_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379
  - name: REDIS_CACHE_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: REDIS_SESSION_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/1
  - name: SHOPWARE_HTTP_CACHE_ENABLED
    value: '1'
  - name: SHOPWARE_ES_ENABLED
    value: '0'
  - name: SHOPWARE_ES_INDEXING_ENABLED
    value: '0'
  - name: BLUE_GREEN_DEPLOYMENT
    value: '0'
  - name: PHP_MEMORY_LIMIT
    value: 512M
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/files
    name: '{{KUBERO_APP_NAME}}-files'
    size: 2Gi
    storageClass: slow
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html/public/media
    name: '{{KUBERO_APP_NAME}}-media'
    size: 5Gi
    storageClass: slow
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: ghcr.io/dockware-mirror/play
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: true

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: nextcloud
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Nextcloud is a self-hosted file sync and collaboration platform.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/19211038?s=200&v=4
    kubero.dev/template.installation: Set NEXTCLOUD_TRUSTED_DOMAINS to your public hostname before going live.
    kubero.dev/template.links: '["https://docs.nextcloud.com/"]'
    kubero.dev/template.screenshots: '["https://nextcloud.com/wp-content/uploads/2022/03/hero.webp"]'
    kubero.dev/template.source: https://github.com/nextcloud/server
    kubero.dev/template.categories: '["storage", "work", "collaboration"]'
    kubero.dev/template.title: Nextcloud
    kubero.dev/template.website: https://nextcloud.com/
  labels:
    manager: kubero
spec:
  name: nextcloud
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: nextcloud-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: nextcloud-mysql-root
            key: password
          database: nextcloud
          username: nextcloud
          passwordSecretKeyRef:
            name: nextcloud-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: nextcloud-mysql-root
        type: Opaque
        stringData:
          password: nextcloud
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: nextcloud-mysql-app
        type: Opaque
        stringData:
          password: nextcloud
  envVars:
  - name: MYSQL_HOST
    value: nextcloud-mysql
  - name: MYSQL_DATABASE
    value: nextcloud
  - name: MYSQL_USER
    value: nextcloud
  - name: MYSQL_PASSWORD
    value: nextcloud
  - name: NEXTCLOUD_TRUSTED_DOMAINS
    value: nextcloud.localhost
  - name: OVERWRITEPROTOCOL
    value: https
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    storageClass: shared
    emptyDir: false
    mountPath: /var/www/html
    name: nextcloud-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: nextcloud
    tag: apache

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: nextcloud
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Nextcloud is a self-hosted file sync and collaboration
      platform.
    kubero.dev/template.icon: https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@6ee4357571945104337fbb75a7852dd0af0b8c4b/services/nextcloud/icon.png
    kubero.dev/template.installation: Auto-installs on first boot against the bundled
      MariaDB add-on when NEXTCLOUD_ADMIN_USER / NEXTCLOUD_ADMIN_PASSWORD and MYSQL_*
      are set (no web setup wizard). Default login is admin / nextcloud — rotate the
      password after first login. NEXTCLOUD_TRUSTED_DOMAINS is wired to the app host.
    kubero.dev/template.links: '["https://docs.nextcloud.com/"]'
    kubero.dev/template.screenshots: '["https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@6ee4357571945104337fbb75a7852dd0af0b8c4b/services/nextcloud/demo.mp4", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@6ee4357571945104337fbb75a7852dd0af0b8c4b/services/nextcloud/dashboard.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@6ee4357571945104337fbb75a7852dd0af0b8c4b/services/nextcloud/screenshot-files.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@6ee4357571945104337fbb75a7852dd0af0b8c4b/services/nextcloud/screenshot-documents.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@6ee4357571945104337fbb75a7852dd0af0b8c4b/services/nextcloud/screenshot-photos.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@6ee4357571945104337fbb75a7852dd0af0b8c4b/services/nextcloud/screenshot-dashboard.png"]'
    kubero.dev/template.source: https://github.com/nextcloud/server
    kubero.dev/template.categories: '["storage", "work", "collaboration"]'
    kubero.dev/template.title: Nextcloud
    kubero.dev/template.website: https://nextcloud.com/
  labels:
    manager: kubero
spec:
  name: nextcloud
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: nextcloud
          username: nextcloud
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: nextcloud
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: nextcloud
  envVars:
  - name: MYSQL_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: MYSQL_DATABASE
    value: nextcloud
  - name: MYSQL_USER
    value: nextcloud
  - name: MYSQL_PASSWORD
    value: nextcloud
  - name: NEXTCLOUD_ADMIN_USER
    value: admin
  - name: NEXTCLOUD_ADMIN_PASSWORD
    value: nextcloud
  - name: NEXTCLOUD_TRUSTED_DOMAINS
    value: localhost {{KUBERO_APP_HOST}}
  - name: OVERWRITEPROTOCOL
    value: https
  - name: OVERWRITEHOST
    value: '{{KUBERO_APP_HOST}}'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    storageClass: lite
    emptyDir: false
    # Persist full app tree (config + apps + data) so first-boot auto-install
    # survives restarts and users never see the web setup wizard.
    mountPath: /var/www/html
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: IfNotPresent
    repository: registry.stackblaze.cloud/library/nextcloud
    tag: apache
    run:
      securityContext:
        readOnlyRootFilesystem: false

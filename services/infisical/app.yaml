apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: infisical
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source secrets management and internal PKI platform for developers and teams.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/107880645?s=200&v=4
    kubero.dev/template.installation: Generate ENCRYPTION_KEY with `openssl rand -hex 16` and AUTH_SECRET with `openssl rand
      -base64 32` before production use.
    kubero.dev/template.links: '["https://infisical.com/docs/"]'
    kubero.dev/template.screenshots: '["https://infisical.com/images/og-image.png"]'
    kubero.dev/template.source: https://github.com/Infisical/infisical
    kubero.dev/template.categories: '["security", "development", "work"]'
    kubero.dev/template.title: Infisical
    kubero.dev/template.website: https://infisical.com/
  labels:
    manager: kubero
spec:
  name: infisical
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: infisical-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: infisical
              owner: infisical
              secret:
                name: infisical-postgresql-app
              postInitApplicationSQL:
                - GRANT ALL ON SCHEMA public TO infisical
                - GRANT CREATE ON SCHEMA public TO infisical
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO infisical
          enableSuperuserAccess: true
          superuserSecret:
            name: infisical-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: infisical-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: infisical
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: infisical-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: infisical
          password: infisical
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: infisical-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: HOST
    value: 0.0.0.0
  - name: PORT
    value: '8080'
  - name: DB_CONNECTION_URI
    value: postgresql://infisical:infisical@infisical-postgresql-rw:5432/infisical
  - name: REDIS_URL
    value: redis://rfr-infisical-valkey-readwrite:6379
  - name: ENCRYPTION_KEY
    value: f13dbc92aaaf86fa7cb0ed8ac3265f47
  - name: AUTH_SECRET
    value: 5lrMXKKWCVocS/uerPsl7V+TX/aaUaI7iDkgl3tSmLE=
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: infisical/infisical
    tag: latest
  # Default QA LimitRange caps web pods at 512Mi; Infisical OOMs during DB migrations.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10

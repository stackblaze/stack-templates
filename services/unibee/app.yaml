apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: unibee
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source, gateway-agnostic subscription billing
      and invoicing platform for SaaS businesses.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/unibee/icon.png
    kubero.dev/template.installation: 'Primary web/API container only (unibee/api).
      DATABASE_LINK uses a MySQL DSN, so this template wires the mariadb add-on (UniBee
      speaks MySQL, not postgres). The valkey add-on has no password, so REDIS_PASSWORD
      is left empty. UniBee is a multi-container stack: also deploy the companion
      services as separate Kubero apps and route them behind one ingress (UniBee normally
      fronts them with nginx): admin merchant portal = unibee/admin-portal:v1.9.0
      (port 80), user portal = unibee/user-portal:v1.9.0 (port 80), and the licensing
      service = unibee/license-api:v1.0.2-premium (port 80). Set UNIBEE_API_URL and
      the portal URLs to your public host once routing is set up; replace UNIBEE_LICENSE
      with your key (blank works in stand-alone MODE for the open-source edition).
      Rotate the mariadb password from the slug default. First run: open the admin
      portal and create the first merchant/admin account.'
    kubero.dev/template.links: '["https://github.com/UniBee-Billing/unibee/blob/main/README.md",
      "https://unibee.dev/"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/UniBee-Billing/unibee
    kubero.dev/template.categories: '["finance", "e-commerce", "work"]'
    kubero.dev/template.title: UniBee
    kubero.dev/template.website: https://unibee.dev/
  labels:
    manager: kubero
spec:
  name: unibee
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: unibee
          username: unibee
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: unibee
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: unibee
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: MODE
    value: stand-alone
  - name: ENV
    value: prod
  - name: SERVER_ADDRESS
    value: '80'
  - name: UNIBEE_API_URL
    value: '{{KUBERO_APP_URL}}/api'
  - name: DATABASE_LINK
    value: mysql:unibee:unibee@tcp({{KUBERO_APP_NAME}}-mysql:3306)/unibee?loc=UTC&parseTime=false
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: REDIS_ADDRESS
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379
  - name: REDIS_PASSWORD
    value: ''
  - name: UNIBEE_LICENSE
    value: ''
  extraVolumes: []
  cronjobs: []
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 180
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/unibee-api
    tag: v1.9.0
    command:
    - sh
    - -c
    - "set -e\napk add --no-cache mysql-client netcat-openbsd >/dev/null\nwhile !\
      \ nc -z \"${DB_HOST}\" 3306 2>/dev/null; do sleep 2; done\nif ! mysql -h\"${DB_HOST}\"\
      \ -uunibee -punibee unibee -N -e \"SHOW TABLES LIKE 'merchant';\" 2>/dev/null\
      \ | grep -q merchant; then\n  curl -fsSL \"https://raw.githubusercontent.com/UniBee-Billing/unibee/v1.9.0/mysql/structure.sql\"\
      \ \\\n    | mysql -h\"${DB_HOST}\" -uunibee -punibee unibee\nfi\ncd /app &&\
      \ exec ./main\n"
    run:
      securityContext:
        readOnlyRootFilesystem: true

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: hop
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source data orchestration and integration
      platform (ETL) for designing and running visual data pipelines and workflows
      in the browser.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/hop/icon.png
    kubero.dev/template.installation: Deploys the official apache/hop-web image, with
      the visual designer reachable at the /ui path on the app URL. Apache Hop stores
      its projects, environments, and metadata as files, so no database add-on is
      provisioned; the persistent /config volume holds your project and config directory
      and must be kept. Mount or import your Hop project under /config and set HOP_PROJECT_FOLDER
      / HOP_PROJECT_NAME / HOP_ENVIRONMENT_NAME to auto-load it on startup (leave
      them empty to start with the default 'samples' project). Database, file, and
      message-queue connections used by your pipelines (Postgres, MySQL, Kafka, S3,
      etc.) are configured inside Hop per pipeline and are not part of this template.
      For production, run with a sized app pod (the JVM needs more than the default
      512Mi) and add authentication in front of Hop Web, which ships without built-in
      login.
    kubero.dev/template.links: '["https://hop.apache.org/manual/latest/hop-gui/hop-web.html",
      "https://hop.apache.org/tech-manual/latest/docker-container.html"]'
    kubero.dev/template.screenshots: '["https://hop.apache.org/img/hop-gui.png"]'
    kubero.dev/template.source: https://github.com/apache/hop
    kubero.dev/template.categories: '["data", "automation", "development"]'
    kubero.dev/template.title: Apache Hop
    kubero.dev/template.website: https://hop.apache.org
  labels:
    manager: kubero
spec:
  name: hop
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: HOP_PROJECT_FOLDER
    value: ''
  - name: HOP_PROJECT_NAME
    value: ''
  - name: HOP_ENVIRONMENT_NAME
    value: ''
  - name: HOP_LOG_LEVEL
    value: Basic
  - name: HOP_AUDIT_FOLDER
    value: /config/audit
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 2Gi
    storageClass: lite
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: apache/hop-web
    tag: latest
    command:
    - bash
    - -c
    - "set -Euo pipefail\nif [ -n \"${HOP_PROJECT_FOLDER}\" ] && [ -n \"${HOP_PROJECT_NAME}\"\
      \ ] && [ -d \"${HOP_PROJECT_FOLDER}\" ]; then\n  if ! \"${DEPLOYMENT_PATH}/hop-conf.sh\"\
      \ -pl | grep -q -E \"^  ${HOP_PROJECT_NAME} :\"; then\n    \"${DEPLOYMENT_PATH}/hop-conf.sh\"\
      \ \\\n      --project=\"${HOP_PROJECT_NAME}\" \\\n      --project-create \\\n\
      \      --project-home=\"${HOP_PROJECT_FOLDER}\" \\\n      --project-config-file=\"\
      ${HOP_PROJECT_CONFIG_FILE_NAME}\"\n  fi\n  if [ -n \"${HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS}\"\
      \ ] && [ -n \"${HOP_ENVIRONMENT_NAME}\" ]; then\n    if ! \"${DEPLOYMENT_PATH}/hop-conf.sh\"\
      \ -el | grep -q -E -x \"^  ${HOP_ENVIRONMENT_NAME}\"; then\n      \"${DEPLOYMENT_PATH}/hop-conf.sh\"\
      \ \\\n        --environment=\"${HOP_ENVIRONMENT_NAME}\" \\\n        --environment-create\
      \ \\\n        --environment-project=\"${HOP_PROJECT_NAME}\" \\\n        --environment-purpose=\"\
      Apache Hop docker container\" \\\n        --environment-config-files=\"${HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS}\"\
      \n    fi\n  fi\nfi\n[ -f /config/tomcat-users.xml ] && cp /config/tomcat-users.xml\
      \ /usr/local/tomcat/conf/\n[ -f /config/web.xml ] && cp /config/web.xml /usr/local/tomcat/webapps/ROOT/WEB-INF/\n\
      catalina.sh run &\npid=\"$!\"\ntrap \"catalina.sh stop\" SIGINT SIGTERM\nwait\
      \ \"$pid\"\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: magento
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source PHP e-commerce platform with a flexible catalog, checkout, promotions and
      a powerful admin for building online stores.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/magento/icon.png
    kubero.dev/template.installation: 'Community ataberkylmz/magento2 image (Bitnami Magento was removed from Docker Hub).
      MariaDB and OpenSearch 1.3 are provisioned as operator add-ons; Valkey is included for optional Redis cache/session
      wiring after install. First boot auto-installs Magento 2.4.4 from ADMIN_* / DB_* / ELASTICSEARCH_* env vars — rotate
      ADMIN_PASSWORD and the MariaDB password before exposing publicly. Admin panel lives at {{KUBERO_APP_URL}}/admin.
      Install is slow (several minutes) and memory-heavy; the web pod requests 2Gi RAM. Optional: deploy a cron worker with
      ''php bin/magento cron:run'' and configure Redis via bin/magento setup:config:set after first boot.'
    kubero.dev/template.links: '["https://experienceleague.adobe.com/docs/commerce-operations/installation-guide/overview.html",
      "https://github.com/ataberkylmz/Magento2-Docker"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/magento/magento2
    kubero.dev/template.categories: '["e-commerce", "cms", "work"]'
    kubero.dev/template.title: Magento
    kubero.dev/template.website: https://business.adobe.com/products/magento/open-source.html
  labels:
    manager: kubero
spec:
  name: magento
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: magento-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: magento-mysql-root
            key: password
          database: magento
          username: magento
          passwordSecretKeyRef:
            name: magento-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: magento-mysql-root
        type: Opaque
        stringData:
          password: magento
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: magento-mysql-app
        type: Opaque
        stringData:
          password: magento
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: magento-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  - displayName: OpenSearch
    env: []
    icon: /img/addons/opensearch.svg
    id: kubero-operator
    kind: KuberoOpenSearch
    resourceDefinitions:
      KuberoOpenSearch:
        apiVersion: application.kubero.dev/v1alpha1
        kind: KuberoOpenSearch
        metadata:
          name: magento-elasticsearch
        spec:
          opensearch:
            clusterName: magento-elasticsearch
            masterService: magento-elasticsearch
            image:
              tag: '1.3.20'
            singleNode: true
            replicas: 1
            persistence:
              enabled: true
              storageClass: fast
              size: 5Gi
            securityConfig:
              enabled: false
            config:
              opensearch.yml: |
                cluster.name: magento-elasticsearch
                network.host: 0.0.0.0
                discovery.type: single-node
                plugins.security.disabled: true
  envVars:
  - name: MAGENTO_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: USE_SSL
    value: '1'
  - name: DB_SERVER
    value: magento-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_NAME
    value: magento
  - name: DB_USER
    value: magento
  - name: DB_PASSWORD
    value: magento
  - name: ELASTICSEARCH_SERVER
    value: magento-elasticsearch
  - name: ELASTICSEARCH_PORT
    value: '9200'
  - name: ADMIN_USERNAME
    value: admin
  - name: ADMIN_PASSWORD
    value: replace-with-openssl-rand-base64-32
  - name: ADMIN_EMAIL
    value: admin@example.com
  - name: ADMIN_NAME
    value: Store
  - name: ADMIN_LASTNAME
    value: Admin
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html
    name: magento-data
    size: 5Gi
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: ataberkylmz/magento2
    tag: 2.4.4

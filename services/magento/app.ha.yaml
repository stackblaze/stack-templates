apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: magento
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source PHP e-commerce platform with a flexible
      catalog, checkout, promotions and a powerful admin for building online stores.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/magento/icon.png
    kubero.dev/template.installation: "shinsenter/magento image (Bitnami Magento was\
      \ removed from Docker Hub). MariaDB Galera and OpenSearch 1.3 (3-node) are provisioned\
      \ as operator add-ons. On first boot the container bootstraps Magento via composer\
      \ then runs setup:install \u2014 rotate ADMIN_PASSWORD and the MariaDB password\
      \ before exposing publicly. Admin panel lives at {{KUBERO_APP_URL}}/admin. Install\
      \ is slow (10\u201315 min) and memory-heavy; the web pod requests 2Gi RAM."
    kubero.dev/template.links: '["https://experienceleague.adobe.com/docs/commerce-operations/installation-guide/overview.html",
      "https://hub.docker.com/r/shinsenter/magento"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/wiki/magento/magento2/images/maintainers.png"]'
    kubero.dev/template.source: https://github.com/magento/magento2
    kubero.dev/template.categories: '["e-commerce", "cms", "work"]'
    kubero.dev/template.title: Magento
    kubero.dev/template.website: https://business.adobe.com/products/magento/open-source.html
  labels:
    manager: kubero
spec:
  name: magento
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: magento
          username: magento
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: magento
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: magento
  - displayName: OpenSearch
    env: []
    icon: /img/addons/opensearch.svg
    id: kubero-operator
    kind: KuberoOpenSearch
    resourceDefinitions:
      KuberoOpenSearch:
        apiVersion: application.kubero.dev/v1alpha1
        kind: KuberoOpenSearch
        metadata:
          name: '{{KUBERO_APP_NAME}}-elasticsearch'
        spec:
          opensearch:
            clusterName: '{{KUBERO_APP_NAME}}-elasticsearch'
            masterService: '{{KUBERO_APP_NAME}}-elasticsearch'
            image:
              tag: 1.3.20
            singleNode: false
            replicas: 3
            roles:
            - master
            - ingest
            - data
            persistence:
              enabled: true
              storageClass: fast
              size: 5Gi
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: '1'
                memory: 2Gi
            securityConfig:
              enabled: false
            config:
              opensearch.yml: 'cluster.name: magento-elasticsearch

                network.host: 0.0.0.0

                plugins.security.disabled: true

                '
  envVars:
  - name: MAGENTO_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: COMPOSER_MEMORY_LIMIT
    value: '-1'
  - name: DISABLE_AUTORUN_CREATING_PROJECT
    value: '1'
  - name: ADMIN_USERNAME
    value: admin
  - name: ADMIN_PASSWORD
    value: replace-with-openssl-rand-base64-32
  - name: ADMIN_EMAIL
    value: admin@example.com
  - name: ADMIN_NAME
    value: Store
  - name: ADMIN_LASTNAME
    value: Admin
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: ES_HOST
    value: '{{KUBERO_APP_NAME}}-elasticsearch'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/www/html
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: shared
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: shinsenter/magento
    tag: php8.3-nginx
    command:
    - bash
    - -c
    - "(\n  while ! (echo >/dev/tcp/${DB_HOST}/3306) 2>/dev/null; do sleep 3; done\n\
      \  while ! curl -sf \"http://${ES_HOST}:9200/_cat/health\" >/dev/null; do sleep\
      \ 3; done\n  if [ ! -f /var/www/html/bin/magento ]; then\n    cd /var/www/html\n\
      \    if [ ! -f composer.json ]; then\n      find /var/www/html -mindepth 1 -maxdepth\
      \ 1 ! -name lost+found -exec rm -rf {} + 2>/dev/null || true\n      composer\
      \ create-project --no-interaction magento/community-edition .\n    else\n  \
      \    composer install --no-interaction\n    fi\n  fi\n  while [ ! -f /var/www/html/bin/magento\
      \ ]; do sleep 5; done\n  cd /var/www/html\n  if [ ! -f app/etc/env.php ]; then\n\
      \    php bin/magento setup:install \\\n      --base-url=\"https://${MAGENTO_HOST}/\"\
      \ \\\n      --db-host=${DB_HOST} --db-name=magento --db-user=magento --db-password=magento\
      \ \\\n      --admin-firstname=\"${ADMIN_NAME}\" --admin-lastname=\"${ADMIN_LASTNAME}\"\
      \ \\\n      --admin-email=\"${ADMIN_EMAIL}\" --admin-user=\"${ADMIN_USERNAME}\"\
      \ --admin-password=\"${ADMIN_PASSWORD}\" \\\n      --search-engine=elasticsearch7\
      \ \\\n      --elasticsearch-host=${ES_HOST} --elasticsearch-port=9200 \\\n \
      \     --use-rewrites=1 --backend-frontname=admin -n\n    php bin/magento deploy:mode:set\
      \ production -n\n    php bin/magento cache:flush -n\n  fi\n) > /var/log/magento-install.log\
      \ 2>&1 &\ndisown\nfor ep in /docker-php-entrypoint /usr/local/bin/docker-php-entrypoint;\
      \ do\n  [ -x \"$ep\" ] && exec \"$ep\"\ndone\nexec /init\n"
    run:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        readOnlyRootFilesystem: false

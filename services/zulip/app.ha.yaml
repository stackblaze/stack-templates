apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: zulip
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: "Powerful open-source team chat organized into\
      \ topic-based threads \u2014 an alternative to Slack."
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/zulip/icon.png
    kubero.dev/template.installation: "Set SETTING_EXTERNAL_HOST and SECRETS_secret_key\
      \ before first boot. Initial startup can take 5\u201310 minutes while Zulip\
      \ configures all services. Requires `kubero-operator/operators/install.sh` (RabbitMQ\
      \ Cluster operator)."
    kubero.dev/template.links: '["https://zulip.readthedocs.io/projects/docker/"]'
    kubero.dev/template.screenshots: '["https://zulip.com/static/images/landing-page/zulip-hero.png"]'
    kubero.dev/template.source: https://github.com/zulip/zulip
    kubero.dev/template.categories: '["communication", "work", "collaboration"]'
    kubero.dev/template.title: Zulip
    kubero.dev/template.website: https://zulip.com/
  labels:
    manager: kubero
spec:
  name: zulip
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: zulip
              owner: zulip
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO zulip
              - GRANT CREATE ON SCHEMA public TO zulip
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO zulip
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: zulip
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: zulip
          password: zulip
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  - displayName: RabbitMQ
    env: []
    icon: /img/addons/rabbitmq.svg
    id: kubero-operator
    kind: RabbitmqCluster
    resourceDefinitions:
      RabbitmqCluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-rabbitmq'
        spec:
          replicas: 3
          persistence:
            storageClassName: fast
            storage: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          rabbitmq:
            additionalConfig: 'default_user = zulip

              default_pass = zulip

              '
  - displayName: Memcached
    env: []
    icon: /img/addons/memcached.svg
    id: kubero-operator
    kind: KuberoAddonMemcached
    resourceDefinitions:
      KuberoAddonMemcached:
        apiVersion: application.kubero.dev/v1alpha1
        kind: KuberoAddonMemcached
        metadata:
          name: '{{KUBERO_APP_NAME}}-memcached'
        spec:
          memcached:
            image:
              tag: 1.6.39
            replicaCount: 3
            config:
              memoryLimit: 64
              maxConnections: 1024
              extraArgs: []
              verbosity: 0
            resources: {}
  envVars:
  - name: SETTING_EXTERNAL_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: SETTING_ALLOWED_HOSTS
    value: '[''*'']'
  - name: SETTING_ROOT_DOMAIN_LANDING_PAGE
    value: 'True'
  - name: LOADBALANCER_IPS
    value: 0.0.0.0/0
  - name: SETTING_ZULIP_ADMINISTRATOR
    value: admin@example.com
  - name: DB_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: DB_HOST_PORT
    value: '5432'
  - name: DB_NAME
    value: zulip
  - name: DB_USER
    value: zulip
  - name: REMOTE_POSTGRES_SSLMODE
    value: prefer
  - name: SETTING_RABBITMQ_HOST
    value: '{{KUBERO_APP_NAME}}-rabbitmq'
  - name: SETTING_REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: SETTING_MEMCACHED_LOCATION
    value: '{{KUBERO_APP_NAME}}-memcached:11211'
  - name: DISABLE_HTTPS
    value: 'True'
  - name: SSL_CERTIFICATE_GENERATION
    value: self-signed
  - name: TRUST_GATEWAY_IP
    value: 'True'
  - name: SECRETS_postgres_password
    value: zulip
  - name: SECRETS_rabbitmq_password
    value: zulip
  - name: SECRETS_redis_password
    value: ''
  - name: SECRETS_memcached_password
    value: ''
  - name: SECRETS_secret_key
    value: '{{KUBERO_GEN_ALNUM:50}}'
  - name: POSTGRES_DB
    value: zulip
  - name: POSTGRES_USER
    value: zulip
  - name: POSTGRES_PASSWORD
    value: zulip
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 4Gi
  healthcheck:
    enabled: true
    path: /health
    startupSeconds: 1200
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: zulip/docker-zulip
    tag: 11.6-0
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: plane
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: "Open-source project management platform \u2014\
      \ modern alternative to Jira and Linear."
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/plane/icon.png
    kubero.dev/template.installation: "This template deploys the Plane API backend\
      \ with PostgreSQL, Valkey, RabbitMQ, and RustFS. Plane CE also requires web,\
      \ worker, beat, and proxy containers \u2014 use the official Plane Helm chart\
      \ for a full stack, or deploy makeplane/plane-frontend and makeplane/plane-proxy\
      \ companions pointed at this API service."
    kubero.dev/template.links: '["https://developers.plane.so/"]'
    kubero.dev/template.screenshots: '["https://plane.so/og-image.png"]'
    kubero.dev/template.source: https://github.com/makeplane/plane
    kubero.dev/template.categories: '["productivity", "work", "collaboration"]'
    kubero.dev/template.title: Plane
    kubero.dev/template.website: https://plane.so/
  labels:
    manager: kubero
spec:
  name: plane
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: plane
              owner: plane
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO plane
              - GRANT CREATE ON SCHEMA public TO plane
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO plane
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: plane
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: plane
          password: plane
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  - displayName: RustFS
    env: []
    icon: /img/addons/rustfs.svg
    id: kubero-operator
    kind: Tenant
    resourceDefinitions:
      Tenant:
        apiVersion: rustfs.com/v1alpha1
        kind: Tenant
        metadata:
          name: '{{KUBERO_APP_NAME}}-rustfs'
        spec:
          image: rustfs/rustfs:latest
          credsSecret:
            name: '{{KUBERO_APP_NAME}}-rustfs-credentials'
          pools:
          - name: pool-0
            servers: 1
            persistence:
              volumesPerServer: 4
              volumeClaimTemplate:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
                storageClassName: slow
      credsSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-rustfs-credentials'
        type: Opaque
        stringData:
          accesskey: planeadmin
          secretkey: changeme
  - displayName: RabbitMQ
    env: []
    icon: /img/addons/rabbitmq.svg
    id: kubero-operator
    kind: RabbitmqCluster
    resourceDefinitions:
      RabbitmqCluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-rabbitmq'
        spec:
          replicas: 1
          persistence:
            storageClassName: lite
            storage: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          rabbitmq:
            additionalConfig: "default_user = plane\ndefault_pass = plane\ndefault_vhost\
              \ = plane\n"
  envVars:
  - name: WEB_URL
    value: '{{KUBERO_APP_URL}}'
  - name: CORS_ALLOWED_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: DATABASE_URL
    value: postgresql://plane:plane@{{KUBERO_APP_NAME}}-postgresql-rw:5432/plane
  - name: REDIS_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: CELERY_BROKER_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: CELERY_RESULT_BACKEND
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: AMQP_URL
    value: amqp://plane:plane@{{KUBERO_APP_NAME}}-rabbitmq:5672/plane
  - name: RABBITMQ_HOST
    value: '{{KUBERO_APP_NAME}}-rabbitmq'
  - name: RABBITMQ_PORT
    value: '5672'
  - name: SECRET_KEY
    value: '{{KUBERO_GEN_ALNUM:50}}'
  - name: USE_MINIO
    value: '1'
  - name: AWS_ACCESS_KEY_ID
    value: planeadmin
  - name: AWS_SECRET_ACCESS_KEY
    value: changeme
  - name: AWS_S3_ENDPOINT_URL
    value: http://{{KUBERO_APP_NAME}}-rustfs-io:9000
  - name: AWS_S3_BUCKET_NAME
    value: uploads
  - name: AWS_REGION
    value: us-east-1
  - name: GUNICORN_WORKERS
    value: '1'
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: '1'
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 3Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: makeplane/plane-backend
    tag: stable
    command:
    - sh
    - -c
    - ./bin/docker-entrypoint-migrator.sh && ./bin/docker-entrypoint-api.sh
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: plane
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: "Open-source project management platform — modern alternative to Jira and Linear."
    kubero.dev/template.icon: https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/icon.png
    kubero.dev/template.installation: |
      Deploys Plane CE as a multi-service monorepo group (same Architecture UX as voting-app): api + worker + beat (makeplane/plane-backend), web/space/admin/live frontends, and plane-proxy as the public entrypoint. Shared add-ons (PostgreSQL, Valkey, RabbitMQ, RustFS) attach to the api service; companions share gitrepo.clone_url https://github.com/makeplane/plane.git so the Architecture graph groups them. After deploy, create cluster-local alias Services the proxy Caddyfile expects (api→api app :8000, web/space/admin/live→:3000, plane-minio→RustFS IO :9000), then set WEB_URL and CORS_ALLOWED_ORIGINS on api/frontends to the proxy public URL. Rotate SECRET_KEY, LIVE_SERVER_SECRET_KEY, and RustFS credentials before production use.
    kubero.dev/template.links: '["https://developers.plane.so/"]'
    kubero.dev/template.screenshots: '["https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/demo.mp4", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/dashboard.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/screenshot-all-projects.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/screenshot-home.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/screenshot-analytics.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/screenshot-settings.png", "https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@main/services/plane/screenshot-admin-general.png"]'
    kubero.dev/template.source: https://github.com/makeplane/plane
    kubero.dev/template.categories: '["productivity", "work", "collaboration"]'
    kubero.dev/template.title: Plane
    kubero.dev/template.website: https://plane.so/
  labels:
    manager: kubero
spec:
  name: plane
  deploymentstrategy: docker
  # Synthetic monorepo key — Architecture groups siblings by clone_url (+ branch).
  gitrepo:
    admin: false
    clone_url: https://github.com/makeplane/plane.git
    default_branch: master
    private: false
    ssh_url: ''
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 2
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: plane
              owner: plane
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO plane
              - GRANT CREATE ON SCHEMA public TO plane
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO plane
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: plane
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: plane
          password: plane
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  - displayName: RustFS
    env: []
    icon: /img/addons/rustfs.svg
    id: kubero-operator
    kind: Tenant
    resourceDefinitions:
      Tenant:
        apiVersion: rustfs.com/v1alpha1
        kind: Tenant
        metadata:
          name: '{{KUBERO_APP_NAME}}-rustfs'
        spec:
          image: rustfs/rustfs:latest
          credsSecret:
            name: '{{KUBERO_APP_NAME}}-rustfs-credentials'
          pools:
          - name: pool-0
            servers: 1
            persistence:
              volumesPerServer: 4
              volumeClaimTemplate:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
                storageClassName: slow
      credsSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-rustfs-credentials'
        type: Opaque
        stringData:
          accesskey: planeadmin
          secretkey: changeme
  - displayName: RabbitMQ
    env: []
    icon: /img/addons/rabbitmq.svg
    id: kubero-operator
    kind: RabbitmqCluster
    resourceDefinitions:
      RabbitmqCluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-rabbitmq'
        spec:
          replicas: 1
          persistence:
            storageClassName: lite
            storage: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          rabbitmq:
            additionalConfig: "default_user = plane\ndefault_pass = plane\ndefault_vhost\
              \ = plane\n"
  envVars:

  - name: WEB_URL
    value: '{{KUBERO_APP_URL}}'
  - name: CORS_ALLOWED_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: DATABASE_URL
    value: postgresql://plane:plane@{{KUBERO_APP_NAME}}-postgresql-rw:5432/plane
  - name: REDIS_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: CELERY_BROKER_URL
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: CELERY_RESULT_BACKEND
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: AMQP_URL
    value: amqp://plane:plane@{{KUBERO_APP_NAME}}-rabbitmq:5672/plane
  - name: RABBITMQ_HOST
    value: '{{KUBERO_APP_NAME}}-rabbitmq'
  - name: RABBITMQ_PORT
    value: '5672'
  - name: SECRET_KEY
    value: '{{KUBERO_GEN_ALNUM:50}}'
  - name: LIVE_SERVER_SECRET_KEY
    value: '{{KUBERO_GEN_ALNUM:32}}'
  - name: USE_MINIO
    value: '1'
  - name: AWS_ACCESS_KEY_ID
    value: planeadmin
  - name: AWS_SECRET_ACCESS_KEY
    value: changeme
  - name: AWS_S3_ENDPOINT_URL
    value: http://{{KUBERO_APP_NAME}}-rustfs-io:9000
  - name: AWS_S3_BUCKET_NAME
    value: uploads
  - name: AWS_REGION
    value: us-east-1
  - name: GUNICORN_WORKERS
    value: '1'
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: '1'
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 3Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: makeplane/plane-backend
    tag: stable
    command:
    - sh
    - -c
    - ./bin/docker-entrypoint-migrator.sh && ./bin/docker-entrypoint-api.sh
    run:
      securityContext:
        readOnlyRootFilesystem: false
  # Catalog-only (not written to the KuberoApp CR). Dashboard expands these into
  # docker multi-app cards; addons stay on the primary api card above.
  # exposeInternet:false → web replicas, no Ingress (proxy is the public entry).
  templateServices:
  - id: worker
    nameHint: plane-worker
    exposeInternet: false
    image:
      repository: makeplane/plane-backend
      tag: stable
      containerPort: '8000'
      command:
      - ./bin/docker-entrypoint-worker.sh
    inheritEnvFrom: primary
    healthcheck:
      enabled: false
  - id: beat
    nameHint: plane-beat
    exposeInternet: false
    image:
      repository: makeplane/plane-backend
      tag: stable
      containerPort: '8000'
      command:
      - ./bin/docker-entrypoint-beat.sh
    inheritEnvFrom: primary
    healthcheck:
      enabled: false
  - id: web
    nameHint: plane-web
    exposeInternet: false
    image:
      repository: makeplane/plane-frontend
      tag: stable
      containerPort: '3000'
    envVars:
    - name: WEB_URL
      value: '{{KUBERO_APP_URL}}'
    healthcheck:
      enabled: true
      path: /
  - id: space
    nameHint: plane-space
    exposeInternet: false
    image:
      repository: makeplane/plane-space
      tag: stable
      containerPort: '3000'
    envVars:
    - name: WEB_URL
      value: '{{KUBERO_APP_URL}}'
    healthcheck:
      enabled: false
  - id: admin
    nameHint: plane-admin
    exposeInternet: false
    image:
      repository: makeplane/plane-admin
      tag: stable
      containerPort: '3000'
    envVars:
    - name: WEB_URL
      value: '{{KUBERO_APP_URL}}'
    healthcheck:
      enabled: false
  - id: live
    nameHint: plane-live
    exposeInternet: false
    image:
      repository: makeplane/plane-live
      tag: stable
      containerPort: '3000'
    envVars:
    - name: API_BASE_URL
      value: http://api:8000
    - name: WEB_URL
      value: '{{KUBERO_APP_URL}}'
    - name: REDIS_URL
      value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
    - name: LIVE_SERVER_SECRET_KEY
      value: '{{KUBERO_GEN_ALNUM:32}}'
    healthcheck:
      enabled: false
  - id: proxy
    nameHint: plane-proxy
    exposeInternet: true
    publicUrlSource: true
    image:
      repository: makeplane/plane-proxy
      tag: stable
      containerPort: '80'
    envVars:
    - name: BUCKET_NAME
      value: uploads
    - name: FILE_SIZE_LIMIT
      value: '5242880'
    - name: SITE_ADDRESS
      value: ':80'
    healthcheck:
      enabled: true
      path: /
  # Alias Services the plane-proxy Caddyfile expects (created post-install /
  # by the deploy helper). Selectors use KuberoApp instance labels.
  templateServiceAliases:
  - name: api
    port: 8000
    targetRole: primary
  - name: web
    port: 3000
    targetRole: web
  - name: space
    port: 3000
    targetRole: space
  - name: admin
    port: 3000
    targetRole: admin
  - name: live
    port: 3000
    targetRole: live
  - name: plane-minio
    port: 9000
    externalNameRole: rustfs-io

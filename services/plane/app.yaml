apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: plane
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source project management platform — modern alternative to Jira and Linear.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/115727700?s=200&v=4
    kubero.dev/template.installation: This template deploys the Plane API backend with PostgreSQL and Valkey. Plane CE also
      requires web, worker, beat, and proxy containers — use the official Plane Helm chart for a full stack, or deploy makeplane/plane-frontend
      and makeplane/plane-proxy companions pointed at this API service.
    kubero.dev/template.links: '["https://developers.plane.so/"]'
    kubero.dev/template.screenshots: '["https://plane.so/og-image.png"]'
    kubero.dev/template.source: https://github.com/makeplane/plane
    kubero.dev/template.categories: '["productivity", "work", "collaboration"]'
    kubero.dev/template.title: Plane
    kubero.dev/template.website: https://plane.so/
  labels:
    manager: kubero
spec:
  name: plane
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: plane-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: plane
              owner: plane
              secret:
                name: plane-postgresql-app
              postInitApplicationSQL:
                - GRANT ALL ON SCHEMA public TO plane
                - GRANT CREATE ON SCHEMA public TO plane
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO plane
          enableSuperuserAccess: true
          superuserSecret:
            name: plane-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: plane-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: plane
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: plane-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: plane
          password: plane
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: plane-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  - displayName: RustFS
    env: []
    icon: /img/addons/rustfs.svg
    id: kubero-operator
    kind: Tenant
    resourceDefinitions:
      Tenant:
        apiVersion: rustfs.com/v1alpha1
        kind: Tenant
        metadata:
          name: plane-rustfs
        spec:
          image: rustfs/rustfs:latest
          credsSecret:
            name: plane-rustfs-credentials
          pools:
          - name: pool-0
            servers: 1
            persistence:
              volumesPerServer: 4
              volumeClaimTemplate:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
                storageClassName: slow
      credsSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: plane-rustfs-credentials
        type: Opaque
        stringData:
          accesskey: planeadmin
          secretkey: changeme
  envVars:
  - name: WEB_URL
    value: '{{KUBERO_APP_URL}}'
  - name: CORS_ALLOWED_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: DATABASE_URL
    value: postgresql://plane:plane@plane-postgresql-rw:5432/plane
  - name: REDIS_URL
    value: redis://rfr-plane-valkey-readwrite:6379/0
  - name: SECRET_KEY
    value: '{{KUBERO_GEN_ALNUM:50}}'
  - name: USE_MINIO
    value: '1'
  - name: AWS_ACCESS_KEY_ID
    value: planeadmin
  - name: AWS_SECRET_ACCESS_KEY
    value: changeme
  - name: AWS_S3_ENDPOINT_URL
    value: http://plane-rustfs:9000
  - name: AWS_S3_BUCKET_NAME
    value: uploads
  - name: AWS_REGION
    value: us-east-1
  - name: GUNICORN_WORKERS
    value: '1'
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: '1'
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 3Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: makeplane/plane-backend
    tag: stable
    command:
    - sh
    - -c
    - ./bin/docker-entrypoint-migrator.sh && ./bin/docker-entrypoint-api.sh

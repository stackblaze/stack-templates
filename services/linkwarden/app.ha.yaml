apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: linkwarden
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Self-hosted collaborative bookmark manager to
      collect and organize links.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/linkwarden/icon.png
    kubero.dev/template.installation: Set NEXTAUTH_SECRET with `openssl rand -base64
      32`. For full-text search, deploy meilisearch in the same pipeline phase and
      set MEILI_HOST plus MEILI_MASTER_KEY.
    kubero.dev/template.links: '["https://docs.linkwarden.app/"]'
    kubero.dev/template.screenshots: '["https://linkwarden.app/_next/image?url=%2Fthumbnail.png&w=1920&q=75"]'
    kubero.dev/template.source: https://github.com/linkwarden/linkwarden
    kubero.dev/template.categories: '["documentation", "utilities", "work"]'
    kubero.dev/template.title: Linkwarden
    kubero.dev/template.website: https://linkwarden.app/
  labels:
    manager: kubero
spec:
  name: linkwarden
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: linkwarden-db
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: linkwarden
              owner: linkwarden
              secret:
                name: linkwarden-db-app
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO linkwarden
              - GRANT CREATE ON SCHEMA public TO linkwarden
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO linkwarden
          enableSuperuserAccess: true
          superuserSecret:
            name: linkwarden-db-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: linkwarden-db-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: linkwarden
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: linkwarden-db-app
        type: kubernetes.io/basic-auth
        stringData:
          username: linkwarden
          password: linkwarden
  envVars:
  - name: NEXTAUTH_URL
    value: '{{KUBERO_APP_URL}}/api/v1/auth'
  - name: NEXTAUTH_SECRET
    value: H+KbL/OFrqbEuDy/1zX8bsPG+spXri3S
  - name: DATABASE_URL
    value: postgresql://linkwarden:linkwarden@linkwarden-db-rw:5432/linkwarden
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /data/data
    name: linkwarden-data
    size: 2Gi
    storageClass: shared
  cronjobs: []
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: ghcr.io/linkwarden/linkwarden
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: pixelfed
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free, federated (ActivityPub) photo-sharing platform - a self-hosted, ethical alternative
      to Instagram for the Fediverse.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/pixelfed/icon.png
    kubero.dev/template.installation: 'This template runs the PRIMARY Pixelfed web/php-fpm container only. The zknt/pixelfed
      image serves over HTTP on port 80 and ships a php-fpm + nginx supervisord bundle. REQUIRED first-run steps: 1) Generate
      an APP_KEY with ''php artisan key:generate'' (or ''openssl rand -base64 32'') and set it as ''base64:...'' - rotate
      the placeholder before going live. 2) After the DB is up, exec into the pod and run ''php artisan migrate --force''
      and ''php artisan storage:link'', then ''php artisan import:cities'' and ''php artisan instance:actor'' to seed the
      federation actor. 3) Create the first admin with ''php artisan user:create'' (or register then ''php artisan user:admin
      <id>''). COMPANION SERVICES to deploy separately for a full instance (same zknt/pixelfed image, different command):
      a HORIZON QUEUE WORKER (''php artisan horizon'') is MANDATORY for federation, media optimization, and notifications
      - deploy it as a second app pointing at the same MariaDB + Valkey; an optional SCHEDULER/cron loop (''php artisan schedule:work'')
      for digests and cleanup. Pixelfed stores uploads/avatars under /var/www/storage (mounted here) - the worker pod must
      share or replicate this path (use RWX storage) so federated media is reachable. Object storage: for production at scale
      point FILESYSTEM_DRIVER + AWS_* / S3 vars at an external S3 bucket (e.g. the RustFS add-on) instead of the local volume;
      omit it here for a single-node start. Rotate the MariaDB password, Valkey is password-less in-cluster. Set ADMIN_DOMAIN
      / APP_DOMAIN to your real host before federating - it is baked into ActivityPub actor URLs and cannot be changed cleanly
      later.'
    kubero.dev/template.links: '["https://docs.pixelfed.org/running-pixelfed/", "https://github.com/pixelfed/pixelfed/blob/dev/docker-compose.yml"]'
    kubero.dev/template.screenshots: '["https://pixelfed.org/img/screenshots/timeline.png"]'
    kubero.dev/template.source: https://github.com/pixelfed/pixelfed
    kubero.dev/template.categories: '["social", "media", "communication"]'
    kubero.dev/template.title: Pixelfed
    kubero.dev/template.website: https://pixelfed.org
  labels:
    manager: kubero
spec:
  name: pixelfed
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: pixelfed-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: pixelfed-mysql-root
            key: password
          database: pixelfed
          username: pixelfed
          passwordSecretKeyRef:
            name: pixelfed-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: pixelfed-mysql-root
        type: Opaque
        stringData:
          password: pixelfed
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: pixelfed-mysql-app
        type: Opaque
        stringData:
          password: pixelfed
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: pixelfed-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: APP_NAME
    value: Pixelfed
  - name: APP_ENV
    value: production
  - name: APP_DEBUG
    value: 'false'
  - name: APP_KEY
    value: base64:replace-with-openssl-rand-base64-32
  - name: APP_URL
    value: '{{KUBERO_APP_URL}}'
  - name: APP_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: ADMIN_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: SESSION_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: TRUST_PROXIES
    value: '*'
  - name: DB_CONNECTION
    value: mysql
  - name: DB_HOST
    value: pixelfed-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_DATABASE
    value: pixelfed
  - name: DB_USERNAME
    value: pixelfed
  - name: DB_PASSWORD
    value: pixelfed
  - name: REDIS_CLIENT
    value: phpredis
  - name: REDIS_SCHEME
    value: tcp
  - name: REDIS_HOST
    value: rfr-pixelfed-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: REDIS_PASSWORD
    value: 'null'
  - name: REDIS_DATABASE
    value: '0'
  - name: CACHE_DRIVER
    value: redis
  - name: BROADCAST_DRIVER
    value: redis
  - name: QUEUE_DRIVER
    value: redis
  - name: SESSION_DRIVER
    value: redis
  - name: HORIZON_PREFIX
    value: horizon-
  - name: MAIL_DRIVER
    value: log
  - name: FILESYSTEM_DRIVER
    value: local
  - name: OPEN_REGISTRATION
    value: 'false'
  - name: ENFORCE_EMAIL_VERIFICATION
    value: 'false'
  - name: PF_OPTIMIZE_IMAGES
    value: 'true'
  - name: IMAGE_DRIVER
    value: imagick
  - name: ACTIVITY_PUB
    value: 'true'
  - name: ATOM_FEEDS
    value: 'true'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/storage
    name: pixelfed-storage
    size: 5Gi
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/bootstrap
    name: pixelfed-bootstrap
    size: 1Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: zknt/pixelfed
    tag: latest

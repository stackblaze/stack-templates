apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: lightdash
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source BI platform that turns your dbt project into a self-serve analytics tool
      with explores, charts, and dashboards.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/lightdash/icon.png
    kubero.dev/template.installation: 'This template runs the PRIMARY Lightdash web/api server (lightdash/lightdash, port
      8080), which on boot also runs its own DB migrations against the bundled Postgres add-on. To be fully functional you
      MUST ALSO deploy a companion HEADLESS BROWSER deployment from image `ghcr.io/browserless/chromium:latest` (formerly
      browserless/chrome), exposing port 3000 on an in-cluster service named to match HEADLESS_BROWSER_HOST below; it renders
      charts/dashboards for scheduled deliveries, image downloads, and PDF exports. Lightdash also needs S3-COMPATIBLE OBJECT
      STORAGE for results/file caching and scheduled-delivery artifacts — the bundled RustFS add-on supplies S3_ENDPOINT/S3_BUCKET/S3_REGION/S3_ACCESS_KEY/S3_SECRET_KEY
      (rotate the RustFS credentials before exposing; point at any other S3 bucket instead if preferred).
      ROTATE before exposing: LIGHTDASH_SECRET (`openssl rand -base64 32`; do NOT change it after data exists or saved warehouse
      credentials become undecryptable) and the Postgres add-on password (keep PGPASSWORD in sync). Set SITE_URL via the {{KUBERO_APP_URL}}
      token (already wired). The first user to register becomes the admin/owner. Optional outbound email needs the EMAIL_SMTP_*
      env vars (not provisioned).'
    kubero.dev/template.links: '["https://docs.lightdash.com/self-host/self-host-lightdash", "https://docs.lightdash.com/self-host/customize-deployment/environment-variables"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/lightdash/lightdash/main/static/screenshots/lightdash-dashboard.png"]'
    kubero.dev/template.source: https://github.com/lightdash/lightdash
    kubero.dev/template.categories: '["data", "monitoring", "development"]'
    kubero.dev/template.title: Lightdash
    kubero.dev/template.website: https://www.lightdash.com
  labels:
    manager: kubero
spec:
  name: lightdash
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: lightdash-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: lightdash
              owner: lightdash
              secret:
                name: lightdash-postgresql-app
              postInitApplicationSQL:
                - GRANT ALL ON SCHEMA public TO lightdash
                - GRANT CREATE ON SCHEMA public TO lightdash
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO lightdash
          enableSuperuserAccess: true
          superuserSecret:
            name: lightdash-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: lightdash-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: lightdash
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: lightdash-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: lightdash
          password: lightdash
  - displayName: RustFS
    env: []
    icon: /img/addons/rustfs.svg
    id: kubero-operator
    kind: Tenant
    resourceDefinitions:
      Tenant:
        apiVersion: rustfs.com/v1alpha1
        kind: Tenant
        metadata:
          name: lightdash-rustfs
        spec:
          image: rustfs/rustfs:latest
          credsSecret:
            name: lightdash-rustfs-credentials
          pools:
          - name: pool-0
            servers: 1
            persistence:
              volumesPerServer: 4
              volumeClaimTemplate:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
                storageClassName: slow
      credsSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: lightdash-rustfs-credentials
        type: Opaque
        stringData:
          accesskey: lightdashadmin
          secretkey: changeme
  envVars:
  - name: PGHOST
    value: lightdash-postgresql-rw
  - name: PGPORT
    value: '5432'
  - name: PGUSER
    value: lightdash
  - name: PGPASSWORD
    value: lightdash
  - name: PGDATABASE
    value: lightdash
  - name: LIGHTDASH_SECRET
    value: replace-with-openssl-rand-base64-32
  - name: PORT
    value: '8080'
  - name: SITE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: TRUST_PROXY
    value: 'true'
  - name: SECURE_COOKIES
    value: 'true'
  - name: NODE_ENV
    value: production
  - name: HEADLESS_BROWSER_HOST
    value: lightdash-headless-browser
  - name: HEADLESS_BROWSER_PORT
    value: '3000'
  - name: LIGHTDASH_INSTALL_TYPE
    value: kubero
  - name: S3_ENDPOINT
    value: http://lightdash-rustfs:9000
  - name: S3_BUCKET
    value: lightdash
  - name: S3_REGION
    value: us-east-1
  - name: S3_ACCESS_KEY
    value: lightdashadmin
  - name: S3_SECRET_KEY
    value: changeme
  - name: S3_FORCE_PATH_STYLE
    value: 'true'
  extraVolumes: []
  cronjobs: []
  healthcheck:
    enabled: true
    path: /api/v1/health
    startupSeconds: 900
    timeoutSeconds: 10
    periodSeconds: 15
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8080'
    pullPolicy: Always
    repository: lightdash/lightdash
    tag: latest

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: saltcorn
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free and open-source no-code application builder
      for creating database-backed web apps without writing code.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/saltcorn/icon.png
    kubero.dev/template.installation: 'Image: saltcorn/saltcorn (official). Saltcorn
      requires PostgreSQL; it connects via the discrete PG* vars pointing at the bundled
      postgres add-on (host saltcorn-postgresql-rw). Rotate SALTCORN_SESSION_SECRET
      (any long random string, e.g. `openssl rand -hex 32`) and the Postgres password
      (default ''saltcorn'') before exposing publicly. On first run Saltcorn auto-initializes
      the schema, then presents a setup wizard to create the admin user and site name
      - complete this immediately. User-installed plugins, uploaded files and config
      persist on the /saltcorn volume. Multi-tenant mode is off by default (SALTCORN_MULTI_TENANT=false).'
    kubero.dev/template.links: '["https://wiki.saltcorn.com/view/ShowPage/deploy-with-docker",
      "https://wiki.saltcorn.com/"]'
    kubero.dev/template.screenshots: '["https://saltcorn.com/files/serve/176"]'
    kubero.dev/template.source: https://github.com/saltcorn/saltcorn
    kubero.dev/template.categories: '["development", "productivity", "data"]'
    kubero.dev/template.title: Saltcorn
    kubero.dev/template.website: https://saltcorn.com
  labels:
    manager: kubero
spec:
  name: saltcorn
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: saltcorn-postgresql
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: saltcorn
              owner: saltcorn
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO saltcorn
              - GRANT CREATE ON SCHEMA public TO saltcorn
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO saltcorn
              secret:
                name: saltcorn-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: saltcorn-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: saltcorn-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: saltcorn
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: saltcorn-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: saltcorn
          password: saltcorn
  envVars:
  - name: SALTCORN_SESSION_SECRET
    value: replace-with-openssl-rand-hex-32
  - name: SALTCORN_MULTI_TENANT
    value: 'false'
  - name: PGHOST
    value: saltcorn-postgresql-rw
  - name: PGPORT
    value: '5432'
  - name: PGDATABASE
    value: saltcorn
  - name: PGUSER
    value: saltcorn
  - name: PGPASSWORD
    value: saltcorn
  - name: SALTCORN_FILE_STORE
    value: /saltcorn
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /saltcorn
    name: saltcorn-data
    size: 5Gi
    storageClass: slow
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: '2'
      memory: 2Gi
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/saltcorn
    tag: latest
    command:
    - /usr/local/bin/saltcorn
    - serve
    - -a
    run:
      securityContext:
        readOnlyRootFilesystem: true

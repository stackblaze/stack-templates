apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Unleash is an open source feature management
      solution.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/23053233?s=200&v=4
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/Unleash/unleash/main/.github/github_online_demo.svg"]'
    kubero.dev/template.source: https://github.com/Unleash/unleash
    kubero.dev/template.categories: '["development", "utilities", "accessories"]'
    kubero.dev/template.title: Unleash
    kubero.dev/template.website: https://getunleash.io/
  name: unleash
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgres
              owner: postgres
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: postgres
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: postgres
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DATABASE_SSL
    value: 'false'
  - name: LOG_LEVEL
    value: warn
  - name: INIT_FRONTEND_API_TOKENS
    value: default:development.unleash-insecure-frontend-api-token
  - name: INIT_CLIENT_API_TOKENS
    value: default:development.unleash-insecure-api-token
  - name: DATABASE_URL
    value: postgres://postgres:postgres@{{KUBERO_APP_NAME}}-postgresql-rw/postgres
  extraVolumes: []
  image:
    containerPort: '4242'
    repository: registry.stackblaze.cloud/unleashorg/unleash-server
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: unleash
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

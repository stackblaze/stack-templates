apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Kanboard is a free and open source project management
      software focused on the Kanban methodology.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/13722943?s=200&v=4
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://kanboard.org/assets/img/board.png"]'
    kubero.dev/template.source: https://github.com/kanboard/kanboard
    kubero.dev/template.categories: '["work", "development", "utilities"]'
    kubero.dev/template.title: Kanboard
    kubero.dev/template.website: https://kanboard.org
  labels:
    manager: kubero
  name: kanboard
spec:
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: kanboard-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: kanboard-mysql-root
            key: password
          database: kanboard
          username: kanboard
          passwordSecretKeyRef:
            name: kanboard-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: kanboard-mysql-root
        type: Opaque
        stringData:
          password: kanboard
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: kanboard-mysql-app
        type: Opaque
        stringData:
          password: kanboard
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: PLUGIN_INSTALLER
    value: 'true'
  - name: DB_DRIVER
    value: mysql
  - name: DB_USERNAME
    value: kanboard
  - name: DB_PASSWORD
    value: kanboard
  - name: DB_NAME
    value: kanboard
  - name: DB_HOSTNAME
    value: kanboard-mysql
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/app/plugins
    name: kanboard-plugins-volume
    size: 1Gi
    storageClass: slow
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: kanboard/kanboard
    tag: latest
  name: kanboard
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: countly
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source, privacy-focused product analytics
      platform for tracking web, mobile and desktop apps with funnels, retention,
      crashes and push.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/countly/icon.png
    kubero.dev/template.installation: "Countly Community Edition (countly/countly-server:23.11.22)\
      \ with the DocumentDB add-on for analytics storage. Pin to 23.11.22 \u2014 Countly\
      \ 25.x needs MongoDB 8 features this add-on may lack. Requires at least 2Gi\
      \ RAM; first boot can take several minutes. FIRST-RUN: open the site, complete\
      \ the setup wizard to create the global admin account, then add your first application\
      \ for its App Key/API Key. The appimages volume keeps uploaded app icons/avatars."
    kubero.dev/template.links: '["https://support.countly.com/hc/en-us/articles/360037814511-Setting-Up-Countly-with-Docker",
      "https://support.countly.com/hc/en-us/articles/360036862332-Installing-the-Countly-Server"]'
    kubero.dev/template.screenshots: '["https://cdn.prod.website-files.com/61c1b7c3e2f3805325be4594/668ce80fb93226b6ad88d718_d587926ef3277bc26935a28e68750dcb_Meta%20Tag-Countly.com.jpg"]'
    kubero.dev/template.source: https://github.com/Countly/countly-server
    kubero.dev/template.categories: '["data", "monitoring", "productivity"]'
    kubero.dev/template.title: Countly
    kubero.dev/template.website: https://countly.com
  labels:
    manager: kubero
spec:
  name: countly
  deploymentstrategy: docker
  addons:
  - displayName: Document DB
    env: []
    icon: /img/addons/mongo.svg
    id: kubero-operator
    kind: DocumentDB
    resourceDefinitions:
      DocumentDB:
        apiVersion: documentdb.io/preview
        kind: DocumentDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-documentdb'
        spec:
          nodeCount: 1
          instancesPerNode: 1
          documentDbCredentialSecret: documentdb-credentials
          resource:
            storage:
              pvcSize: 1Gi
              storageClass: default
          exposeViaService:
            serviceType: ClusterIP
      credentialSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: documentdb-credentials
        type: Opaque
        stringData:
          username: mongoadmin
          password: countly
  envVars:
  - name: COUNTLY_OVERWRITE_MEM_REQUIREMENT
    value: '1'
  - name: COUNTLY_PLUGINS
    value: mobile,web,plugins,views,logger,systemlogs,populator,reports,crashes,push
  - name: COUNTLY_CONFIG_API_API_WORKERS
    value: '1'
  - name: NODE_OPTIONS
    value: --max-old-space-size=1536
  - name: COUNTLY_CONFIG_API_API_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: COUNTLY_CONFIG_FRONTEND_WEB_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: COUNTLY_CONFIG__MONGODB
    value: mongodb://mongoadmin:countly@documentdb-service-{{KUBERO_APP_NAME}}-documentdb:10260/countly?directConnection=true&authMechanism=SCRAM-SHA-256&tls=true&tlsAllowInvalidCertificates=true&replicaSet=rs0
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/countly/frontend/express/public/appimages
    name: countly-appimages
    size: 2Gi
    storageClass: slow
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '1'
      memory: 3Gi
  healthcheck:
    enabled: true
    path: /o/ping
    startupSeconds: 1200
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: countly/countly-server
    tag: 23.11.22
    run:
      securityContext:
        readOnlyRootFilesystem: true

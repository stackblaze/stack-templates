apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: countly
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source, privacy-focused product analytics platform for tracking web, mobile and
      desktop apps with funnels, retention, crashes and push.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/countly/icon.png
    kubero.dev/template.installation: 'Countly Community Edition all-in-one image (countly/countly-server:23.11.22) bundles
      Nginx, the API + dashboard Node.js processes, and an embedded MongoDB on port 80. Pin to 23.11.22 — Countly 25.x needs
      MongoDB 8 features and the documentdb add-on lacks capped collections Countly requires. DATASTORE: analytics data lives
      in the bundled MongoDB; persist /var/lib/mongodb (minimum 2Gi). Requires at least 2Gi RAM for MongoDB + Countly; first
      boot can take several minutes. HA variant keeps a single web replica because embedded MongoDB is not shared across
      pods — for true HA deploy separate countly/api + countly/frontend with an external MongoDB replica set. FIRST-RUN: open
      the site, complete the setup wizard. The /opt/countly/frontend/express/public/appimages volume keeps uploaded icons.'
    kubero.dev/template.links: '["https://support.countly.com/hc/en-us/articles/360037814511-Setting-Up-Countly-with-Docker",
      "https://support.countly.com/hc/en-us/articles/360036862332-Installing-the-Countly-Server"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/Countly/countly-server
    kubero.dev/template.categories: '["data", "monitoring", "productivity"]'
    kubero.dev/template.title: Countly
    kubero.dev/template.website: https://countly.com
  labels:
    manager: kubero
spec:
  name: countly
  deploymentstrategy: docker
  addons: []
  envVars:
  - name: COUNTLY_MONGO_INSIDE
    value: '1'
  - name: COUNTLY_OVERWRITE_MEM_REQUIREMENT
    value: '1'
  - name: COUNTLY_PLUGINS
    value: mobile,web,plugins,views,logger,systemlogs,populator,reports,crashes,push
  - name: COUNTLY_CONFIG_API_API_WORKERS
    value: '1'
  - name: NODE_OPTIONS
    value: --max-old-space-size=1536
  - name: COUNTLY_CONFIG_API_API_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: COUNTLY_CONFIG_FRONTEND_WEB_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/lib/mongodb
    name: countly-mongodb
    size: 5Gi
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /opt/countly/frontend/express/public/appimages
    name: countly-appimages
    size: 2Gi
  cronjobs: []
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: '1'
      memory: 3Gi
  healthcheck:
    enabled: true
    path: /o/ping
    startupSeconds: 1200
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: countly/countly-server
    tag: 22.03.6
    command:
    - sh
    - -c
    - |
      ln -sf /usr/bin/mongosh /usr/bin/mongo
      mkdir -p /etc/nginx/sites-enabled
      rm -f /etc/nginx/conf.d/default.conf
      chown -R mongodb:mongodb /var/lib/mongodb
      node /opt/countly/bin/scripts/create_nginx_conf.js
      exec /usr/bin/python3 -u /sbin/my_init

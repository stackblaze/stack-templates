apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: docmost
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Docmost is an open-source collaborative wiki
      and documentation software. It is an open-source alternative to Confluence and
      Notion.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/docmost/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://camo.githubusercontent.com/242ed60fe9d9d3c7e1d8d7d3f64d28d23c0a81e5963265880095e0e9c7604205/68747470733a2f2f646f636d6f73742e636f6d2f73637265656e73686f74732f686f6d652e706e67"]'
    kubero.dev/template.source: https://github.com/docmost/docmost
    kubero.dev/template.categories: '["documentation", "work"]'
    kubero.dev/template.title: Docmost
    kubero.dev/template.website: https://docmost.com/
  labels:
    manager: kubero
spec:
  name: docmost
  deploymentstrategy: docker
  envVars:
  - name: APP_URL
    value: http://docmost.localhost
  - name: APP_SECRET
    value: 0LZiQBLw4WvqPlz4cz8RsHJlxNiSqM9B48y4ChyJ5v1oA0L/TPIqRjQNdPZN3iEG
  - name: DATABASE_URL
    value: postgresql://docmost:docmost@docmost-postgresql-rw:5432/docmost?schema=public
  - name: REDIS_URL
    value: redis://rfr-docmost-valkey-readwrite:6379
  extraVolumes: []
  cronjobs: []
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: docmost-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: docmost
              owner: docmost
              secret:
                name: docmost-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: docmost-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: docmost-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: docmost
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: docmost-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: docmost
          password: docmost
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: docmost-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          sentinel:
            replicas: 3
            quorum: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: docmost/docmost
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false

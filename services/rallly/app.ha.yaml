apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Rallly is an open-source scheduling and collaboration
      tool designed to make organizing events and meetings easier.
    kubero.dev/template.icon: https://rallly.co/favicon-196x196.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '["https://github.com/lukevella/rallly-selfhosted"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/lukevella/rallly/main/docs/images/poll-image.png"]'
    kubero.dev/template.source: https://github.com/lukevella/rallly
    kubero.dev/template.categories: '["collaboration","work"]'
    kubero.dev/template.title: Rallly
    kubero.dev/template.website: https://rallly.co
  name: rallly
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: rallly-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgresql
              owner: rallly
              secret:
                name: rallly-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: rallly-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: rallly-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: rallly
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: rallly-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: rallly
          password: rallly
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DATABASE_URL
    value: postgres://rallly:rallly@rallly-postgresql-rw:5432/postgresql
  - name: SECRET_PASSWORD
    value: replace-me-now-with-a-own-secret
  extraVolumes: []
  image:
    containerPort: '3000'
    repository: lukevella/rallly
    tag: latest
  name: rallly
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Rallly is an open-source scheduling and collaboration
      tool designed to make organizing events and meetings easier.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/rallly/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '["https://github.com/lukevella/rallly-selfhosted"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/lukevella/rallly/main/docs/images/poll-image.png"]'
    kubero.dev/template.source: https://github.com/lukevella/rallly
    kubero.dev/template.categories: '["collaboration","work"]'
    kubero.dev/template.title: Rallly
    kubero.dev/template.website: https://rallly.co
  name: rallly
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgresql
              owner: rallly
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO rallly
              - GRANT CREATE ON SCHEMA public TO rallly
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO rallly
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: rallly
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: rallly
          password: rallly
  - displayName: RustFS
    env: []
    icon: /img/addons/rustfs.svg
    id: kubero-operator
    kind: Tenant
    resourceDefinitions:
      Tenant:
        apiVersion: rustfs.com/v1alpha1
        kind: Tenant
        metadata:
          name: rallly-rustfs
        spec:
          image: rustfs/rustfs:latest
          credsSecret:
            name: rallly-rustfs-credentials
          pools:
          - name: pool-0
            servers: 1
            persistence:
              volumesPerServer: 4
              volumeClaimTemplate:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
                storageClassName: slow
      credsSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: rallly-rustfs-credentials
        type: Opaque
        stringData:
          accesskey: ralllyadmin
          secretkey: changeme
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: NODE_ENV
    value: production
  - name: NEXT_PUBLIC_BASE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: DATABASE_URL
    value: postgres://rallly:rallly@{{KUBERO_APP_NAME}}-postgresql-rw:5432/postgresql
  - name: SECRET_PASSWORD
    value: replace-me-now-with-a-own-secret
  - name: SUPPORT_EMAIL
    value: support@example.com
  - name: NOREPLY_EMAIL
    value: noreply@example.com
  - name: S3_ENDPOINT
    value: http://rallly-rustfs:9000
  - name: S3_BUCKET_NAME
    value: rallly
  - name: S3_REGION
    value: us-east-1
  - name: S3_ACCESS_KEY_ID
    value: ralllyadmin
  - name: S3_SECRET_ACCESS_KEY
    value: changeme
  extraVolumes: []
  image:
    containerPort: '3000'
    repository: lukevella/rallly
    tag: '4'
    run:
      securityContext:
        readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 300
    timeoutSeconds: 5
    periodSeconds: 10
  name: rallly
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

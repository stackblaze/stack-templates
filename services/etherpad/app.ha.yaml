apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Etherpad is a real-time collaborative editor
      scalable to thousands of simultaneous real time users.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/etherpad/icon.png
    kubero.dev/template.installation: ''
    kubero.dev/template.links: '["https://github.com/ether/etherpad-lite/blob/develop/doc/docker.md"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/ether/etherpad-lite/develop/doc/images/etherpad_demo.gif"]'
    kubero.dev/template.source: https://github.com/ether/etherpad-lite
    kubero.dev/template.categories: '["collaboration","work", "documentation"]'
    kubero.dev/template.title: Etherpad
    kubero.dev/template.website: https://etherpad.org/
  name: etherpad
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: etherpad-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: postgresql
              owner: etherpad
              secret:
                name: etherpad-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: etherpad-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: etherpad-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: etherpad
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: etherpad-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: etherpad
          password: etherpad
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DB_TYPE
    value: postgres
  - name: DB_PASS
    value: etherpad
  - name: DB_USER
    value: etherpad
  - name: DB_NAME
    value: postgresql
  - name: DB_HOST
    value: etherpad-postgresql-rw
  - name: DB_PORT
    value: '5432'
  extraVolumes: []
  image:
    containerPort: '8080'
    repository: etherpad/etherpad
    run:
      securityContext:
        readOnlyRootFilesystem: false
    tag: latest
  name: etherpad
  web:
    replicaCount: 2
  worker:
    replicaCount: 0

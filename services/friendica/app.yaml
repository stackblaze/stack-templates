apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: friendica
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Decentralized social network platform that federates with the Fediverse (ActivityPub),
      Mastodon, Diaspora and more.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/3286163?s=200&v=4
    kubero.dev/template.installation: 'First boot auto-installs once MYSQL_* and FRIENDICA_URL/FRIENDICA_ADMIN_MAIL are set;
      the admin account is linked to FRIENDICA_ADMIN_MAIL (use the email you will register with). REQUIRED companion service:
      deploy a second container from the SAME image friendica:2026.05-apache but with the startup command set to /cron.sh
      - this is the Friendica worker/cron daemon that processes the federation queue and background jobs; without it nothing
      federates and the site stalls. The web and cron containers must share the same MariaDB add-on and the same persistent
      volume mounted at /var/www/html. Rotate the MariaDB password (default ''friendica'') after first deploy. Outbound email
      is recommended (configure SMTP in the admin panel) for verification mails. The bundled Valkey add-on provides Redis-based
      locking/caching and is wired via REDIS_HOST. Configure your real public domain via FRIENDICA_URL (defaults to the assigned
      app URL).'
    kubero.dev/template.links: '["https://wiki.friendi.ca", "https://github.com/friendica/docker"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/friendica/friendica
    kubero.dev/template.categories: '["social", "communication", "collaboration"]'
    kubero.dev/template.title: Friendica
    kubero.dev/template.website: https://friendi.ca
  labels:
    manager: kubero
spec:
  name: friendica
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: friendica-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: friendica-mysql-root
            key: password
          database: friendica
          username: friendica
          passwordSecretKeyRef:
            name: friendica-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: friendica-mysql-root
        type: Opaque
        stringData:
          password: friendica
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: friendica-mysql-app
        type: Opaque
        stringData:
          password: friendica
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: friendica-valkey
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: MYSQL_HOST
    value: friendica-mysql
  - name: MYSQL_PORT
    value: '3306'
  - name: MYSQL_DATABASE
    value: friendica
  - name: MYSQL_USER
    value: friendica
  - name: MYSQL_PASSWORD
    value: friendica
  - name: FRIENDICA_URL
    value: '{{KUBERO_APP_URL}}'
  - name: FRIENDICA_ADMIN_MAIL
    value: admin@example.com
  - name: FRIENDICA_TZ
    value: UTC
  - name: FRIENDICA_LANG
    value: en
  - name: REDIS_HOST
    value: rfr-friendica-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html
    name: friendica-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: friendica
    tag: 2026.05-apache

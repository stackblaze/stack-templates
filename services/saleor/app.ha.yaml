apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: saleor
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: GraphQL-first, headless open-source e-commerce platform for building scalable storefronts,
      marketplaces and digital commerce.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/saleor/icon.png
    kubero.dev/template.installation: 'Saleor is a multi-container stack. This template deploys the PRIMARY GraphQL API/server
      image (ghcr.io/saleor/saleor). After first boot, exec into the pod and run migrations + create an admin: `python manage.py
      migrate` then `python manage.py createsuperuser` (or set the pre-baked superuser via env). You MUST also deploy these
      companion services, all using the SAME ghcr.io/saleor/saleor image with the same DATABASE_URL/REDIS_URL/SECRET_KEY env:
      (1) Celery WORKER -> command `celery --app saleor.celeryconf:app worker --loglevel=info`; (2) Celery BEAT SCHEDULER
      -> command `celery --app saleor.celeryconf:app beat --scheduler saleor.schedulers.schedulers.DatabaseScheduler`. The
      admin DASHBOARD is a separate static SPA image `ghcr.io/saleor/saleor-dashboard` (nginx, port 80) pointed at this API''s
      /graphql/ endpoint. Add-ons: a Postgres add-on (Saleor recommends PostgreSQL) and a Valkey/Redis add-on (used as Celery
      broker + cache) are provisioned. Rotate the default Postgres password and the SECRET_KEY (replace the placeholder with
      `openssl rand -hex 32`). Set ALLOWED_HOSTS/ALLOWED_GRAPHQL_ORIGINS to your real host. For media/static uploads Saleor
      recommends external S3-compatible object storage in production; this template mounts a local volume at /app/media for
      default local file storage. A full-text search backend is optional and not included.'
    kubero.dev/template.links: '["https://docs.saleor.io/setup/docker-compose", "https://docs.saleor.io/setup/configuration"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/saleor/saleor
    kubero.dev/template.categories: '["e-commerce", "development", "data"]'
    kubero.dev/template.title: Saleor
    kubero.dev/template.website: https://saleor.io
  labels:
    manager: kubero
spec:
  name: saleor
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: saleor-postgresql
        spec:
          instances: 3
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: fast
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: saleor
              owner: saleor
              secret:
                name: saleor-postgresql-app
          enableSuperuserAccess: true
          superuserSecret:
            name: saleor-postgresql-superuser
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: saleor-postgresql-superuser
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: saleor
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: saleor-postgresql-app
        type: kubernetes.io/basic-auth
        stringData:
          username: saleor
          password: saleor
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: saleor-valkey
        spec:
          version: '8.0'
          arch: failover
          replicas:
            shards: 1
            replicasOfShard: 2
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          sentinel:
            replicas: 3
            quorum: 2
  envVars:
  - name: DATABASE_URL
    value: postgresql://saleor:saleor@saleor-postgresql-rw:5432/saleor
  - name: REDIS_URL
    value: redis://rfr-saleor-valkey-readwrite:6379/0
  - name: CACHE_URL
    value: redis://rfr-saleor-valkey-readwrite:6379/0
  - name: CELERY_BROKER_URL
    value: redis://rfr-saleor-valkey-readwrite:6379/1
  - name: SECRET_KEY
    value: replace-with-openssl-rand-hex-32
  - name: RSA_PRIVATE_KEY
    value: '-----BEGIN RSA PRIVATE KEY-----\nMIIEogIBAAKCAQEAp8zRrQrPdMq+mn38jXyWe3PwQzbjPZY/am/z1t+ZQ3y0JOqt\ng7mznd06ShlEQ+e2EeyYSfKJoTuJqVuTTTVnXlhWdxR8OFQIgNDpTU17qcSdtoZ3\nYvlZV9UgVBAhxLvl82CTAw3VU3FQzBlIH2Mb0exCuMPsbXU6/xPUnnEaVYJgIDfe\nXWa5vwySkyjgiTBc/9ZwXPAnz32+MVST+oD0WDkUsXXT6BFDIAIT1zAbMvzYeUMR\n3ZztRWI+Fb/U1FECTqjmkAm76ke5k82D9MTCxg5KnWU/g4hS7LP7mf/uueTO2d4f\ncnhiDl+Wv8WGgKplbctD7RfpS5L//HvfFBnCXQIDAQABAoIBAApJCJjP0ZJcrg0N\nXWUKcV/iUKRnZsuQMYATmibo1ZMN1QNGm474MO1jfCPtbgzaf64UFOvtcP21cZ/0\nTsWxWQ4ZoefSf+BlAuYVyBh2qsvnvcIMdnYWMiGAh7wssUvcN5aw1qSzMkkB0wcb\nopstPu03CzTvlMb1zqwIGg+B1RskwAI46cBJ8wMlZEcFWDTQBOzzD8tdJP1E7Ax4\nXOgrtnI9pZvhQkvaW5ydvQkF/ZK2n6YrCBetfyVPgC8unLR9KD/TZsBcuuk5LOqX\nJ8y2o79QsJL8Iqva9/n4vhy7KUbvBnDDHDzAXJv9Wbxs8ytJPgk8uV0t15xblIZu\nY3Z4O/ECgYEA1AyMJGnPxD5bSpq4DK7RCWKlEReMFeW+aCALog4hVFAcCR2Raial\njRpJV/YI2AOSyyxqmS2QB1XE8TKU594UOrS/EeAHVBstOdOZE7Qd2r1yEI7aLK37\nCt0s7q0hLRZr9byuuuZYAQVhbzZk1ypeRjVL3xLv5eHHMB8JRAmm+e0CgYEAypRl\nN/HK43ufI7cELwWHPgMlx4Ye+4CXbXkef96fN9GDlmrt0VJzPQwesFP9QRyXZdN6\n+K6sr4vDzYrOW4dNJdsTfOribFueLE2ygSNeGur5u7HTwCHJujjk6TJmqSk5CxcV\n08sJFFfErGmtWqTKBFmf9S4+HnlnENRbJQVGHDECgYBHWBlmvvsaiehpR3kZO1A1\nmizzfTqyu2O+4NlJIvvvxCxKnNoqHuqgePGoWK1NEJa5KS6MbxoAfckPZfdXtA6W\nWe3Xc8rDb4ld5WWhjX5l9EuGaqnZUogedaAChdmds+eK/HrFg26kmUzZADIZerXR\nZWkrmtGAROChvi995sl5WQKBgC1L7S4LNLCU7cqQm7Df7ZOiJIpupPLbmAB0eqtg\n3f0fLesuUariYr4dvabzwMcUW437MZ31gMtn1wpYpTe2EzwJtlvSMXrFKaMCZI2X\nmO0v6VNcudpWM8MeAaFbEbV1cDnYmZrX5VnVHjbnEkoYWsuKNsgd5Onvf2o18YNf\noIOhAoGALz446ahVqVLVR7hge3exlcD54sVQsbjVmplDAoY2Ay0gCXEjYk353x26\nCNiOxAcP5C6sJ6m7fbHQIMMI2nPVvON2E++XpsWT6zPkX4sfOHfnSm17mcSiiui5\nwBOm/zUUNRD1S1sEVQIdvyopO5w8EtEc4KkWh6+jXH7XBR+Uplc=\n-----END RSA PRIVATE KEY-----\n'
  - name: DEBUG
    value: 'False'
  - name: ALLOWED_HOSTS
    value: '{{KUBERO_APP_HOST}}'
  - name: ALLOWED_CLIENT_HOSTS
    value: '{{KUBERO_APP_HOST}}'
  - name: ALLOWED_GRAPHQL_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: PUBLIC_URL
    value: '{{KUBERO_APP_URL}}'
  - name: DEFAULT_FROM_EMAIL
    value: noreply@example.com
  - name: DEFAULT_CURRENCY
    value: USD
  - name: MEDIA_ROOT
    value: /app/media
  - name: STATIC_URL
    value: /static/
  - name: PLAYGROUND_ENABLED
    value: 'False'
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /app/media
    name: saleor-media
    size: 5Gi
  cronjobs: []
  healthcheck:
    enabled: true
    path: /health/
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/saleor/saleor
    tag: '3.20'
    command:
    - sh
    - -c
    - python manage.py migrate --noinput && gunicorn --bind :8000 --workers 4 --worker-class saleor.asgi.gunicorn_worker.UvicornWorker saleor.asgi:application

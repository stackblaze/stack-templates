  - name: DEBUG
    value: 'False'
  - name: ALLOWED_HOSTS
    value: '{{KUBERO_APP_HOST}}'
  - name: ALLOWED_CLIENT_HOSTS
    value: '{{KUBERO_APP_HOST}}'
  - name: ALLOWED_GRAPHQL_ORIGINS
    value: '{{KUBERO_APP_URL}}'
  - name: PUBLIC_URL
    value: '{{KUBERO_APP_URL}}'
  - name: DEFAULT_FROM_EMAIL
    value: noreply@example.com
  - name: DEFAULT_CURRENCY
    value: USD
  - name: MEDIA_ROOT
    value: /app/media
  - name: STATIC_URL
    value: /static/
  - name: PLAYGROUND_ENABLED
    value: 'False'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /app/media
    name: saleor-media
    size: 5Gi
    storageClass: shared
  cronjobs: []
  healthcheck:
    enabled: true
    path: /health/
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '8000'
    pullPolicy: Always
    repository: ghcr.io/saleor/saleor
    tag: '3.20'
    command:
    - sh
    - -c
    - python manage.py migrate --noinput && gunicorn --bind :8000 --workers 4 --worker-class
      saleor.asgi.gunicorn_worker.UvicornWorker saleor.asgi:application
    run:
      securityContext:
        readOnlyRootFilesystem: false

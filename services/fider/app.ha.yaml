apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
    name: fider
    annotations:
        kubero.dev/template.architecture: '["linux/amd64", "linux/arm64"]'
        kubero.dev/template.description: "Open platform to collect and prioritize feedback"
        kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/fider/icon.png
        kubero.dev/template.installation: ""
        kubero.dev/template.links: "[]"
        kubero.dev/template.screenshots: '["https://fider.io/_next/image?url=%2Fimages%2Fscreenshot%2Fhome2.png&w=1920&q=75"]'
        kubero.dev/template.source: "https://github.com/getfider/fider"
        kubero.dev/template.categories: '["collaboration","productivity"]'
        kubero.dev/template.title: "Fider"
        kubero.dev/template.website: "https://fider.io"
    labels:
        manager: kubero
spec:
    name: fider
    deploymentstrategy: docker
    envVars:
        - name: BASE_URL
          value: https://fider.localhost
        - name: DATABASE_URL
          value: postgres://fider:fider@fider-postgresql-rw/fider?sslmode=disable
        - name: JWT_SECRET
          value: random64
        - name: EMAIL_NOREPLY
          value: noreply@example.com
        - name: EMAIL_SMTP_HOST
          value: smtp.yourdomain.com
        - name: EMAIL_SMTP_PORT
          value: "587"
        - name: EMAIL_SMTP_USERNAME
          value: user@yourdomain.com
        - name: EMAIL_SMTP_PASSWORD
          value: s0m3p4ssw0rd
        - name: EMAIL_SMTP_ENABLE_STARTTLS
          value: "true"
    extraVolumes: []
    cronjobs: []
    addons:
        - displayName: PostgreSQL (CloudNativePG)
          env: []
          icon: /img/addons/pgsql.svg
          id: kubero-operator
          kind: Cluster
          resourceDefinitions:
              Cluster:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata:
                      name: fider-postgresql
                  spec:
                      instances: 3
                      imageName: ghcr.io/cloudnative-pg/postgresql:16
                      primaryUpdateStrategy: unsupervised
                      storage:
                          storageClass: fast
                          size: 5Gi
                      resources:
                          requests:
                              cpu: 100m
                              memory: 256Mi
                          limits:
                              cpu: "1"
                              memory: 1Gi
                      bootstrap:
                          initdb:
                              database: fider
                              owner: fider
                              secret:
                                  name: fider-postgresql-app
                      enableSuperuserAccess: true
                      superuserSecret:
                          name: fider-postgresql-superuser
              superuserSecret:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                      name: fider-postgresql-superuser
                  type: kubernetes.io/basic-auth
                  stringData:
                      username: postgres
                      password: fider
              appUserSecret:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                      name: fider-postgresql-app
                  type: kubernetes.io/basic-auth
                  stringData:
                      username: fider
                      password: fider
    web:
        replicaCount: 1
    worker:
        replicaCount: 0
    image:
        containerPort: "3000"
        pullPolicy: Always
        repository: getfider/fider
        tag: stable

apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: docassemble
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source expert system for guided interviews
      and document assembly, widely used to build legal-aid and law-firm self-help
      applications.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/docassemble/icon.png
    kubero.dev/template.installation: 'Docassemble ships as a single all-in-one image
      (jhpyle/docassemble) whose roles are selected with the CONTAINERROLE env var.
      This template runs the web role and externalises the SQL database and Redis
      to the bundled add-ons. ROTATE the Postgres password and SECRETKEY (openssl
      rand -base64 32) before production. The container listens on internal port 80;
      set BEHINDHTTPSLOADBALANCER=true because Kubero''s ingress terminates TLS, and
      DAHOSTNAME is auto-set from {{KUBERO_APP_HOST}}. On first boot the schema is
      created automatically; the bootstrap admin is admin@admin.com / password (set/rotate
      via the configuration). Persistent application data (uploaded packages, generated
      files, certs, config.yml) lives under /usr/share/docassemble on the volume.
      COMPANION SERVICES: for a production multi-server install deploy additional
      replicas of the SAME jhpyle/docassemble image with different CONTAINERROLE values
      that share the same Postgres, Redis and /usr/share/docassemble volume: CONTAINERROLE=celery
      (background task / document-assembly worker), CONTAINERROLE=cron (scheduled
      tasks), and optionally CONTAINERROLE=log (centralised logging) and CONTAINERROLE=mail.
      RabbitMQ is only needed for the SQL/Redis-replicated HA topology (set RABBITMQ=pyamqp://...)
      and can be added later; a single-node web+celery setup does not require it.
      A background OCR/translation ML container is not required for basic operation.
      To externalise file storage to S3/Azure instead of the volume, set the S3 or
      AZURE config keys in the docassemble configuration (not an operator add-on).'
    kubero.dev/template.links: '["https://docassemble.org/docs/docker.html", "https://docassemble.org/docs/scalability.html"]'
    kubero.dev/template.screenshots: '["http://docassemble.org/img/docassemble-logo.jpg"]'
    kubero.dev/template.source: https://github.com/jhpyle/docassemble
    kubero.dev/template.categories: '["productivity", "automation", "documentation"]'
    kubero.dev/template.title: Docassemble
    kubero.dev/template.website: https://docassemble.org
  labels:
    manager: kubero
spec:
  name: docassemble
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: docassemble
              owner: docassemble
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO docassemble
              - GRANT CREATE ON SCHEMA public TO docassemble
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO docassemble
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: docassemble
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: docassemble
          password: docassemble
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: CONTAINERROLE
    value: web
  - name: DBPREFIX
    value: postgresql+psycopg2://
  - name: DBHOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: DBPORT
    value: '5432'
  - name: DBNAME
    value: docassemble
  - name: DBUSER
    value: docassemble
  - name: DBPASSWORD
    value: docassemble
  - name: REDIS
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379
  - name: SECRETKEY
    value: replace-with-openssl-rand-base64-32
  - name: DAHOSTNAME
    value: '{{KUBERO_APP_HOST}}'
  - name: BEHINDHTTPSLOADBALANCER
    value: 'true'
  - name: USEHTTPS
    value: 'false'
  - name: USELETSENCRYPT
    value: 'false'
  - name: TIMEZONE
    value: America/New_York
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /usr/share/docassemble/backup
    name: '{{KUBERO_APP_NAME}}-data'
    size: 5Gi
    storageClass: lite
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/jhpyle/docassemble
    tag: latest
    command:
    - bash
    - -c
    - 'mkdir -p /usr/share/docassemble/log /usr/share/docassemble/config /usr/share/docassemble/files
      /usr/share/docassemble/backup /usr/share/docassemble/certs

      exec /usr/bin/supervisord -n -c /etc/supervisor/supervisord.conf

      '
    run:
      securityContext:
        readOnlyRootFilesystem: false

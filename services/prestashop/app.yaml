apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: prestashop
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source e-commerce platform for building and managing online stores, with a built-in
      admin back office and a marketplace of modules and themes.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/prestashop/icon.png
    kubero.dev/template.installation: 'PrestaShop requires MySQL/MariaDB (it does not support PostgreSQL). This template provisions
      the prestashop-mysql add-on (db/user/password all ''prestashop'' - ROTATE before production). PS_INSTALL_AUTO=1 runs
      the installer automatically on first boot using ADMIN_MAIL/ADMIN_PASSWD - change ADMIN_PASSWD (default ''prestashop''
      here) and ADMIN_MAIL immediately, then delete or rename the /admin folder after install as PrestaShop requires. PS_DOMAIN
      is set to the app host so install URLs resolve; if you later change the domain, update Shop URL under Shop Parameters
      > Traffic & SEO. Optional: set PS_ENABLE_SSL=1 once TLS is fronting the app.'
    kubero.dev/template.links: '["https://devdocs.prestashop-project.org/", "https://github.com/PrestaShop/docker"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/PrestaShop/PrestaShop
    kubero.dev/template.categories: '["e-commerce", "cms", "work"]'
    kubero.dev/template.title: PrestaShop
    kubero.dev/template.website: https://www.prestashop-project.org/
  labels:
    manager: kubero
spec:
  name: prestashop
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: prestashop-mysql
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: prestashop-mysql-root
            key: password
          database: prestashop
          username: prestashop
          passwordSecretKeyRef:
            name: prestashop-mysql-app
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: prestashop-mysql-root
        type: Opaque
        stringData:
          password: prestashop
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: prestashop-mysql-app
        type: Opaque
        stringData:
          password: prestashop
  envVars:
  - name: DB_SERVER
    value: prestashop-mysql
  - name: DB_PORT
    value: '3306'
  - name: DB_NAME
    value: prestashop
  - name: DB_USER
    value: prestashop
  - name: DB_PASSWD
    value: prestashop
  - name: DB_PREFIX
    value: ps_
  - name: PS_INSTALL_AUTO
    value: '1'
  - name: PS_ERASE_DB
    value: '0'
  - name: PS_DEV_MODE
    value: '0'
  - name: PS_DOMAIN
    value: '{{KUBERO_APP_HOST}}'
  - name: PS_HANDLE_DYNAMIC_DOMAIN
    value: '0'
  - name: PS_FOLDER_INSTALL
    value: install
  - name: PS_FOLDER_ADMIN
    value: admin
  - name: ADMIN_MAIL
    value: admin@localhost.local
  - name: ADMIN_PASSWD
    value: prestashop
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /var/www/html
    name: prestashop-data
    size: 5Gi
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: prestashop/prestashop
    tag: 8-apache

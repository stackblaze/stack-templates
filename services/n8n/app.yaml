apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Free and source-available fair-code licensed
      workflow automation tool. Easily automate tasks across different services.
    kubero.dev/template.icon: https://avatars.githubusercontent.com/u/45487711?s=200&v=4
    kubero.dev/template.installation: Complete the one-time owner setup at your app URL,
      then sign in. If you are sent back to /setup, delete the app and its PostgreSQL
      addon together, redeploy, and verify POST /rest/login returns 200 (not 404)
      before signing in. Do not re-register the owner account.
    kubero.dev/template.links: '[]'
    kubero.dev/template.screenshots: '["https://cdn.jsdelivr.net/gh/stackblaze/stack-templates@9775a895e2c366dd2693016984cdd39baf26fad4/services/n8n/demo.mp4", "https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/n8n/dashboard.png"]'
    kubero.dev/template.source: https://github.com/n8n-io/n8n
    kubero.dev/template.categories: '["work", "productivity", "utilities"]'
    kubero.dev/template.title: n8n
    kubero.dev/template.website: https://n8n.io
  name: n8n
spec:
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgres'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: n8n
              owner: n8n
              secret:
                name: '{{KUBERO_APP_NAME}}-postgres-app'
              postInitApplicationSQL:
              - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
              - GRANT ALL ON SCHEMA public TO n8n
              - GRANT CREATE ON SCHEMA public TO n8n
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO n8n
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgres-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgres-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: '123456'
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgres-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: n8n
          password: '123456'
  cronjobs: []
  deploymentstrategy: docker
  envVars:
  - name: DB_TYPE
    value: postgresdb
  - name: DB_POSTGRESDB_HOST
    value: '{{KUBERO_APP_NAME}}-postgres-rw'
  - name: DB_POSTGRESDB_PORT
    value: '5432'
  - name: DB_POSTGRESDB_USER
    value: n8n
  - name: DB_POSTGRESDB_PASSWORD
    value: '123456'
  - name: N8N_BASIC_AUTH_ACTIVE
    value: 'false'
  - name: WEBHOOK_URL
    value: '{{KUBERO_APP_URL}}'
  - name: N8N_EDITOR_BASE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: N8N_HOST
    value: '{{KUBERO_APP_HOST}}'
  - name: N8N_PORT
    value: '5678'
  - name: N8N_PROTOCOL
    value: https
  - name: N8N_PROXY_HOPS
    value: '1'
  - name: DB_POSTGRESDB_DATABASE
    value: n8n
  extraVolumes: []
  image:
    containerPort: '5678'
    repository: docker.n8n.io/n8nio/n8n
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
  name: n8n
  web:
    replicaCount: 1
  worker:
    replicaCount: 0

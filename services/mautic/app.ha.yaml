apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: mautic
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Open-source marketing automation platform for
      email campaigns, lead management, landing pages, and multichannel customer journeys.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/mautic/icon.png
    kubero.dev/template.installation: 'Mautic only supports MySQL/MariaDB (no Postgres).
      This template deploys the primary mautic_web container; on first run open the
      URL and complete the web installer, or rely on the auto-install env vars (set
      DOCKER_MAUTIC_LOAD_TEST_DATA=false). IMPORTANT: rotate the mariadb password
      and the MAUTIC_DB_PASSWORD env to match before going to production. For full
      functionality deploy two companion containers from the SAME image mautic/mautic:5-apache,
      changing only DOCKER_MAUTIC_ROLE: (1) a worker container with DOCKER_MAUTIC_ROLE=mautic_worker
      (consumes the Symfony Messenger queues for email sending/processing), and (2)
      a cron container with DOCKER_MAUTIC_ROLE=mautic_cron (runs scheduled segment/campaign/email
      cron jobs). All three containers must share the same MAUTIC_DB_* settings and
      the same persistent volumes (/var/www/html/config, /var/www/html/var/logs, /var/www/html/docroot/media).
      Do not mount the entire /var/www/html directory or the app code is hidden. Redis/Valkey
      can optionally back the Messenger transport and cache for higher throughput
      but is not required.'
    kubero.dev/template.links: '["https://docs.mautic.org/en/setup/how-to-install-mautic/docker-installation",
      "https://github.com/mautic/docker-mautic"]'
    kubero.dev/template.screenshots: '["https://www.mautic.org/wp-content/uploads/2021/02/dashboard.png"]'
    kubero.dev/template.source: https://github.com/mautic/mautic
    kubero.dev/template.categories: '["crm", "automation", "communication"]'
    kubero.dev/template.title: Mautic
    kubero.dev/template.website: https://www.mautic.org
  labels:
    manager: kubero
spec:
  name: mautic
  deploymentstrategy: docker
  addons:
  - displayName: MariaDB
    env: []
    icon: /img/addons/mysql.svg
    id: kubero-operator
    kind: MariaDB
    resourceDefinitions:
      MariaDB:
        apiVersion: k8s.mariadb.com/v1alpha1
        kind: MariaDB
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql'
        spec:
          metrics:
            enabled: true
          rootPasswordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-root'
            key: password
          database: mautic
          username: mautic
          passwordSecretKeyRef:
            name: '{{KUBERO_APP_NAME}}-mysql-app'
            key: password
          storage:
            size: 5Gi
            storageClassName: fast
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          galera:
            enabled: true
      rootSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-root'
        type: Opaque
        stringData:
          password: mautic
      appSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-mysql-app'
        type: Opaque
        stringData:
          password: mautic
  envVars:
  - name: DOCKER_MAUTIC_ROLE
    value: mautic_web
  - name: MAUTIC_DB_HOST
    value: '{{KUBERO_APP_NAME}}-mysql'
  - name: MAUTIC_DB_PORT
    value: '3306'
  - name: MAUTIC_DB_DATABASE
    value: mautic
  - name: MAUTIC_DB_USER
    value: mautic
  - name: MAUTIC_DB_PASSWORD
    value: mautic
  - name: MAUTIC_DB_SERVER_VERSION
    value: mariadb-10.11.7
  - name: MAUTIC_RUN_CRON_JOBS
    value: 'false'
  - name: DOCKER_MAUTIC_LOAD_TEST_DATA
    value: 'true'
  - name: MAUTIC_SITE_URL
    value: '{{KUBERO_APP_URL}}'
  extraVolumes:
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/www/html/config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/www/html/var/logs
    name: '{{KUBERO_APP_NAME}}-logs'
    size: 1Gi
    storageClass: shared
  - accessModes:
    - ReadWriteMany
    emptyDir: false
    mountPath: /var/www/html/docroot/media
    name: '{{KUBERO_APP_NAME}}-media'
    size: 3Gi
    storageClass: shared
  cronjobs: []
  healthcheck:
    enabled: true
    path: /s/login
    startupSeconds: 900
    timeoutSeconds: 5
    periodSeconds: 10
  web:
    replicaCount: 2
  worker:
    replicaCount: 0
  image:
    containerPort: '80'
    pullPolicy: Always
    repository: mautic/mautic
    tag: 5-apache
    command:
    - sh
    - -c
    - sleep 45 && exec /entrypoint.sh apache2-foreground
    run:
      securityContext:
        readOnlyRootFilesystem: false

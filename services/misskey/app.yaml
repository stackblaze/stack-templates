apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: misskey
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Decentralized, ActivityPub-federated microblogging
      platform with reactions, Drive file storage and a customizable UI.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/misskey/icon.png
    kubero.dev/template.installation: 'Misskey is configured PRIMARILY via a YAML
      file (.config/default.yml), not env vars alone, so before first boot you MUST
      supply that config (mounted at /misskey/.config) pointing db.host=misskey-postgresql-rw
      / db.port=5432 / db.db=misskey and redis.host=rfr-misskey-valkey-readwrite /
      redis.port=6379, and set url to your public https URL. The env vars below mirror
      those values and cover the parts Misskey reads from the environment; rotate
      POSTGRES_PASSWORD and the db password in default.yml to match. After the web
      container is up, run the DB migrations (it runs `pnpm migrate` on start in the
      official image). COMPANION SERVICES: the single misskey/misskey image runs web
      + the federation/inbox/deliver/queue workers in one process by default, so no
      extra worker container is strictly required for small instances; for scale you
      can run additional misskey/misskey replicas with MK_ONLY_QUEUE/MK_ONLY_SERVER
      style splits. OPTIONAL: for full-text post search Misskey can use Elasticsearch/OpenSearch
      or Meilisearch (image getmeili/meilisearch) configured in default.yml under
      meilisearch/elasticsearch - not provisioned here; and for object storage of
      Drive uploads it can use any S3-compatible bucket (configured under objectStorage
      in default.yml) instead of the local volume.'
    kubero.dev/template.links: '["https://misskey-hub.net/en/docs/for-admin/install/guides/docker/",
      "https://misskey-hub.net/en/docs/"]'
    kubero.dev/template.screenshots: '["https://raw.githubusercontent.com/misskey-dev/misskey/develop/title.svg"]'
    kubero.dev/template.source: https://github.com/misskey-dev/misskey
    kubero.dev/template.categories: '["social", "communication", "media"]'
    kubero.dev/template.title: Misskey
    kubero.dev/template.website: https://misskey-hub.net/
  labels:
    manager: kubero
spec:
  name: misskey
  deploymentstrategy: docker
  addons:
  - displayName: PostgreSQL (CloudNativePG)
    env: []
    icon: /img/addons/pgsql.svg
    id: kubero-operator
    kind: Cluster
    resourceDefinitions:
      Cluster:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql'
        spec:
          instances: 1
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          primaryUpdateStrategy: unsupervised
          storage:
            storageClass: smart
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi
          bootstrap:
            initdb:
              database: misskey
              owner: misskey
              postInitApplicationSQL:
              - GRANT ALL ON SCHEMA public TO misskey
              - GRANT CREATE ON SCHEMA public TO misskey
              - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO misskey
              secret:
                name: '{{KUBERO_APP_NAME}}-postgresql-app'
          enableSuperuserAccess: true
          superuserSecret:
            name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
      superuserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-superuser'
        type: kubernetes.io/basic-auth
        stringData:
          username: postgres
          password: misskey
      appUserSecret:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{KUBERO_APP_NAME}}-postgresql-app'
        type: kubernetes.io/basic-auth
        stringData:
          username: misskey
          password: misskey
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: MISSKEY_URL
    value: '{{KUBERO_APP_URL}}'
  - name: DATABASE_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: DATABASE_PORT
    value: '5432'
  - name: DATABASE_DB
    value: misskey
  - name: DATABASE_USER
    value: misskey
  - name: DATABASE_PASSWORD
    value: misskey
  - name: POSTGRES_HOST
    value: '{{KUBERO_APP_NAME}}-postgresql-rw'
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_DB
    value: misskey
  - name: POSTGRES_USER
    value: misskey
  - name: POSTGRES_PASSWORD
    value: misskey
  - name: REDIS_HOST
    value: rfr-{{KUBERO_APP_NAME}}-valkey-readwrite
  - name: REDIS_PORT
    value: '6379'
  - name: NODE_ENV
    value: production
  extraVolumes:
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /misskey/files
    name: '{{KUBERO_APP_NAME}}-files'
    size: 5Gi
    storageClass: lite
  - accessModes:
    - ReadWriteOnce
    emptyDir: false
    mountPath: /misskey/.config
    name: '{{KUBERO_APP_NAME}}-config'
    size: 1Gi
    storageClass: lite
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  healthcheck:
    enabled: true
    path: /
    startupSeconds: 600
    timeoutSeconds: 5
    periodSeconds: 10
  image:
    containerPort: '3000'
    pullPolicy: Always
    repository: registry.stackblaze.cloud/misskey/misskey
    tag: latest
    command:
    - sh
    - -c
    - "grep -q 'kubero-seed' /misskey/.config/default.yml 2>/dev/null || cat > /misskey/.config/default.yml\
      \ <<EOF\n# kubero-seed\nurl: ${MISSKEY_URL}\nport: 3000\ndb:\n  host: ${DATABASE_HOST}\n\
      \  port: ${DATABASE_PORT}\n  db: ${DATABASE_DB}\n  user: ${DATABASE_USER}\n\
      \  pass: ${DATABASE_PASSWORD}\ndbReplications: false\nredis:\n  host: ${REDIS_HOST}\n\
      \  port: ${REDIS_PORT}\nfulltextSearch:\n  provider: sqlLike\nid: 'aidx'\nproxyBypassHosts:\n\
      \  - api.deepl.com\n  - api-free.deepl.com\n  - www.recaptcha.net\n  - hcaptcha.com\n\
      \  - challenges.cloudflare.com\nEOF\nexec pnpm run migrateandstart\n"
    run:
      securityContext:
        readOnlyRootFilesystem: false

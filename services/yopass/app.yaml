apiVersion: application.kubero.dev/v1alpha1
kind: KuberoApp
metadata:
  name: yopass
  annotations:
    kubero.dev/template.architecture: '[]'
    kubero.dev/template.description: Self-hosted web service for securely sharing
      one-time secrets, passwords and files with client-side encryption and automatic
      expiry.
    kubero.dev/template.icon: https://raw.githubusercontent.com/stackblaze/stack-templates/main/services/yopass/icon.png
    kubero.dev/template.installation: Yopass stores encrypted secrets ephemerally
      in Valkey (deployed as the bundled add-on); secrets auto-expire by TTL so no
      persistent volume is required. The server connects via REDIS at redis://rfr-yopass-valkey-readwrite:6379/0.
      Secrets are encrypted in the browser before upload, so the server never sees
      plaintext. Set the public URL via the BASE_URL env (already wired to {{KUBERO_APP_URL}})
      so generated share links are correct. For production behind the Kubero ingress,
      optionally set TRUSTED_PROXIES to the ingress CIDR. No database credentials
      to rotate.
    kubero.dev/template.links: '["https://github.com/jhaals/yopass#yopass", "https://hub.docker.com/r/jhaals/yopass"]'
    kubero.dev/template.screenshots: '[]'
    kubero.dev/template.source: https://github.com/jhaals/yopass
    kubero.dev/template.categories: '["security", "utilities", "productivity"]'
    kubero.dev/template.title: Yopass
    kubero.dev/template.website: https://yopass.se
  labels:
    manager: kubero
spec:
  name: yopass
  deploymentstrategy: docker
  addons:
  - displayName: Valkey
    env: []
    icon: /img/addons/redis.svg
    id: kubero-operator
    kind: Valkey
    resourceDefinitions:
      Valkey:
        apiVersion: rds.valkey.buf.red/v1alpha1
        kind: Valkey
        metadata:
          name: '{{KUBERO_APP_NAME}}-valkey'
        spec:
          version: '8.0'
          arch: replica
          replicas:
            shards: 1
            replicasOfShard: 1
          access:
            serviceType: ClusterIP
          storage:
            capacity: 1Gi
            storageClassName: fast
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
  envVars:
  - name: DATABASE
    value: redis
  - name: REDIS
    value: redis://rfr-{{KUBERO_APP_NAME}}-valkey-readwrite:6379/0
  - name: PORT
    value: '1337'
  - name: ADDRESS
    value: 0.0.0.0
  - name: BASE_URL
    value: '{{KUBERO_APP_URL}}'
  - name: MAX_LENGTH
    value: '10000'
  extraVolumes: []
  cronjobs: []
  web:
    replicaCount: 1
  worker:
    replicaCount: 0
  image:
    containerPort: '1337'
    pullPolicy: Always
    repository: ghcr.io/stackblaze/stack-templates/yopass
    tag: latest
    run:
      securityContext:
        readOnlyRootFilesystem: false
